<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat - Realtime Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #0b4a3f;
            --accent: #00a884;
            --bg-light: #f0f2f5;
            --my-msg: #d9fdd3;
            --other-msg: #ffffff;
            --text: #3b4a54;
        }

        body.dark-mode {
            --bg-light: #0b141a;
            --my-msg: #005c4b;
            --other-msg: #202c33;
            --text: #e9edef;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-light); height: 100vh; overflow: hidden; color: var(--text); }

        /* 1. INTRO SCREEN */
        #intro {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; transition: 0.5s;
        }
        .intro-logo { font-size: 3rem; font-weight: bold; margin-bottom: 10px; }

        /* 2. AUTH SCREEN */
        #auth-screen {
            display: none; height: 100vh; width: 100%;
            justify-content: center; align-items: center; background: var(--bg-light);
        }
        .auth-card {
            background: white; padding: 30px; border-radius: 15px;
            width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn-main { background: var(--accent); color: white; }

        /* 3. MAIN APP */
        #app { display: none; height: 100vh; grid-template-columns: 350px 1fr; }
        #sidebar { background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: var(--bg-light); display: flex; justify-content: space-between; align-items: center; }
        
        #chat-area { display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        .chat-header { padding: 10px 20px; background: var(--bg-light); display: flex; align-items: center; justify-content: space-between; }
        
        #msg-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; position: relative; }
        .sent { align-self: flex-end; background: var(--my-msg); }
        .received { align-self: flex-start; background: var(--other-msg); }

        .input-area { padding: 10px 15px; background: var(--bg-light); display: flex; align-items: center; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }

        /* Settings Modal */
        #modal-settings {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px; display: none; z-index: 10000; width: 320px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            #chat-area { display: none; position: fixed; inset: 0; z-index: 100; }
            #chat-area.active { display: flex; }
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="intro-logo"><i class="fas fa-comments"></i> ZChat</div>
        <p>Realtime Messaging</p>
        <p style="margin-top:20px; opacity:0.7">Created by zZerr44</p>
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">ZChat Login</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <div style="display:flex; justify-content: space-between; align-items: center; margin: 10px 0;">
                <span>Keep Login</span>
                <input type="checkbox" id="keep-login" style="width:20px">
            </div>
            <button class="btn btn-main" onclick="handleAuth()">Action</button>
            <p id="switch-auth" onclick="toggleMode()" style="margin-top:15px; color:var(--accent); cursor:pointer">Belum punya akun? Daftar</p>
        </div>
    </div>

    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <strong><i class="fa fa-user-circle"></i> <span id="my-name">User</span></strong>
                <div>
                    <i class="fa fa-user-plus" onclick="addUser()" style="margin-right:15px; cursor:pointer"></i>
                    <i class="fa fa-cog" onclick="showSettings()" style="cursor:pointer"></i>
                </div>
            </div>
            <div style="padding:10px"><input type="text" id="search" placeholder="Cari teman..." onkeyup="filterFriends()" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;"></div>
            <div id="contact-list" style="flex:1; overflow-y:auto"></div>
        </aside>

        <main id="chat-area">
            <div class="chat-header">
                <div style="display:flex; align-items:center">
                    <i class="fa fa-arrow-left" onclick="closeChat()" style="margin-right:15px; cursor:pointer"></i>
                    <strong id="target-name">Pilih Teman</strong>
                </div>
                <div id="tools" style="display:none">
                    <i class="fa fa-ban" onclick="blockUser()" style="margin-right:15px; cursor:pointer" title="Block"></i>
                    <i class="fa fa-trash" onclick="deleteChat()" style="cursor:pointer" title="Hapus Chat"></i>
                </div>
            </div>
            <div id="msg-container"></div>
            <div class="input-area" id="input-row" style="display:none">
                <input type="text" id="msg-input" placeholder="Ketik pesan...">
                <i class="fa fa-paper-plane" onclick="sendMsg()" style="color:var(--accent); font-size:1.5rem; cursor:pointer"></i>
            </div>
        </main>
    </div>

    <div id="modal-settings">
        <h3>Settings</h3><hr style="margin:10px 0">
        <p>Dark Mode: <input type="checkbox" onchange="document.body.classList.toggle('dark-mode')"></p>
        <p>Wallpaper: <input type="color" onchange="document.getElementById('chat-area').style.background = this.value" style="width:100%"></p>
        <div style="margin: 20px 0; font-size: 0.8rem; text-align:center">
            <strong>ZChat v1.0</strong><br>Created by zZerr44
        </div>
        <button class="btn btn-main" onclick="logout()" style="background:#ff4b2b">Logout</button>
        <button class="btn" onclick="document.getElementById('modal-settings').style.display='none'">Close</button>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let me = localStorage.getItem('z_user') || null;
        let activeTarget = null;
        let mode = 'login';

        // 1. Intro Logic
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                if (me) startApp();
                else document.getElementById('auth-screen').style.display = 'flex';
            }, 2000);
        };

        // 2. Auth Logic
        function toggleMode() {
            mode = mode === 'login' ? 'register' : 'login';
            document.getElementById('auth-title').innerText = mode === 'login' ? 'ZChat Login' : 'ZChat Register';
            document.getElementById('switch-auth').innerText = mode === 'login' ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Login';
        }

        async function handleAuth() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Isi semua!");

            const ref = db.ref('users/' + u);
            const snap = await ref.once('value');

            if(mode === 'register') {
                if(snap.exists()) return alert("Username sudah ada!");
                await ref.set({ password: p });
                alert("Berhasil daftar!"); toggleMode();
            } else {
                if(snap.exists() && snap.val().password === p) {
                    me = u;
                    if(document.getElementById('keep-login').checked) localStorage.setItem('z_user', u);
                    startApp();
                } else alert("Salah user/pass!");
            }
        }

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            document.getElementById('my-name').innerText = me;
            loadContacts();
        }

        // 3. Chat & Contacts
        async function addUser() {
            const t = prompt("Masukkan username teman:").toLowerCase();
            if(!t || t === me) return;
            const snap = await db.ref('users/' + t).once('value');
            if(!snap.exists()) return alert("User tidak ditemukan!");
            await db.ref(`contacts/${me}/${t}`).set(true);
        }

        function loadContacts() {
            db.ref(`contacts/${me}`).on('value', snap => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const div = document.createElement('div');
                    div.style = "padding:15px; border-bottom:1px solid #eee; cursor:pointer";
                    div.innerHTML = `<strong>${c.key}</strong>`;
                    div.onclick = () => openChat(c.key);
                    list.appendChild(div);
                });
            });
        }

        function openChat(name) {
            activeTarget = name;
            document.getElementById('target-name').innerText = name;
            document.getElementById('tools').style.display = 'block';
            document.getElementById('input-row').style.display = 'flex';
            if(window.innerWidth <= 768) document.getElementById('chat-area').classList.add('active');

            const room = [me, name].sort().join("_");
            db.ref('messages/' + room).on('value', snap => {
                const cont = document.getElementById('msg-container');
                cont.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const b = document.createElement('div');
                    b.className = `bubble ${d.sender === me ? 'sent' : 'received'}`;
                    b.innerText = d.text;
                    cont.appendChild(b);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        async function sendMsg() {
            const txt = document.getElementById('msg-input').value;
            if(!txt || !activeTarget) return;

            const blocked = await db.ref(`blocked/${activeTarget}/${me}`).once('value');
            if(blocked.exists()) return alert("Kamu diblokir!");

            const room = [me, activeTarget].sort().join("_");
            db.ref('messages/' + room).push({ sender: me, text: txt, time: Date.now() });
            document.getElementById('msg-input').value = "";
        }

        // Tools
        function closeChat() { document.getElementById('chat-area').classList.remove('active'); }
        function showSettings() { document.getElementById('modal-settings').style.display = 'block'; }
        function logout() { localStorage.clear(); location.reload(); }
        function blockUser() { if(confirm("Blokir?")) db.ref(`blocked/${me}/${activeTarget}`).set(true); }
        function deleteChat() { if(confirm("Hapus chat?")) db.ref('messages/' + [me, activeTarget].sort().join("_")).remove(); }
    </script>
</body>
</html>
