<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Elite - No Auth Version</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* --- 1. DESIGN VARIABLES --- */
        :root {
            --z-bg: #000000;
            --z-surface: #0a0a0a;
            --z-card: #121212;
            --z-accent: #007bff;
            --z-accent-dark: #004a99;
            --z-border: #1e1e1e;
            --z-text-main: #ffffff;
            --z-text-dim: #777777;
            --z-danger: #ff3333;
            --z-success: #00e676;
            --z-radius: 18px;
        }

        /* --- 2. GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--z-bg);
            color: var(--z-text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }

        /* --- 3. UI COMPONENTS --- */
        #z-loader {
            position: fixed;
            inset: 0;
            background: var(--z-bg);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .z-spinner-ring {
            width: 50px;
            height: 50px;
            border: 4px solid var(--z-border);
            border-top: 4px solid var(--z-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #z-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--z-accent);
            padding: 14px 25px;
            border-radius: 50px;
            z-index: 100000;
            font-weight: 800;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: none;
        }

        /* --- 4. MODAL ENGINE --- */
        .z-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 90000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .z-modal-box {
            background: var(--z-card);
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--z-border);
            text-align: center;
        }

        /* --- 5. ENTRY SCREEN (LOGIN TANPA PASSWORD) --- */
        #z-entry-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .z-entry-card {
            background: var(--z-card);
            width: 100%;
            max-width: 400px;
            padding: 50px 30px;
            border-radius: 35px;
            border: 1px solid var(--z-border);
            text-align: center;
        }

        .z-logo-large {
            width: 80px;
            height: 80px;
            background: var(--z-accent);
            margin: 0 auto 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: 900;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.4);
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            background: var(--z-surface);
            border: 1px solid var(--z-border);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--z-accent); }

        .z-btn-main {
            width: 100%;
            padding: 16px;
            background: var(--z-accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }

        .z-btn-main:active { transform: scale(0.96); }

        /* --- 6. DASHBOARD INTERFACE --- */
        #z-dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--z-card);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--z-accent);
        }

        .z-user-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .z-avatar {
            width: 40px;
            height: 40px;
            background: var(--z-accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        .z-menu-btn {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .z-menu-btn span {
            width: 28px;
            height: 3px;
            background: var(--z-accent);
        }

        /* --- 7. SIDEBAR MENU --- */
        #z-sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            display: none;
        }

        #z-sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: var(--z-card);
            z-index: 10001;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 25px;
            border-left: 2px solid var(--z-accent);
        }

        #z-sidebar.open { right: 0; }

        .z-side-title {
            color: var(--z-accent);
            font-weight: 900;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .z-side-item {
            padding: 18px 0;
            border-bottom: 1px solid var(--z-border);
            color: var(--z-text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .z-side-item:hover { color: var(--z-accent); }

        /* --- 8. FRIEND LIST --- */
        #z-friend-container {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .z-friend-card {
            background: var(--z-surface);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border: 1px solid var(--z-border);
            cursor: pointer;
            transition: 0.3s;
        }

        .z-friend-card:hover { border-color: var(--z-accent); background: #111; }

        /* --- 9. CHAT VIEW ENGINE --- */
        #z-chat-page {
            position: fixed;
            inset: 0;
            background: var(--z-bg);
            z-index: 50000;
            display: flex;
            flex-direction: column;
        }

        .z-chat-header {
            padding: 15px 20px;
            background: var(--z-card);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--z-accent);
        }

        #z-chat-logs {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .z-msg {
            max-width: 80%;
            padding: 14px 18px;
            font-size: 15px;
            border-radius: 20px;
            line-height: 1.4;
        }

        .z-msg-me { align-self: flex-end; background: var(--z-accent); border-bottom-right-radius: 4px; }
        .z-msg-them { align-self: flex-start; background: var(--z-border); border-bottom-left-radius: 4px; }

        .z-chat-input-bar {
            padding: 20px;
            background: var(--z-card);
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--z-border);
        }
    </style>
</head>
<body>

    <div id="z-loader" class="hidden"><div class="z-spinner-ring"></div><p style="margin-top:20px; color:var(--z-accent); letter-spacing:3px;">INITIALIZING...</p></div>
    <div id="z-toast"></div>

    <div id="z-modal-root" class="z-modal-overlay hidden">
        <div class="z-modal-box">
            <h3 id="z-m-title" style="color:var(--z-accent); margin-bottom:15px">TITLE</h3>
            <div id="z-m-body"></div>
            <div style="display:flex; gap:12px; margin-top:25px">
                <button class="z-btn-main" id="z-m-ok" style="flex:1">OKE</button>
                <button class="z-btn-main" onclick="closeZModal()" style="flex:1; background:#333">BATAL</button>
            </div>
        </div>
    </div>

    <div id="z-entry-page">
        <div class="z-entry-card">
            <div class="z-logo-large">Z</div>
            <h1 style="margin-bottom:30px; letter-spacing:2px">ZCHAT ELITE</h1>
            <p style="color:var(--z-text-dim); margin-bottom:20px">Masukkan Username untuk Masuk</p>
            <input type="text" id="z-username-input" placeholder="Contoh: zerr44">
            <button class="z-btn-main" onclick="processLogin()">MASUK KE SISTEM</button>
            <p style="font-size:11px; margin-top:20px; color:#444">Data tersimpan otomatis di Database</p>
        </div>
    </div>

    <div id="z-dashboard" class="hidden">
        <div id="z-sidebar-overlay" onclick="toggleSidebar()"></div>
        <header>
            <div class="z-user-pill" onclick="toggleSidebar()">
                <div id="z-my-avatar" class="z-avatar">?</div>
                <div style="font-weight:800; font-size:14px">PROFIL</div>
            </div>
            <div style="font-weight:900; letter-spacing:4px; color:var(--z-accent)">ZCHAT</div>
            <div class="z-menu-btn" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </div>
        </header>

        <nav id="z-sidebar">
            <div class="z-side-title">PENGATURAN</div>
            <div class="z-side-item" onclick="viewMyProfile()">👤 Detail Akun</div>
            <div class="z-side-item" onclick="setMyStatus()">🌗 Status Kehadiran</div>
            <div class="z-side-item" onclick="cleanSystemCache()" style="color:var(--z-danger)">🧹 Bersihkan Sesi</div>
            <div class="z-side-item" onclick="systemLogout()" style="margin-top:40px; color:var(--z-danger); border:none">🚪 LOGOUT</div>
        </nav>

        <div id="z-friend-container">
            <button class="z-btn-main" onclick="addNewFriend()" style="margin-bottom:25px; border-radius:15px">+ TEMUKAN TEMAN</button>
            <div id="z-friend-list-area">
                </div>
        </div>
    </div>

    <div id="z-chat-page" class="hidden">
        <div class="z-chat-header">
            <div onclick="closeChat()" style="font-size:35px; cursor:pointer; color:var(--z-accent)">←</div>
            <div>
                <b id="z-chat-target-name" style="font-size:18px">USERNAME</b>
                <div style="font-size:11px; color:var(--z-success)">Aktif di ZChat</div>
            </div>
        </div>
        <div id="z-chat-logs"></div>
        <div class="z-chat-input-bar">
            <input id="z-chat-input" placeholder="Tulis pesan..." style="margin:0; flex:1">
            <button class="z-btn-main" style="width:90px; margin:0" onclick="sendMessage()">KIRIM</button>
        </div>
    </div>

    <script>
        // --- CORE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const zDB = firebase.database();

        let myUser = null;
        let activeChatUser = null;

        // --- UI UTILS ---
        function showToast(msg) {
            const t = document.getElementById('z-toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function setLoader(s) { document.getElementById('z-loader').classList.toggle('hidden', !s); }

        function openZModal(t, b, ok) {
            document.getElementById('z-m-title').innerText = t;
            document.getElementById('z-m-body').innerHTML = b;
            document.getElementById('z-modal-root').classList.remove('hidden');
            document.getElementById('z-m-ok').onclick = () => { ok(); closeZModal(); };
        }

        function closeZModal() { document.getElementById('z-modal-root').classList.add('hidden'); }

        function toggleSidebar() {
            const s = document.getElementById('z-sidebar');
            const o = document.getElementById('z-sidebar-overlay');
            const open = s.classList.toggle('open');
            o.style.display = open ? 'block' : 'none';
        }

        // --- AUTH ENGINE (NO PASSWORD) ---
        async function processLogin() {
            const u = document.getElementById('z-username-input').value.trim().toLowerCase();
            if(!u || u.length < 3) return showToast("Username minimal 3 karakter!");

            setLoader(true);
            try {
                // Simpan user ke database kalau belum ada
                await zDB.ref('users/' + u).update({ username: u, last_active: Date.now() });
                
                const userData = { username: u };
                loginSuccess(userData);
            } catch (e) {
                showToast("Koneksi Database Gagal!");
            }
            setLoader(false);
        }

        function loginSuccess(data) {
            myUser = data;
            localStorage.setItem('z_elite_user', JSON.stringify(data));
            document.getElementById('z-entry-page').classList.add('hidden');
            document.getElementById('z-dashboard').classList.remove('hidden');
            document.getElementById('z-my-avatar').innerText = data.username[0].toUpperCase();
            loadFriendList();
        }

        // Auto Login
        const saved = localStorage.getItem('z_elite_user');
        if(saved) loginSuccess(JSON.parse(saved));

        // --- SOCIAL ENGINE ---
        function addNewFriend() {
            openZModal("CARI TEMAN", `<input id="z-find-user" placeholder="Ketik Username...">`, async () => {
                const target = document.getElementById('z-find-user').value.trim().toLowerCase();
                if(!target || target === myUser.username) return;

                setLoader(true);
                const check = await zDB.ref('users/' + target).once('value');
                if(check.exists()) {
                    await zDB.ref(`friends/${myUser.username}/${target}`).set(true);
                    await zDB.ref(`friends/${target}/${myUser.username}`).set(true);
                    showToast("Teman Ditambahkan!");
                } else {
                    showToast("User tidak ditemukan!");
                }
                setLoader(false);
            });
        }

        function loadFriendList() {
            zDB.ref(`friends/${myUser.username}`).on('value', snap => {
                const area = document.getElementById('z-friend-list-area');
                area.innerHTML = "";
                if(!snap.exists()) {
                    area.innerHTML = `<p style="text-align:center; color:#333; margin-top:50px">Belum ada teman.</p>`;
                    return;
                }
                snap.forEach(f => {
                    const name = f.key;
                    const card = document.createElement('div');
                    card.className = "z-friend-card";
                    card.innerHTML = `
                        <div class="z-avatar" style="background:#222; border:1px solid var(--z-accent); margin-right:20px;">
                            ${name[0].toUpperCase()}
                        </div>
                        <div style="flex:1">
                            <div style="font-weight:900; letter-spacing:1px">${name.toUpperCase()}</div>
                            <div style="font-size:12px; color:var(--z-text-dim)">Klik untuk kirim pesan</div>
                        </div>
                    `;
                    card.onclick = () => openChat(name);
                    area.appendChild(card);
                });
            });
        }

        // --- CHAT ENGINE ---
        function openChat(name) {
            activeChatUser = name;
            document.getElementById('z-chat-target-name').innerText = name.toUpperCase();
            document.getElementById('z-chat-page').classList.remove('hidden');
            listenMessages();
        }

        function closeChat() {
            document.getElementById('z-chat-page').classList.add('hidden');
            const chatID = [myUser.username, activeChatUser].sort().join('_');
            zDB.ref(`chats/${chatID}`).off();
            activeChatUser = null;
        }

        function sendMessage() {
            const input = document.getElementById('z-chat-input');
            const text = input.value.trim();
            if(!text) return;

            const chatID = [myUser.username, activeChatUser].sort().join('_');
            zDB.ref(`chats/${chatID}`).push({
                s: myUser.username,
                t: text,
                time: Date.now()
            });
            input.value = "";
            input.focus();
        }

        function listenMessages() {
            const chatID = [myUser.username, activeChatUser].sort().join('_');
            const area = document.getElementById('z-chat-logs');
            
            zDB.ref(`chats/${chatID}`).on('value', snap => {
                area.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const isMe = d.s === myUser.username;
                    const b = document.createElement('div');
                    b.className = `z-msg ${isMe ? 'z-msg-me' : 'z-msg-them'}`;
                    b.innerText = d.t;
                    area.appendChild(b);
                });
                area.scrollTop = area.scrollHeight;
            });
        }

        // --- SIDEBAR ACTIONS ---
        function viewMyProfile() {
            openZModal("PROFIL", `<p>Username: <b>${myUser.username}</b></p><p>Status: Elite User</p>`, ()=>{});
        }

        function setMyStatus() {
            openZModal("STATUS", `<button class="z-btn-main" onclick="showToast('Status: Sibuk')">Sibuk</button>`, ()=>{});
        }

        function cleanSystemCache() {
            openZModal("RESET", "Bersihkan sesi login?", () => { localStorage.clear(); location.reload(); });
        }

        function systemLogout() {
            openZModal("LOGOUT", "Keluar dari akun?", () => { localStorage.removeItem('z_elite_user'); location.reload(); });
        }

        // Handle Enter
        document.addEventListener('keypress', e => {
            if(e.key === 'Enter' && document.activeElement.id === 'z-chat-input') sendMessage();
        });
    </script>
</body>
</html>
