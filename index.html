<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Final - Pro Edition</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* --- 1. CORE STYLE & THEME --- */
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --input: #181818;
            --border: #222222;
            --accent: #007bff;
            --accent-glow: rgba(0, 123, 255, 0.4);
            --text: #ffffff;
            --text-dim: #888888;
            --danger: #ff4444;
            --success: #00ff88;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }

        /* --- 2. CUSTOM CSS ICONS (ANTI-EMOJI) --- */
        .icon-plus {
            width: 14px;
            height: 14px;
            position: relative;
            display: inline-block;
        }
        .icon-plus::before, .icon-plus::after {
            content: "";
            position: absolute;
            background: currentColor;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .icon-plus::before { width: 100%; height: 2px; }
        .icon-plus::after { width: 2px; height: 100%; }

        .icon-arrow {
            width: 12px;
            height: 12px;
            border-top: 3px solid currentColor;
            border-left: 3px solid currentColor;
            transform: rotate(-45deg);
            display: inline-block;
        }

        /* --- 3. SYSTEM COMPONENTS --- */
        #z-loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader-box {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #z-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 10001;
            display: none;
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        /* --- 4. MODAL SYSTEM --- */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-box {
            background: var(--card);
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
        }

        /* --- 5. LOGIN SCREEN --- */
        #page-login {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            padding: 50px 30px;
            border-radius: 32px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .app-initial {
            width: 80px;
            height: 80px;
            background: var(--accent);
            margin: 0 auto 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        input {
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn-p {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-p:active { transform: scale(0.97); }

        /* --- 6. DASHBOARD --- */
        #page-app {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--card);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .mini-avatar {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        .menu-bar {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-bar span {
            width: 25px;
            height: 3px;
            background: var(--accent);
            border-radius: 5px;
        }

        /* --- 7. SIDEBAR --- */
        #sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 5000;
            display: none;
        }

        #sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: var(--card);
            z-index: 5001;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 25px;
            border-left: 1px solid var(--accent);
        }

        #sidebar.active { right: 0; }

        .side-title { color: var(--accent); font-weight: 900; margin-bottom: 30px; font-size: 20px; }
        .side-btn {
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .side-btn:hover { color: var(--text); }

        /* --- 8. CHAT ENGINE UI --- */
        #chat-window {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 8000;
            display: flex;
            flex-direction: column;
        }

        .chat-top {
            padding: 15px 20px;
            background: var(--card);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--accent);
        }

        #chat-logs {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: radial-gradient(circle, #0a0a0a 10%, transparent 10%);
            background-size: 20px 20px;
        }

        .m-box { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .m-me { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .m-them { align-self: flex-start; background: var(--border); border-bottom-left-radius: 4px; }

        .chat-bottom {
            padding: 20px;
            background: var(--card);
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border);
        }

        .friend-item {
            background: #0a0a0a;
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="z-loader" class="hidden"><div class="loader-box"></div></div>
    <div id="z-toast">Pesan</div>

    <div id="z-mod" class="modal-bg hidden">
        <div class="modal-box">
            <h3 id="z-mod-t" style="color:var(--accent); margin-bottom:15px">TITLE</h3>
            <div id="z-mod-b"></div>
            <div style="display:flex; gap:12px; margin-top:25px">
                <button class="btn-p" id="z-mod-ok" style="flex:1">PROSES</button>
                <button class="btn-p" onclick="closeZMod()" style="flex:1; background:#333">BATAL</button>
            </div>
        </div>
    </div>

    <div id="page-login">
        <div class="login-card">
            <div class="app-initial">Z</div>
            <h1 style="margin-bottom:10px">ZChat Pro</h1>
            <p style="color:var(--text-dim); margin-bottom:30px">Gunakan Username untuk Masuk</p>
            <input type="text" id="in-user" placeholder="Nama Pengguna">
            <button class="btn-p" onclick="startEngine()">MASUK</button>
        </div>
    </div>

    <div id="page-app" class="hidden">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <header>
            <div class="user-meta" onclick="toggleSidebar()">
                <div id="my-avatar" class="mini-avatar">?</div>
                <b style="font-size:14px">SAYA</b>
            </div>
            <div style="font-weight:900; letter-spacing:4px; color:var(--accent)">ZCHAT</div>
            <div class="menu-bar" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </div>
        </header>

        <nav id="sidebar">
            <div class="side-title">PENGATURAN</div>
            <div class="side-btn" onclick="actProfile()">Info Akun</div>
            <div class="side-btn" onclick="actStatus()">Status Online</div>
            <div class="side-btn" onclick="actClear()">Bersihkan Cache</div>
            <div class="side-btn" style="margin-top:50px; color:var(--danger)" onclick="actLogout()">Keluar Sesi</div>
        </nav>

        <div style="padding:25px; flex:1; overflow-y:auto">
            <button class="btn-p" onclick="actAddFriend()" style="margin-bottom:30px; border-radius:18px">
                <span class="icon-plus" style="margin-right:10px"></span> TAMBAH TEMAN
            </button>
            <div id="friend-list"></div>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-top">
            <div onclick="exitChat()" style="cursor:pointer; color:var(--accent); padding-right:10px">
                <span class="icon-arrow"></span>
            </div>
            <b id="target-label" style="font-size:18px">USERNAME</b>
        </div>
        <div id="chat-logs"></div>
        <div class="chat-bottom">
            <input id="chat-input" placeholder="Tulis pesan..." style="margin:0; flex:1">
            <button class="btn-p" style="width:90px; margin:0" onclick="sendMsg()">KIRIM</button>
        </div>
    </div>

    <script>
        // --- CONFIG & DB ---
        const fbConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        let me = null;
        let target = null;

        // --- CORE UI ---
        function toast(m){ const t=document.getElementById('z-toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        function loading(s){ document.getElementById('z-loader').classList.toggle('hidden', !s); }
        function toggleSidebar(){ const s=document.getElementById('sidebar'); const o=document.getElementById('sidebar-overlay'); const a=s.classList.toggle('active'); o.style.display=a?'block':'none'; }
        function openZMod(t, b, ok){ document.getElementById('z-mod-t').innerText=t; document.getElementById('z-mod-b').innerHTML=b; document.getElementById('z-mod').classList.remove('hidden'); document.getElementById('z-mod-ok').onclick=()=>{ok(); closeZMod();}; }
        function closeZMod(){ document.getElementById('z-mod').classList.add('hidden'); }

        // --- AUTH ENGINE (LOGIN/REGISTER AUTO) ---
        async function startEngine(){
            const u = document.getElementById('in-user').value.trim().toLowerCase();
            if(u.length < 3) return toast("Nama terlalu pendek!");

            loading(true);
            try {
                // Gunakan update agar data yang sudah ada tidak terhapus
                await db.ref('users/' + u).update({ username: u, online: true });
                loginSuccess({ username: u });
            } catch(e) {
                toast("Database Error!");
            }
            loading(false);
        }

        function loginSuccess(data){
            me = data;
            localStorage.setItem('z_session_v7', JSON.stringify(data));
            document.getElementById('page-login').classList.add('hidden');
            document.getElementById('page-app').classList.remove('hidden');
            document.getElementById('my-avatar').innerText = me.username[0].toUpperCase();
            listenFriends();
        }

        const saved = localStorage.getItem('z_session_v7');
        if(saved) loginSuccess(JSON.parse(saved));

        // --- SOCIAL ENGINE ---
        function actAddFriend(){
            openZMod("CARI USER", `<input id="find-u" placeholder="Masukkan Nama...">`, async()=>{
                const t = document.getElementById('find-u').value.trim().toLowerCase();
                if(!t || t === me.username) return;

                loading(true);
                const check = await db.ref('users/' + t).once('value');
                if(check.exists()){
                    await db.ref(`friends/${me.username}/${t}`).set(true);
                    await db.ref(`friends/${t}/${me.username}`).set(true);
                    toast("Berhasil Terhubung!");
                } else {
                    toast("User tidak ada!");
                }
                loading(false);
            });
        }

        function listenFriends(){
            db.ref(`friends/${me.username}`).on('value', snap => {
                const list = document.getElementById('friend-list');
                list.innerHTML = "";
                if(!snap.exists()){
                    list.innerHTML = `<div style="text-align:center; color:#222; margin-top:50px">Daftar teman kosong.</div>`;
                    return;
                }
                snap.forEach(f => {
                    const name = f.key;
                    const el = document.createElement('div');
                    el.className = "friend-item";
                    el.innerHTML = `
                        <div class="mini-avatar" style="background:#222; border:1px solid var(--accent); margin-right:15px">
                            ${name[0].toUpperCase()}
                        </div>
                        <div style="flex:1">
                            <div style="font-weight:800">${name.toUpperCase()}</div>
                            <div style="font-size:12px; color:var(--text-dim)">Klik untuk mulai chat</div>
                        </div>
                    `;
                    el.onclick = () => openChat(name);
                    list.appendChild(el);
                });
            });
        }

        // --- CHAT ENGINE ---
        function openChat(name){
            target = name;
            document.getElementById('target-label').innerText = name.toUpperCase();
            document.getElementById('chat-window').classList.remove('hidden');
            listenMsgs();
        }

        function exitChat(){
            document.getElementById('chat-window').classList.add('hidden');
            const cid = [me.username, target].sort().join('_');
            db.ref(`chats/${cid}`).off();
            target = null;
        }

        function sendMsg(){
            const inp = document.getElementById('chat-input');
            const txt = inp.value.trim();
            if(!txt) return;

            const cid = [me.username, target].sort().join('_');
            db.ref(`chats/${cid}`).push({ s: me.username, t: txt, d: Date.now() });
            inp.value = "";
            inp.focus();
        }

        function listenMsgs(){
            const cid = [me.username, target].sort().join('_');
            const box = document.getElementById('chat-logs');
            db.ref(`chats/${cid}`).on('value', snap => {
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const isMe = d.s === me.username;
                    const msgEl = document.createElement('div');
                    msgEl.className = `m-box ${isMe ? 'm-me' : 'm-them'}`;
                    msgEl.innerText = d.t;
                    box.appendChild(msgEl);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- SIDEBAR ACTIONS ---
        function actProfile(){ openZMod("PROFIL", `<p>User: ${me.username}</p><p>Status: Pro Member</p>`, ()=>{}); }
        function actStatus(){ openZMod("STATUS", `<p style="color:var(--success)">Anda Sedang Online</p>`, ()=>{}); }
        function actClear(){ openZMod("RESET", "Muat ulang aplikasi?", ()=>location.reload()); }
        function actLogout(){ openZMod("KELUAR", "Hapus data sesi?", ()=>{ localStorage.clear(); location.reload(); }); }

        // ENTER KEY
        document.addEventListener('keypress', e => { if(e.key==='Enter' && document.activeElement.id==='chat-input') sendMsg(); });
    </script>
</body>
                </html>
