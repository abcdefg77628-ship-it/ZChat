<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat - Official App</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00a884;
            --primary-dark: #008069;
            --bg-light: #f0f2f5;
            --bg-chat: #efeae2;
            --white: #ffffff;
            --text-dark: #111b21;
            --text-gray: #667781;
            --my-bubble: #d9fdd3;
            --other-bubble: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); overflow: hidden; height: 100vh; width: 100vw; }

        /* --- SPLASH SCREEN (FIXED) --- */
        #splash {
            position: fixed; inset: 0; background: var(--white);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: var(--transition);
        }
        .logo-z { 
            width: 100px; height: 100px; background: var(--primary); 
            border-radius: 25px; display: flex; align-items: center; 
            justify-content: center; margin-bottom: 20px; 
            box-shadow: 0 10px 20px rgba(0,168,132,0.3);
            animation: pulse 2s infinite;
        }
        .logo-z span { font-size: 60px; color: white; font-weight: 800; font-family: 'Arial'; }
        
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
            100% { transform: scale(1); } 
        }

        /* --- AUTH PAGES --- */
        .auth-container { 
            display: none; height: 100vh; align-items: center; justify-content: center; padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }
        .auth-card { background: white; padding: 35px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .auth-card h2 { margin-bottom: 20px; color: var(--text-dark); text-align: center; font-weight: 700; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e1e1e1; border-radius: 12px; outline: none; font-size: 15px; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); border: none; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        .file-input-label { display: block; text-align: center; padding: 15px; border: 2px dashed #ccc; margin: 10px 0; border-radius: 12px; cursor: pointer; color: var(--text-gray); }

        /* --- MAIN UI --- */
        #app { display: none; height: 100vh; grid-template-columns: 350px 1fr; }
        
        .sidebar { background: var(--white); border-right: 1px solid #e1e1e1; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #f0f2f5; display: flex; justify-content: space-between; align-items: center; }
        .user-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid white; }
        .search-bar { padding: 12px; }
        .search-bar input { background: #f0f2f5; border: none; border-radius: 10px; padding: 10px 15px; margin: 0; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
        .chat-item:hover { background: #f5f6f6; }
        .chat-item-info { margin-left: 15px; flex: 1; overflow: hidden; }
        .chat-item-top { display: flex; justify-content: space-between; margin-bottom: 4px; }

        .main-content { display: flex; flex-direction: column; background: var(--bg-chat); position: relative; }
        .chat-header { padding: 12px 20px; background: #f0f2f5; display: flex; align-items: center; z-index: 10; border-bottom: 1px solid #e1e1e1; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { max-width: 70%; padding: 8px 14px; border-radius: 12px; font-size: 14.5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--my-bubble); border-top-right-radius: 0; }
        .msg.other { align-self: flex-start; background: var(--other-bubble); border-top-left-radius: 0; }
        .msg-time { font-size: 10px; color: var(--text-gray); margin-left: 8px; float: right; margin-top: 5px; }

        .chat-input-area { padding: 12px 20px; background: #f0f2f5; display: flex; align-items: center; gap: 15px; }
        .chat-input-area input { flex: 1; border: none; padding: 12px 18px; border-radius: 25px; margin: 0; font-size: 15px; }
        .icon-btn { color: var(--text-gray); font-size: 22px; cursor: pointer; }

        /* Mobile Styles */
        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            .sidebar { width: 100%; position: absolute; inset: 0; z-index: 20; }
            .main-content { position: absolute; inset: 0; z-index: 10; display: none; }
            .main-content.active { display: flex; z-index: 30; }
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-z"><span>Z</span></div>
        <h1 style="color: var(--primary); letter-spacing: 4px; font-weight: 800;">ZCHAT</h1>
        <p id="loader-status" style="color: var(--text-gray); margin-top: 15px; font-size: 13px;">Memuat sistem...</p>
    </div>

    <div id="login-page" class="auth-container">
        <div class="auth-card">
            <h2>Login ZChat</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">Masuk</button>
            <p style="text-align: center; margin-top: 20px; font-size: 14px;">
                Belum punya akun? <a href="#" onclick="showAuth('register')" style="color: var(--primary); font-weight:600; text-decoration:none;">Daftar</a>
            </p>
        </div>
    </div>

    <div id="register-page" class="auth-container">
        <div class="auth-card">
            <h2>Buat Akun</h2>
            <label class="file-input-label">
                <input type="file" id="reg-photo" hidden accept="image/*" onchange="previewImg(this)">
                <span id="file-status"><i class="fas fa-camera"></i> Foto Profil</span>
            </label>
            <input type="text" id="reg-username" placeholder="Username Unik">
            <input type="password" id="reg-password" placeholder="Password">
            <button class="btn-main" onclick="handleRegister()">Daftar Sekarang</button>
            <p style="text-align: center; margin-top: 20px; font-size: 14px;">
                Sudah ada akun? <a href="#" onclick="showAuth('login')" style="color: var(--primary); font-weight:600; text-decoration:none;">Login</a>
            </p>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <img id="my-avatar" src="" class="user-img" onclick="showModal('profile-modal')">
                <div class="header-icons">
                    <i class="fas fa-comment-dots icon-btn" style="margin-right: 20px;" onclick="showModal('new-chat-modal')"></i>
                    <i class="fas fa-sign-out-alt icon-btn" onclick="logout()"></i>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Cari teman chat..." onkeyup="searchChat(this.value)">
            </div>
            <div class="chat-list" id="chat-list"></div>
        </div>

        <div class="main-content" id="chat-area">
            <div class="chat-header">
                <i class="fas fa-arrow-left icon-btn" style="margin-right: 15px; display: none;" id="back-btn" onclick="closeChat()"></i>
                <img id="target-avatar" src="" class="user-img" style="width:40px; height:40px;">
                <div style="margin-left: 15px; flex: 1;">
                    <h4 id="target-name">Pilih Chat</h4>
                    <p id="target-status" style="font-size: 12px; color: var(--primary);">online</p>
                </div>
            </div>
            <div class="chat-body" id="messages-container"></div>
            <div class="chat-input-area">
                <i class="far fa-smile icon-btn"></i>
                <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeypress="handleEnter(event)">
                <i class="fas fa-paper-plane icon-btn" style="color: var(--primary);" onclick="sendMessage()"></i>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3>Pengaturan Profil</h3>
            <hr style="margin: 15px 0; opacity: 0.2;">
            <p style="font-size: 13px; color: gray;">Bio Anda:</p>
            <input type="text" id="user-bio" placeholder="Tulis sesuatu...">
            <button class="btn-main" onclick="updateProfile()">Simpan</button>
            <button class="btn-main" style="background: #ea4335;" onclick="deleteAccount()">Hapus Akun</button>
            <button class="btn-main" style="background: #999;" onclick="closeModal()">Tutup</button>
        </div>
    </div>

    <div id="new-chat-modal" class="modal">
        <div class="modal-content">
            <h3>Mulai Chat Baru</h3>
            <input type="text" id="search-user-input" placeholder="Ketik username teman...">
            <button class="btn-main" onclick="startNewChat()">Cari & Chat</button>
            <button class="btn-main" style="background: #999;" onclick="closeModal()">Batal</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let currentUser = null;
        let activeChatId = null;

        // --- NAVIGATION & SPLASH (IMPROVED) ---
        function navigate() {
            const splash = document.getElementById('splash');
            const savedUser = localStorage.getItem('zchat_user');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    showApp();
                } else {
                    showAuth('login');
                }
            }, 600);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const statusText = document.getElementById('loader-status');
            setTimeout(() => {
                statusText.innerText = "Menghubungkan ke ZServer...";
                db.ref(".info/connected").once("value", () => {
                    statusText.innerText = "Hampir siap...";
                    navigate();
                });
            }, 2000);
        });

        function showAuth(type) {
            document.getElementById('login-page').style.display = type === 'login' ? 'flex' : 'none';
            document.getElementById('register-page').style.display = type === 'register' ? 'flex' : 'none';
            document.getElementById('app').style.display = 'none';
        }

        function showApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            document.getElementById('my-avatar').src = currentUser.photo || 'https://via.placeholder.com/45';
            loadChatList();
            updateOnlineStatus();
        }

        // --- AUTH LOGIC ---
        async function handleRegister() {
            const user = document.getElementById('reg-username').value.trim().toLowerCase();
            const pass = document.getElementById('reg-password').value;
            const file = document.getElementById('reg-photo').files[0];

            if (!user || !pass || !file) return alert("Lengkapi data dan foto!");

            const snapshot = await db.ref('users').orderByChild('username').equalTo(user).once('value');
            if (snapshot.exists()) return alert("Username sudah terdaftar!");

            const storageRef = storage.ref(`avatars/${user}_${Date.now()}`);
            await storageRef.put(file);
            const photoUrl = await storageRef.getDownloadURL();

            const ref = db.ref('users').push();
            const userData = { uid: ref.key, username: user, password: pass, photo: photoUrl, bio: "Hey there! I am using ZChat." };
            await ref.set(userData);
            
            alert("Berhasil mendaftar! Silakan login.");
            showAuth('login');
        }

        async function handleLogin() {
            const user = document.getElementById('login-username').value.trim().toLowerCase();
            const pass = document.getElementById('login-password').value;

            const snapshot = await db.ref('users').orderByChild('username').equalTo(user).once('value');
            if (snapshot.exists()) {
                const data = Object.values(snapshot.val())[0];
                if (data.password === pass) {
                    currentUser = data;
                    localStorage.setItem('zchat_user', JSON.stringify(data));
                    showApp();
                } else alert("Password salah!");
            } else alert("User tidak ditemukan!");
        }

        // --- CHAT LOGIC ---
        function loadChatList() {
            db.ref('chats').on('value', snap => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const chat = child.val();
                    if (chat.members.includes(currentUser.username)) {
                        const other = chat.members.find(m => m !== currentUser.username);
                        const html = `
                            <div class="chat-item" onclick="openChat('${child.key}', '${other}')">
                                <img src="https://ui-avatars.com/api/?name=${other}&background=00a884&color=fff" class="user-img">
                                <div class="chat-item-info">
                                    <div class="chat-item-top"><strong>${other}</strong></div>
                                    <p style="font-size: 13px; color: gray;">${chat.lastMessage || 'Mulai kirim pesan...'}</p>
                                </div>
                            </div>`;
                        list.innerHTML += html;
                    }
                });
            });
        }

        function openChat(chatId, targetName) {
            activeChatId = chatId;
            document.getElementById('target-name').innerText = targetName;
            document.getElementById('target-avatar').src = `https://ui-avatars.com/api/?name=${targetName}&background=00a884&color=fff`;
            
            if (window.innerWidth <= 768) {
                document.getElementById('chat-area').classList.add('active');
                document.getElementById('back-btn').style.display = 'block';
            }

            db.ref(`messages/${chatId}`).on('value', snap => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snap.forEach(child => {
                    const msg = child.val();
                    const isMe = msg.sender === currentUser.username;
                    const time = new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    container.innerHTML += `
                        <div class="msg ${isMe ? 'me' : 'other'}">
                            ${msg.text}
                            <span class="msg-time">${time} ${isMe ? '<i class="fas fa-check-double"></i>' : ''}</span>
                        </div>`;
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const txt = input.value.trim();
            if (!txt || !activeChatId) return;

            const msgData = { sender: currentUser.username, text: txt, time: Date.now() };
            await db.ref(`messages/${activeChatId}`).push(msgData);
            await db.ref(`chats/${activeChatId}`).update({ lastMessage: txt });
            input.value = "";
        }

        async function startNewChat() {
            const target = document.getElementById('search-user-input').value.trim().toLowerCase();
            if (target === currentUser.username) return alert("Itu username Anda sendiri.");
            
            const snap = await db.ref('users').orderByChild('username').equalTo(target).once('value');
            if (!snap.exists()) return alert("User tidak ditemukan!");

            const chatId = [currentUser.username, target].sort().join("_");
            await db.ref(`chats/${chatId}`).set({ members: [currentUser.username, target], lastMessage: "" });
            closeModal();
            openChat(chatId, target);
        }

        // --- UI UTILS ---
        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }
        function logout() { localStorage.clear(); location.reload(); }
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function closeChat() { document.getElementById('chat-area').classList.remove('active'); }
        function previewImg(i) { if(i.files[0]) document.getElementById('file-status').innerText = "Terpilih: " + i.files[0].name; }
        function updateOnlineStatus() {
            db.ref(`users/${currentUser.uid}`).update({ status: 'online' });
            db.ref(`users/${currentUser.uid}`).onDisconnect().update({ status: 'offline' });
        }
    </script>
</body>
</html>
