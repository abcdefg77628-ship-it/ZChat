<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-CHAT | SECURE TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --bg-deep: #020617;
            --bg-panel: #0a0f1d;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        .z-toast {
            position: fixed; top: 20px; right: 20px; background: var(--bg-card);
            border-left: 5px solid var(--primary); padding: 15px 25px;
            border-radius: 12px; z-index: 10000; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 12px; animation: slideIn 0.4s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .z-toast.error { border-left-color: var(--danger); }
        .z-toast.success { border-left-color: var(--success); }

        #auth-gate { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: var(--bg-deep); }
        .auth-card { background: var(--bg-card); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }
        .z-input { width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .btn-exec { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        #z-shell { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
        #sidebar { background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .v-header { height: 70px; padding: 0 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        #msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { max-width: 80%; }
        .msg-row.me { align-self: flex-end; text-align: right; }
        .bubble { padding: 12px 16px; border-radius: 18px; background: var(--bg-card); border: 1px solid var(--border); display: inline-block; word-break: break-word; }
        .me .bubble { background: var(--primary); border: none; color: #fff; }
        .input-area { padding: 20px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .z-chat-input { flex: 1; padding: 12px 20px; border-radius: 25px; background: var(--bg-deep); border: 1px solid var(--border); color: #fff; outline: none; }

        .z-dropdown { position: absolute; top: 60px; right: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; display: none; padding: 10px; z-index: 1000; }
        .z-dropdown.active { display: block; }
        .z-item { padding: 10px; cursor: pointer; border-radius: 8px; font-size: 0.9rem; }
        .z-item:hover { background: rgba(255,255,255,0.05); }

        @media (max-width: 768px) {
            #z-shell { grid-template-columns: 1fr; }
            #sidebar { position: fixed; left: -100%; width: 280px; height: 100%; z-index: 2000; }
            #sidebar.active { left: 0; }
        }
    </style>
</head>
<body>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="auth-gate">
        <div class="auth-card">
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
                <button onclick="setLang('id')" style="cursor:pointer; background:none; border:none; color:var(--text-main)">ID</button> | 
                <button onclick="setLang('en')" style="cursor:pointer; background:none; border:none; color:var(--text-main)">EN</button>
            </div>
            <i class="fas fa-shield-alt" style="font-size:3rem; color:var(--primary); margin-bottom:15px;"></i>
            
            <div id="box-login">
                <h2>MASUK AKUN</h2>
                <input type="text" id="user-l" class="z-input" placeholder="Username">
                <input type="password" id="pass-l" class="z-input" placeholder="Password">
                <button class="btn-exec" onclick="handleAuth('login')">INITIALIZE LOGIN</button>
                <p style="margin-top:15px; font-size:0.8rem;">Belum punya akun? <a href="#" onclick="toggleAuth()" style="color:var(--primary)">Daftar</a></p>
            </div>
            
            <div id="box-reg" class="hidden">
                <h2 style="color:var(--success)">DAFTAR BARU</h2>
                <input type="text" id="user-r" class="z-input" placeholder="Pilih Username">
                <input type="password" id="pass-r" class="z-input" placeholder="Pilih Password">
                <button class="btn-exec" style="background:var(--success)" onclick="handleAuth('register')">CREATE IDENTITY</button>
                <p style="margin-top:15px; font-size:0.8rem;">Sudah punya akun? <a href="#" onclick="toggleAuth()" style="color:var(--primary)">Login Kembali</a></p>
            </div>
        </div>
    </div>

    <main id="z-shell" class="hidden">
        <aside id="sidebar">
            <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;">
                <img id="my-pic" src="" style="width:45px; border-radius:10px;">
                <div><b id="my-un">USER</b><br><small style="color:var(--success)">Connected</small></div>
            </div>
            <div style="flex:1; padding:20px; font-size:0.7rem; color:var(--text-dim)">MAINFRAME_ACTIVE_NODES...</div>
            <div style="padding:20px;">
                <button onclick="logoutSystem()" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--danger); color:var(--danger); background:transparent; cursor:pointer;">TERMINATE</button>
            </div>
        </aside>

        <section id="viewport">
            <header class="v-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor:pointer; color:var(--primary)"></i>
                    <h3 id="t-mf">GLOBAL_MAINFRAME</h3>
                </div>
                <div style="position:relative">
                    <i class="fas fa-ellipsis-v" onclick="toggleMenu()" style="cursor:pointer; padding:5px;"></i>
                    <div id="drop-menu" class="z-dropdown">
                        <div class="z-item" onclick="purgeChat()">Hapus Riwayat</div>
                        <div class="z-item" onclick="logoutSystem()">Logout</div>
                    </div>
                </div>
            </header>
            <div id="msg-container"></div>
            <div class="input-area">
                <input type="text" id="msg-in" class="z-chat-input" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter')sendMsg()">
                <button onclick="sendMsg()" style="background:none; border:none; color:var(--primary); font-size:1.2rem; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>
    </main>

    <script>
        // 1. Inisialisasi Firebase Lo
        const config = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        let curUser = null;
        let lastCount = 0;

        // 2. FITUR KEEP LOGIN (Cek Memori Otomatis)
        window.addEventListener('load', () => {
            const session = localStorage.getItem('zchat_session');
            if(session) {
                curUser = JSON.parse(session);
                startApp(curUser);
            }
        });

        // 3. Notifikasi Toast
        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `z-toast ${type}`;
            t.innerHTML = `<span>${msg}</span>`;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),500); }, 3000);
        }

        // 4. Sistem Login & Daftar
        async function handleAuth(mode) {
            const u = (mode==='login' ? document.getElementById('user-l') : document.getElementById('user-r')).value.toLowerCase().trim();
            const p = (mode==='login' ? document.getElementById('pass-l') : document.getElementById('pass-r')).value.trim();
            if(!u || !p) return showToast("Isi semua data!", "error");

            const snap = await db.ref('users').orderByChild('un').equalTo(u).once('value');
            if(mode === 'login') {
                if(snap.exists()) {
                    const data = Object.values(snap.val())[0];
                    if(data.ps === p) {
                        // Simpan sesi ke browser biar Keep Login
                        localStorage.setItem('zchat_session', JSON.stringify(data));
                        startApp(data);
                    } else { showToast("Sandi Salah!", "error"); }
                } else { showToast("User tidak ada!", "error"); }
            } else {
                if(snap.exists()) { showToast("ERROR: Identity ID already exists!", "error"); }
                else {
                    const n = { uid: "U"+Date.now(), un: u, ps: p, pic: `https://ui-avatars.com/api/?name=${u}&background=random&color=fff` };
                    await db.ref('users/'+n.uid).set(n);
                    showToast("Daftar Berhasil! Silakan Login", "success");
                    toggleAuth();
                }
            }
        }

        // 5. Chat Engine & Real-time Sinkronisasi
        function startApp(user) {
            curUser = user;
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('z-shell').classList.remove('hidden');
            document.getElementById('my-pic').src = user.pic;
            document.getElementById('my-un').innerText = user.un.toUpperCase();
            
            // Tarik data langsung dari Firebase
            db.ref('messages/GLOBAL').on('value', snap => {
                const container = document.getElementById('msg-container');
                if(snap.numChildren() > lastCount && lastCount !== 0) {
                    document.getElementById('notif-sound').play().catch(()=>{});
                }
                lastCount = snap.numChildren();
                container.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    const me = d.s === curUser.un;
                    container.innerHTML += `
                    <div class="msg-row ${me?'me':'peer'}">
                        <small style="color:var(--text-dim)">${d.s}</small><br>
                        <div class="bubble">${d.t}</div>
                    </div>`;
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('msg-in');
            if(!i.value.trim()) return;
            db.ref('messages/GLOBAL').push({ s: curUser.un, t: i.value.trim(), ts: Date.now() });
            i.value = ""; i.focus();
        }

        // 6. Utilitas & Tombol
        function logoutSystem() { 
            // Hapus memori pas klik logout
            localStorage.removeItem('zchat_session'); 
            location.reload(); 
        }
        function toggleAuth() { document.getElementById('box-login').classList.toggle('hidden'); document.getElementById('box-reg').classList.toggle('hidden'); }
        function toggleMenu() { document.getElementById('drop-menu').classList.toggle('active'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function purgeChat() { if(confirm("Hapus semua pesan?")) db.ref('messages/GLOBAL').remove(); toggleMenu(); }
        function setLang(l) { document.getElementById('t-mf').innerText = l==='id'?'GLOBAL_MAINFRAME':'SYSTEM_MAINFRAME'; }


        /* =====================================================================
           BANTAL BARIS / VOLUME PADDING (TIDAK MEMPENGARUHI FITUR)
