<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #121214;
            --primary: #007aff;
            --gold: linear-gradient(135deg, #ff9d00, #fff0a1, #b8860b, #fff0a1, #ff9d00);
            --text: #ffffff;
            --text-dim: #8e8e93;
            --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* LOADING SPINNER */
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TOAST CUSTOM (NO ALERT) */
        #toast-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { background: var(--card); padding: 12px 25px; border-radius: 50px; border: 1px solid var(--primary); margin-bottom: 10px; font-weight: 600; font-size: 13px; animation: slideDown 0.4s forwards; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); width: 100%; max-width: 400px; padding: 40px; border-radius: 30px; border: 1px solid var(--border); }
        .tab-box { display: flex; gap: 10px; margin-bottom: 30px; background: #1c1c1e; padding: 5px; border-radius: 15px; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); font-weight: 800; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .tab.active { background: var(--primary); color: #fff; }
        input { width: 100%; padding: 16px; background: #1c1c1e; border: 1px solid var(--border); border-radius: 15px; color: #fff; margin-bottom: 15px; outline: none; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 15px; color: #fff; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }

        /* MAIN APP */
        #app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--card); }
        
        /* SIDEBAR */
        #side { position: fixed; left: -100%; top: 0; width: 80%; height: 100%; background: var(--card); z-index: 4000; transition: 0.4s; padding: 40px 20px; border-right: 1px solid var(--border); }
        #side.active { left: 0; }
        .menu-item { padding: 18px; border-radius: 12px; margin-bottom: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-item:active { background: rgba(255,255,255,0.05); }
        
        /* GOLD ADMIN BUTTON */
        .admin-btn { 
            background: var(--gold); background-size: 200% 200%; color: #000 !important; 
            font-weight: 900; text-transform: uppercase; border: none; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); animation: goldGlow 3s infinite;
        }
        @keyframes goldGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* CONTENT */
        .scroller { flex: 1; overflow-y: auto; padding: 20px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin: 20px 0 10px; font-weight: 800; }
        .user-card { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--border); }
        .avatar { width: 50px; height: 50px; border-radius: 15px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .name { flex: 1; font-weight: 700; }
        .btn-sm { padding: 8px 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; font-size: 12px; }
        .btn-add { background: var(--primary); color: #fff; }
        .btn-inbox { background: #32d74b; color: #fff; }

        /* CHAT ROOM */
        #chat-room { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; flex-direction: column; transform: translateX(100%); transition: 0.3s; }
        #chat-room.active { transform: translateX(0); }
        .chat-header { padding: 20px; background: var(--card); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg.him { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .chat-input { padding: 20px; display: flex; gap: 10px; background: var(--card); }

                /* LOGOUT MODAL */
        #modal-out { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-card { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; border: 1px solid var(--border); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3500; display: none; }
    </style>
</head>
<body>

    <div id="toast-box"></div>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="text-align:center; margin-bottom:30px; font-weight:900; color:var(--primary);">ZChat</h1>
            <div class="tab-box">
                <button class="tab active" onclick="z.switchTab('li')">LOGIN</button>
                <button class="tab" onclick="z.switchTab('re')">REGISTER</button>
            </div>
            <div id="f-li">
                <input type="text" id="liu" placeholder="Username">
                <input type="password" id="lip" placeholder="Password">
                <button class="btn-main" onclick="z.doLogin(this)"><span class="txt">Sign In</span><div class="spinner"></div></button>
            </div>
            <div id="f-re" style="display:none;">
                <input type="text" id="reu" placeholder="New Username">
                <input type="password" id="rep" placeholder="New Password">
                <button class="btn-main" onclick="z.doReg(this)"><span class="txt">Register Now</span><div class="spinner"></div></button>
            </div>
        </div>
    </div>

    <div id="app">
        <header>
            <div onclick="z.side(true)" style="cursor:pointer;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
            <div style="font-weight:900; font-size:20px;">ZChat</div>
            <div style="width:24px;"></div>
        </header>

        <div class="scroller">
            <div id="box-inbox"></div> <div class="section-title">Your Friends</div>
            <div id="list-friends"></div>
            <div class="section-title">Global Discovery</div>
            <div id="list-global"></div>
        </div>
    </div>

    <div class="overlay" onclick="z.side(false)"></div>
    <div id="side">
        <div style="text-align:center; margin-bottom:30px;">
            <div id="my-ava" class="avatar" style="width:70px; height:70px; margin:0 auto 10px; font-size:24px;">U</div>
            <h3 id="my-name">Username</h3>
        </div>
        <div id="admin-panel" class="menu-item admin-btn" style="display:none;" onclick="z.toast('Admin Panel Access Granted')">Admin Panel DevzZerr</div>
        
        <div class="menu-item" onclick="z.toast('Opening Settings...')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Pengaturan
        </div>
        <div class="menu-item" onclick="z.toast('Privacy Security Active')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Privasi
        </div>
        <div class="menu-item" onclick="z.askOut()" style="color:#ff453a; border:none; margin-top:30px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Keluar Sesi
        </div>
    </div>

    <div id="chat-room">
        <div class="chat-header">
            <div onclick="z.closeChat()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg></div>
            <div id="target-ava" class="avatar" style="width:40px; height:40px;">?</div>
            <div id="target-name" style="font-weight:800;">Target</div>
        </div>
        <div class="chat-body" id="chat-box"></div>
        <div class="chat-input">
            <input type="text" id="m-inp" placeholder="Ketik pesan..." style="margin-bottom:0; flex:1;">
            <button class="btn-main" style="width:60px;" onclick="z.sendChat()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div id="modal-out">
        <div class="modal-card">
            <h2 style="margin-bottom:10px;">Keluar?</h2>
            <p style="color:var(--text-dim); font-size:13px; margin-bottom:20px;">Ketik username kamu "<b><span id="h-user"></span></b>" untuk konfirmasi keluar.</p>
            <input type="text" id="c-user" placeholder="Ketik username..." style="text-align:center;">
            <div style="display:flex; gap:10px;">
                <button onclick="z.uiModal(false)" style="flex:1; padding:15px; border-radius:12px; border:none; background:#1c1c1e; color:#fff;">Batal</button>
                <button onclick="z.finalOut()" style="flex:1; padding:15px; border-radius:12px; border:none; background:#ff453a; color:#fff; font-weight:800;">Keluar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const config = { databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        const z = {
            me: JSON.parse(localStorage.getItem('z_user')),
            target: null,

            toast(m) {
                const b = document.getElementById('toast-box');
                const t = document.createElement('div');
                t.className = 'toast'; t.innerText = m;
                b.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
            },

            setLoad(btn, st) {
                const t = btn.querySelector('.txt');
                const s = btn.querySelector('.spinner');
                if(st) { t.style.display = 'none'; s.style.display = 'block'; btn.disabled = true; }
                else { t.style.display = 'block'; s.style.display = 'none'; btn.disabled = false; }
            },

            switchTab(t) {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
                document.getElementById('f-li').style.display = t === 'li' ? 'block' : 'none';
                document.getElementById('f-re').style.display = t === 're' ? 'block' : 'none';
            },

            doLogin(btn) {
                const u = document.getElementById('liu').value.toLowerCase().trim();
                const p = document.getElementById('lip').value;
                if(!u || !p) return this.toast("Isi semua bidang!");
                this.setLoad(btn, true);
                db.ref('users/' + u).once('value', s => {
                    this.setLoad(btn, false);
                    const d = s.val();
                    if(d && d.pass === p) {
                        this.me = d; localStorage.setItem('z_user', JSON.stringify(d)); this.launch();
                    } else this.toast("Gagal: Username/Password salah!");
                });
            },

            doReg(btn) {
                const u = document.getElementById('reu').value.toLowerCase().trim();
                const p = document.getElementById('rep').value;
                if(u.length < 3 || p.length < 5) return this.toast("Data terlalu pendek!");
                this.setLoad(btn, true);
                db.ref('users/' + u).once('value', s => {
                    if(s.exists()) { this.setLoad(btn, false); return this.toast("Username sudah ada!"); }
                    const d = { user: u, pass: p };
                    db.ref('users/' + u).set(d);
                    this.me = d; localStorage.setItem('z_user', JSON.stringify(d)); this.launch();
                });
            },

            launch() {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('my-name').innerText = this.me.user;
                document.getElementById('my-ava').innerText = this.me.user.charAt(0).toUpperCase();
                
                // ADMIN PANEL KHUSUS DEVZZERR44
                if(this.me.user === 'devzzerr44') document.getElementById('admin-panel').style.display = 'flex';

                this.sync();
            },

            sync() {
                // Semua User & Filter Global vs Friends
                db.ref('users').on('value', s => {
                    db.ref('friends/' + this.me.user).once('value', f => {
                        const myFriends = f.val() ? Object.keys(f.val()) : [];
                        const gl = document.getElementById('list-global');
                        const fl = document.getElementById('list-friends');
                        gl.innerHTML = ""; fl.innerHTML = "";
                        
                        s.forEach(u => {
                            const val = u.val();
                            if(val.user === this.me.user) return;
                            
                            const card = document.createElement('div');
                            card.className = 'user-card';
                            const isFriend = myFriends.includes(val.user);
                            
                            card.innerHTML = `
                                <div class="avatar">${val.user.charAt(0).toUpperCase()}</div>
                                <div class="name">${val.user}</div>
                                ${isFriend ? '' : `<button class="btn-sm btn-add" id="btn-${val.user}" onclick="z.sendReq('${val.user}')">Add</button>`}
                            `;
                            
                            if(isFriend) {
                                card.onclick = () => this.openChat(val);
                                fl.appendChild(card);
                            } else {
                                gl.appendChild(card);
                            }
                        });
                    });
                });

                // Kotak Masuk (Add Back)
                db.ref('req/' + this.me.user).on('value', s => {
                    const box = document.getElementById('box-inbox');
                    box.innerHTML = s.exists() ? '<div class="section-title">Inbox Request</div>' : '';
                    s.forEach(r => {
                        const from = r.key;
                        const d = document.createElement('div');
                        d.className = 'user-card'; d.style.border = '1px solid #32d74b';
                        d.innerHTML = `
                            <div class="avatar" style="background:#32d74b">${from.charAt(0).toUpperCase()}</div>
                            <div class="name">${from} <br><small>Mengajak berteman</small></div>
                            <button class="btn-sm btn-inbox" onclick="z.accept('${from}')">Add Back</button>
                        `;
                        box.appendChild(d);
                    });
                });
            },

            sendReq(to) {
                db.ref('req/' + to + '/' + this.me.user).set(true);
                const b = document.getElementById('btn-' + to);
                b.innerText = "Pending"; b.style.opacity = '0.5'; b.disabled = true;
                this.toast("Permintaan dikirim!");
            },

            accept(u) {
                db.ref('friends/' + this.me.user + '/' + u).set(true);
                db.ref('friends/' + u + '/' + this.me.user).set(true);
                db.ref('req/' + this.me.user + '/' + u).remove();
                this.toast("Sekarang berteman!");
            },

            openChat(u) {
                this.target = u;
                document.getElementById('target-name').innerText = u.user;
                document.getElementById('target-ava').innerText = u.user.charAt(0).toUpperCase();
                const room = document.getElementById('chat-room');
                room.style.display = 'flex';
                setTimeout(() => room.classList.add('active'), 10);
                
                const id = this.me.user < u.user ? this.me.user + "_" + u.user : u.user + "_" + this.me.user;
                db.ref('chats/' + id).on('value', s => {
                    const box = document.getElementById('chat-box'); box.innerHTML = "";
                    s.forEach(m => {
                        const v = m.val();
                        const d = document.createElement('div');
                        d.className = `msg ${v.s === this.me.user ? 'me' : 'him'}`;
                        d.innerText = v.t; box.appendChild(d);
                    });
                    box.scrollTop = box.scrollHeight;
                });
            },

            sendChat() {
                const i = document.getElementById('m-inp');
                if(!i.value || !this.target) return;
                const id = this.me.user < this.target.user ? this.me.user + "_" + this.target.user : this.target.user + "_" + this.me.user;
                db.ref('chats/' + id).push({ s: this.me.user, t: i.value });
                i.value = "";
            },

            closeChat() {
                document.getElementById('chat-room').classList.remove('active');
                setTimeout(() => document.getElementById('chat-room').style.display = 'none', 300);
            },

            side(st) {
                document.getElementById('side').classList.toggle('active', st);
                document.querySelector('.overlay').style.display = st ? 'block' : 'none';
            },

            askOut() {
                document.getElementById('h-user').innerText = this.me.user;
                this.uiModal(true);
            },

            uiModal(st) { document.getElementById('modal-out').style.display = st ? 'flex' : 'none'; },

            finalOut() {
                const input = document.getElementById('c-user').value;
                if(input === this.me.user) {
                    localStorage.clear(); location.reload();
                } else this.toast("Username tidak cocok!");
            }
        };

        if(z.me) z.launch();
    </script>
</body>
</html>
