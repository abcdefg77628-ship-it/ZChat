<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat by zZerr44</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --biru-utama: #007bff;
            --biru-tua: #004a99;
            --hitam-reg: #121212;
            --putih: #ffffff;
            --abu-bubble: #f1f0f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #000; color: #fff; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- CUSTOM TOAST NOTIFICATION --- */
        #toast-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 123, 255, 0.9); color: white; padding: 12px 25px;
            border-radius: 50px; z-index: 9999; font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: none; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }

        /* --- AUTH PAGE (Background Hitam) --- */
        #auth-page {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: var(--hitam-reg);
        }

        .auth-card {
            background: #1e1e1e; padding: 40px 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid #333;
        }

        .logo-z {
            width: 80px; height: 80px; background: var(--biru-utama); color: white;
            font-size: 55px; font-weight: bold; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 8px 8px 0px var(--biru-tua);
            border-radius: 4px;
        }

        .app-title { font-size: 1.5rem; margin-bottom: 25px; color: var(--biru-utama); }

        input {
            width: 100%; padding: 14px; margin: 10px 0;
            border: 1px solid #444; border-radius: 12px; outline: none;
            background: #252525; color: white;
        }

        .btn-main {
            width: 100%; padding: 14px; background: var(--biru-utama);
            color: white; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .btn-outline {
            width: 100%; padding: 12px; background: transparent;
            color: #aaa; border: 1px solid #444;
            border-radius: 12px; cursor: pointer; margin-top: 15px;
        }

        /* --- MAIN APP --- */
        #main-app { background: #fff; color: #333; height: 100vh; display: flex; flex-direction: column; }
        
        header {
            background: var(--biru-utama); color: white; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .pp-square {
            width: 42px; height: 42px; background: white; color: var(--biru-utama);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border-radius: 6px; border-bottom: 3px solid var(--biru-tua);
        }

        /* --- MODERN BUBBLE CHAT --- */
        #chat-window { position: fixed; inset: 0; background: #f7f9fb; z-index: 2000; display: flex; flex-direction: column; }
        
        #chat-msgs { flex: 1; overflow-y: auto; padding: 20px; background: #e5ddd5; /* Warna klasik chat */ }

        .bubble { 
            max-width: 80%; padding: 10px 14px; margin-bottom: 8px; font-size: 15px;
            position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .me { 
            align-self: flex-end; background: #dcf8c6; color: #000; 
            border-radius: 15px 0px 15px 15px; 
        }

        .them { 
            align-self: flex-start; background: var(--putih); color: #000;
            border-radius: 0px 15px 15px 15px;
        }

        .chat-input-area { padding: 12px; background: #f0f0f0; display: flex; align-items: center; }
        .chat-input-area input { margin: 0; flex: 1; background: white; color: #000; border: none; }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: white; z-index: 3000; transition: 0.3s; padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
        }
        #sidebar.open { right: 0; }
        .side-btn { width: 100%; padding: 15px; border: none; background: none; text-align: left; border-bottom: 1px solid #eee; cursor: pointer; }

    </style>
</head>
<body>

    <div id="toast-container">Pesan Notifikasi</div>

    <div id="auth-page">
        <div class="auth-card">
            <div class="logo-z">Z</div>
            <h1 class="app-title">ZChat by zZerr44</h1>

            <div id="auth-choice">
                <button class="btn-main" onclick="showForm('login')">MASUK</button>
                <button class="btn-outline" onclick="showForm('register')">DAFTAR AKUN</button>
            </div>

            <div id="login-form" class="hidden">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-main" onclick="doLogin()">Masuk</button>
                <button class="btn-outline" onclick="showForm('choice')">Kembali</button>
            </div>

            <div id="register-form" class="hidden">
                <input type="text" id="r-user" placeholder="Username Baru">
                <input type="password" id="r-pass" placeholder="Password">
                <input type="password" id="r-confirm" placeholder="Konfirmasi Password">
                <button class="btn-main" onclick="doRegister()">Daftar</button>
                <button class="btn-outline" onclick="showForm('choice')">Kembali</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <div onclick="toggleSidebar()">
                <div id="my-initial" class="pp-square">?</div>
            </div>
            <div style="font-weight: bold; letter-spacing: 1px;">ZCHAT</div>
            <div onclick="addFriend()" style="font-size: 24px; cursor: pointer;">+</div>
        </header>

        <div id="friend-list" style="flex:1; overflow-y:auto; padding:15px;">
            <div id="list-container"></div>
        </div>

        <div id="sidebar">
            <h2 style="color:var(--biru-utama); margin-bottom:20px;">Menu Z</h2>
            <button class="side-btn" onclick="changePass()">Keamanan (Ganti Sandi)</button>
            <button class="side-btn" onclick="showNotif('ZChat v1.0 © zZerr44')">Hak Cipta</button>
            <button class="side-btn" style="color:red;" onclick="doLogout()">Log Out</button>
            <button class="btn-outline" onclick="toggleSidebar()">Tutup</button>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div style="background:var(--biru-utama); color:white; padding:15px; display:flex; align-items:center;">
            <span onclick="closeChat()" style="margin-right:20px; font-size:24px; cursor:pointer;">←</span>
            <span id="target-name">Username</span>
        </div>
        <div id="chat-msgs"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ketik pesan...">
            <button onclick="sendMsg()" style="background:var(--biru-utama); color:white; border:none; padding:10px 20px; border-radius:8px; margin-left:10px;">Kirim</button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let activeFriend = null;

        // --- CUSTOM NOTIF (TOAST) ---
        function showNotif(msg) {
            const toast = document.getElementById('toast-container');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // --- UI LOGIC ---
        function showForm(type) {
            document.getElementById('auth-choice').classList.add('hidden');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            if(type === 'login') document.getElementById('login-form').classList.remove('hidden');
            else if(type === 'register') document.getElementById('register-form').classList.remove('hidden');
            else document.getElementById('auth-choice').classList.remove('hidden');
        }

        async function doRegister() {
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            const p = document.getElementById('r-pass').value;
            const c = document.getElementById('r-confirm').value;
            if(!u || !p) return showNotif("Data tidak boleh kosong!");
            if(p !== c) return showNotif("Password tidak cocok!");
            
            const check = await db.ref('users/' + u).once('value');
            if(check.exists()) return showNotif("Username sudah ada!");

            await db.ref('users/' + u).set({ username: u, password: p });
            showNotif("Pendaftaran Berhasil!");
            showForm('login');
        }

        async function doLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            const snap = await db.ref('users/' + u).once('value');
            if(snap.exists() && snap.val().password === p) {
                launch(snap.val());
            } else {
                showNotif("Username/Password salah!");
            }
        }

        function launch(data) {
            currentUser = data;
            localStorage.setItem('z_sess', JSON.stringify(data));
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-initial').innerText = data.username[0].toUpperCase();
            loadFriends();
        }

        if(localStorage.getItem('z_sess')) launch(JSON.parse(localStorage.getItem('z_sess')));

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function doLogout() {
            const res = prompt("Ketik 'out' untuk keluar:");
            if(res === 'out') {
                localStorage.removeItem('z_sess');
                location.reload();
            }
        }

        function addFriend() {
            const t = prompt("Masukkan Username Teman:").toLowerCase();
            if(!t || t === currentUser.username) return;
            db.ref('users/' + t).once('value', snap => {
                if(!snap.exists()) return showNotif("User tidak ditemukan!");
                db.ref(`friends/${currentUser.username}/${t}`).set(true);
                db.ref(`friends/${t}/${currentUser.username}`).set(true);
                showNotif("Berhasil menambah teman!");
            });
        }

        function loadFriends() {
            db.ref(`friends/${currentUser.username}`).on('value', snap => {
                const cont = document.getElementById('list-container');
                cont.innerHTML = "";
                snap.forEach(c => {
                    const name = c.key;
                    const div = document.createElement('div');
                    div.style = "padding:15px; background:#f9f9f9; margin-bottom:10px; border-radius:10px; display:flex; align-items:center; cursor:pointer;";
                    div.innerHTML = `<div class="pp-square" style="background:var(--biru-utama); color:white; margin-right:15px;">${name[0].toUpperCase()}</div><b>${name}</b>`;
                    div.onclick = () => {
                        activeFriend = name;
                        document.getElementById('target-name').innerText = name;
                        document.getElementById('chat-window').classList.remove('hidden');
                        loadMsgs();
                    };
                    cont.appendChild(div);
                });
            });
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        function sendMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt) return;
            const id = [currentUser.username, activeFriend].sort().join('_');
            db.ref(`chats/${id}`).push({ sender: currentUser.username, text: txt });
            document.getElementById('chat-input').value = "";
        }

        function loadMsgs() {
            const id = [currentUser.username, activeFriend].sort().join('_');
            db.ref(`chats/${id}`).on('value', snap => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const d = document.createElement('div');
                    d.className = `bubble ${m.sender === currentUser.username ? 'me' : 'them'}`;
                    d.innerText = m.text;
                    d.onclick = () => { if(confirm("Salin teks?")) navigator.clipboard.writeText(m.text); };
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function changePass() {
            const old = prompt("Masukkan password lama:");
            if(old === currentUser.password) {
                const baru = prompt("Masukkan password baru:");
                db.ref(`users/${currentUser.username}/password`).set(baru);
                currentUser.password = baru;
                showNotif("Password berhasil diubah!");
            } else {
                showNotif("Password lama salah!");
            }
        }
    </script>
</body>
</html>
