<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Ultimate V13 - 400+ Lines Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --bg-deep: #050505;
            --bg-sidebar: #111214;
            --bg-channel: #2b2d31;
            --bg-chat: #313338;
            --accent-z: #5865f2; /* Discord Blurple */
            --accent-cyan: #00d4ff;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --msg-sent: #3e45d1;
            --msg-rec: #383a40;
            --danger: #ed4245;
            --success: #23a55a;
        }

        /* --- RESET & BASE --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* --- DISCORD SIDEBAR (GAK BAKAL KEPOTONG) --- */
        .sidebar-guilds {
            width: 72px;
            background-color: #1e1f22;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            flex-shrink: 0;
        }

        .guild-icon {
            width: 48px;
            height: 48px;
            background-color: var(--bg-channel);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .guild-icon:hover, .guild-icon.active {
            border-radius: 16px;
            background-color: var(--accent-z);
            color: white;
        }

        .guild-icon img { width: 100%; height: 100%; object-fit: cover; }

        .guild-separator {
            width: 32px;
            height: 2px;
            background: #35363c;
            border-radius: 1px;
            margin: 4px 0;
        }

        /* --- CHANNEL / FRIEND LIST --- */
        .sidebar-channels {
            width: 240px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .channel-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            font-weight: 700;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
            font-size: 14px;
        }

        .channel-list {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
        }

        .friend-btn {
            padding: 8px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: var(--text-muted);
            margin-bottom: 2px;
            transition: 0.1s;
        }

        .friend-btn:hover, .friend-btn.active {
            background-color: #3f4147;
            color: white;
        }

        .friend-btn .avatar-mini {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #444;
            position: relative;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--bg-sidebar);
        }

        /* --- MAIN CHAT SECTION --- */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
            position: relative;
        }

        .chat-top-bar {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
            z-index: 10;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-group {
            display: flex;
            gap: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }

        .msg-content { flex: 1; }
        .msg-author { font-weight: 600; font-size: 14px; color: white; display: flex; align-items: center; gap: 8px; }
        .msg-time { font-size: 10px; color: var(--text-muted); font-weight: 400; }
        .msg-text { font-size: 15px; color: #dbdee1; margin-top: 2px; line-height: 1.3; }

        /* --- CHAT INPUT (ANTI-KEPOTONG VERSION) --- */
        .chat-input-area {
            padding: 0 16px 24px 16px; /* Padding bawah extra untuk mobile nav */
            background: transparent;
        }

        .input-wrapper {
            background-color: #383a40;
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }

        /* --- MODALS & DRAWER --- */
        .z-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .z-modal-content {
            background: var(--bg-chat);
            width: 100%;
            max-width: 440px;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .z-btn {
            padding: 10px 20px;
            border-radius: 4px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary { background: var(--accent-z); color: white; }
        .btn-primary:hover { background: #4752c4; }
        
        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            .sidebar-channels {
                position: fixed;
                left: -240px;
                top: 0;
                bottom: 0;
                z-index: 1000;
            }
            .sidebar-channels.active { transform: translateX(240px); }
            .sidebar-guilds { width: 60px; }
        }

        /* NOTIF BOX */
        #z-notif {
            position: fixed;
            top: 20px;
            right: -300px;
            background: var(--accent-z);
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="z-notif">Notifikasi</div>

    <div class="sidebar-guilds">
        <div class="guild-icon active" onclick="location.reload()">
            <span style="font-weight: bold;">Z</span>
        </div>
        <div class="guild-separator"></div>
        <div class="guild-icon" onclick="toggleFriendBar()">
            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=friends" alt="Friends">
        </div>
        <div class="guild-icon" onclick="openMenu()">
            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=setup" alt="Settings">
        </div>
        <div style="flex: 1;"></div>
        <div class="guild-icon" onclick="openProfile()">
            <img id="my-avatar-img" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=user" alt="Me">
        </div>
    </div>

    <div class="sidebar-channels" id="friend-sidebar">
        <div class="channel-header">PESAN LANGSUNG</div>
        <div class="channel-list" id="contact-list">
            <div style="text-align: center; color: var(--text-muted); font-size: 11px; margin-top: 20px;">
                KLIK ICON TEMAN DI KIRI<br>UNTUK BUKA DAFTAR
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div id="auth-overlay" style="position: absolute; inset: 0; background: var(--bg-deep); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 30px;">
            <div style="width: 100%; max-width: 380px; text-align: center;">
                <h2 style="color: white; font-size: 24px; margin-bottom: 8px;">Selamat Datang Kembali!</h2>
                <p style="color: var(--text-muted); margin-bottom: 24px;">ZChat Ultimate V13 - Professional AI Chat</p>
                <div style="text-align: left; margin-bottom: 16px;">
                    <label style="font-size: 12px; font-weight: 700; color: var(--text-muted);">USERNAME</label>
                    <input type="text" id="login-user" style="width: 100%; padding: 10px; background: #1e1f22; border: none; color: white; border-radius: 4px; margin-top: 8px;">
                </div>
                <div style="text-align: left; margin-bottom: 24px;">
                    <label style="font-size: 12px; font-weight: 700; color: var(--text-muted);">PASSWORD</label>
                    <input type="password" id="login-pass" style="width: 100%; padding: 10px; background: #1e1f22; border: none; color: white; border-radius: 4px; margin-top: 8px;">
                </div>
                <button class="z-btn btn-primary" onclick="handleAuth('LOGIN')">Masuk</button>
                <button class="z-btn" style="background: transparent; color: var(--accent-cyan); font-size: 13px;" onclick="handleAuth('REG')">Butuh akun? Daftar sekarang</button>
            </div>
        </div>

        <div class="chat-top-bar">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color: var(--text-muted); font-size: 20px;">@</span>
                <span id="active-chat-name" style="font-weight: 600;">Pilih Teman</span>
            </div>
            <div style="color: var(--text-muted); font-size: 12px; font-weight: 600;">ULTIMATE V13</div>
        </div>

        <div class="chat-messages" id="message-flow">
            <div style="margin: auto; text-align: center; color: var(--text-muted);">
                <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=ZChat" style="width: 80px; opacity: 0.2;">
                <p style="margin-top: 10px;">Mulai percakapan di ZChat</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="main-input" placeholder="Ketik pesan..." onkeypress="if(event.key=='Enter') processSend()">
                <button onclick="processSend()" style="background: none; border: none; color: var(--accent-cyan); font-weight: 700; cursor: pointer;">KIRIM</button>
            </div>
        </div>
    </div>

    <div class="z-modal" id="z-modal-wrapper">
        <div class="z-modal-content">
            <h3 id="modal-title" style="margin-bottom: 16px;">Title</h3>
            <div id="modal-body-content"></div>
            <button class="z-btn" onclick="closeZModal()" style="background: #4e5058; color: white; margin-top: 16px;">Tutup</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        // --- INITIALIZATION ---
        console.log("[ZChat System] Initializing components...");
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = localStorage.getItem('z_user_id');
        let activeTarget = null;
        let myData = null;

        // --- CORE UTILS ---
        window.alertZ = (msg) => {
            const n = document.getElementById('z-notif');
            n.innerText = msg; n.style.right = '20px';
            setTimeout(() => n.style.right = '-300px', 3000);
        };

        window.toggleFriendBar = () => {
            document.getElementById('friend-sidebar').classList.toggle('active');
        };

        window.closeZModal = () => document.getElementById('z-modal-wrapper').style.display = 'none';

        // --- AUTH LOGIC ---
        window.handleAuth = async (type) => {
            const u = document.getElementById('login-user').value.trim().toUpperCase();
            const p = document.getElementById('login-pass').value.trim();
            
            if(u.length < 3) return alertZ("Username minimal 3 karakter!");
            
            if(type === 'REG') {
                const check = await get(ref(db, `users/${u}`));
                if(check.exists()) return alertZ("User sudah terdaftar!");
                
                const avatarUrl = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${u}_${Math.floor(Math.random()*1000)}`;
                await set(ref(db, `users/${u}`), {
                    password: p,
                    avatar: avatarUrl,
                    bio: "Bussy using ZChat Ultimate",
                    created: Date.now()
                });
                alertZ("Berhasil Daftar!");
                initApp(u);
            } else {
                const snap = await get(ref(db, `users/${u}`));
                if(snap.exists() && snap.val().password === p) {
                    initApp(u);
                } else {
                    alertZ("Username atau Password salah!");
                }
            }
        };

        async function initApp(id) {
            currentUser = id;
            localStorage.setItem('z_user_id', id);
            document.getElementById('auth-overlay').style.display = 'none';
            
            const snap = await get(ref(db, `users/${id}`));
            myData = snap.val();
            document.getElementById('my-avatar-img').src = myData.avatar;
            
            // Online Sync
            const statusRef = ref(db, `status/${id}`);
            update(statusRef, { online: true, last_seen: Date.now(), avatar: myData.avatar });
            onDisconnect(statusRef).update({ online: false, last_seen: Date.now() });
            
            console.log(`[ZChat] Logged in as ${id}`);
            syncContacts();
            listenRequests();
        }

        // --- CONTACT SYSTEM ---
        function syncContacts() {
            onValue(ref(db, `users/${currentUser}/friends`), (snap) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = '';
                
                if(!snap.exists()) {
                    list.innerHTML = `<div style="padding:20px; text-align:center; color:#555; font-size:12px;">Gak ada teman. Tambah yuk!</div>`;
                }

                snap.forEach(child => {
                    const friendID = child.key;
                    onValue(ref(db, `status/${friendID}`), (sSnap) => {
                        const s = sSnap.val();
                        let existing = document.getElementById(`f-card-${friendID}`);
                        if(existing) existing.remove();
                        
                        const div = document.createElement('div');
                        div.id = `f-card-${friendID}`;
                        div.className = `friend-btn ${activeTarget === friendID ? 'active' : ''}`;
                        div.innerHTML = `
                            <div class="avatar-mini">
                                <img src="${s.avatar}" style="width:100%; border-radius:50%">
                                <div class="status-dot" style="background: ${s.online ? 'var(--success)' : '#555'}"></div>
                            </div>
                            <div style="flex:1; overflow:hidden">
                                <div style="font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${friendID}</div>
                                <div style="font-size:11px; color:var(--text-muted)">${s.online ? 'Online' : 'Offline'}</div>
                            </div>
                        `;
                        div.onclick = () => openChat(friendID);
                        list.appendChild(div);
                    });
                });
            });
        }

        // --- CHAT ENGINE ---
        window.openChat = (target) => {
            activeTarget = target;
            document.getElementById('active-chat-name').innerText = target;
            document.querySelectorAll('.friend-btn').forEach(b => b.classList.remove('active'));
            const card = document.getElementById(`f-card-${target}`);
            if(card) card.classList.add('active');
            
            if(window.innerWidth <= 768) toggleFriendBar();
            
            const chatID = [currentUser, target].sort().join('___');
            onValue(ref(db, `chats/${chatID}`), (snap) => {
                const box = document.getElementById('message-flow');
                box.innerHTML = '';
                
                snap.forEach(m => {
                    const d = m.val();
                    const isMe = d.s === currentUser;
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message-group';
                    msgDiv.innerHTML = `
                        <img src="${isMe ? myData.avatar : 'https://api.dicebear.com/7.x/pixel-art/svg?seed='+target}" class="msg-avatar">
                        <div class="msg-content">
                            <div class="msg-author">${d.s} <span class="msg-time">${new Date(d.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div>
                            <div class="msg-text">${d.c}</div>
                        </div>
                    `;
                    box.appendChild(msgDiv);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.processSend = () => {
            const input = document.getElementById('main-input');
            if(!input.value || !activeTarget) return;
            
            const chatID = [currentUser, activeTarget].sort().join('___');
            push(ref(db, `chats/${chatID}`), {
                s: currentUser,
                c: input.value,
                t: Date.now()
            });
            input.value = '';
        };

        // --- MODAL FEATURES ---
        window.openMenu
