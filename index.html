<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZChat Pro v3.0 | Secure Node</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #000000;
            --bg-surface: #0a0a0b;
            --bg-elevated: #111114;
            --bg-input: #151518;
            --accent: #0084ff;
            --accent-soft: rgba(0, 132, 255, 0.15);
            --accent-glow: rgba(0, 132, 255, 0.4);
            --text-main: #ffffff;
            --text-dim: #82828a;
            --text-ghost: #4a4a4f;
            --border: #1f1f22;
            --success: #30d158;
            --danger: #ff453a;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --sh-glare: 0 0 20px rgba(0, 132, 255, 0.2);
        }

        /* Optimizer */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none;
        }
        *::-webkit-scrollbar { display: none; }

        body, html { 
            background: var(--bg-deep); color: var(--text-main); 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            position: fixed; -webkit-user-select: none;
        }

        /* Transitions */
        .page-transition {
            animation: viewFade 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes viewFade {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Toast System */
        #z-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--bg-surface); border: 1px solid var(--border);
            padding: 14px 24px; border-radius: 50px; font-size: 13px; font-weight: 800;
            z-index: 1000000; transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        #z-toast.active { top: 40px; }

        /* Custom Context Menu */
        #msg-menu {
            position: fixed; background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 8px; z-index: 20000;
            display: none; min-width: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu-item {
            padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; color: var(--text-main); transition: 0.2s;
        }
        .menu-item:active { background: var(--bg-input); }
        .menu-item.red { color: var(--danger); }

        /* Layer Core */
        .layer {
            position: absolute; inset: 0; background: var(--bg-deep);
            display: none; flex-direction: column; overflow: hidden;
        }

        /* Buttons & Inputs Deep UI */
        .z-input {
            width: 100%; background: var(--bg-input); border: 2px solid var(--border);
            padding: 18px 22px; border-radius: var(--radius-lg); color: white;
            font-size: 16px; transition: all 0.3s;
        }
        .z-input:focus { border-color: var(--accent); box-shadow: var(--sh-glare); outline: none; }

        .z-btn {
            width: 100%; padding: 20px; border-radius: var(--radius-lg); border: none;
            font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 8px 25px var(--accent-glow); }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* Bubbles Scaling */
        .bubble {
            max-width: 78%; padding: 14px 18px; border-radius: 22px; font-size: 15px;
            line-height: 1.5; position: relative; animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .bubble.me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .bubble.you { align-self: flex-start; background: var(--bg-elevated); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        /* Status Badges */
        .badge-status { width: 8px; height: 8px; border-radius: 50%; }
        .online { background: var(--success); box-shadow: 0 0 10px var(--success); }
    </style>
</head>
<body>
    <div id="z-toast"><span id="z-toast-text">SYSTEM READY</span></div>
    <div id="msg-menu">
        <div class="menu-item" onclick="copyMsg()">Salin Pesan / Copy</div>
        <div class="menu-item red" onclick="deleteMsgRequest()">Hapus untuk Semua / Delete for All</div>
    </div>

    <div class="splash" id="splash">
        <div class="z-logo" style="font-size: 40px;">Z<span>PRO</span></div>
        <div id="boot-loader" style="width: 150px; height: 2px; background: var(--border); margin-top: 20px; position: relative; overflow: hidden;">
            <div id="boot-progress" style="position: absolute; width: 0%; height: 100%; background: var(--accent); transition: 0.5s;"></div>
        </div>
        <p id="boot-text" style="font-size: 9px; color: var(--text-ghost); margin-top: 10px; letter-spacing: 2px; font-weight: 800;">INITIALIZING SECURE PROTOCOL...</p>
    </div>

    <div class="layer page-transition" id="auth-layer" style="display: none; padding: 40px; overflow-y: auto;">
        <div onclick="toggleLanguage()" id="lang-btn" style="align-self: flex-end; background: var(--bg-input); border: 1px solid var(--border); padding: 10px 18px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; color: var(--accent);">EN</div>
        
        <div style="max-width: 450px; margin: 40px auto; width: 100%;">
            <div class="z-logo" style="margin-bottom: 8px;">Z<span>CHAT</span></div>
            <p id="auth-subtitle" style="color: var(--text-dim); font-size: 14px; margin-bottom: 45px; font-weight: 600;">Sistem Komunikasi Node Terenkripsi</p>

            <div id="login-form">
                <div style="margin-bottom: 22px;">
                    <label id="lbl-user" style="display: block; font-size: 10px; font-weight: 800; color: var(--text-ghost); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;">ID Node (Username)</label>
                    <input type="text" id="l-user" class="z-input" placeholder="node_id">
                </div>
                <div style="margin-bottom: 30px;">
                    <label id="lbl-pass" style="display: block; font-size: 10px; font-weight: 800; color: var(--text-ghost); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;">Kunci Akses (Password)</label>
                    <input type="password" id="l-pass" class="z-input" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="z-btn btn-main" id="btn-login">MASUK SISTEM / LOGIN</button>
                <button onclick="showAuth('REG')" id="btn-to-reg" style="width: 100%; padding: 20px; background: transparent; color: var(--text-dim); border: none; font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 13px;">Belum punya identitas? Daftar baru</button>
            </div>

            <div id="reg-form" style="display: none;">
                <div style="margin-bottom: 20px;">
                    <label id="lbl-r-user" style="display: block; font-size: 10px; font-weight: 800; color: var(--text-ghost); text-transform: uppercase; margin-bottom: 10px;">Daftar ID Node Baru</label>
                    <input type="text" id="r-user" class="z-input">
                </div>
                <div style="margin-bottom: 20px;">
                    <label id="lbl-r-pass" style="display: block; font-size: 10px; font-weight: 800; color: var(--text-ghost); text-transform: uppercase; margin-bottom: 10px;">Setel Kunci Akses</label>
                    <input type="password" id="r-pass" class="z-input">
                </div>
                <div style="margin-bottom: 30px;">
                    <label id="lbl-r-conf" style="display: block; font-size: 10px; font-weight: 800; color: var(--text-ghost); text-transform: uppercase; margin-bottom: 10px;">Ulangi Kunci</label>
                    <input type="password" id="r-conf" class="z-input">
                </div>
                <button onclick="handleRegister()" class="z-btn btn-main" id="btn-reg">INISIALISASI NODE</button>
                <button onclick="showAuth('LOGIN')" id="btn-to-login" style="width: 100%; padding: 20px; background: transparent; color: var(--text-dim); border: none; font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 13px;">Kembali ke Gerbang Masuk</button>
            </div>
        </div>
    </div>

    <div class="layer" id="app-shell" style="grid-template-rows: auto 1fr auto;">
        <header style="padding: 60px 25px 20px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;" onclick="openProfileSettings()">
                <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--bg-input); border: 2px solid var(--border); padding: 2px;">
                    <img id="my-pfp" src="" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                </div>
                <div>
                    <div id="my-id" style="font-weight: 800; font-size: 16px; letter-spacing: -0.5px;">NODE_UNKNOWN</div>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <div class="badge-status online"></div>
                        <span id="my-status-label" style="font-size: 9px; color: var(--success); font-weight: 800; letter-spacing: 1px;">ENCRYPTED</span>
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 20px;">
                <svg onclick="toggleSearch(true)" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <svg onclick="handleLogout()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </div>
        </header>

        <div id="inbox-render" style="overflow-y: auto; padding-top: 10px;">
            </div>

        <nav style="padding: 15px 40px 35px; background: var(--bg-surface); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--accent)" stroke="var(--accent)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <svg style="opacity: 0.3;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            <svg style="opacity: 0.3;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </nav>
    </div>
        <div class="layer page-transition" id="chat-view" style="z-index: 9500;">
        <header style="padding: 60px 25px 15px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;">
            <svg onclick="closeChat()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="cursor: pointer;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--bg-input); border: 1px solid var(--border); overflow: hidden;">
                <img id="target-pfp" src="" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div style="flex: 1;">
                <div id="target-name" style="font-weight: 800; font-size: 15px;">NODE_TARGET</div>
                <div id="target-status" style="font-size: 10px; color: var(--text-dim); font-weight: 700; text-transform: uppercase;">CONNECTING...</div>
            </div>
        </header>

        <div id="msg-render" style="flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: var(--bg-deep);"></div>

        <div id="typing-ui" style="padding: 5px 25px; font-size: 10px; color: var(--success); font-weight: 800; display: none;">TARGET SEDANG MENGETIK...</div>

        <div style="padding: 15px 20px calc(25px + env(safe-area-inset-bottom)); background: var(--bg-surface); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px;">
            <input type="text" id="main-input" style="flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 30px; padding: 14px 22px; color: white; outline: none; font-size: 15px;" placeholder="Transmisi pesan aman...">
            <button onclick="sendMsg()" style="width: 50px; height: 50px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; box-shadow: var(--sh-glare);">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"></line><polyline points="22 2 15 22 11 13 2 9 22 2"></polyline></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, serverTimestamp, get, query, orderByChild, equalTo, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // GLOBAL STATES
        let ME = null;
        let CURR_CHAT = null;
        let LANG = 'ID';
        let ACTIVE_LISTENERS = {};

        const DICT = {
            ID: {
                subtitle: "Sistem Komunikasi Node Terenkripsi",
                user: "ID Node (Username)", pass: "Kunci Akses (Password)",
                login: "MASUK SISTEM", reg: "INISIALISASI NODE",
                toReg: "Belum punya identitas? Daftar baru",
                toLogin: "Kembali ke Gerbang Masuk",
                typing: "SEDANG MENGETIK...", online: "TERHUBUNG",
                err_short: "ID Node minimal 5 karakter!",
                err_match: "Kunci akses tidak cocok!",
                logout_ask: "Putuskan koneksi dari jaringan?"
            },
            EN: {
                subtitle: "Encrypted Node Communication System",
                user: "Node ID (Username)", pass: "Access Key (Password)",
                login: "AUTHORIZE ACCESS", reg: "INITIALIZE NODE",
                toReg: "No identity yet? Register now",
                toLogin: "Back to Entry Gate",
                typing: "TYPING...", online: "CONNECTED",
                err_short: "Node ID min 5 characters!",
                err_match: "Access keys mismatch!",
                logout_ask: "Disconnect from network?"
            }
        };

        // --- UI CORE FUNCTIONS ---
        window.toast = (msg) => {
            const t = document.getElementById('z-toast');
            document.getElementById('z-toast-text').innerText = msg;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 3000);
        };

        window.toggleLanguage = () => {
            LANG = LANG === 'ID' ? 'EN' : 'ID';
            const d = DICT[LANG];
            document.getElementById('lang-btn').innerText = LANG === 'ID' ? 'EN' : 'ID';
            document.getElementById('auth-subtitle').innerText = d.subtitle;
            document.getElementById('lbl-user').innerText = d.user;
            document.getElementById('lbl-pass').innerText = d.pass;
            document.getElementById('btn-login').innerText = d.login;
            document.getElementById('btn-reg').innerText = d.reg;
            document.getElementById('btn-to-reg').innerText = d.toReg;
            document.getElementById('btn-to-login').innerText = d.toLogin;
        };

        window.showAuth = (m) => {
            document.getElementById('login-form').style.display = m === 'LOGIN' ? 'block' : 'none';
            document.getElementById('reg-form').style.display = m === 'REG' ? 'block' : 'none';
        };

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, async (user) => {
            const bootProgress = document.getElementById('boot-progress');
            if (user) {
                bootProgress.style.width = "60%";
                const snap = await get(ref(db, `users/${user.uid}`));
                if (snap.exists()) {
                    ME = { uid: user.uid, ...snap.val() };
                    bootProgress.style.width = "100%";
                    
                    // Profile Setup
                    document.getElementById('my-id').innerText = ME.username.toUpperCase();
                    document.getElementById('my-pfp').src = `https://ui-avatars.com/api/?background=151518&color=0084ff&bold=true&name=${ME.username}`;
                    
                    // Presence Management
                    const myRef = ref(db, `users/${user.uid}`);
                    update(myRef, { status: 'online' });
                    onDisconnect(myRef).update({ status: 'offline', lastSeen: serverTimestamp() });

                    setTimeout(() => {
                        document.getElementById('auth-layer').style.display = 'none';
                        document.getElementById('app-shell').style.display = 'grid';
                        document.getElementById('splash').style.opacity = '0';
                        setTimeout(() => document.getElementById('splash').style.display = 'none', 600);
                        renderInbox();
                    }, 800);
                }
            } else {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('auth-layer').style.display = 'flex';
            }
        });

        window.handleRegister = async () => {
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            const p = document.getElementById('r-pass').value;
            const c = document.getElementById('r-conf').value;

            if (u.length < 5) return toast(DICT[LANG].err_short);
            if (p !== c) return toast(DICT[LANG].err_match);

            try {
                const check = await get(ref(db, `usernames/${u}`));
                if (check.exists()) return toast("ID_TAKEN");
                const res = await createUserWithEmailAndPassword(auth, `${u}@zpro.io`, p);
                await set(ref(db, `users/${res.user.uid}`), { username: u, status: 'online', createdAt: serverTimestamp() });
                await set(ref(db, `usernames/${u}`), res.user.uid);
                location.reload();
            } catch (e) { toast("AUTH_FAILED"); }
        };

        window.handleLogin = async () => {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            if(!u || !p) return toast("DATA_INCOMPLETE");
            try {
                await signInWithEmailAndPassword(auth, `${u}@zpro.io`, p);
            } catch (e) { toast("ACCESS_DENIED"); }
        };

        // --- MESSAGING SYSTEM ---
        window.openChat = (tid, name) => {
            CURR_CHAT = tid;
            document.getElementById('target-name').innerText = name.toUpperCase();
            document.getElementById('target-pfp').src = `https://ui-avatars.com/api/?background=151518&color=0084ff&bold=true&name=${name}`;
            document.getElementById('chat-view').style.display = 'flex';
            
            // Listen Presence & Typing
            onValue(ref(db, `typing/${ME.uid}/${tid}`), (s) => {
                const ui = document.getElementById('typing-ui');
                ui.innerText = name.toUpperCase() + " " + DICT[LANG].typing;
                ui.style.display = s.exists() ? 'block' : 'none';
            });

            // Stream Messages
            const cid = [ME.uid, tid].sort().join('_');
            onValue(ref(db, `messages/${cid}`), (snap) => {
                const box = document.getElementById('msg-render');
                box.innerHTML = '';
                snap.forEach(m => {
                    const d = m.val();
                    const isMe = d.s === ME.uid;
                    const b = document.createElement('div');
                    b.className = `bubble ${isMe ? 'me' : 'you'}`;
                    b.innerHTML = `${d.t}<div style="font-size:8px; opacity:0.5; margin-top:5px; text-align:right;">${new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
                    
                    // Context Menu Logic
                    b.oncontextmenu = (e) => {
                        e.preventDefault();
                        if(isMe && confirm("Hapus untuk semua?")) set(ref(db, `messages/${cid}/${m.key}`), null);
                    };
                    box.appendChild(b);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.sendMsg = () => {
            const i = document.getElementById('main-input');
            if (!i.value.trim() || !CURR_CHAT) return;
            const cid = [ME.uid, CURR_CHAT].sort().join('_');
            const payload = { s: ME.uid, t: i.value, ts: serverTimestamp() };
            push(ref(db, `messages/${cid}`), payload);
            update(ref(db, `inbox/${ME.uid}/${CURR_CHAT}`), { l: i.value, ts: serverTimestamp() });
            update(ref(db, `inbox/${CURR_CHAT}/${ME.uid}`), { l: i.value, ts: serverTimestamp() });
            i.value = '';
        };

        // --- INBOX ENGINE ---
        function renderInbox() {
            onValue(ref(db, `inbox/${ME.uid}`), (snap) => {
                const box = document.getElementById('inbox-render');
                box.innerHTML = '';
                if(!snap.exists()) return;
                
                let chats = [];
                snap.forEach(c => chats.push({id: c.key, ...c.val()}));
                chats.sort((a,b) => b.ts - a.ts).forEach(async (chat) => {
                    const uSnap = await get(ref(db, `users/${chat.id}`));
                    const ud = uSnap.val();
                    const row = document.createElement('div');
                    row.style = "padding: 18px 25px; display: flex; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer;";
                    row.innerHTML = `<div style="width: 48px; height: 48px; border-radius: 50%; overflow: hidden;"><img src="https://ui-avatars.com/api/?background=151518&color=0084ff&bold=true&name=${ud.username}"></div><div style="flex:1; overflow:hidden;"><div style="display:flex; justify-content:space-between;"><b>${ud.username.toUpperCase()}</b><small style="opacity:0.3;">${new Date(chat.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small></div><div style="font-size:13px; color:var(--text-dim); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${chat.l}</div></div>`;
                    row.onclick = () => openChat(chat.id, ud.username);
                    box.appendChild(row);
                });
            });
        }

        window.closeChat = () => { document.getElementById('chat-view').style.display = 'none'; CURR_CHAT = null; };
        window.handleLogout = () => { if(confirm(DICT[LANG].logout_ask)) signOut(auth).then(()=>location.reload()); };

        // TYPING HANDLER
        document.getElementById('main-input').oninput = () => {
            if(!CURR_CHAT) return;
            set(ref(db, `typing/${CURR_CHAT}/${ME.uid}`), true);
            setTimeout(() => set(ref(db, `typing/${CURR_CHAT}/${ME.uid}`), null), 2000);
        };
    </script>
</body>
</html>
