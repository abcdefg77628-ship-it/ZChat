<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat by zZerr44</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --biru-utama: #007bff;
            --biru-tua: #004a99;
            --biru-muda: #e7f3ff;
            --putih: #ffffff;
            --abu-bg: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--abu-bg); color: #333; height: 100vh; }
        .hidden { display: none !important; }

        /* --- HALAMAN AUTH (DUA OPSI) --- */
        #auth-page {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: var(--biru-utama);
        }

        .auth-card {
            background: var(--putih); padding: 40px 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Logo Kubus Z */
        .logo-z {
            width: 80px; height: 80px; background: var(--biru-utama); color: white;
            font-size: 55px; font-weight: bold; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 8px 8px 0px var(--biru-tua); /* Efek Kubus */
            border: 2px solid white;
        }

        .app-title { font-size: 1.5rem; margin-bottom: 25px; color: var(--biru-tua); font-weight: 800; }

        input {
            width: 100%; padding: 14px; margin: 10px 0;
            border: 2px solid #eee; border-radius: 10px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--biru-utama); }

        .btn-main {
            width: 100%; padding: 14px; background: var(--biru-utama);
            color: white; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-outline {
            width: 100%; padding: 12px; background: transparent;
            color: var(--biru-utama); border: 2px solid var(--biru-utama);
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        /* --- HALAMAN UTAMA --- */
        header {
            background: var(--putih); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--biru-utama);
        }

        .profile-box { cursor: pointer; }
        .pp-square {
            width: 45px; height: 45px; background: var(--biru-utama);
            color: white; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px; border-radius: 5px;
        }
        .pp-line { width: 45px; height: 4px; background: var(--biru-utama); margin-top: 5px; border-radius: 2px; }

        .menu-icon { cursor: pointer; width: 30px; }
        .menu-icon span { display: block; height: 4px; background: var(--biru-utama); margin: 5px 0; border-radius: 2px; }

        /* Sidebar Slide */
        #sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: var(--putih); z-index: 1000; transition: 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
            padding: 30px 20px; box-shadow: -10px 0 20px rgba(0,0,0,0.1);
        }
        #sidebar.open { right: 0; }
        .side-btn { 
            display: block; width: 100%; padding: 15px; text-align: left;
            background: none; border: none; border-bottom: 1px solid #eee;
            font-size: 16px; cursor: pointer; color: #444;
        }
        .side-btn:hover { background: var(--biru-muda); color: var(--biru-utama); }

        /* Chat UI */
        #friend-list { padding: 20px; overflow-y: auto; }
        .friend-item {
            background: white; padding: 15px; border-radius: 12px;
            display: flex; align-items: center; margin-bottom: 12px;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .friend-item:active { transform: scale(0.98); }

        /* Chat Window */
        #chat-window {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--abu-bg); z-index: 2000; display: flex; flex-direction: column;
        }
        .chat-top { background: var(--biru-utama); color: white; padding: 15px; display: flex; align-items: center; font-weight: bold; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .bubble { 
            max-width: 75%; padding: 12px 16px; border-radius: 15px; margin-bottom: 10px;
            line-height: 1.4; word-wrap: break-word; font-size: 15px;
        }
        .me { align-self: flex-end; background: var(--biru-utama); color: white; border-bottom-right-radius: 2px; }
        .them { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="auth-card">
            <div class="logo-z">Z</div>
            <h1 class="app-title">ZChat by zZerr44</h1>

            <div id="auth-choice">
                <button class="btn-main" onclick="showForm('login')">SIGN IN</button>
                <button class="btn-outline" onclick="showForm('register')">REGISTER</button>
            </div>

            <div id="login-form" class="hidden">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-main" onclick="doLogin()">Masuk</button>
                <button class="btn-outline" onclick="showForm('choice')">Kembali</button>
            </div>

            <div id="register-form" class="hidden">
                <input type="text" id="r-user" placeholder="Username Baru">
                <input type="password" id="r-pass" placeholder="Password">
                <input type="password" id="r-confirm" placeholder="Konfirmasi Password">
                <button class="btn-main" onclick="doRegister()">Daftar Sekarang</button>
                <button class="btn-outline" onclick="showForm('choice')">Kembali</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <div class="profile-box">
                <div id="my-initial" class="pp-square">?</div>
                <div class="pp-line"></div>
            </div>
            <div class="menu-icon" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </div>
        </header>

        <div id="friend-list">
            <button class="btn-main" onclick="addFriend()">+ Cari Teman</button>
            <div id="list-container" style="margin-top: 20px;"></div>
        </div>

        <div id="sidebar">
            <h2 style="margin-bottom: 20px; color: var(--biru-utama);">Menu</h2>
            <button class="side-btn" onclick="alert('Username: ' + currentUser.username)">Profil Saya</button>
            <button class="side-btn" onclick="changePass()">Ganti Sandi</button>
            <button class="side-btn" onclick="alert('ZChat v1.0 by zZerr44')">Hak Cipta</button>
            <button class="side-btn" style="color: red; margin-top: 20px;" onclick="doLogout()">Keluar (Log Out)</button>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-top">
            <span onclick="closeChat()" style="margin-right: 20px; font-size: 24px; cursor: pointer;">←</span>
            <span id="target-name">Username</span>
        </div>
        <div id="chat-msgs"></div>
        <div style="padding: 15px; background: white; display: flex;">
            <input type="text" id="chat-input" placeholder="Tulis pesan..." style="margin: 0; flex: 1; margin-right: 10px;">
            <button class="btn-main" style="width: 80px; margin: 0;" onclick="sendMsg()">Kirim</button>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let activeFriend = null;

        // --- NAVIGATION AUTH ---
        function showForm(type) {
            document.getElementById('auth-choice').classList.add('hidden');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');

            if(type === 'login') document.getElementById('login-form').classList.remove('hidden');
            else if(type === 'register') document.getElementById('register-form').classList.remove('hidden');
            else document.getElementById('auth-choice').classList.remove('hidden');
        }

        // --- REGISTER LOGIC ---
        async function doRegister() {
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            const p = document.getElementById('r-pass').value;
            const c = document.getElementById('r-confirm').value;

            if(!u || !p) return alert("Data tidak boleh kosong!");
            if(p !== c) return alert("Konfirmasi password salah!");

            const check = await db.ref('users/' + u).once('value');
            if(check.exists()) return alert("Username sudah ada!");

            const userData = { username: u, password: p, ppVar: Math.floor(Math.random() * 5) };
            await db.ref('users/' + u).set(userData);
            alert("Berhasil! Silakan Masuk.");
            showForm('login');
        }

        // --- LOGIN LOGIC ---
        async function doLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;

            const snap = await db.ref('users/' + u).once('value');
            if(snap.exists() && snap.val().password === p) {
                saveAndLaunch(snap.val());
            } else {
                alert("Username/Password salah!");
            }
        }

        function saveAndLaunch(data) {
            currentUser = data;
            localStorage.setItem('z_session', JSON.stringify(data));
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-initial').innerText = data.username[0].toUpperCase();
            listenFriends();
        }

        // --- KEEP LOGIN CHECK ---
        const session = localStorage.getItem('z_session');
        if(session) saveAndLaunch(JSON.parse(session));

        // --- SIDEBAR & LOGOUT ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        
        function doLogout() {
            const confirm = prompt("Ketik 'out' untuk keluar:");
            if(confirm === 'out') {
                localStorage.removeItem('z_session');
                location.reload();
            }
        }

        // --- CHAT & FRIENDS ---
        function addFriend() {
            const target = prompt("Masukkan Username Teman:").toLowerCase();
            if(target === currentUser.username) return;
            db.ref('users/' + target).once('value', snap => {
                if(!snap.exists()) return alert("User tidak ditemukan!");
                db.ref(`friends/${currentUser.username}/${target}`).set(true);
                db.ref(`friends/${target}/${currentUser.username}`).set(true);
            });
        }

        function listenFriends() {
            db.ref(`friends/${currentUser.username}`).on('value', snap => {
                const container = document.getElementById('list-container');
                container.innerHTML = "";
                snap.forEach(child => {
                    const name = child.key;
                    const div = document.createElement('div');
                    div.className = "friend-item";
                    div.innerHTML = `<div class="pp-square" style="margin-right:15px">${name[0].toUpperCase()}</div><b>${name}</b>`;
                    div.onclick = () => openChat(name);
                    container.appendChild(div);
                });
            });
        }

        function openChat(name) {
            activeFriend = name;
            document.getElementById('target-name').innerText = name;
            document.getElementById('chat-window').classList.remove('hidden');
            loadMsgs();
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        function sendMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt) return;
            const chatID = [currentUser.username, activeFriend].sort().join('_');
            db.ref(`chats/${chatID}`).push({
                sender: currentUser.username,
                text: txt,
                time: Date.now()
            });
            document.getElementById('chat-input').value = "";
        }

        function loadMsgs() {
            const chatID = [currentUser.username, activeFriend].sort().join('_');
            db.ref(`chats/${chatID}`).off();
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    const d = document.createElement('div');
                    d.className = `bubble ${m.sender === currentUser.username ? 'me' : 'them'}`;
                    d.innerText = m.text;
                    // Fitur Salin
                    d.onclick = () => { if(confirm("Salin pesan?")) navigator.clipboard.writeText(m.text); };
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function changePass() {
            const old = prompt("Password lama:");
            if(old === currentUser.password) {
                const baru = prompt("Password baru:");
                const kinf = prompt("Konfirmasi password baru:");
                if(baru === kinf) {
                    db.ref(`users/${currentUser.username}/password`).set(baru);
                    currentUser.password = baru;
                    alert("Sukses!");
                }
            }
        }
    </script>
</body>
</html>
