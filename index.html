<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00a884;
            --bg-light: #f0f2f5;
            --bg-chat: #efeae2;
            --white: #ffffff;
            --text-dark: #111b21;
            --text-gray: #667781;
            --my-bubble: #d9fdd3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); overflow: hidden; height: 100vh; width: 100vw; }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; opacity: 1; transition: opacity 0.5s ease;
        }
        .logo-z { 
            width: 80px; height: 80px; background: var(--primary); 
            border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; margin-bottom: 20px; 
            box-shadow: 0 10px 20px rgba(0,168,132,0.2);
        }
        .logo-z span { font-size: 50px; color: white; font-weight: 800; }

        /* --- PAGES --- */
        .page { display: none; height: 100vh; width: 100vw; }
        
        .auth-container { 
            background: linear-gradient(135deg, var(--primary) 0%, #008069 100%);
            align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* --- APP LAYOUT --- */
        #app { grid-template-columns: 350px 1fr; }
        .sidebar { background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .main-chat { display: flex; flex-direction: column; background: var(--bg-chat); position: relative; }

        /* UI Elements */
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; background: var(--primary); color: white; }
        .chat-header { padding: 10px 15px; background: #f0f2f5; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #ccc; }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.me { align-self: flex-end; background: var(--my-bubble); }
        .msg.other { align-self: flex-start; background: white; }
        .chat-input { padding: 10px; background: #f0f2f5; display: flex; gap: 10px; align-items: center; }

        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            .main-chat { position: absolute; inset: 0; display: none; z-index: 100; }
            .main-chat.active { display: flex; }
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-z"><span>Z</span></div>
        <h2 style="color: var(--primary); letter-spacing: 3px;">ZCHAT</h2>
    </div>

    <div id="login-page" class="page auth-container">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 20px;">ZChat Login</h2>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn" onclick="login()">Masuk</button>
            <p style="text-align: center; margin-top: 15px; font-size: 13px;">
                Baru di sini? <span onclick="showPage('register-page')" style="color: var(--primary); cursor: pointer; font-weight: bold;">Daftar</span>
            </p>
        </div>
    </div>

    <div id="register-page" class="page auth-container">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 20px;">Daftar Akun</h2>
            <input type="file" id="r-photo" accept="image/*">
            <input type="text" id="r-user" placeholder="Username Unik">
            <input type="password" id="r-pass" placeholder="Password">
            <button class="btn" onclick="register()">Buat Akun</button>
            <p style="text-align: center; margin-top: 15px; font-size: 13px;">
                Sudah punya akun? <span onclick="showPage('login-page')" style="color: var(--primary); cursor: pointer; font-weight: bold;">Login</span>
            </p>
        </div>
    </div>

    <div id="app" class="page" style="display: none;">
        <div class="sidebar">
            <div class="chat-header">
                <img id="my-pic" class="user-avatar" src="">
                <div style="flex: 1; margin-left: 10px; font-weight: bold;" id="my-name">User</div>
                <i class="fas fa-plus-circle" onclick="showModal('new-chat-modal')" style="cursor: pointer; color: var(--text-gray);"></i>
                <i class="fas fa-sign-out-alt" onclick="logout()" style="margin-left: 15px; cursor: pointer; color: var(--text-gray);"></i>
            </div>
            <div id="chat-list" style="flex: 1; overflow-y: auto;"></div>
        </div>

        <div id="main-chat-area" class="main-chat">
            <div class="chat-header">
                <i class="fas fa-arrow-left" id="back-btn" onclick="closeChat()" style="display: none; margin-right: 15px;"></i>
                <img id="target-pic" class="user-avatar" src="https://via.placeholder.com/40">
                <div style="margin-left: 10px;">
                    <div id="target-name" style="font-weight: bold;">Pilih Pesan</div>
                    <div style="font-size: 11px; color: var(--primary);">Online</div>
                </div>
            </div>
            <div id="msg-container" class="chat-body"></div>
            <div class="chat-input">
                <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" style="width: 50px;" onclick="send()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="new-chat-modal" class="modal">
        <div class="modal-box">
            <h3>Cari Teman</h3>
            <input type="text" id="search-name" placeholder="Username teman...">
            <button class="btn" onclick="startChat()">Mulai Chat</button>
            <button class="btn" style="background: #999; margin-top: 5px;" onclick="closeModal()">Batal</button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let me = null;
        let activeChat = null;

        // --- CORE NAVIGATION ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const target = document.getElementById(id);
            if(id === 'app') target.style.display = 'grid';
            else target.style.display = 'flex';
        }

        window.onload = () => {
            setTimeout(() => {
                const saved = localStorage.getItem('zchat_user');
                if(saved) {
                    me = JSON.parse(saved);
                    loadApp();
                } else {
                    showPage('login-page');
                }
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
            }, 2500);
        };

        // --- AUTH ---
        async function register() {
            const user = document.getElementById('r-user').value.trim().toLowerCase();
            const pass = document.getElementById('r-pass').value;
            const file = document.getElementById('r-photo').files[0];
            if(!user || !pass || !file) return alert("Data tidak lengkap!");

            const snap = await db.ref('users').orderByChild('username').equalTo(user).once('value');
            if(snap.exists()) return alert("Username sudah ada!");

            const ref = storage.ref(`users/${user}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();

            const newUser = { username: user, password: pass, photo: url, uid: Date.now() };
            await db.ref(`users/${user}`).set(newUser);
            alert("Berhasil! Silakan Login.");
            showPage('login-page');
        }

        async function login() {
            const user = document.getElementById('l-user').value.trim().toLowerCase();
            const pass = document.getElementById('l-pass').value;
            
            const snap = await db.ref(`users/${user}`).once('value');
            if(snap.exists() && snap.val().password === pass) {
                me = snap.val();
                localStorage.setItem('zchat_user', JSON.stringify(me));
                loadApp();
            } else {
                alert("User atau Password salah!");
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // --- APP LOGIC ---
        function loadApp() {
            showPage('app');
            document.getElementById('my-pic').src = me.photo;
            document.getElementById('my-name').innerText = me.username;
            
            // Listen Chat List
            db.ref('chats').on('value', snap => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const c = child.val();
                    if(c.members && Object.values(c.members).includes(me.username)) {
                        const other = Object.values(c.members).find(u => u !== me.username);
                        list.innerHTML += `
                            <div onclick="openChat('${child.key}', '${other}')" style="padding:15px; border-bottom:1px solid #eee; cursor:pointer; display:flex; align-items:center;">
                                <img src="https://ui-avatars.com/api/?name=${other}&background=00a884&color=fff" style="width:40px; border-radius:50%;">
                                <div style="margin-left:10px;">
                                    <div style="font-weight:bold;">${other}</div>
                                    <div style="font-size:12px; color:gray;">${c.last || 'Klik untuk chat'}</div>
                                </div>
                            </div>
                        `;
                    }
                });
            });
        }

        function openChat(id, name) {
            activeChat = id;
            document.getElementById('target-name').innerText = name;
            document.getElementById('target-pic').src = `https://ui-avatars.com/api/?name=${name}&background=00a884&color=fff`;
            
            if(window.innerWidth <= 768) {
                document.getElementById('main-chat-area').classList.add('active');
                document.getElementById('back-btn').style.display = 'block';
            }

            db.ref(`messages/${id}`).on('value', snap => {
                const cont = document.getElementById('msg-container');
                cont.innerHTML = "";
                snap.forEach(m => {
                    const msg = m.val();
                    const isMe = msg.sender === me.username;
                    cont.innerHTML += `<div class="msg ${isMe ? 'me' : 'other'}">${msg.text}</div>`;
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        async function send() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val || !activeChat) return;

            await db.ref(`messages/${activeChat}`).push({ sender: me.username, text: val, time: Date.now() });
            await db.ref(`chats/${activeChat}`).update({ last: val });
            input.value = "";
        }

        async function startChat() {
            const target = document.getElementById('search-name').value.trim().toLowerCase();
            const snap = await db.ref(`users/${target}`).once('value');
            if(!snap.exists()) return alert("User tidak ditemukan!");
            
            const chatId = [me.username, target].sort().join("_");
            await db.ref(`chats/${chatId}`).set({ members: {u1: me.username, u2: target}, last: "" });
            closeModal();
            openChat(chatId, target);
        }

        // --- UI UTILS ---
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function closeChat() { document.getElementById('main-chat-area').classList.remove('active'); }
    </script>
</body>
</html>
