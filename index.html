<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Chat Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1012;
            --bg-card: #1a1c1e;
            --primary: #007aff;
            --primary-glow: rgba(0, 122, 255, 0.3);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --sent-bubble: #007aff;
            --received-bubble: #2c2c2e;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100%;
            overflow: hidden; /* Prevent body scroll */
            position: fixed;
            width: 100%;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Auth Screen */
        #auth-screen {
            display: none;
            padding: 40px 20px;
            text-align: center;
            height: 100vh;
            justify-content: center;
            flex-direction: column;
            background: radial-gradient(circle at top, #1a1c1e 0%, #0f1012 100%);
        }

        .auth-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* Main Layout */
        #main-app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        header {
            height: 70px;
            background: rgba(26, 28, 30, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #2c2c2e;
            z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }

        .icon-btn {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
        }

        /* Chat List */
        #chat-list-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #1a1c1e;
            transition: var(--transition);
        }

        .chat-item:active { background: #1a1c1e; }

        .avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(45deg, var(--primary), #00c6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 15px;
            font-size: 20px;
            position: relative;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: #4cd964;
            border: 2px solid var(--bg-dark);
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .chat-info { flex: 1; }
        .chat-info h4 { font-size: 16px; margin-bottom: 4px; }
        .chat-info p { font-size: 14px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        .chat-meta { text-align: right; }
        .chat-meta span { font-size: 11px; color: var(--text-dim); }
        .unread-badge {
            background: var(--primary);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 5px;
            display: inline-block;
        }

        /* Chat Room */
        #chat-room {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 200;
            display: none;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        #chat-room.active { display: flex; transform: translateX(0); }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle at 50% 50%, #1a1c1e 0%, #0f1012 100%);
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            position: relative;
            line-height: 1.4;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-sent {
            align-self: flex-end;
            background: var(--sent-bubble);
            border-bottom-right-radius: 4px;
        }

        .msg-received {
            align-self: flex-start;
            background: var(--received-bubble);
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.7;
            display: block;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            padding: 15px;
            background: #1a1c1e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input-area input { margin: 0; border-radius: 25px; background: #2c2c2e; border: none; }

        .send-btn {
            background: var(--primary);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: white;
            flex-shrink: 0;
        }

        /* Sidebar Drawer */
        #drawer {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            z-index: 300;
            transition: var(--transition);
            padding: 40px 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        #drawer.active { left: 0; }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 299;
            display: none;
        }

        .drawer-item {
            padding: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2c2c2e;
            cursor: pointer;
        }
        
        /* Utils */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--primary); font-weight: 600;">Z-CHAT</p>
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom: 10px;">Selamat Datang</h2>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Masukan nomor HP untuk memulai</p>
            <input type="text" id="reg-name" placeholder="Nama Lengkap">
            <input type="number" id="reg-phone" placeholder="Nomor HP (Contoh: 0812...)">
            <button class="btn-primary" onclick="handleRegister()">Masuk Sekarang</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo">Z-Chat</div>
            <div style="display: flex; gap: 10px;">
                <button class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <button class="icon-btn" onclick="toggleDrawer(true)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </div>
        </header>

        <div id="chat-list-container">
            </div>
    </div>

    <div id="chat-room">
        <header style="height: 65px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="icon-btn" onclick="closeChat()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="avatar" style="width: 40px; height: 40px; font-size: 14px;" id="room-avatar">?</div>
                <div>
                    <h4 id="room-name">Nama</h4>
                    <span id="room-status" style="font-size: 10px; color: #4cd964;">Online</span>
                </div>
            </div>
        </header>
        
        <div class="messages-container" id="messages-box"></div>

        <div class="chat-input-area">
            <input type="text" id="msg-input" placeholder="Ketik pesan...">
            <button class="send-btn" onclick="sendMessage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div class="drawer-overlay" onclick="toggleDrawer(false)"></div>
    <div id="drawer">
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="avatar" style="width: 80px; height: 80px; margin: 0 auto 15px; font-size: 30px;" id="my-avatar">U</div>
            <h3 id="my-name">User Name</h3>
            <p id="my-phone" style="color: var(--text-dim); font-size: 14px;">0812345678</p>
        </div>
        <div class="drawer-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profil Saya</span>
        </div>
        <div class="drawer-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Pengaturan</span>
        </div>
        <div class="drawer-item" onclick="logout()" style="color: #ff453a; border: none; margin-top: 50px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            <span>Keluar Aplikasi</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const msgSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

        // --- APP STATE ---
        let currentUser = JSON.parse(localStorage.getItem('zchat_user')) || null;
        let activeChatPhone = null;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').classList.add('hidden');
                    checkAuth();
                }, 500);
            }, 1500);
        };

        function checkAuth() {
            if (currentUser) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initUserData();
                loadChatList();
                updateOnlineStatus(true);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();

            if (name === "" || phone === "") return alert("Mohon lengkapi data!");
            if (isNaN(phone)) return alert("Nomor HP harus berupa angka!");

            currentUser = { name, phone };
            localStorage.setItem('zchat_user', JSON.stringify(currentUser));
            
            // Simpan ke Firebase Users
            db.ref('users/' + phone).set({
                name: name,
                phone: phone,
                lastSeen: Date.now(),
                online: true
            });

            checkAuth();
        }

        function initUserData() {
            document.getElementById('my-name').innerText = currentUser.name;
            document.getElementById('my-phone').innerText = currentUser.phone;
            document.getElementById('my-avatar').innerText = currentUser.name.charAt(0).toUpperCase();
        }

        function updateOnlineStatus(status) {
            if (!currentUser) return;
            db.ref('users/' + currentUser.phone).update({
                online: status,
                lastSeen: Date.now()
            });
        }

        // --- CHAT LOGIC ---
        function loadChatList() {
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                const container = document.getElementById('chat-list-container');
                container.innerHTML = "";

                for (let phone in users) {
                    if (phone === currentUser.phone) continue;

                    const user = users[phone];
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => openChat(user.phone, user.name);
                    
                    div.innerHTML = `
                        <div class="avatar">
                            ${user.name.charAt(0).toUpperCase()}
                            ${user.online ? '<div class="online-dot"></div>' : ''}
                        </div>
                        <div class="chat-info">
                            <h4>${user.name}</h4>
                            <p>${user.online ? 'Online' : 'Offline'}</p>
                        </div>
                        <div class="chat-meta">
                            <span>${formatTime(user.lastSeen)}</span>
                        </div>
                    `;
                    container.appendChild(div);
                }
            });
        }

        function openChat(phone, name) {
            activeChatPhone = phone;
            const room = document.getElementById('chat-room');
            room.style.display = 'flex';
            setTimeout(() => room.classList.add('active'), 10);
            
            document.getElementById('room-name').innerText = name;
            document.getElementById('room-avatar').innerText = name.charAt(0).toUpperCase();
            
            loadMessages();
            
            // Check target status
            db.ref('users/' + phone).on('value', (snap) => {
                const u = snap.val();
                document.getElementById('room-status').innerText = u.online ? 'Online' : 'Offline';
            });
        }

        function closeChat() {
            const room = document.getElementById('chat-room');
            room.classList.remove('active');
            setTimeout(() => room.style.display = 'none', 300);
            activeChatPhone = null;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (text === "" || !activeChatPhone) return;

            const msgId = db.ref('chats').push().key;
            const chatId = getChatId(currentUser.phone, activeChatPhone);
            
            const msgData = {
                id: msgId,
                sender: currentUser.phone,
                text: text,
                timestamp: Date.now()
            };

            db.ref('messages/' + chatId + '/' + msgId).set(msgData);
            input.value = "";
        }

        function loadMessages() {
            const chatId = getChatId(currentUser.phone, activeChatPhone);
            const box = document.getElementById('messages-box');
            
            db.ref('messages/' + chatId).on('value', (snapshot) => {
                box.innerHTML = "";
                const data = snapshot.val();
                
                if (data) {
                    Object.values(data).forEach(msg => {
                        const isMine = msg.sender === currentUser.phone;
                        const div = document.createElement('div');
                        div.className = `message ${isMine ? 'msg-sent' : 'msg-received'}`;
                        div.innerHTML = `
                            ${msg.text}
                            <span class="msg-time">${formatTime(msg.timestamp)}</span>
                        `;
                        // Long press to delete logic could go here
                        box.appendChild(div);
                    });
                }
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- UTILS ---
        function getChatId(p1, p2) {
            return p1 < p2 ? p1 + "_" + p2 : p2 + "_" + p1;
        }

        function formatTime(ts) {
            const date = new Date(ts);
            return date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
        }

        function toggleDrawer(show) {
            document.getElementById('drawer').classList.toggle('active', show);
            document.querySelector('.drawer-overlay').style.display = show ? 'block' : 'none';
        }

        function logout() {
            if(confirm("Keluar dari aplikasi?")) {
                updateOnlineStatus(false);
                localStorage.clear();
                location.reload();
            }
        }

        // Handle Enter key for sending
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Listen for new messages for sound
        db.ref('messages').on('child_changed', (snapshot) => {
            // Logika sederhana notifikasi: Jika pesan terakhir bukan dari saya
            msgSound.play().catch(() => {}); 
        });

        // Update status when closing app
        window.addEventListener('beforeunload', () => updateOnlineStatus(false));
    </script>
</body>
</html>
