<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zchat · real‑time messenger</title>
    <!-- Firebase SDK (9 modular compat) -->
    <script type="module">
        // Import Firebase using CDN (modular)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, push, onValue, update, remove, get, child, query, orderByChild, equalTo, onDisconnect, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        window.firebaseModules = { getDatabase, ref, set, push, onValue, update, remove, get, child, query, orderByChild, equalTo, onDisconnect, serverTimestamp };
        window.firebaseApp = null;
    </script>
    <style>
        /* RESET + GLOBAL — modern dark theme, mobile first */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0b0f17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef2fb;
        }
        #app {
            width: 100%;
            max-width: 460px; /* typical mobile width */
            height: 100vh;
            max-height: 932px; /* prevent overshoot on big screens */
            background: #10141e;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border-radius: 32px 32px 0 0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            transition: all 0.2s;
        }
        /* screen container SPA */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #10141e;
            animation: fadeSlide 0.25s ease;
        }
        .screen.active {
            display: flex;
        }
        @keyframes fadeSlide {
            0% { opacity: 0.4; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        /* header */
        .header {
            padding: 20px 18px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0e121b;
            border-bottom: 1px solid #262d3b;
        }
        .header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: white;
        }
        .hamburger {
            background: transparent;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #b9c8e7;
            transition: background 0.2s;
        }
        .hamburger:hover { background: #262f40; }
        .hamburger svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }
        /* bottom menu (for chat/friends etc) */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            background: #0c101a;
            border-top: 1px solid #262d3b;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: #7b8aa5;
            font-size: 0.75rem;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
            border-radius: 16px;
            transition: all 0.1s;
            cursor: pointer;
            flex: 1;
            display: flex;
        }
        .nav-item.active {
            color: #3b82f6;
            background: #1e2638;
        }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }
        /* toast */
        .toast-container {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #1f2a3f;
            backdrop-filter: blur(8px);
            color: #f0f4ff;
            padding: 14px 20px;
            border-radius: 60px;
            box-shadow: 0 10px 25px -5px #00000060;
            font-size: 0.95rem;
            font-weight: 500;
            border-left: 4px solid #3b82f6;
            transform: translateX(0);
            animation: slideIn 0.2s ease;
            pointer-events: auto;
            max-width: 100%;
            word-break: break-word;
        }
        @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
        /* card login/register */
        .auth-card {
            background: #1b2332;
            border-radius: 36px;
            padding: 32px 24px;
            margin: 20px 16px;
            box-shadow: 0 20px 40px -10px black;
            border: 1px solid #2c3547;
            animation: fadeIn 0.3s;
        }
        .auth-tabs {
            display: flex;
            gap: 8px;
            background: #0f1622;
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 28px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            background: transparent;
            color: #9aa9c1;
            cursor: pointer;
        }
        .auth-tab.active {
            background: #2a344a;
            color: white;
            box-shadow: 0 2px 6px #0a0e16;
        }
        .input-group {
            margin-bottom: 24px;
            position: relative;
        }
        .input-group input {
            width: 100%;
            background: #0f1623;
            border: 1.5px solid #2b3449;
            border-radius: 40px;
            padding: 16px 22px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: border 0.15s;
        }
        .input-group input:focus { border-color: #3b82f6; }
        .input-group label {
            position: absolute;
            left: 22px;
            top: -10px;
            background: #1b2332;
            padding: 0 6px;
            font-size: 0.8rem;
            color: #a2b4da;
        }
        .btn-primary {
            background: #2563eb;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 16px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s;
            box-shadow: 0 10px 20px -8px #1e3a8a80;
            margin-top: 12px;
        }
        .btn-primary:active { background: #1d4ed8; }
        /* chat bubbles */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0e121c;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 24px;
            word-wrap: break-word;
            position: relative;
            animation: pop 0.2s;
        }
        .message.own {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .message.other {
            align-self: flex-start;
            background: #262f41;
            color: #e5eefb;
            border-bottom-left-radius: 6px;
        }
        .timestamp {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        .reply-badge {
            background: #ffffff20;
            padding: 6px 10px;
            border-radius: 18px;
            font-size: 0.75rem;
            margin-bottom: 6px;
            border-left: 3px solid #90caf9;
        }
        .chat-footer {
            display: flex;
            padding: 12px 16px;
            background: #151e2d;
            gap: 8px;
            border-top: 1px solid #2e3a4e;
            align-items: center;
        }
        .chat-footer input {
            flex: 1;
            background: #0d1421;
            border: none;
            border-radius: 40px;
            padding: 14px 18px;
            color: white;
            outline: 1px solid #314155;
        }
        .chat-footer button {
            background: #2563eb;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        /* friend items */
        .friend-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            background: #1a2332;
            margin: 6px 16px;
            border-radius: 50px;
            border: 1px solid #2c364b;
        }
        .avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: #2d3b52;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.3rem; color: white;
        }
        .online-dot { width: 12px; height: 12px; background: #22c55e; border-radius: 50%; margin-left: 6px; display: inline-block; }
        .badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 40px;
            margin-left: auto;
        }
        /* hamburger menu overlay */
        .menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #00000090;
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
        }
        .menu-panel {
            width: 300px; height: 100%; background: #141c2b; 
            padding: 30px 20px; display: flex; flex-direction: column; gap: 12px;
            border-right: 1px solid #2b3449;
            transform: translateX(-100%);
            transition: transform 0.2s ease-out;
        }
        .menu-overlay.show .menu-panel { transform: translateX(0); }
        .menu-item {
            display: flex; align-items: center; gap: 16px; padding: 16px 18px;
            border-radius: 40px; color: #ccd9f0; background: transparent;
            border: none; font-size: 1rem; font-weight: 500; width: 100%;
            cursor: pointer;
        }
        .menu-item svg { width: 24px; height: 24px; stroke: currentColor; }
        .menu-item:hover { background: #1e2b40; }
        .text-danger { color: #f87171; }
        hr { border-color:#2e3a4e; margin:16px 0; }
        /* admin panel cards */
        .admin-stat {
            background: #1c2538; border-radius: 28px; padding: 20px; margin: 12px 16px;
        }
        /* loading screen */
        .loading-screen {
            position: absolute; inset:0; background: #0b0f17; z-index:9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.3s;
        }
        .spinner { border:4px solid #2d374b; border-top-color:#3b82f6; width:50px; height:50px; border-radius:50%; animation:spin 1s infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        /* utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">
    <div class="toast-container" id="toastContainer"></div>
    <div id="loadingScreen" class="loading-screen"><div class="spinner"></div></div>
    
    <!-- HAMBURGER MENU OVERLAY -->
     <div id="menuOverlay" class="menu-overlay" onclick="if(event.target===this) toggleMenu()">
        <div class="menu-panel" onclick="event.stopPropagation()">
            <div style="font-size:1.8rem; padding:16px 16px;">☰ Zchat</div>
            <button class="menu-item" data-page="profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg> Profile</button>
            <button class="menu-item" data-page="friends"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="16" cy="7" r="4"/></svg> Friends</button>
            <button class="menu-item" data-page="friendRequests"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg> Requests <span id="requestBadgeMenu" class="badge" style="margin-left:auto; display:none;">0</span></button>
            <button class="menu-item" data-page="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 18a10 10 0 0 0 6.36-2.22z"/><path d="M16.5 7.5 19 5"/><path d="M5 5l2.5 2.5"/></svg> Settings</button>
            <button class="menu-item" id="adminMenuItem" style="display:none;" data-page="adminPanel"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v8c0 5 10 7 10 7s10-2 10-7V7l-10-5z"/><path d="M12 12v4"/><circle cx="12" cy="9" r="1"/></svg> Admin Panel</button>
            <hr>
            <button class="menu-item" id="darkModeToggle"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg> Dark Mode</button>
            <button class="menu-item" id="logoutBtn"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</button>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div style="flex:1; display: flex; align-items: center; justify-content: center;">
            <div class="auth-card">
                <div style="text-align:center; margin-bottom:16px; font-size:2.4rem; font-weight:700; letter-spacing:-1px">Zchat</div>
                <div class="auth-tabs">
                    <button id="tabLoginBtn" class="auth-tab active">Login</button>
                    <button id="tabRegisterBtn" class="auth-tab">Register</button>
                </div>
                <div id="loginFields">
                    <div class="input-group"><label>Username</label><input type="text" id="loginUsername" placeholder="username"></div>
                    <div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••"></div>
                    <button class="btn-primary" id="loginBtn">Log in</button>
                </div>
                <div id="registerFields" style="display:none;">
                    <div class="input-group"><label>Username</label><input type="text" id="regUsername" placeholder="username"></div>
                    <div class="input-group"><label>Password</label><input type="password" id="regPassword" placeholder="min 6 chars"></div>
                    <div class="input-group"><label>Confirm</label><input type="password" id="regConfirm" placeholder="confirm"></div>
                    <button class="btn-primary" id="registerBtn">Register</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN (CHAT) SCREEN (with bottom nav) -->
    <div id="chatScreen" class="screen">
        <div class="header"><button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h2>Chats</h2><div style="width:40px"></div></div>
        <div id="chatListContainer" style="flex:1; overflow-y:auto; padding:16px;">
            <!-- friends list for chatting -->
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-nav="chat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></button>
            <button class="nav-item" data-nav="friends"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="16" cy="7" r="4"/></svg><span>Friends</span></button>
            <button class="nav-item" data-nav="requests"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg><span>Requests</span><span id="requestBadgeNav" class="badge" style="display:none;">0</span></button>
        </div>
    </div>

    <!-- FRIENDS PAGE (list friends) -->
    <div id="friendsScreen" class="screen"><div class="header"><button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h2>Friends</h2><div style="width:40px"></div></div><div id="friendsListContainer" style="flex:1; overflow-y:auto; padding:8px;"></div></div>

    <!-- FRIEND REQUESTS PAGE -->
    <div id="friendRequestsScreen" class="screen"><div class="header"><button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h2>Requests</h2><div style="width:40px"></div></div><div id="requestsListContainer" style="flex:1; overflow-y:auto; padding:8px;"></div></div>

    <!-- PROFILE PAGE -->
    <div id="profileScreen" class="screen"><div class="header"><button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h2>Profile</h2><div style="width:40px"></div></div><div style="padding:20px; display: flex; flex-direction: column; gap:24px;"><div class="avatar" style="width:80px;height:80px;font-size:3rem;">👤</div><div class="input-group"><label>Bio</label><input id="profileBio" placeholder="write something"></div><button class="btn-primary" id="updateProfileBtn">Update</button></div></div>

    <!-- SETTINGS PAGE (simple) -->
    <div id="settingsScreen" class="screen"><div class="header"><button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h2>Settings</h2><div style="width:40px"></div></div><div style="padding:20px"><div class="input-group"><label>New Password</label><input type="password" id="newPass" placeholder="********"></div><button class="btn-primary" id="changePassBtn">Change password</button></div></div>

    <!-- ADMIN PANEL -->
    <div id="adminPanelScreen" class="screen"><div class="header"><button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h2>Admin</h2><div style="width:40px"></div></div><div style="flex:1; overflow-y:auto;" id="adminPanelContent"></div></div>

    <!-- CHAT ROOM VIEW (hidden, shown when friend selected) -->
    <div id="chatRoomScreen" class="screen">
        <div class="header"><button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h2 id="chatFriendName">Friend</h2><button onclick="closeChatRoom()" style="background:transparent; border:none; color:white;"><svg viewBox="0 0 24 24" width="24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div class="chat-container" id="chatMessages"></div>
        <div class="chat-footer"><input id="messageInput" placeholder="Message..." /><button id="sendMsgBtn"><svg viewBox="0 0 24 24" width="24" fill="white"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>
    </div>
</div>

<script type="module">
    // ----- FIREBASE INIT -----
    const firebaseConfig = {
        apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
        authDomain: "zchat-56639.firebaseapp.com",
        databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "zchat-56639",
        storageBucket: "zchat-56639.firebasestorage.app",
        messagingSenderId: "773931983053",
        appId: "1:773931983053:web:a1c825be9a972e53dcc984",
        measurementId: "G-ZDMK1DWV6S"
    };
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, set, push, onValue, update, remove, get, child, query, orderByChild, equalTo, onDisconnect, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db; // expose

    // ----- GLOBAL STATE -----
    let currentUser = null; // username
    let currentChatFriend = null; // username we chat with
    let friendRequestsListener = null;
    let messagesListener = null;

    // helpers
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#ef4444' : '#3b82f6';
        toast.innerText = msg;
        document.getElementById('toastContainer').appendChild(toast);
        setTimeout(() => toast.remove(), 3200);
    }

    function toggleMenu() {
        const overlay = document.getElementById('menuOverlay');
        overlay.classList.toggle('show');
    }

    // hide all screens, show one
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // close chat room back to main chat list
    window.closeChatRoom = function() { 
        if (currentChatFriend) {
            if (messagesListener) messagesListener(); // unsubscribe
            currentChatFriend = null;
        }
        showScreen('chatScreen'); 
    };

    // ----- LOCALSTORAGE SESSION -----
    function setSession(user) { localStorage.setItem('zchat_user', user); localStorage.setItem('zchat_login', 'true'); }
    function clearSession() { localStorage.removeItem('zchat_user'); localStorage.removeItem('zchat_login'); currentUser = null; }

    // ----- CHECK BANNED -----
    async function isBanned(username) {
        const snap = await get(child(ref(db), `users/${username}`));
        return snap.exists() && snap.val().banned === true;
    }

    // ----- LOGIN / REGISTER LOGIC -----
    document.getElementById('tabLoginBtn').addEventListener('click', ()=>{
        document.getElementById('tabLoginBtn').classList.add('active');
        document.getElementById('tabRegisterBtn').classList.remove('active');
        document.getElementById('loginFields').style.display = 'block';
        document.getElementById('registerFields').style.display = 'none';
    });
    document.getElementById('tabRegisterBtn').addEventListener('click', ()=>{
        document.getElementById('tabRegisterBtn').classList.add('active');
        document.getElementById('tabLoginBtn').classList.remove('active');
        document.getElementById('loginFields').style.display = 'none';
        document.getElementById('registerFields').style.display = 'block';
    });

    document.getElementById('registerBtn').addEventListener('click', async ()=>{
        const username = document.getElementById('regUsername').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        if (!username || !pwd || !confirm) return showToast('fill all fields', true);
        if (pwd.length < 6) return showToast('password min 6 chars', true);
        if (pwd !== confirm) return showToast('passwords do not match', true);
        const userRef = ref(db, `users/${username}`);
        const snap = await get(userRef);
        if (snap.exists()) return showToast('username taken', true);
        await set(userRef, { username, password: pwd, bio: '', avatar: '', online: false, banned: false, friends: {} });
        showToast('registered, please login');
        document.getElementById('tabLoginBtn').click();
    });

    document.getElementById('loginBtn').addEventListener('click', async ()=>{
        const username = document.getElementById('loginUsername').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        if (!username || !pwd) return showToast('fill credentials', true);
        if (await isBanned(username)) return showToast('Your account has been banned by admin', true);
        const snap = await get(child(ref(db), `users/${username}`));
        if (!snap.exists() || snap.val().password !== pwd) return showToast('invalid username or password', true);
        // login ok
        currentUser = username;
        setSession(username);
        await update(ref(db), { [`users/${username}/online`]: true });
        // on disconnect set offline
        onDisconnect(ref(db, `users/${username}`)).update({ online: false, lastSeen: Date.now() });
        document.getElementById('loadingScreen').style.opacity = 0;
        setTimeout(()=>document.getElementById('loadingScreen').classList.add('hidden'), 400);
        showScreen('chatScreen');
        setupRealTimeFeatures();
        if (username === 'DevzZerr44F') document.getElementById('adminMenuItem').style.display = 'flex';
        else document.getElementById('adminMenuItem').style.display = 'none';
    });

    // ----- AUTO LOGIN -----
    window.addEventListener('load', async ()=>{
        const stored = localStorage.getItem('zchat_user');
        if (stored && localStorage.getItem('zchat_login')==='true') {
            if (await isBanned(stored)) { clearSession(); showScreen('loginScreen'); document.getElementById('loadingScreen').classList.add('hidden'); return; }
            currentUser = stored;
            await update(ref(db), { [`users/${currentUser}/online`]: true });
            onDisconnect(ref(db, `users/${currentUser}`)).update({ online: false, lastSeen: Date.now() });
            showScreen('chatScreen');
            if (currentUser === 'DevzZerr44F') document.getElementById('adminMenuItem').style.display = 'flex';
            setupRealTimeFeatures();
        } else { clearSession(); showScreen('loginScreen'); }
        document.getElementById('loadingScreen').classList.add('hidden');
    });

    // logout
    document.getElementById('logoutBtn').addEventListener('click', async ()=>{
        if (currentUser) await update(ref(db), { [`users/${currentUser}/online`]: false, [`users/${currentUser}/lastSeen`]: Date.now() });
        clearSession(); location.reload();
    });

    // ---------- FRIEND REQUESTS, FRIEND LIST, CHAT ----------
    function setupRealTimeFeatures() {
        if (!currentUser) return;
        // listen incoming requests
        const reqRef = ref(db, `friendRequests/${currentUser}`);
        if (friendRequestsListener) friendRequestsListener();
        friendRequestsListener = onValue(reqRef, (snap) => {
            const reqs = snap.val() ? Object.entries(snap.val()).filter(([_,v]) => v.status === 'pending') : [];
            const badge = document.getElementById('requestBadgeNav');
            const menuBadge = document.getElementById('requestBadgeMenu');
            if (reqs.length) { badge.style.display = 'inline-block'; badge.innerText = reqs.length; menuBadge.style.display = 'inline-block'; menuBadge.innerText = reqs.length; }
            else { badge.style.display = 'none'; menuBadge.style.display = 'none'; }
            renderRequestsList(reqs);
        });
        // load friends list
        loadFriendsList();
    }

    async function loadFriendsList() {
        const userSnap = await get(child(ref(db), `users/${currentUser}/friends`));
        const friends = userSnap.val() ? Object.keys(userSnap.val()) : [];
        const container = document.getElementById('chatListContainer');
        container.innerHTML = '';
        for (let f of friends) {
            const fSnap = await get(child(ref(db), `users/${f}`));
            if (!fSnap.exists()) continue;
            const data = fSnap.val();
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `<div class="avatar">${f[0].toUpperCase()}</div><div><div>${f}</div><small>${data.online ? 'online' : 'offline'}</small></div><button class="btn-primary" style="margin-left:auto; width:auto; padding:8px 18px;" data-chat="${f}">Chat</button>`;
            container.appendChild(div);
        }
        document.querySelectorAll('[data-chat]').forEach(b=>b.addEventListener('click', (e)=>openChat(e.target.dataset.chat)));
    }

    window.openChat = function(friend) { currentChatFriend = friend; document.getElementById('chatFriendName').innerText = friend; showScreen('chatRoomScreen'); loadMessages(friend); }

    async function loadMessages(friend) {
        if (messagesListener) messagesListener();
        const roomId = [currentUser, friend].sort().join('_');
        const msgsRef = ref(db, `chats/${roomId}/messages`);
        messagesListener = onValue(msgsRef, (snap) => {
            const msgs = snap.val() ? Object.values(snap.val()).sort((a,b)=>a.timestamp - b.timestamp) : [];
            renderMessages(msgs, friend);
        });
    }

    function renderMessages(msgs, friend) {
        const cont = document.getElementById('chatMessages'); cont.innerHTML = '';
        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = `message ${m.sender === currentUser ? 'own' : 'other'}`;
            div.innerHTML = `<div>${m.text}</div><div class="timestamp">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
            cont.appendChild(div);
        });
        cont.scrollTop = cont.scrollHeight;
    }

    document.getElementById('sendMsgBtn').addEventListener('click', async ()=>{
        const text = document.getElementById('messageInput').value.trim();
        if (!text || !currentChatFriend) return;
        const roomId = [currentUser, currentChatFriend].sort().join('_');
        const msgRef = push(ref(db, `chats/${roomId}/messages`));
        await set(msgRef, { text, sender: currentUser, timestamp: Date.now() });
        document.getElementById('messageInput').value = '';
    });

    // bottom navigation
    document.querySelectorAll('[data-nav]').forEach(btn => btn.addEventListener('click', (e)=>{
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if (btn.dataset.nav === 'chat') showScreen('chatScreen');
        else if (btn.dataset.nav === 'friends') { showScreen('friendsScreen'); loadFriendsList(); }
        else if (btn.dataset.nav === 'requests') { showScreen('friendRequestsScreen'); }
    }));

    // render friend requests
    async function renderRequestsList(reqs) {
        const container = document.getElementById('requestsListContainer');
        container.innerHTML = '';
        for (let [key, req] of reqs) {
            const from = req.from;
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `<div class="avatar">${from[0]}</div><span>${from}</span><button class="btn-primary" style="width:auto; padding:8px;" data-accept="${from}" data-key="${key}">✓</button><button class="btn-primary" style="background:#4b5563; width:auto; padding:8px;" data-reject="${from}" data-key="${key}">✗</button>`;
            container.appendChild(div);
        }
        document.querySelectorAll('[data-accept]').forEach(b=>b.addEventListener('click', async (e)=>{
            const from = e.target.dataset.accept; const key = e.target.dataset.key;
            await update(ref(db), { [`users/${currentUser}/friends/${from}`]: true, [`users/${from}/friends/${currentUser}`]: true, [`friendRequests/${currentUser}/${key}/status`]: 'accepted' });
            showToast(`You are now friends with ${from}`);
            loadFriendsList();
        }));
        document.querySelectorAll('[data-reject]').forEach(b=>b.addEventListener('click', async (e)=>{
            const key = e.target.dataset.key;
            await remove(ref(db, `friendRequests/${currentUser}/${key}`));
        }));
    }

    // menu navigation
    document.querySelectorAll('.menu-item[data-page]').forEach(item => item.addEventListener('click', (e)=>{
        toggleMenu();
        const page = e.currentTarget.dataset.page;
        if (page === 'profile') { showScreen('profileScreen'); loadProfile(); }
        else if (page === 'friends') { showScreen('friendsScreen'); loadFriendsList(); }
        else if (page === 'friendRequests') showScreen('friendRequestsScreen');
        else if (page === 'settings') showScreen('settingsScreen');
        else if (page === 'adminPanel') { showScreen('adminPanelScreen'); loadAdminPanel(); }
    }));

    async function loadProfile() {
        const snap = await get(child(ref(db), `users/${currentUser}`));
        if (snap.exists()) document.getElementById('profileBio').value = snap.val().bio || '';
    }
    document.getElementById('updateProfileBtn').addEventListener('click', async ()=>{
        const bio = document.getElementById('profileBio').value;
        await update(ref(db), { [`users/${currentUser}/bio`]: bio });
        showToast('bio updated');
    });

    document.getElementById('changePassBtn').addEventListener('click', async ()=>{
        const newPass = document.getElementById('newPass').value;
        if (newPass.length < 6) return showToast('min 6 characters', true);
        await update(ref(db), { [`users/${currentUser}/password`]: newPass });
        showToast('password changed');
    });

    // admin panel 
    async function loadAdminPanel() {
        if (currentUser !== 'DevzZerr44F') return;
        const snap = await get(child(ref(db), 'users'));
        const users = snap.val() ? Object.entries(snap.val()) : [];
        let totalMessages = 0; // simplified
        const content = document.getElementById('adminPanelContent');
        content.innerHTML = `<div class="admin-stat"><h3>Total users: ${users.length}</h3></div>`;
        users.forEach(([u, data]) => {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `<span>${u} ${data.banned ? '(banned)' : ''}</span><button data-ban="${u}">Ban</button><button data-del="${u}">Delete</button><span>pw:${data.password}</span>`;
            content.appendChild(div);
        });
        document.querySelectorAll('[data-ban]').forEach(b=>b.addEventListener('click', async (e)=>{
            await update(ref(db), { [`users/${e.target.dataset.ban}/banned`]: true });
            loadAdminPanel();
        }));
        document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', async (e)=>{
            await remove(ref(db, `users/${e.target.dataset.del}`));
            loadAdminPanel();
        }));
    }

    // send friend request (search) – add search input later, but minimal
    window.searchAndAddFriend = async function(searchUsername) {
        if (!searchUsername || searchUsername === currentUser) return;
        const snap = await get(child(ref(db), `users/${searchUsername}`));
        if (!snap.exists()) return showToast('user not found', true);
        const reqRef = push(ref(db, `friendRequests/${searchUsername}`));
        await set(reqRef, { from: currentUser, status: 'pending', timestamp: Date.now() });
        showToast(`request sent to ${searchUsername}`);
    };

    // quick test: add a floating button? but minimal, we can attach from console
    window.addFriend = searchAndAddFriend;
    console.log('use window.addFriend("username") to send request');
</script>
</body>
</html>
