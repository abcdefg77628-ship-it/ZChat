<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZChat - Secure Communication</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           CORE SYSTEM STYLING
           ========================================= */
        :root {
            --bg-main: #0a0a0a;
            --bg-side: #121315;
            --bg-chat: #1e1f22;
            --bg-input: #2b2d31;
            --accent: #5865f2;
            --text-p: #ffffff;
            --text-s: #949ba4;
            --danger: #ed4245;
            --success: #23a55a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-p);
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            position: fixed; /* Mencegah layar goyang saat keyboard muncul */
        }

        /* LAYOUT ARCHITECTURE */
        .app-shell { display: flex; width: 100%; height: 100%; position: relative; }

        /* SIDEBAR (FRIENDS) */
        .sidebar-container {
            width: 260px;
            background: var(--bg-side);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #26272b;
            transition: transform 0.3s ease;
            z-index: 500;
        }

        .sidebar-header {
            height: 60px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 14px;
            border-bottom: 1px solid #26272b;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .friend-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .friend-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: 0.2s;
        }
        .friend-card:hover, .friend-card.active { background: #2b2d31; }

        .ava-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            position: relative;
            background: #444;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--bg-side);
        }

        /* MAIN CONTENT AREA */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            position: relative;
        }

        /* TOP NAVIGATION (DENGAN GARIS TIGA DI KANAN) */
        .top-nav {
            height: 60px;
            background: rgba(18, 19, 21, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #26272b;
        }

        .nav-left { display: flex; align-items: center; gap: 12px; }
        .burger-menu {
            cursor: pointer;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .burger-line { width: 22px; height: 2px; background: white; border-radius: 2px; }

        /* MESSAGE AREA (ANTI KEPOTONG) */
        .message-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-bottom: 120px; /* Jarak aman dari input bar */
        }

        .msg-item { display: flex; gap: 14px; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-bubble { flex: 1; }
        .msg-info { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .msg-user { font-weight: 700; font-size: 14px; color: white; }
        .msg-time { font-size: 10px; color: var(--text-s); }
        .msg-body { font-size: 15px; color: #dbdee1; line-height: 1.4; word-break: break-word; }

        /* INPUT AREA (FIXED BOTTOM - ANTI KEPOTONG) */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, var(--bg-chat) 30%);
            padding: 10px 16px 30px; /* Padding bawah gede buat HP */
            z-index: 200;
        }

        .input-box {
            background: var(--bg-input);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        }

        .input-box input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }

        /* MENU MODAL (POJOK KANAN) */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: none;
            justify-content: flex-end;
            padding: 10px;
        }
        .menu-card {
            background: var(--bg-side);
            width: 280px;
            height: fit-content;
            border-radius: 12px;
            padding: 20px;
            animation: slideInRight 0.3s ease;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .menu-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            background: #1e1f22;
            font-weight: 600;
            font-size: 14px;
        }
        .menu-item:hover { background: var(--accent); }

        /* AUTH SCREEN */
        .auth-screen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .auth-form { width: 100%; max-width: 360px; text-align: center; }
        .z-input {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            margin-bottom: 12px;
            outline: none;
        }
        .z-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar-container { position: fixed; left: -260px; height: 100%; }
            .sidebar-container.open { transform: translateX(260px); }
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 100000;
            display: none;
        }
    </style>
</head>
<body>

    <div id="toast">Notif</div>

    <div class="app-shell">
        <aside class="sidebar-container" id="side-bar">
            <div class="sidebar-header" id="txt-dm">DAFTAR TEMAN</div>
            <div class="friend-list" id="dom-friends">
                </div>
            <div style="padding:15px; background:#0e0f11; display:flex; align-items:center; gap:10px">
                <img id="my-ava" src="" style="width:32px; height:32px; border-radius:50%">
                <div style="font-size:12px; font-weight:700" id="my-name">USER</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="auth-screen" id="auth-box">
                <div class="auth-form">
                    <h1 style="color:var(--accent); letter-spacing:3px; margin-bottom:30px">ZCHAT</h1>
                    <input type="text" id="in-u" class="z-input" placeholder="USERNAME">
                    <input type="password" id="in-p" class="z-input" placeholder="PASSWORD">
                    <button class="z-btn" onclick="handleLogin('LOGIN')" id="btn-login-label">MASUK</button>
                    <p style="font-size:12px; margin-top:15px; color:var(--text-s)" onclick="handleLogin('REG')" id="btn-reg-label">Belum punya akun? Daftar</p>
                </div>
            </div>

            <header class="top-nav">
                <div class="nav-left">
                    <div class="burger-menu" onclick="toggleSidebar()" id="btn-side">
                        <div class="burger-line"></div>
                        <div class="burger-line"></div>
                        <div class="burger-line"></div>
                    </div>
                    <span id="active-chat" style="font-weight:700">Pilih Teman</span>
                </div>
                
                <div class="burger-menu" onclick="toggleMenu()" style="align-items: flex-end;">
                    <div class="burger-line" style="width: 24px;"></div>
                    <div class="burger-line" style="width: 18px;"></div>
                    <div class="burger-line" style="width: 24px;"></div>
                </div>
            </header>

            <div class="message-area" id="chat-flow" onclick="closeAll()">
                <div style="margin:auto; text-align:center; opacity:0.3">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=ZChat" style="width:100px">
                    <p id="txt-welcome">Mulai obrolan aman</p>
                </div>
            </div>

            <footer class="bottom-bar">
                <div class="input-box">
                    <input type="text" id="m-in" placeholder="Tulis pesan..." onkeypress="if(event.key=='Enter') pushChat()">
                    <button onclick="pushChat()" style="background:none; border:none; color:var(--accent); font-weight:800; cursor:pointer" id="btn-send">KIRIM</button>
                </div>
            </footer>
        </main>
    </div>

    <div class="menu-overlay" id="menu-box" onclick="toggleMenu()">
        <div class="menu-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:20px" id="txt-settings">Pengaturan</h3>
            
            <label style="font-size:10px; color:var(--text-s); font-weight:800" id="txt-lang">BAHASA / LANGUAGE</label>
            <select id="lang-pick" onchange="setLang(this.value)" style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:8px; margin:8px 0 20px">
                <option value="id">Indonesia</option>
                <option value="en">English</option>
            </select>

            <div class="menu-item" onclick="addFriendUI()" id="txt-add">
                <span>➕</span> <span id="label-add">Tambah Teman</span>
            </div>
            <div class="menu-item" onclick="showReq()" id="txt-req">
                <span>📩</span> <span id="label-req">Permintaan</span>
            </div>
            <div class="menu-item" onclick="logout()" style="color:var(--danger)">
                <span>🚪</span> <span id="label-out">Keluar</span>
            </div>
            <button class="z-btn" style="background:#333; margin-top:20px" onclick="toggleMenu()" id="txt-close">TUTUP</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        const app = initializeApp(conf);
        const db = getDatabase(app);

        let user = localStorage.getItem('z_user');
        let target = null;
        let lang = localStorage.getItem('z_lang') || 'id';

        const dict = {
            id: { 
                dm: "DAFTAR TEMAN", settings: "PENGATURAN", add: "Tambah Teman", 
                req: "Permintaan", out: "Keluar", close: "TUTUP", 
                place: "Tulis pesan...", send: "KIRIM", login: "MASUK", 
                reg: "Belum punya akun? Daftar", welcome: "Mulai obrolan aman" 
            },
            en: { 
                dm: "FRIENDS LIST", settings: "SETTINGS", add: "Add Friend", 
                req: "Requests", out: "Logout", close: "CLOSE", 
                place: "Type a message...", send: "SEND", login: "LOGIN", 
                reg: "No account? Register", welcome: "Start secure chat" 
            }
        };

        window.showT = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); };
        window.toggleSidebar = () => document.getElementById('side-bar').classList.toggle('open');
        window.toggleMenu = () => {
            const m = document.getElementById('menu-box');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        };
        window.closeAll = () => {
            document.getElementById('side-bar').classList.remove('open');
            document.getElementById('menu-box').style.display = 'none';
        };

        window.setLang = (l) => {
            lang = l; localStorage.setItem('z_lang', l);
            const d = dict[l];
            document.getElementById('txt-dm').innerText = d.dm;
            document.getElementById('txt-settings').innerText = d.settings;
            document.getElementById('label-add').innerText = d.add;
            document.getElementById('label-req').innerText = d.req;
            document.getElementById('label-out').innerText = d.out;
            document.getElementById('txt-close').innerText = d.close;
            document.getElementById('m-in').placeholder = d.place;
            document.getElementById('btn-send').innerText = d.send;
            document.getElementById('btn-login-label').innerText = d.login;
            document.getElementById('btn-reg-label').innerText = d.reg;
            document.getElementById('txt-welcome').innerText = d.welcome;
        };

        window.handleLogin = async (mode) => {
            const u = document.getElementById('in-u').value.trim().toUpperCase();
            const p = document.getElementById('in-p').value.trim();
            if(u.length < 3) return showT("Username minimal 3 karakter!");

            if(mode === 'REG') {
                const s = await get(ref(db, `users/${u}`));
                if(s.exists()) return showT("User sudah ada!");
                await set(ref(db, `users/${u}`), { p, ava: `https://api.dicebear.com/7.x/pixel-art/svg?seed=${u}_${Date.now()}` });
                start(u);
            } else {
                const s = await get(ref(db, `users/${u}`));
                if(s.exists() && s.val().p === p) start(u); else showT("Salah Login!");
            }
        };

        async function start(u) {
            user = u; localStorage.setItem('z_user', u);
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('my-name').innerText = u;
            
            const s = await get(ref(db, `users/${u}`));
            document.getElementById('my-ava').src = s.val().ava;
            
            update(ref(db, `status/${u}`), { online: true, ava: s.val().ava });
            onDisconnect(ref(db, `status/${u}`)).update({ online: false });
            
            loadFriends();
            setLang(lang);
            document.getElementById('lang-pick').value = lang;
        }

        function loadFriends() {
            onValue(ref(db, `users/${user}/friends`), (snap) => {
                const area = document.getElementById('dom-friends'); area.innerHTML = '';
                snap.forEach(c => {
                    onValue(ref(db, `status/${c.key}`), (st) => {
                        const d = st.val();
                        let old = document.getElementById(`f-${c.key}`); if(old) old.remove();
                        const card = document.createElement('div');
                        card.id = `f-${c.key}`; card.className = `friend-card ${target===c.key?'active':''}`;
                        card.innerHTML = `<div class="ava-circle"><img src="${d.ava}" style="width:100%; border-radius:50%"><div class="status-dot" style="background:${d.online?'var(--success)':'#555'}"></div></div>
                                         <div><div style="font-weight:700; font-size:14px">${c.key}</div><div style="font-size:10px; color:var(--text-s)">${d.online?'Online':'Offline'}</div></div>`;
                        card.onclick = () => openChat(c.key);
                        area.appendChild(card);
                    });
                });
            });
        }

        window.openChat = (id) => {
            target = id; document.getElementById('active-chat').innerText = id;
            closeAll();
            const cid = [user, id].sort().join('_');
            onValue(ref(db, `chats/${cid}`), (snap) => {
                const box = document.getElementById('chat-flow'); box.innerHTML = '';
                snap.forEach(m => {
                    const d = m.val();
                    const div = document.createElement('div');
                    div.className = 'msg-item';
                    div.innerHTML = `<img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${d.s}" style="width:36px; height:36px; border-radius:50%">
                                    <div class="msg-bubble"><div class="msg-info"><span class="msg-user">${d.s}</span><span class="msg-time">Today</span></div><div class="msg-body">${d.c}</div></div>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.pushChat = () => {
            const i = document.getElementById('m-in'); if(!i.value || !target) return;
            const cid = [user, target].sort().join('_');
            push(ref(db, `chats/${cid}`), { s: user, c: i.value, t: Date.now() });
            i.value = '';
        };

        window.addFriendUI = () => {
            const f = prompt("Username teman:");
            if(f) {
                const tu = f.toUpperCase();
                set(ref(db, `req/${tu}/${user}`), { from: user });
                showT("Permintaan dikirim!");
                toggleMenu();
            }
        };

        window.showReq = () => {
            onValue(ref(db, `req/${user}`), (snap) => {
                if(!snap.exists()) return showT("Tidak ada permintaan.");
                snap.forEach(c => {
                    if(confirm(`Terima pertemanan dari ${c.key}?`)) {
                        set(ref(db, `users/${user}/friends/${c.key}`), true);
                        set(ref(db, `users/${c.key}/friends/${user}`), true);
                        remove(ref(db, `req/${user}/${c.key}`));
                    }
                });
            }, {onlyOnce: true});
        };

        window.logout = () => { localStorage.clear(); location.reload(); };

        if(user) start(user);
    </script>
</body>
</html>
