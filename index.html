<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #6366f1; --bg: #090e1a; --c: #161b2c; --t: #f8fafc; --d: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); overflow: hidden; height: 100vh; }
        #z-t { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%); background: var(--c); border-left: 5px solid var(--p); padding: 15px; border-radius: 12px; z-index: 9999; transition: 0.5s; min-width: 280px; box-shadow: 0 10px 30px #000; }
        #z-t.s { transform: translateX(-50%) translateY(0); }
        .auth-card { background: var(--c); padding: 30px; border-radius: 25px; width: 90%; max-width: 380px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #2d3748; background: #0f172a; color: #fff; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; background: var(--p); color: #fff; margin-top: 10px; }
        #main { display: none; grid-template-columns: 320px 1fr; height: 100vh; }
        .side { background: var(--c); border-right: 1px solid #2d3748; display: flex; flex-direction: column; }
        .head { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3748; }
        .draw { position: fixed; top: 0; right: -300px; width: 300px; height: 100%; background: var(--c); z-index: 1000; transition: 0.3s; padding: 25px; box-shadow: -10px 0 30px #000; }
        .draw.o { right: 0; }
        .av { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 15px; font-weight: bold; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 0.9rem; margin-bottom: 5px; }
        @media (max-width: 768px) { #main { grid-template-columns: 1fr; } .side { position: absolute; width: 100%; height: 100%; z-index: 10; } .side.h { display: none; } }
    </style>
</head>
<body>
    <div id="z-t"><i class="fas fa-info-circle" style="color:var(--p)"></i> <span id="tm"></span></div>
    <div id="intro" style="position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10000;">
        <h1 style="font-size:3rem; color:var(--p); font-weight:900;">ZChat</h1>
        <p style="color:var(--d); font-size:0.8rem; margin-top:10px;">Creator: zZerr44</p>
    </div>
    <div id="auth" style="height:100vh; display:none; align-items:center; justify-content:center;">
        <div class="auth-card">
            <h2 id="at">ZChat Login</h2>
            <input type="text" id="au" placeholder="Username">
            <input type="password" id="ap" placeholder="Password">
            <label style="font-size:0.8rem;"><input type="checkbox" id="kl"> Keep Login</label>
            <button class="btn" onclick="hAuth()">Lanjut</button>
            <p style="text-align:center; margin-top:15px; font-size:0.8rem; color:var(--p); cursor:pointer;" onclick="tAM()">Daftar Akun</p>
        </div>
    </div>
    <div id="main">
        <div class="side" id="sd">
            <div class="head"><strong>ZChat</strong> <i class="fas fa-bars" onclick="tD()"></i></div>
            <div id="cl" style="flex:1; overflow-y:auto; padding:10px;"></div>
        </div>
        <div style="display:flex; flex-direction:column; background:#0b1120;">
            <div id="ac" style="display:none; flex-direction:column; height:100%;">
                <div class="head"><i class="fas fa-arrow-left" onclick="bS()"></i> <strong id="tn">User</strong></div>
                <div id="mc" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column;"></div>
                <div style="padding:15px; display:flex; gap:10px;"><input type="text" id="mi" placeholder="Pesan..." style="margin:0;"><button class="btn" onclick="sM()" style="width:60px; margin:0;"><i class="fas fa-paper-plane"></i></button></div>
            </div>
        </div>
    </div>
    <div class="draw" id="dr">
        <div class="av" id="ma">?</div>
        <h3 id="mu" style="text-align:center; margin-bottom:20px;">User</h3>
        <div onclick="sP('f')" style="padding:12px; cursor:pointer;"><i class="fas fa-plus"></i> Tambah Teman</div>
        <div onclick="sP('c')" style="padding:12px; cursor:pointer;"><i class="fas fa-shield"></i> Hak Cipta</div>
        <div onclick="lO()" style="padding:12px; cursor:pointer; color:red;"><i class="fas fa-sign-out"></i> Logout</div>
        <p style="position:absolute; bottom:20px; left:0; width:100%; text-align:center; font-size:0.7rem; color:var(--d);">ZChat Versi "1"</p>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const cfg = { apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM", databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "zchat-56639" };
        const app = initializeApp(cfg); const db = getDatabase(app); let cU = null, aT = null, iR = false;
        window.sT = (m) => { const x = document.getElementById('z-t'); document.getElementById('tm').innerText = m; x.classList.add('s'); setTimeout(()=>x.classList.remove('s'), 2500); };
        window.tD = () => document.getElementById('dr').classList.toggle('o');
        window.tAM = () => { iR = !iR; document.getElementById('at').innerText = iR ? "Daftar ZChat" : "ZChat Login"; };
        window.hAuth = async () => {
            const u = document.getElementById('au').value.trim().toLowerCase(), p = document.getElementById('ap').value;
            if(!u || !p) return sT("Isi semua!");
            const r = ref(db, 'users/' + u), s = await get(r);
            if(iR) { if(s.exists()) return sT("Sudah ada!"); await set(r, { u, p }); sT("Sukses! Silakan Login."); tAM(); }
            else { if(!s.exists() || s.val().p !== p) return sT("Gagal!"); start(s.val()); }
        };
        function start(d) {
            cU = d; document.getElementById('auth').style.display='none'; document.getElementById('main').style.display='grid';
            document.getElementById('mu').innerText = cU.u; const a = document.getElementById('ma'), clrs = ['#6366f1','#ec4899','#10b981','#f59e0b','#8b5cf6'];
            a.innerText = cU.u[0].toUpperCase(); a.style.background = clrs[cU.u.charCodeAt(0)%5];
            if(document.getElementById('kl').checked) localStorage.setItem('z_s', JSON.stringify(cU));
            onValue(ref(db, `contacts/${cU.u}`), (s) => {
                const l = document.getElementById('cl'); l.innerHTML = "";
                s.forEach(c => { const v = c.val().u, d = document.createElement('div'); d.style="padding:15px; cursor:pointer; border-bottom:1px solid #1e293b;"; d.innerHTML = `<strong>${v}</strong>`; d.onclick = () => { aT = v; document.getElementById('ac').style.display='flex'; document.getElementById('tn').innerText = v; if(innerWidth<768) document.getElementById('sd').classList.add('h'); loadM(); }; l.appendChild(d); });
            });
        }
        window.sM = () => { const i = document.getElementById('mi'), t = i.value.trim(); if(!t) return; const id = [cU.u, aT].sort().join("_"); push(ref(db, `messages/${id}`), { s: cU.u, t, ts: serverTimestamp() }); i.value = ""; };
        function loadM() { const id = [cU.u, aT].sort().join("_"); onValue(ref(db, `messages/${id}`), (s) => { const c = document.getElementById('mc'); c.innerHTML = ""; s.forEach(m => { const v = m.val(), me = v.s === cU.u, d = document.createElement('div'); d.className = "msg"; d.style = `align-self:${me?'flex-end':'flex-start'}; background:${me?'var(--p)':'#1e293b'};`; d.innerText = v.t; c.appendChild(d); }); c.scrollTop = c.scrollHeight; }); }
        window.bS = () => document.getElementById('sd').classList.remove('h');
        window.lO = () => { if(prompt("Ketik 'out'")==='out') { localStorage.removeItem('z_s'); location.reload(); } };
        window.sP = (t) => { if(t==='c') alert("ZChat v1 by zZerr44. Kode ini dilindungi hak cipta eksklusif."); else { const n = prompt("Username:"); if(n) set(ref(db, `contacts/${cU.u}/${n}`), { u: n }); } tD(); };
        setTimeout(() => { document.getElementById('intro').style.display='none'; const s = localStorage.getItem('z_s'); if(s) start(JSON.parse(s)); else document.getElementById('auth').style.display='flex'; }, 2000);
    </script>
</body>
</html>
