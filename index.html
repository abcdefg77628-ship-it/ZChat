<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat - Realtime Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-dim: #6b7280;
            --chat-bubble-me: #6366f1;
            --chat-bubble-them: #e5e7eb;
            --sidebar-w: 350px;
        }

        .dark-mode {
            --bg-body: #111827;
            --bg-card: #1f2937;
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --chat-bubble-them: #374151;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.3s; }
        body { background: var(--bg-body); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* --- Intro Screen --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            animation: fadeOut 1s ease 3s forwards;
        }
        .intro-content { text-align: center; animation: zoomIn 1s ease; }
        .intro-content h1 { font-size: 3rem; letter-spacing: 5px; color: var(--primary); }
        .intro-content p { opacity: 0.7; margin-top: 10px; }

        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- Auth Screen --- */
        #auth-screen {
            display: flex; align-items: center; justify-content: center; height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: var(--bg-card); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #ddd; background: transparent; color: inherit;
        }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: var(--primary); color: white; font-weight: 600; cursor: pointer;
            margin-top: 10px;
        }
        .toggle-container { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 0.9rem; }
        
        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- Main App UI --- */
        #app-screen { display: none; height: 100vh; grid-template-columns: var(--sidebar-w) 1fr; }
        
        .sidebar { 
            background: var(--bg-card); border-right: 1px solid rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; }
        .contact-item:hover { background: rgba(0,0,0,0.05); }

        .chat-area { display: flex; flex-direction: column; background-size: cover; background-position: center; }
        .chat-header { padding: 15px 20px; background: var(--bg-card); border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubble Chat */
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; position: relative; }
        .msg.me { align-self: flex-end; background: var(--chat-bubble-me); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: var(--chat-bubble-them); border-bottom-left-radius: 2px; }

        .chat-input-area { padding: 20px; background: var(--bg-card); display: flex; gap: 10px; }
        
        /* Modal Settings */
        .modal { position: fixed; top: 0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index: 1000; }
        .modal-content { background:var(--bg-card); padding:25px; border-radius:15px; width:90%; max-width:400px; }

        @media (max-width: 768px) {
            #app-screen { grid-template-columns: 1fr; }
            .sidebar { display: block; width: 100%; }
            .chat-area { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 10; display: none; }
            .chat-area.active { display: flex; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-content">
            <h1>ZChat</h1>
            <p>Realtime Chat</p>
            <p style="font-size: 0.8rem; margin-top: 20px;">Creator: zZerr44</p>
        </div>
    </div>

    <div id="auth-screen">
        <div class="auth-card" id="login-form">
            <h2 style="margin-bottom: 20px;">Welcome Back</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="keep-login">
                    <span class="slider"></span>
                </label>
                <span>Keep Login</span>
            </div>
            <button class="btn" onclick="handleLogin()">Login</button>
            <p style="text-align:center; margin-top:15px; font-size:0.8rem; cursor:pointer;" onclick="toggleAuth()">Don't have an account? Register</p>
        </div>

        <div class="auth-card" id="reg-form" style="display: none;">
            <h2 style="margin-bottom: 20px;">Create Account</h2>
            <input type="text" id="reg-user" placeholder="Username">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="btn" onclick="handleRegister()">Register</button>
            <p style="text-align:center; margin-top:15px; font-size:0.8rem; cursor:pointer;" onclick="toggleAuth()">Already have an account? Login</p>
        </div>
    </div>

    <div id="app-screen">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>ZChat</h3>
                <div style="display: flex; gap: 10px;">
                    <button onclick="showAddUser()" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">➕</button>
                    <button onclick="showSettings()" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">⚙️</button>
                </div>
            </div>
            <div class="contact-list" id="contact-list">
                </div>
        </div>

        <div class="chat-area" id="chat-area-main">
            <div class="chat-header">
                <button class="mobile-only" onclick="closeChat()" style="background:none; border:none; margin-right:10px;">⬅️</button>
                <b id="active-chat-user">Select a contact</b>
                <div id="chat-options" style="display:none;">
                    <button onclick="blockUser()" title="Block" style="border:none; background:none; cursor:pointer;">🚫</button>
                    <button onclick="deleteCurrentChat()" title="Delete Chat" style="border:none; background:none; cursor:pointer;">🗑️</button>
                </div>
            </div>
            <div class="messages-container" id="messages-container">
                </div>
            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="Type a message...">
                <button class="btn" style="width: 80px; margin-top:0;" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-settings">
        <div class="modal-content">
            <h3>Settings</h3><br>
            <button class="btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
            <button class="btn" onclick="changeWallpaper()">Change Wallpaper</button>
            <button class="btn" onclick="showAppInfo()">App Info</button>
            <button class="btn" style="background:#ef4444;" onclick="logout()">Logout</button>
            <button class="btn" onclick="closeModals()" style="background:#6b7280;">Close</button>
        </div>
    </div>

    <div class="modal" id="modal-add-user">
        <div class="modal-content">
            <h3>Add Contact</h3><br>
            <input type="text" id="new-contact-user" placeholder="Enter username">
            <button class="btn" onclick="addNewContact()">Add</button>
            <button class="btn" onclick="closeModals()" style="background:#6b7280;">Cancel</button>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('zchat_user') || null;
        let activeContact = null;

        // Init App
        window.onload = () => {
            if (currentUser && localStorage.getItem('zchat_keep') === 'true') {
                showApp();
            }
        };

        // --- Auth Functions ---
        function toggleAuth() {
            document.getElementById('login-form').style.display = 
                document.getElementById('login-form').style.display === 'none' ? 'block' : 'none';
            document.getElementById('reg-form').style.display = 
                document.getElementById('reg-form').style.display === 'none' ? 'block' : 'none';
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value.toLowerCase();
            const pass = document.getElementById('reg-pass').value;
            if(!user || !pass) return alert("Fill all fields");

            const snapshot = await db.ref('users/' + user).once('value');
            if(snapshot.exists()) return alert("User already exists");

            await db.ref('users/' + user).set({ password: pass, username: user });
            alert("Registration successful! Please login.");
            toggleAuth();
        }

        async function handleLogin() {
            const user = document.getElementById('login-user').value.toLowerCase();
            const pass = document.getElementById('login-pass').value;
            const keep = document.getElementById('keep-login').checked;

            const snapshot = await db.ref('users/' + user).once('value');
            if(snapshot.exists() && snapshot.val().password === pass) {
                currentUser = user;
                if(keep) {
                    localStorage.setItem('zchat_keep', 'true');
                    localStorage.setItem('zchat_user', user);
                }
                showApp();
            } else {
                alert("Wrong credentials");
            }
        }

        function showApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'grid';
            loadContacts();
        }

        // --- Contact & Chat Logic ---
        async function addNewContact() {
            const target = document.getElementById('new-contact-user').value.toLowerCase();
            if(target === currentUser) return alert("Cannot add yourself");

            const snapshot = await db.ref('users/' + target).once('value');
            if(snapshot.exists()) {
                await db.ref(`contacts/${currentUser}/${target}`).set(true);
                closeModals();
                loadContacts();
            } else {
                alert("User not found!");
            }
        }

        function loadContacts() {
            const listDiv = document.getElementById('contact-list');
            db.ref(`contacts/${currentUser}`).on('value', (snap) => {
                listDiv.innerHTML = '';
                snap.forEach(child => {
                    const name = child.key;
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.innerHTML = `<span>${name}</span>`;
                    item.onclick = () => openChat(name);
                    listDiv.appendChild(item);
                });
            });
        }

        function openChat(contactName) {
            activeContact = contactName;
            document.getElementById('active-chat-user').innerText = contactName;
            document.getElementById('chat-options').style.display = 'block';
            if(window.innerWidth <= 768) document.getElementById('chat-area-main').classList.add('active');
            
            // Realtime Message Listener
            const chatId = getChatId(currentUser, activeContact);
            db.ref(`messages/${chatId}`).on('value', (snap) => {
                const msgDiv = document.getElementById('messages-container');
                msgDiv.innerHTML = '';
                snap.forEach(child => {
                    const data = child.val();
                    const el = document.createElement('div');
                    el.className = `msg ${data.sender === currentUser ? 'me' : 'them'}`;
                    el.innerText = data.text;
                    msgDiv.appendChild(el);
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }

        function sendMessage() {
            const text = document.getElementById('msg-input').value;
            if(!text || !activeContact) return;

            const chatId = getChatId(currentUser, activeContact);
            db.ref(`messages/${chatId}`).push({
                sender: currentUser,
                text: text,
                timestamp: Date.now()
            });
            document.getElementById('msg-input').value = '';
        }

        function getChatId(u1, u2) {
            return [u1, u2].sort().join('_');
        }

        // --- UI Utilities ---
        function showSettings() { document.getElementById('modal-settings').style.display = 'flex'; }
        function showAddUser() { document.getElementById('modal-add-user').style.display = 'flex'; }
        function closeModals() { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function changeWallpaper() {
            const url = prompt("Enter Image URL for wallpaper:");
            if(url) document.getElementById('chat-area-main').style.backgroundImage = `url('${url}')`;
        }

        function showAppInfo() {
            alert("ZChat\nVersion: 1.0.0\nCreator: zZerr44\nBuilt with Firebase & Vanilla JS");
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function closeChat() {
            document.getElementById('chat-area-main').classList.remove('active');
        }

        function deleteCurrentChat() {
            if(confirm("Delete all messages in this chat?")) {
                const chatId = getChatId(currentUser, activeContact);
                db.ref(`messages/${chatId}`).remove();
            }
        }

        function blockUser() {
            alert(`${activeContact} has been blocked (UI Simulation)`);
        }
    </script>
</body>
  </html>
