<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Pro - zZerr44</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --sidebar-color: #111214;
            --friend-list-bg: #1e1f22;
            --chat-bg: radial-gradient(circle, #002288 0%, #000000 100%);
            --accent-z: #00d4ff;
            --text-main: #ffffff;
            --msg-sent: #005c4b;
            --msg-rec: #2b2d31;
            --panel-bg: #18191c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* --- SIDEBAR SLIDE MENU --- */
        .slide-menu {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: var(--panel-bg); z-index: 10000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.8); padding: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .slide-menu.active { right: 0; }
        .menu-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999;
            display: none; backdrop-filter: blur(3px);
        }
        .menu-item {
            padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 15px; font-weight: 500; color: #ccc;
        }
        .menu-item:hover { background: #2b2d31; color: var(--accent-z); }
        .menu-item i { font-size: 18px; }

        /* --- APP LAYOUT --- */
        .app-container { display: none; height: 100vh; grid-template-columns: 72px 280px 1fr; }

        /* Nav Kiri */
        .nav-left { background: var(--sidebar-color); display: flex; flex-direction: column; align-items: center; padding: 15px 0; border-right: 1px solid #000; }
        .nav-circle { width: 48px; height: 48px; border-radius: 50%; background: #313338; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .nav-circle:hover { border-radius: 15px; background: var(--accent-z); color: black; }

        /* Friend List */
        .friend-list-panel { background: var(--friend-list-bg); display: flex; flex-direction: column; border-right: 1px solid #111; }
        .panel-head { padding: 20px; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        
        .friend-card {
            padding: 12px 15px; margin: 2px 10px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .friend-card:hover { background: #35373c; }
        .friend-card.active { background: #404249; }
        .pp-wrap { position: relative; width: 45px; height: 45px; }
        .pp-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--friend-list-bg); background: #888; }
        .status-dot.online { background: #23a55a; }

        /* Chat Area */
        .chat-area { display: flex; flex-direction: column; background: var(--chat-bg); position: relative; overflow: hidden; }
        .chat-header { height: 65px; background: rgba(24, 25, 28, 0.95); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 100; }
        
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; z-index: 1; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .msg.sent { align-self: flex-end; background: var(--msg-sent); border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--msg-rec); border-bottom-left-radius: 2px; }

        /* Blank State */
        #blank-state { position: absolute; inset: 0; background: var(--chat-bg); z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* Input Box */
        .input-bar { padding: 15px 20px; background: #1e1f22; display: flex; gap: 12px; align-items: center; z-index: 100; }
        .btn-act { background: none; border: none; color: #b5bac1; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .btn-act:hover { color: var(--accent-z); }
        #msg-input { flex: 1; padding: 12px 18px; background: #2b2d31; border: none; color: white; border-radius: 25px; }

        /* Modal / Settings Panel */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #18191c; width: 100%; max-width: 450px; border-radius: 20px; padding: 30px; border: 1px solid #333; text-align: center; max-height: 90vh; overflow-y: auto; }

        /* Avatar Selection Grid */
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .avatar-opt { width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .avatar-opt:hover { border-color: var(--accent-z); transform: scale(1.05); }

        /* Custom Notif */
        #custom-notification { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #2b2d31; border-bottom: 3px solid var(--accent-z); padding: 15px 30px; z-index: 30000; transition: 0.5s; border-radius: 0 0 10px 10px; }

        /* Burger Icon (3 Garis) */
        .burger-icon { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger-icon span { display: block; height: 3px; width: 100%; background: #ccc; border-radius: 3px; transition: 0.3s; }

        @media (max-width: 768px) {
            .app-container { grid-template-columns: 60px 1fr; }
            .friend-list-panel { display: none; }
        }
    </style>
</head>
<body>

    <div id="custom-notification">Pesan Notif</div>
    <div id="menu-overlay" class="menu-overlay" onclick="toggleSlideMenu()"></div>

    <div id="slide-menu" class="slide-menu">
        <h3 style="margin-bottom: 20px; color: var(--accent-z);">Menu ZChat</h3>
        <div class="menu-item" onclick="openProfileSettings()"><span>👤</span> Pengaturan Profil</div>
        <div class="menu-item" onclick="openSecurity()"><span>🔒</span> Sandi & Keamanan</div>
        <div class="menu-item" onclick="showCopyright()"><span>©️</span> Hak Cipta</div>
        <div class="menu-item" onclick="openWallpaper()"><span>🖼️</span> Wallpaper</div>
        <div style="flex:1"></div>
        <div class="menu-item" onclick="logout()" style="color:#ff4d4d"><span>🚪</span> Logout</div>
    </div>

    <div id="modal-box" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title" style="color:var(--accent-z); margin-bottom:20px"></h2>
            <div id="modal-body"></div>
            <button class="btn-main" onclick="closeModal()" style="margin-top:25px; padding:12px 30px; border-radius:10px; border:none; background:var(--accent-z); font-weight:bold; cursor:pointer;">TUTUP</button>
        </div>
    </div>

    <div id="auth-screen" style="position:fixed; inset:0; background:black; z-index:50000; display:flex; justify-content:center; align-items:center;">
        <div style="background:#18191c; padding:40px; border-radius:20px; width:350px; text-align:center; border:1px solid #222;">
            <div style="font-size:40px; color:var(--accent-z); font-weight:bold; margin-bottom:20px;">Z</div>
            <input type="text" id="user-input" placeholder="User minimal 8 karakter">
            <input type="password" id="pass-input" placeholder="Sandi minimal 8 karakter">
            <button onclick="processAuth()" style="width:100%; padding:15px; background:var(--accent-z); border:none; border-radius:10px; font-weight:bold; margin-top:15px; cursor:pointer;">MASUK / DAFTAR</button>
        </div>
    </div>

    <div class="app-container" id="main-app">
        <div class="nav-left">
            <div class="nav-circle" style="background:var(--accent-z); color:black; font-weight:bold;">Z</div>
            <div class="nav-circle" onclick="openProfileSettings()"><img id="my-nav-avatar" src="" style="width:100%; border-radius:50%"></div>
        </div>

        <div class="friend-list-panel">
            <div class="panel-head">
                <span>ZChat</span>
                <button onclick="addFriendModal()" style="background:none; border:none; color:var(--accent-z); font-size:24px; cursor:pointer;">+</button>
            </div>
            <div id="friend-list-container" style="flex:1; overflow-y:auto;"></div>
        </div>

        <div class="chat-area">
            <div id="blank-state">
                <div style="font-size:80px; color:var(--accent-z); opacity:0.1; font-weight:bold;">Z</div>
                <p style="color:#444; margin-top:10px;">Pilih teman untuk memulai obrolan</p>
            </div>

            <div class="chat-header">
                <div id="active-user-display" style="font-weight:bold; font-size:18px;">Pilih Teman</div>
                <div class="burger-icon" onclick="toggleSlideMenu()">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="messages-container" id="chat-box"></div>

            <div class="input-bar">
                <button class="btn-act" onclick="document.getElementById('file-inp').click()">📷</button>
                <input type="file" id="file-inp" hidden accept="image/*" onchange="uploadImg(this)">
                <input type="text" id="msg-input" placeholder="Tulis pesan..." onkeypress="if(event.key=='Enter') sendChat()">
                <button class="btn-act" onclick="sendChat()" style="color:var(--accent-z)">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = localStorage.getItem('zchat_user');
        let activeFriend = null;
        const avatars = Array.from({length: 15}, (_, i) => `https://api.dicebear.com/7.x/avataaars/svg?seed=Z${i+50}`);

        window.showNotif = (t) => {
            const n = document.getElementById('custom-notification');
            n.innerText = t; n.style.top = '20px';
            setTimeout(() => n.style.top = '-100px', 3000);
        };

        window.toggleSlideMenu = () => {
            const m = document.getElementById('slide-menu');
            const o = document.getElementById('menu-overlay');
            m.classList.toggle('active');
            o.style.display = m.classList.contains('active') ? 'block' : 'none';
        };

        window.openModal = (t, b) => {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-body').innerHTML = b;
            document.getElementById('modal-box').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('modal-box').style.display = 'none';

        // --- AUTH ---
        window.processAuth = async () => {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if(u.length < 8 || p.length < 8) return showNotif("Minimal 8 Karakter!");

            const userRef = ref(db, 'users/' + u);
            const snap = await get(userRef);

            if(!snap.exists()) {
                await set(userRef, { password: p, nickname: u, bio: "ZChat Pro User", avatar: avatars[0] });
                showNotif("Akun Baru Terdaftar!");
            } else if(snap.val().password !== p) {
                return showNotif("Sandi Salah!");
            }
            login(u);
        };

        async function login(u) {
            currentUser = u;
            localStorage.setItem('zchat_user', u);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';

            const userSnap = await get(ref(db, 'users/' + u));
            const data = userSnap.val();
            document.getElementById('my-nav-avatar').src = data.avatar;

            set(ref(db, 'status/' + u), { online: true, avatar: data.avatar, nickname: data.nickname || u });
            onDisconnect(ref(db, 'status/' + u)).update({ online: false });
            loadFriends();
        }

        // --- FRIENDS & CHAT ---
        function loadFriends() {
            onValue(ref(db, 'status'), (snap) => {
                const container = document.getElementById('friend-list-container');
                container.innerHTML = '';
                snap.forEach(child => {
                    if(child.key !== currentUser) {
                        const d = child.val();
                        const div = document.createElement('div');
                        div.className = `friend-card ${activeFriend === child.key ? 'active' : ''}`;
                        div.innerHTML = `
                            <div class="pp-wrap"><img src="${d.avatar}" class="pp-img"><div class="status-dot ${d.online ? 'online' : ''}"></div></div>
                            <div><div style="font-weight:bold">${d.nickname || child.key}</div><div style="font-size:11px; color:#888">${d.online?'Online':'Offline'}</div></div>
                        `;
                        div.onclick = () => startChat(child.key, d.nickname || child.key);
                        container.appendChild(div);
                    }
                });
            });
        }

        window.startChat = (name, nickname) => {
            activeFriend = name;
            document.getElementById('blank-state').style.display = 'none';
            document.getElementById('active-user-display').innerText = nickname;
            
            const chatID = [currentUser, activeFriend].sort().join('_');
            onValue(ref(db, 'chats/' + chatID), (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snap.forEach(msg => {
                    const d = msg.val();
                    const m = document.createElement('div');
                    m.className = `msg ${d.sender === currentUser ? 'sent' : 'received'}`;
                    if(d.type === 'img') m.innerHTML = `<img src="${d.content}" style="max-width:100%; border-radius:10px">`;
                    else m.innerText = d.content;
                    box.appendChild(m);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.sendChat = () => {
            const inp = document.getElementById('msg-input');
            if(!inp.value || !activeFriend) return;
            const chatID = [currentUser, activeFriend].sort().join('_');
            push(ref(db, 'chats/' + chatID), { sender: currentUser, content: inp.value, type: 'text' });
            inp.value = '';
        };

        // --- SETTINGS ---
        window.openProfileSettings = async () => {
            toggleSlideMenu();
            const snap = await get(ref(db, 'users/' + currentUser));
            const data = snap.val();
            
            let avs = `<div class="avatar-grid">`;
            avatars.forEach(a => avs += `<img src="${a}" class="avatar-opt" onclick="updateAvatar('${a}')">`);
            avs += `</div>`;

            openModal("Pengaturan Profil", `
                <div style="text-align:left">
                    <label style="font-size:12px; color:#888">Nama Tampilan</label>
                    <input type="text" id="set-name" value="${data.nickname || currentUser}">
                    <label style="font-size:12px; color:#888">Bio</label>
                    <input type="text" id="set-bio" value="${data.bio || ''}">
                    <button class="btn-main" style="width:100%" onclick="saveProfile()">SIMPAN PERUBAHAN</button>
                    <hr style="margin:20px 0; border:0.5px solid #333">
                    <p style="font-weight:bold; margin-bottom:10px">Ganti Foto Profil</p>
                    ${avs}
                </div>
            `);
        };

        window.saveProfile = () => {
            const nickname = document.getElementById('set-name').value;
            const bio = document.getElementById('set-bio').value;
            update(ref(db, 'users/' + currentUser), { nickname, bio });
            update(ref(db, 'status/' + currentUser), { nickname });
            showNotif("Profil Diperbarui!");
            closeModal();
        };

        window.updateAvatar = (url) => {
            update(ref(db, 'users/' + currentUser), { avatar: url });
            update(ref(db, 'status/' + currentUser), { avatar: url });
            document.getElementById('my-nav-avatar').src = url;
            showNotif("Avatar Diperbarui!");
            closeModal();
        };

        window.openSecurity = () => {
            toggleSlideMenu();
            openModal("Keamanan", `
                <input type="password" id="new-p" placeholder="Sandi Baru">
                <button class="btn-main" style="width:100%" onclick="updatePass()">UPDATE SANDI</button>
            `);
        };

        window.updatePass = () => {
            const p = document.getElementById('new-p').value;
            if(p.length < 8) return showNotif("Minimal 8 Karakter!");
            update(ref(db, 'users/' + currentUser), { password: p });
            showNotif("Sandi Berhasil Diubah!");
            closeModal();
        };

        window.openWallpaper = () => {
            toggleSlideMenu();
            openModal("Wallpaper", `
                <p>Fitur kustom wallpaper chat segera hadir!</p>
            `);
        };

        window.showCopyright = () => { toggleSlideMenu(); openModal("Hak Cipta", "ZChat Pro 2026. Developed by zZerr44."); };
        window.logout = () => { localStorage.clear(); location.reload(); };

        if(currentUser) login(currentUser);
    </script>
</body>
</html>
