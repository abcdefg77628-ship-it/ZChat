<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat - Original Messenger</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { 
            --primary: #00a884; --bg-dark: #111b21; --bg-lighter: #202c33; 
            --text: #e9edef; --bubble-out: #005c4b; --bubble-in: #202c33; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; }

        /* SPLASH SCREEN */
        #splash {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .logo-z { font-size: 80px; font-weight: 900; color: var(--primary); }

        /* AUTH & PAGE SYSTEM */
        .page { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--bg-lighter); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* APP LAYOUT */
        #main-app { display: none; height: 100vh; grid-template-columns: 350px 1fr; }
        .sidebar { background: var(--bg-dark); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .side-header { padding: 15px; background: var(--bg-lighter); display: flex; justify-content: space-between; align-items: center; }
        .add-user-btn { background: var(--primary); color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; align-items: center; position: relative; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }

        /* CHAT WINDOW */
        .chat-window { display: flex; flex-direction: column; background: #0b141a; position: relative; }
        .chat-header { padding: 10px 20px; background: var(--bg-lighter); display: flex; align-items: center; gap: 15px; height: 65px; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 12px; padding: 10px 15px; border-radius: 12px; max-width: 80%; font-size: 15px; position: relative; }
        .sent { background: var(--bubble-out); align-self: flex-end; }
        .received { background: var(--bubble-in); align-self: flex-start; }
        .msg-time { font-size: 10px; opacity: 0.5; margin-top: 5px; text-align: right; }

        .input-area { padding: 12px; background: var(--bg-lighter); display: flex; align-items: center; gap: 10px; }
        .input-area input { margin: 0; border-radius: 20px; }

        @media (max-width: 768px) {
            #main-app { grid-template-columns: 1fr; }
            .chat-window { position: fixed; inset: 0; display: none; z-index: 100; }
            .chat-window.active { display: flex; }
        }
    </style>
</head>
<body>

    <div id="splash"><div class="logo-z">Z</div><p>ZChat Pro</p></div>

    <div id="login-page" class="page">
        <div class="card">
            <h2 style="color:var(--primary)">ZChat Login</h2>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="doLogin()">MASUK</button>
            <p onclick="showReg()" style="margin-top:15px; cursor:pointer; font-size:14px;">Belum punya akun? Daftar</p>
        </div>
    </div>

    <div id="reg-page" class="page">
        <div class="card">
            <h2 style="color:var(--primary)">Daftar Akun Z</h2>
            <input type="text" id="r-user" placeholder="Username Baru">
            <input type="password" id="r-pass" placeholder="Password">
            <button onclick="doReg()">BUAT AKUN</button>
            <p onclick="showLog()" style="margin-top:15px; cursor:pointer; font-size:14px;">Sudah punya akun? Login</p>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div class="side-header">
                <span style="font-weight:bold; color:var(--primary)">ZCHAT</span>
                <div class="add-user-btn" onclick="findAndAddUser()">+</div>
            </div>
            <div id="user-list" class="chat-list"></div>
            <div style="padding:10px; text-align:center; font-size:12px; opacity:0.5; cursor:pointer" onclick="doLogout()">Logout</div>
        </div>

        <div id="chat-window" class="chat-window">
            <div class="chat-header">
                <span onclick="closeChat()" id="back-btn" style="display:none; cursor:pointer; font-size:20px;">&#8592;</span>
                <div id="c-avatar" class="avatar" style="width:35px; height:35px;">Z</div>
                <div id="c-name" style="font-weight:bold; flex:1;">Pilih Teman</div>
            </div>
            <div id="msg-cont" class="messages"></div>
            <div class="input-area">
                <input type="text" id="m-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="width:auto; padding:10px 15px; margin:0;">&#10148;</button>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myData = JSON.parse(localStorage.getItem('z_user')) || null;
        let activeChatId = null;
        let currentRecipient = null;

        // Notifikasi APK
        if (Notification.permission !== "granted") Notification.requestPermission();

        function showNotif(title, text) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: text });
                if (navigator.vibrate) navigator.vibrate(200);
            }
        }

        // Timer Splash (Anti-Stuck)
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            if(myData) startApp(); else showLog();
        }, 2000);

        // --- AUTH ---
        function showReg() { document.getElementById('login-page').style.display='none'; document.getElementById('reg-page').style.display='flex'; }
        function showLog() { document.getElementById('reg-page').style.display='none'; document.getElementById('login-page').style.display='flex'; }

        function doReg() {
            const u = document.getElementById('r-user').value.toLowerCase().trim();
            const p = document.getElementById('r-pass').value;
            if(!u || !p) return;
            db.ref('users/' + u).get().then(snap => {
                if(snap.exists()) return alert("Username sudah ada!");
                db.ref('users/' + u).set({ username: u, password: p, status: 'online' }).then(() => {
                    alert("Berhasil Daftar!"); showLog();
                });
            });
        }

        function doLogin() {
            const u = document.getElementById('l-user').value.toLowerCase().trim();
            const p = document.getElementById('l-pass').value;
            db.ref('users/' + u).get().then(snap => {
                if(snap.exists() && snap.val().password === p) {
                    myData = snap.val();
                    localStorage.setItem('z_user', JSON.stringify(myData));
                    startApp();
                } else alert("Login Gagal!");
            });
        }

        function doLogout() { localStorage.removeItem('z_user'); location.reload(); }

        // --- CORE APP ---
        function startApp() {
            document.getElementById('login-page').style.display='none';
            document.getElementById('main-app').style.display='grid';
            if(window.innerWidth <= 768) document.getElementById('back-btn').style.display='inline-block';
            loadFriendList();
            listenIncomingRequests();
        }

        // CARI USER (Validasi User Gak Asal Save)
        function findAndAddUser() {
            const target = prompt("Masukkan Username Teman:");
            if(!target || target === myData.username) return;

            db.ref('users/' + target).get().then(snap => {
                if(snap.exists()) {
                    // Cek apa sudah berteman
                    db.ref('friends/' + myData.username + '/' + target).get().then(fSnap => {
                        if(fSnap.exists()) return alert("Sudah berteman!");
                        // Kirim Request
                        db.ref('requests/' + target + '/' + myData.username).set({ from: myData.username, status: 'pending' });
                        alert("Permintaan dikirim ke " + target);
                    });
                } else {
                    alert("User tidak ditemukan di database!");
                }
            });
        }

        // TERIMA/TOLAK REQUEST
        function listenIncomingRequests() {
            db.ref('requests/' + myData.username).on('child_added', snap => {
                const req = snap.val();
                if(req.status === 'pending') {
                    if(confirm("User @" + req.from + " ingin memulai chat. Terima?")) {
                        db.ref('friends/' + myData.username + '/' + req.from).set(true);
                        db.ref('friends/' + req.from + '/' + myData.username).set(true);
                        db.ref('requests/' + myData.username + '/' + req.from).update({status: 'accepted'});
                    } else {
                        db.ref('requests/' + myData.username + '/' + req.from).remove();
                    }
                }
            });
        }

        function loadFriendList() {
            db.ref('friends/' + myData.username).on('value', snap => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const friendName = child.key;
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `<div class="avatar">${friendName[0].toUpperCase()}</div><div><b>${friendName}</b></div>`;
                    div.onclick = () => openChat(friendName);
                    list.appendChild(div);
                });
            });
        }

        function openChat(name) {
            currentRecipient = name;
            activeChatId = [myData.username, name].sort().join("_");
            document.getElementById('c-name').innerText = name;
            document.getElementById('c-avatar').innerText = name[0].toUpperCase();
            if(window.innerWidth <= 768) document.getElementById('chat-window').classList.add('active');
            
            // Listen Messages
            db.ref('messages/' + activeChatId).off(); // Reset listener biar gak tumpuk
            db.ref('messages/' + activeChatId).on('value', snap => {
                const cont = document.getElementById('msg-cont');
                cont.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    const div = document.createElement('div');
                    div.className = `msg ${m.sender === myData.username ? 'sent' : 'received'}`;
                    div.innerHTML = `<div>${m.text}</div><div class="msg-time">${new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
                    cont.appendChild(div);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        function sendMsg() {
            const inp = document.getElementById('m-input');
            const txt = inp.value.trim();
            if(!txt || !activeChatId) return;
            db.ref('messages/' + activeChatId).push({
                sender: myData.username,
                text: txt,
                time: Date.now()
            });
            inp.value = "";
        }

        function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
    </script>
</body>
</html>
