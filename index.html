<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zchat · premium evolution</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, push, onValue, update, remove, get, child, onDisconnect } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';
        window.firebaseModules = { getDatabase, ref, set, push, onValue, update, remove, get, child, onDisconnect, getStorage, storageRef, uploadBytes, getDownloadURL };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0b0f17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef2fb;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #app {
            width: 100%;
            max-width: 460px;
            height: 100vh;
            background: #10141e;
            border-radius: 32px 32px 0 0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #10141e;
            animation: fadeSlide 0.25s ease;
        }
        .screen.active { display: flex; }
        @keyframes fadeSlide { 0% { opacity: 0.4; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }

        /* Header with PP and coin */
        .header {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0e121b;
            border-bottom: 1px solid #262d3b;
            flex-shrink: 0;
            height: 70px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .profile-pic-header {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2d3b52;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        .accessory-icon {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 22px;
            height: 22px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0e121b;
            font-size: 12px;
        }
        .coin-display {
            background: #1e2638;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.9rem;
        }
        .hamburger {
            background: transparent;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #b9c8e7;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .hamburger:hover { background: #262f40; }
        .hamburger svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* Content scrollable */
        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }
        .content.full {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Bottom navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            background: #0c101a;
            border-top: 1px solid #262d3b;
            flex-shrink: 0;
            height: 60px;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: #7b8aa5;
            font-size: 0.75rem;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
            border-radius: 20px;
            cursor: pointer;
            flex: 1;
            display: flex;
        }
        .nav-item.active { color: #3b82f6; background: #1e2638; }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }

        /* Toast */
        .toast-container {
            position: absolute; top: 16px; left: 16px; right: 16px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            background: #1f2a3f; backdrop-filter: blur(8px); color: #f0f4ff;
            padding: 14px 20px; border-radius: 60px; box-shadow: 0 10px 25px -5px #00000060;
            font-size: 0.95rem; font-weight: 500; border-left: 4px solid #3b82f6;
            animation: slideIn 0.2s ease; pointer-events: auto;
        }
        @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }

        /* Auth card */
        .auth-card {
            background: #1b2332; border-radius: 36px; padding: 32px 24px;
            box-shadow: 0 20px 40px -10px black; border: 1px solid #2c3547; width: 100%;
        }
        .auth-tabs { display: flex; gap: 8px; background: #0f1622; padding: 6px; border-radius: 60px; margin-bottom: 28px; }
        .auth-tab { flex:1; text-align:center; padding:12px 0; border-radius:40px; font-weight:600; border:none; background:transparent; color:#9aa9c1; cursor:pointer; }
        .auth-tab.active { background:#2a344a; color:white; }
        .input-group { margin-bottom:24px; position:relative; }
        .input-group input { width:100%; background:#0f1623; border:1.5px solid #2b3449; border-radius:40px; padding:16px 22px; font-size:1rem; color:white; outline:none; }
        .input-group input:focus { border-color:#3b82f6; }
        .input-group label { position:absolute; left:22px; top:-10px; background:#1b2332; padding:0 6px; font-size:0.8rem; color:#a2b4da; }
        .btn-primary { background:#2563eb; border:none; color:white; font-weight:700; padding:16px; border-radius:40px; width:100%; cursor:pointer; margin-top:12px; }
        .btn-secondary { background:#2d374b; border:none; color:white; font-weight:600; padding:12px 24px; border-radius:40px; cursor:pointer; }

        /* Friend item */
        .friend-item {
            display: flex; align-items: center; gap: 14px; padding: 14px 20px;
            background: #1a2332; margin: 8px 0; border-radius: 50px; border: 1px solid #2c364b;
        }
        .avatar {
            width: 48px; height: 48px; border-radius: 50%; background: #2d3b52;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.3rem; color: white; flex-shrink: 0;
        }
        .online-dot { width: 12px; height: 12px; background: #22c55e; border-radius: 50%; display: inline-block; }
        .badge { background:#ef4444; color:white; font-size:0.7rem; padding:4px 8px; border-radius:40px; margin-left:auto; }

        /* Menu overlay */
        .menu-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:2000; display:none;
        }
        .menu-overlay.show { display:block; }
        .menu-panel {
            width:280px; height:100%; background:#141c2b; padding:30px 16px; display:flex; flex-direction:column; gap:8px;
            border-right:1px solid #2b3449; transform:translateX(-100%); transition:transform 0.25s ease-out; overflow-y:auto;
        }
        .menu-overlay.show .menu-panel { transform:translateX(0); }
        .menu-item {
            display:flex; align-items:center; gap:16px; padding:16px 18px; border-radius:40px; color:#ccd9f0;
            background:transparent; border:none; font-size:1rem; width:100%; cursor:pointer;
        }
        .menu-item svg { width:24px; height:24px; stroke:currentColor; fill:none; }

        /* Chat */
        .chat-container {
            flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px;
            display:flex; flex-direction:column; gap:8px; background:#0e121c;
            background-size: cover; background-position: center;
        }
        .message {
            max-width:80%; padding:12px 16px; border-radius:24px; word-wrap:break-word;
        }
        .message.own { align-self:flex-end; background:#2563eb; color:white; border-bottom-right-radius:6px; }
        .message.other { align-self:flex-start; background:#262f41; color:#e5eefb; border-bottom-left-radius:6px; }
        .timestamp { font-size:0.65rem; opacity:0.7; margin-top:4px; text-align:right; }
        .chat-footer {
            display:flex; padding:12px 16px; background:#151e2d; gap:8px; border-top:1px solid #2e3a4e;
            align-items:center; flex-shrink:0; height:80px;
        }
        .chat-footer input { flex:1; background:#0d1421; border:none; border-radius:40px; padding:14px 18px; color:white; outline:1px solid #314155; }
        .chat-footer button { background:#2563eb; border:none; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }

        /* Shop grid */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .shop-item {
            background: #1e2638; border-radius: 24px; padding: 16px; display: flex;
            flex-direction: column; align-items: center; gap: 8px; border: 1px solid #334155;
        }
        .shop-item .icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
        .shop-item .name { font-weight: 600; }
        .shop-item .price { color: #fbbf24; font-weight: 700; }
        .shop-item button { margin-top: 8px; background:#2563eb; border:none; color:white; padding:8px 16px; border-radius:40px; cursor:pointer; width:100%; }

        /* Custom icons (no emoji) */
        .icon-diamond {
            width: 30px; height: 30px; background: #b9f2ff; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .icon-star {
            width: 30px; height: 30px; background: gold; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        .icon-circle { width: 30px; height: 30px; background: #ffd700; border-radius: 50%; }
        .icon-square { width: 30px; height: 30px; background: #c0c0c0; }
        .icon-triangle { width: 30px; height: 30px; background: #ff6347; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .icon-heart { width: 30px; height: 30px; background: #ff69b4; transform: rotate(45deg); position: relative; }
        .icon-heart::before, .icon-heart::after { content: ''; width: 30px; height: 30px; background: #ff69b4; border-radius: 50%; position: absolute; }
        .icon-heart::before { left: -15px; top: 0; }
        .icon-heart::after { top: -15px; left: 0; }
        .icon-hexagon { width: 30px; height: 30px; background: #9370db; clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%); }
        .icon-boomerang { width: 30px; height: 30px; background: #cd853f; clip-path: polygon(0% 0%, 100% 0%, 80% 50%, 100% 100%, 0% 100%, 20% 50%); }
        .icon-crown { width: 30px; height: 30px; background: gold; clip-path: polygon(20% 0%, 40% 30%, 60% 0%, 80% 30%, 100% 0%, 100% 100%, 0% 100%); }
        .icon-ring { width: 30px; height: 30px; border: 4px solid gold; border-radius: 50%; background: transparent; }

        /* Animated icons */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes glow { 0% { filter: brightness(1); } 50% { filter: brightness(1.5); } 100% { filter: brightness(1); } }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0); } }
        @keyframes heartbeat { 0% { transform: scale(1); } 25% { transform: scale(1.1); } 50% { transform: scale(1); } 75% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes colorShift { 0% { background-color: #ff6b6b; } 25% { background-color: #4ecdc4; } 50% { background-color: #ffe66d; } 75% { background-color: #c7b9ff; } 100% { background-color: #ff6b6b; } }
        @keyframes sway { 0% { transform: rotate(0deg); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } 100% { transform: rotate(0deg); } }
        @keyframes sparkle { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes ringRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes falling { 0% { transform: translateY(-10px) rotate(0deg); } 100% { transform: translateY(10px) rotate(360deg); } }

        .icon-spin { animation: spin 2s linear infinite; }
        .icon-pulse { animation: pulse 1s ease infinite; }
        .icon-glow { animation: glow 1.5s ease infinite; }
        .icon-float { animation: float 2s ease infinite; }
        .icon-heartbeat { animation: heartbeat 1s ease infinite; }
        .icon-colorShift { animation: colorShift 3s linear infinite; }
        .icon-sway { animation: sway 2s ease infinite; }
        .icon-sparkle { animation: sparkle 1s ease infinite; }
        .icon-ringRotate { animation: ringRotate 3s linear infinite; }
        .icon-falling { animation: falling 1.5s ease infinite; }

        /* Animated wallpapers */
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes particleMove {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }
        .wp-animated-1 { background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #ffe66d); background-size: 300% 300%; animation: moveGradient 5s ease infinite; }
        .wp-animated-2 { background: radial-gradient(circle at 30% 30%, #f0f, #0ff); background-size: 200% 200%; animation: pulse 3s infinite; }
        .wp-animated-3 { background: repeating-linear-gradient(45deg, #3b82f6 0px, #3b82f6 10px, #1e3a8a 10px, #1e3a8a 20px); animation: moveGradient 10s linear infinite; }
        .wp-animated-4 { background: conic-gradient(from 0deg, red, yellow, green, blue, purple, red); animation: spin 10s linear infinite; }
        .wp-animated-5 { background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><circle cx="50" cy="50" r="10" fill="white" opacity="0.3"/></svg>'); animation: particleMove 10s linear infinite; }

        /* Loading */
        .loading-screen { position:absolute; inset:0; background:#0b0f17; z-index:9999; display:flex; align-items:center; justify-content:center; transition:opacity 0.3s; }
        .spinner { border:4px solid #2d374b; border-top-color:#3b82f6; width:50px; height:50px; border-radius:50%; animation:spin 1s infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .hidden { display:none !important; }
        .empty-state { text-align:center; color:#7b8aa5; padding:40px 20px; }
    </style>
</head>
<body>
<div id="app">
    <div class="toast-container" id="toastContainer"></div>
    <div id="loadingScreen" class="loading-screen"><div class="spinner"></div></div>

    <!-- MENU OVERLAY -->
    <div id="menuOverlay" class="menu-overlay" onclick="if(event.target===this) toggleMenu()">
        <div class="menu-panel" onclick="event.stopPropagation()">
            <div style="font-size:1.8rem; padding:16px;">☰ Zchat</div>
            <button class="menu-item" data-page="profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg> Profile</button>
            <button class="menu-item" data-page="friends"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="16" cy="7" r="4"/></svg> Friends</button>
            <button class="menu-item" data-page="friendRequests"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg> Requests <span id="requestBadgeMenu" class="badge" style="display:none;">0</span></button>
            <button class="menu-item" data-page="shop"><svg viewBox="0 0 24 24"><path d="M4 7h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7Z"/><path d="M8 7V4h8v3"/><circle cx="12" cy="13" r="1"/></svg> Shop</button>
            <button class="menu-item" data-page="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 18a10 10 0 0 0 6.36-2.22z"/><path d="M16.5 7.5 19 5"/><path d="M5 5l2.5 2.5"/></svg> Settings</button>
            <button class="menu-item" id="adminMenuItem" style="display:none;" data-page="adminPanel"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v8c0 5 10 7 10 7s10-2 10-7V7l-10-5z"/><path d="M12 12v4"/><circle cx="12" cy="9" r="1"/></svg> Admin Panel</button>
            <hr>
            <button class="menu-item" id="logoutBtn"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</button>
                                                                                                                       </div>
                                                                                                                           </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div class="content full">
            <div class="auth-card">
                <div style="text-align:center; font-size:2.4rem; font-weight:700; margin-bottom:16px;">Zchat</div>
                <div class="auth-tabs">
                    <button id="tabLoginBtn" class="auth-tab active">Login</button>
                    <button id="tabRegisterBtn" class="auth-tab">Register</button>
                </div>
                <div id="loginFields">
                    <div class="input-group"><label>Username</label><input type="text" id="loginUsername" autocomplete="off"></div>
                    <div class="input-group"><label>Password</label><input type="password" id="loginPassword" autocomplete="off"></div>
                    <button class="btn-primary" id="loginBtn">Log in</button>
                </div>
                <div id="registerFields" style="display:none;">
                    <div class="input-group"><label>Username</label><input type="text" id="regUsername" autocomplete="off"></div>
                    <div class="input-group"><label>Password</label><input type="password" id="regPassword" placeholder="min 6 chars"></div>
                    <div class="input-group"><label>Confirm</label><input type="password" id="regConfirm"></div>
                    <button class="btn-primary" id="registerBtn">Register</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CHAT SCREEN -->
    <div id="chatScreen" class="screen">
        <div class="header">
            <div class="header-left">
                <div class="profile-pic-header" id="headerProfilePic" onclick="goToProfile()">
                    <span id="headerAvatar">👤</span>
                    <span id="headerAccessory" class="accessory-icon" style="display:none;"></span>
                </div>
                <div class="coin-display" id="headerCoin">🪙 0</div>
            </div>
            <h2 style="flex:1; text-align:center;">Chats</h2>
            <button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        </div>
        <div class="content" id="chatListContainer"></div>
        <div class="bottom-nav">
            <button class="nav-item active" data-nav="chat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></button>
            <button class="nav-item" data-nav="friends"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="16" cy="7" r="4"/></svg><span>Friends</span></button>
            <button class="nav-item" data-nav="requests"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg><span>Requests</span><span id="requestBadgeNav" class="badge" style="display:none;">0</span></button>
        </div>
    </div>

    <!-- FRIENDS PAGE -->
    <div id="friendsScreen" class="screen">
        <div class="header">
            <button class="back-btn" onclick="goBackToChat()"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
            <h2>Friends</h2>
            <button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        </div>
        <div class="content">
            <div class="search-box" style="display:flex; gap:8px; margin-bottom:16px; background:#0e121b; padding:8px 16px; border-radius:40px;">
                <input type="text" id="friendSearchInput" placeholder="Cari username..." style="flex:1; background:transparent; border:none; color:white;">
                <button id="sendRequestBtn" class="btn-secondary" style="padding:10px 20px;">Tambah</button>
            </div>
            <div id="friendsListContainer"></div>
        </div>
    </div>

    <!-- FRIEND REQUESTS PAGE -->
    <div id="friendRequestsScreen" class="screen">
        <div class="header">
            <button class="back-btn" onclick="goBackToChat()"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
            <h2>Requests</h2>
            <button class="hamburger" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        </div>
        <div class="content" id="requestsListContainer"></div>
    </div>

    <!-- SHOP PAGE -->
    <div id="shopScreen" class="screen">

    // ================== COIN & DAILY LOGIN ==================
    async function handleDailyLogin() {
        if (!currentUser) return;
        const userRef = ref(db, `users/${currentUser}`);
        const snap = await get(userRef);
        if (!snap.exists()) return;
        const data = snap.val();
        const today = new Date().toDateString();
        const lastClaim = data.lastDaily || '';
        let streak = data.dailyStreak || 0;
        let reward = 0;
        let specialReward = null;

        if (lastClaim !== today) {
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            if (lastClaim === yesterday) {
                streak = (streak % 7) + 1;
            } else {
                streak = 1;
            }

            const rewards = {
                1: 20,
                2: 30,
                3: { coin: 20, frame: 'frame_premium' },
                4: 50,
                5: 60,
                6: 70,
                7: { coin: 50, accessory: 'acc_rare_animated' }
            };
            const rewardItem = rewards[streak];
            let updates = { lastDaily: today, dailyStreak: streak };
            let coinBonus = 0;

            if (typeof rewardItem === 'number') {
                coinBonus = rewardItem;
            } else {
                coinBonus = rewardItem.coin || 0;
                if (rewardItem.frame) {
                    // give frame as accessory
                    let acc = data.accessories || [];
                    if (!acc.includes(rewardItem.frame)) {
                        acc.push(rewardItem.frame);
                        updates.accessories = acc;
                    } else {
                        coinBonus += 30;
                    }
                }
                if (rewardItem.accessory) {
                    let acc = data.accessories || [];
                    if (!acc.includes(rewardItem.accessory)) {
                        acc.push(rewardItem.accessory);
                        updates.accessories = acc;
                    } else {
                        coinBonus += 50;
                    }
                }
            }

            updates.coin = (data.coin || 0) + coinBonus;
            await update(ref(db), { [`users/${currentUser}`]: updates });
            showToast(`Login hari ke-${streak}! Dapat ${coinBonus} coin` + (specialReward ? ' + hadiah spesial' : ''));
            updateHeaderCoin();
            updateHeaderPic();
        } else {
            showToast('Sudah klaim hari ini');
        }
    }

    async function buyItem(type, id, price) {
        const snap = await get(child(ref(db), `users/${currentUser}`));
        const data = snap.val() || {};
        const coin = data.coin || 0;
        if (coin < price) { showToast('Coin tidak cukup', true); return; }
        let updates = { coin: coin - price };
        if (type === 'wallpaper') {
            const owned = data.wallpapers || [];
            if (!owned.includes(id)) {
                owned.push(id);
                updates.wallpapers = owned;
            } else { showToast('Sudah memiliki ini', true); return; }
        } else {
            const owned = data.accessories || [];
            if (!owned.includes(id)) {
                owned.push(id);
                updates.accessories = owned;
            } else { showToast('Sudah memiliki ini', true); return; }
        }
        await update(ref(db), { [`users/${currentUser}`]: updates });
        showToast('Pembelian berhasil!');
        updateHeaderCoin();
    }

        const snap = await get(child(ref(db), `users/${username}`));
        if (!snap.exists()) return showToast('Username tidak ditemukan', true);

        if (snap.val().password !== pwd) return showToast('Password salah', true);
        currentUser = username;
        setSession(username);
        await update(ref(db), { [`users/${username}/online`]: true, [`users/${username}/lastSeen`]: Date.now() });

        setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 400);
        showScreen('chatScreen');
        setupRealTimeFeatures();
        if (username === 'DevzZerr44F') document.getElementById('adminMenuItem').style.display = 'flex';
        else document.getElementById('adminMenuItem').style.display = 'none';

        updateHeaderCoin();
        updateHeaderPic();
        renderShop();
    });

    // AUTO LOGIN
    window.addEventListener('load', async () => {
        const stored = localStorage.getItem('zchat_user');
        if (stored && localStorage.getItem('zchat_login') === 'true') {
            const snap = await get(child(ref(db), `users/${stored}`));
            if (!snap.exists() || snap.val().banned) {
                clearSession();
                showScreen('loginScreen');
            } else {
                currentUser = stored;
                await update(ref(db), { [`users/${stored}/online`]: true, [`users/${stored}/lastSeen`]: Date.now() });
                onDisconnect(ref(db, `users/${stored}`)).update({ online: false, lastSeen: Date.now() });
                showScreen('chatScreen');
                if (stored === 'DevzZerr44F') document.getElementById('adminMenuItem').style.display = 'flex';
                setupRealTimeFeatures();
                updateHeaderCoin();
                updateHeaderPic();
                renderShop();
            }
        } else {
            showScreen('loginScreen');
        }
        document.getElementById('loadingScreen').classList.add('hidden');
    });

    // LOGOUT
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        if (currentUser) await update(ref(db), { [`users/${currentUser}/online`]: false, [`users/${currentUser}/lastSeen`]: Date.now() });
        clearSession();
        location.reload();
    });

    // ================== FRIENDS & CHAT ==================
    window.addFriend = async function(searchUsername) {
        if (!searchUsername || searchUsername === currentUser) return showToast('Username tidak valid', true);
        const snap = await get(child(ref(db), `users/${searchUsername}`));
        if (!snap.exists()) return showToast('User tidak ditemukan', true);
        const reqRef = push(ref(db, `friendRequests/${searchUsername}`));
        await set(reqRef, { from: currentUser, status: 'pending', timestamp: Date.now() });
        showToast(`Request sent to ${searchUsername}`);
    };
    document.getElementById('sendRequestBtn')?.addEventListener('click', () => {
        const u = document.getElementById('friendSearchInput').value.trim();
        if (u) window.addFriend(u);
    });

    async function loadFriendsList() {
        const snap = await get(child(ref(db), `users/${currentUser}/friends`));
        const friends = snap.val() ? Object.keys(snap.val()) : [];
        const chatContainer = document.getElementById('chatListContainer');
        const friendsContainer = document.getElementById('friendsListContainer');
        if (chatContainer) {
            chatContainer.innerHTML = friends.length ? '' : '<div class="empty-state">Belum ada teman. Tambah di menu Friends</div>';
        }
        if (friendsContainer) {
            friendsContainer.innerHTML = friends.length ? '' : '<div class="empty-state">Belum ada teman. Cari username untuk menambah</div>';
        }
        for (let f of friends) {
            const fSnap = await get(child(ref(db), `users/${f}`));
            if (!fSnap.exists()) continue;
            const data = fSnap.val();
            if (chatContainer) {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `
                    <div class="avatar">${f[0].toUpperCase()}</div>
                    <div style="flex:1"><b>${f}</b><br><small>${data.online ? '● online' : '○ offline'}</small></div>
                    <button class="btn-primary" style="width:auto; padding:8px 16px;" data-chat="${f}">Chat</button>
                `;
                chatContainer.appendChild(div);
            }
            if (friendsContainer) {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `
                    <div class="avatar">${f[0].toUpperCase()}</div>
                    <div style="flex:1"><b>${f}</b><br><small>${data.bio || ''}</small></div>
                    <span class="online-dot" style="background:${data.online ? '#22c55e' : '#6b7280'}"></span>
                    <button class="btn-secondary" style="padding:6px 12px;" data-unfriend="${f}">✖</button>
                `;
                friendsContainer.appendChild(div);
            }
        }
        document.querySelectorAll('[data-chat]').forEach(b => b.addEventListener('click', e => openChat(e.target.dataset.chat)));
        document.querySelectorAll('[data-unfriend]').forEach(b => b.addEventListener('click', e => unfriend(e.target.dataset.unfriend)));
    }

    window.openChat = function(friend) {
        currentChatFriend = friend;
        document.getElementById('chatFriendName').innerText = friend;
        showScreen('chatRoomScreen');
        loadMessages(friend);
    };

    async function loadMessages(friend) {
        const roomId = [currentUser, friend].sort().join('_');
        const msgsRef = ref(db, `chats/${roomId}/messages`);
        onValue(msgsRef, (snap) => {
            const msgs = snap.val() ? Object.values(snap.val()).sort((a,b)=>a.timestamp - b.timestamp) : [];
            const cont = document.getElementById('chatMessages');
            cont.innerHTML = msgs.length ? '' : '<div class="empty-state">Kirim pesan pertama</div>';
            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = `message ${m.sender === currentUser ? 'own' : 'other'}`;
                div.innerHTML = `<div>${m.text}</div><div class="timestamp">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
                cont.appendChild(div);
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    document.getElementById('sendMsgBtn').addEventListener('click', async () => {
        const text = document.getElementById('messageInput').value.trim();
        if (!text || !currentChatFriend) return;
        const roomId = [currentUser, currentChatFriend].sort().join('_');
        const msgRef = push(ref(db, `chats/${roomId}/messages`));
        await set(msgRef, { text, sender: currentUser, timestamp: Date.now() });
        document.getElementById('messageInput').value = '';
    });

    // REQUESTS
    async function renderRequestsList(reqs) {
        const container = document.getElementById('requestsListContainer');
        if (!container) return;
        container.innerHTML = '';
        if (reqs.length === 0) return container.innerHTML = '<div class="empty-state">Tidak ada request</div>';
        for (let [key, req] of reqs) {
            const from = req.from;
            const fromSnap = await get(child(ref(db), `users/${from}`));
            const fromData = fromSnap.exists() ? fromSnap.val() : {};
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `
                <div class="avatar">${from[0].toUpperCase()}</div>
                <div style="flex:1"><b>${from}</b><br><small>${fromData.bio || ''}</small></div>
                <button class="btn-primary" style="padding:6px 12px;" data-accept="${from}" data-key="${key}">✓</button>
                <button class="btn-secondary" style="padding:6px 12px;" data-reject="${key}">✗</button>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('[data-accept]').forEach(b => b.addEventListener('click', async e => {
            const from = e.target.dataset.accept; const key = e.target.dataset.key;
            await update(ref(db), {
                [`users/${currentUser}/friends/${from}`]: true,
                [`users/${from}/friends/${currentUser}`]: true,
                [`friendRequests/${currentUser}/${key}/status`]: 'accepted'
            });
            showToast(`Berteman dengan ${from}`);
            loadFriendsList();
        }));
        document.querySelectorAll('[data-reject]').forEach(b => b.addEventListener('click', async e => {
            const key = e.target.dataset.key;
            await remove(ref(db, `friendRequests/${currentUser}/${key}`));
        }));
    }

    // BOTTOM NAV
    document.querySelectorAll('[data-nav]').forEach(btn => {
        btn.addEventListener('click', e => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (btn.dataset.nav === 'chat') { showScreen('chatScreen'); loadFriendsList(); }
            else if (btn.dataset.nav === 'friends') { showScreen('friendsScreen'); loadFriendsList(); }
            else if (btn.dataset.nav === 'requests') { showScreen('friendRequestsScreen'); }
        });
    });

    // MENU NAV
    document.querySelectorAll('.menu-item[data-page]').forEach(item => {
        item.addEventListener('click', e => {
            toggleMenu();
            const page = e.currentTarget.dataset.page;
            if (page === 'profile') { showScreen('profileScreen'); loadProfile(); }
            else if (page === 'friends') { showScreen('friendsScreen'); loadFriendsList(); }
            else if (page === 'friendRequests') { showScreen('friendRequestsScreen'); }
            else if (page === 'shop') { showScreen('shopScreen'); renderShop(); }
            else if (page === 'settings') { showScreen('settingsScreen'); }
            else if (page === 'adminPanel') {
                if (currentUser === 'DevzZerr44F') { showScreen('adminPanelScreen'); loadAdminPanel(); }
                else showToast('Akses ditolak', true);
            }
        });
    });

    // PROFILE
    async function loadProfile() {
        const snap = await get(child(ref(db), `users/${currentUser}`));
        if (snap.exists()) {
            const data = snap.val();
            document.getElementById('profileBio').value = data.bio || '';
            document.getElementById('profileUsername').innerText = currentUser;
            document.getElementById('profileCoin').innerText = data.coin || 0;
        }
    }
    document.getElementById('updateProfileBtn').addEventListener('click', async () => {
        const bio = document.getElementById('profileBio').value;
        await update(ref(db), { [`users/${currentUser}/bio`]: bio });
        showToast('Bio diperbarui');
    });

    // SETTINGS
    document.getElementById('changePassBtn').addEventListener('click', async () => {
        const newPass = document.getElementById('newPass').value;
        if (newPass.length < 6) return showToast('Minimal 6 karakter', true);
        await update(ref(db), { [`users/${currentUser}/password`]: newPass });
        showToast('Password diganti');
    });

    // ADMIN PANEL
    async function loadAdminPanel() {
        if (currentUser !== 'DevzZerr44F') return;
        const snap = await get(child(ref(db), 'users'));
        const users = snap.val() ? Object.entries(snap.val()) : [];
        const content = document.getElementById('adminPanelContent');
        content.innerHTML = '<h3>Manajemen User</h3>';
        users.forEach(([u, data]) => {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `
                <span>${u} ${data.banned ? '🔴' : '🟢'}</span>
                <button data-ban="${u}">${data.banned ? 'Unban' : 'Ban'}</button>
                <button data-del="${u}">Delete</button>
            `;
            content.appendChild(div);
        });
        document.querySelectorAll('[data-ban]').forEach(b => b.addEventListener('click', async e => {
            const user = e.target.dataset.ban;
            const snap = await get(child(ref(db), `users/${user}/banned`));
            await update(ref(db), { [`users/${user}/banned`]: !snap.val() });
            loadAdminPanel();
        }));
        document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async e => {
            if (confirm('Hapus user?')) {
                await remove(ref(db, `users/${e.target.dataset.del}`));
                loadAdminPanel();
            }
        }));
    }

    // SETUP REAL TIME
    function setupRealTimeFeatures() {
        if (!currentUser) return;
        loadFriendsList();
        const reqRef = ref(db, `friendRequests/${currentUser}`);
        onValue(reqRef, (snap) => {
            const reqs = snap.val() ? Object.entries(snap.val()).filter(([_,v]) => v.status === 'pending') : [];
            const badge = document.getElementById('requestBadgeNav');
            const menuBadge = document.getElementById('requestBadgeMenu');
            if (reqs.length) {
                badge.style.display = 'inline-block'; badge.innerText = reqs.length;
                menuBadge.style.display = 'inline-block'; menuBadge.innerText = reqs.length;
            } else {
                badge.style.display = 'none'; menuBadge.style.display = 'none';
            }
            renderRequestsList(reqs);
        });
    }

    // SHOP TABS
    document.getElementById('shopTabWallpapers')?.addEventListener('click', () => {
        document.getElementById('shopWallpapers').style.display = 'block';
        document.getElementById('shopAccessories').style.display = 'none';
    });
    document.getElementById('shopTabAccessories')?.addEventListener('click', () => {
        document.getElementById('shopWallpapers').style.display = 'none';
        document.getElementById('shopAccessories').style.display = 'block';
    });
    }

    // SHOP TABS
    document.getElementById('shopTabWallpapers')?.addEventListener('click', () => {
        document.getElementById('shopWallpapers').style.display = 'block';
        document.getElementById('shopAccessories').style.display = 'none';
    });
    document.getElementById('shopTabAccessories')?.addEventListener('click', () => {
        document.getElementById('shopWallpapers').style.display = 'none';
        document.getElementById('shopAccessories').style.display = 'block';
    });

    // ENTER KEY
    document.getElementById('loginPassword')?.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
    document.getElementById('regConfirm')?.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('registerBtn').click(); });
    document.getElementById('messageInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('sendMsgBtn').click(); });
</script>
</body>
</html>
