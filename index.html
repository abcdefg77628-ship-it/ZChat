<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat Elite - Ultimate v3.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           CORE STYLING (GLOBAL)
           ========================================= */
        :root {
            --primary: #6366f1;
            --secondary: #ef4444;
            --bg-dark: #0b0f1a;
            --bg-sidebar: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        .hidden { display: none !important; }

        /* =========================================
           TOAST NOTIFICATION SYSTEM
           ========================================= */
        .toast-container {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
        }

        .toast {
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            margin-bottom: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideInDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideInDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* =========================================
           LAYOUT SYSTEM
           ========================================= */
        #app-section {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 360px 1fr;
        }

        /* SIDEBAR */
        #sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 25px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--glass);
        }

        .user-profile-brief {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-profile-brief img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        /* NAVIGATION BAR */
        .nav-tabs {
            display: flex;
            padding: 15px 0;
            background: rgba(0,0,0,0.1);
            justify-content: space-around;
        }

        .tab-btn {
            color: var(--text-dim);
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
            transform: translateY(-2px);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* LISTS (CHATS, FRIENDS, REQS) */
        .list-container {
            flex: 1;
            overflow-y: auto;
        }

        .item-row {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .item-row:hover {
            background: var(--glass);
        }

        .avatar-box {
            position: relative;
        }

        .avatar-box img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #222;
        }

        /* ONLINE STATUS BUBBLE */
        .status-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid var(--bg-sidebar);
        }
        .status-online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-offline { background: #64748b; }

        /* =========================================
           CHAT MAIN INTERFACE
           ========================================= */
        #chat-area {
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* VARIASI WALLPAPER */
        .wp-radial-red {
            background: radial-gradient(circle at center, rgba(160, 0, 0, 0.45) 0%, rgba(0, 0, 0, 1) 100%) !important;
        }

        .wp-solid-dark {
            background: #0b0f1a !important;
        }

        .wp-pattern {
            background-color: #0b0f1a;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }

        .chat-header-main {
            padding: 15px 25px;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid var(--glass);
        }

        .msg-flow {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* CHAT BUBBLES */
        .msg-bubble {
            max-width: 65%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .msg-sent {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .msg-received {
            align-self: flex-start;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* SLIDE MENU (TITIK 3) */
        #right-slide-menu {
            position: absolute;
            right: 0;
            top: 0;
            width: 300px;
            height: 100%;
            background: #0f172a;
            z-index: 500;
            transform: translateX(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 25px;
            box-shadow: -15px 0 50px rgba(0,0,0,0.8);
            border-left: 2px solid var(--primary);
        }

        #right-slide-menu.active {
            transform: translateX(0);
        }

        .slide-item {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
            border: none;
            color: white;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .slide-item:hover {
            background: var(--primary);
        }

        /* =========================================
           MODAL SYSTEM (SETTINGS, SEARCH)
           ========================================= */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal-box {
            width: 90%;
            max-width: 450px;
            background: #1e293b;
            padding: 35px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
        }

        .modal-box h2 {
            margin-bottom: 25px;
            color: var(--primary);
            text-align: center;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            font-size: 1rem;
        }

        .btn-confirm { background: var(--primary); color: white; }
        .btn-cancel { background: #475569; color: white; margin-top: 15px; }
        .btn-danger { background: var(--secondary); color: white; }

        /* AUTH BOX */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            #app-section { grid-template-columns: 1fr; }
            #chat-area {
                position: fixed;
                inset: 0;
                transform: translateX(100%);
                z-index: 1000;
            }
            #chat-area.active { transform: translateX(0); }
        }
    </style>
</head>
<body class="wp-radial-red"> <div class="toast-container" id="toast-wrap"></div>

    <div id="auth-screen">
        <div class="auth-container">
            <div style="margin-bottom: 30px;">
                <i class="fas fa-user-secret" style="font-size: 4rem; color: var(--primary);"></i>
                <h1 style="margin-top: 15px; font-size: 2.5rem; letter-spacing: 2px;">ZCHAT <span style="color:var(--primary)">ELITE</span></h1>
            </div>
            
            <div id="auth-box">
                <input type="text" id="in-user" placeholder="Username" style="width:100%; padding:15px; margin-bottom:15px; border-radius:12px; border:none; background:#111; color:white;">
                <input type="password" id="in-pass" placeholder="Password" style="width:100%; padding:15px; margin-bottom:25px; border-radius:12px; border:none; background:#111; color:white;">
                
                <button class="btn-action btn-confirm" onclick="processAuth()">MASUK KE SERVER</button>
                
                <p id="toggle-auth" onclick="switchAuthMode()" style="margin-top:25px; cursor:pointer; color:var(--primary); font-weight:600;">
                    Belum punya akun? Registrasi Sekarang
                </p>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden">
        
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile-brief" onclick="openSettings()">
                    <img id="my-pic" src="https://via.placeholder.com/150" alt="Me">
                    <div>
                        <b id="my-name-display">User</b>
                        <p id="my-bio-display" style="font-size: 0.7rem; color: var(--text-dim);">Bio Loading...</p>
                    </div>
                </div>
                <div style="display: flex; gap: 15px;">
                    <i class="fas fa-search" onclick="openSearch()" style="cursor:pointer; opacity:0.7"></i>
                    <i class="fas fa-cog" onclick="openSettings()" style="cursor:pointer; opacity:0.7"></i>
                </div>
            </div>

            <div class="nav-tabs">
                <div class="tab-btn active" id="tab-chats" onclick="changeTab('chats')"><i class="fas fa-comment-alt"></i></div>
                <div class="tab-btn" id="tab-friends" onclick="changeTab('friends')"><i class="fas fa-user-friends"></i></div>
                <div class="tab-btn" id="tab-reqs" onclick="changeTab('reqs')"><i class="fas fa-bell"></i></div>
            </div>

            <div id="view-chats" class="list-container"></div>
            
            <div id="view-friends" class="list-container hidden">
                <div style="padding: 20px; text-align: center;">
                    <button onclick="openSearch()" style="background: var(--glass); border: 1px dashed var(--primary); color: var(--primary); padding: 10px 20px; border-radius: 10px; cursor: pointer; width: 100%;">
                        + Tambah Teman Baru
                    </button>
                </div>
                <div id="friend-list-data"></div>
            </div>

            <div id="view-reqs" class="list-container hidden"></div>
        </aside>

        <main id="chat-area">
            
            <div id="empty-chat-state" style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px;">
                <div style="width: 120px; height: 120px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                    <i class="fas fa-shield-virus" style="font-size: 4rem; color: var(--secondary); opacity: 0.5;"></i>
                </div>
                <h2 style="opacity: 0.8;">ENCRYPTED CHANNEL</h2>
                <p style="color: var(--text-dim); margin-top: 10px;">Pilih percakapan untuk memulai koneksi peer-to-peer aman.</p>
            </div>

            <div id="active-chat-state" class="hidden" style="height:100%; display:flex; flex-direction:column;">
                
                <header class="chat-header-main">
                    <div style="display:flex; align-items:center; gap:15px">
                        <i class="fas fa-arrow-left" id="back-to-sidebar" onclick="hideChatMobile()" style="cursor:pointer; font-size:1.2rem"></i>
                        <img id="active-target-pic" src="" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                        <div>
                            <b id="active-target-name">Target User</b>
                            <p id="active-target-status" style="font-size: 0.7rem; color: #10b981;">Online</p>
                        </div>
                    </div>
                    <i class="fas fa-ellipsis-v" onclick="toggleSlideMenu()" style="cursor:pointer; padding:10px; font-size:1.2rem"></i>
                </header>

                <div class="msg-flow" id="chat-messages-box"></div>

                <div style="padding: 20px 30px; background: rgba(0,0,0,0.4); display: flex; gap: 15px; align-items: center;">
                    <div style="flex: 1; position: relative;">
                        <input type="text" id="main-msg-input" placeholder="Ketik pesan aman..." 
                               onkeydown="if(event.key==='Enter') sendMessageNow()"
                               style="width:100%; padding:15px 25px; border-radius:30px; border:none; background: #1e293b; color:white; outline:none;">
                    </div>
                    <button onclick="sendMessageNow()" style="width:55px; height:55px; border-radius:50%; border:none; background: var(--primary); color:white; cursor:pointer; font-size:1.3rem; box-shadow: 0 4px 15px rgba(99,102,241,0.4)">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>

                <div id="right-slide-menu">
                    <h2 style="margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px;">Chat Options</h2>
                    <button class="slide-item" onclick="handleMenuAction('Mute')"><i class="fas fa-bell-slash"></i> Mute Notifications</button>
                    <button class="slide-item" onclick="handleMenuAction('Block')" style="color:var(--secondary)"><i class="fas fa-user-slash"></i> Block User</button>
                    <button class="slide-item" onclick="deleteCurrentChat()"><i class="fas fa-trash-alt"></i> Clear All Messages</button>
                    <button class="slide-item" onclick="handleMenuAction('Archive')"><i class="fas fa-file-archive"></i> Archive Chat</button>
                    
                    <button class="slide-item" style="margin-top: 50px; background: #334155;" onclick="toggleSlideMenu()">
                        <i class="fas fa-times"></i> Close Menu
                    </button>
                </div>

            </div>
        </main>
    </div>

    <div id="modal-settings" class="modal-overlay hidden">
        <div class="modal-box">
            <h2>Pengaturan Profil</h2>
            
            <div class="form-group">
                <label>Ganti Username</label>
                <input type="text" id="set-username-val">
            </div>

            <div class="form-group">
                <label>Ganti Password</label>
                <input type="password" id="set-password-val" placeholder="Biarkan kosong jika tidak diubah">
            </div>

            <div class="form-group">
                <label>Ubah Bio</label>
                <input type="text" id="set-bio-val">
            </div>

            <div class="form-group">
                <label>Variasi Wallpaper</label>
                <select id="set-wallpaper-val">
                    <option value="wp-radial-red">Pro: Merah Hitam (Radial)</option>
                    <option value="wp-solid-dark">Classic: Solid Dark</option>
                    <option value="wp-pattern">Tech: Carbon Fibre</option>
                </select>
            </div>

            <button class="btn-action btn-confirm" onclick="applySettingsUpdate()">SIMPAN PERUBAHAN</button>
            
            <button class="btn-action btn-danger" id="logout-trigger-btn" onclick="startLogoutSequence()">LOG OUT</button>
            
            <button class="btn-action btn-cancel" onclick="closeSettings()">BATAL</button>
        </div>
    </div>

    <div id="modal-search" class="modal-overlay hidden">
        <div class="modal-box">
            <h2>Tambah Teman</h2>
            <div class="form-group">
                <label>Masukkan Username</label>
                <input type="text" id="search-username-
