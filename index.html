<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERA - Pro Connected</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root { --wa-green: #25d366; --wa-light: #dcf8c6; --bg: #f0f2f5; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); overflow: hidden; }

        /* HEADER & APP */
        #main-app { display: none; height: 100vh; flex-direction: column; background: white; }
        .header { background: #f0f2f5; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        
        /* NOTIF ACC/REJECT */
        #req-box { background: #e7f3ff; padding: 10px; display: none; border-bottom: 2px solid #0080ff; }
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: white; border-radius: 12px; margin-bottom: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* CONTACT LIST */
        .contact-item { padding: 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--wa-green); color: white; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; font-size: 20px; }

        /* CHAT ROOM */
        #chat-room { display: none; position: fixed; inset: 0; background: #e5ddd5; flex-direction: column; z-index: 100; }
        .chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; position: relative; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-in { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .msg-out { background: var(--wa-light); align-self: flex-end; border-top-right-radius: 0; }
        .msg-img { width: 100%; max-width: 200px; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        /* FOOTER */
        .footer { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 12px; }
        .footer input { flex: 1; border: none; border-radius: 25px; padding: 12px 18px; outline: none; font-size: 15px; }
        .icon-btn { font-size: 20px; color: #54656f; cursor: pointer; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.8); }

        .btn-send { background: var(--wa-green); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* LOGIN PAGE */
        .login-page { display: flex; height: 100vh; align-items: center; justify-content: center; background: #25d366; }
        .card { background: white; padding: 40px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        input.auth { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; text-align: center; font-size: 16px; }
    </style>
</head>
<body>

    <div id="login-page" class="login-page">
        <div class="card">
            <h1 style="color:#25d366; margin-bottom: 5px;">ZERA PRO</h1>
            <p style="color:gray; font-size: 12px; margin-bottom: 25px;">Connected to Nebula Protocol</p>
            <input type="text" id="myUser" class="auth" placeholder="Username">
            <input type="password" id="myPass" class="auth" placeholder="Password">
            <button onclick="login()" style="width:100%; padding:14px; background:#25d366; border:none; color:white; border-radius:12px; font-weight:bold; cursor:pointer;">ACCESS TERMINAL</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <b id="display-name">@User</b>
            <div onclick="showGlobalSettings()"><i class="fas fa-ellipsis-v"></i></div>
        </div>
        
        <div id="req-box">
            <div id="req-list"></div>
        </div>

        <div id="contact-list" style="flex:1; overflow-y:auto;"></div>
        
        <div onclick="addContact()" style="position:fixed; bottom:30px; right:30px; width:60px; height:60px; background:#25d366; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:24px; box-shadow:0 5px 15px rgba(0,0,0,0.2); cursor:pointer;">
            <i class="fas fa-user-plus"></i>
        </div>
    </div>

    <div id="chat-room">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <span onclick="closeChat()" style="margin-right:15px; cursor:pointer; font-size:20px;">←</span>
                <div>
                    <b id="chatting-with">Username</b><br>
                    <small style="color:#25d366; font-size:10px;">Encrypted</small>
                </div>
            </div>
            <div style="display:flex; gap:22px;">
                <i class="fas fa-phone icon-btn" onclick="callSystem('Voice')"></i>
                <i class="fas fa-video icon-btn" onclick="callSystem('Video')"></i>
                <i class="fas fa-ellipsis-v icon-btn" onclick="showChatOptions()"></i>
            </div>
        </div>
        <div id="chatBox" class="chat-view"></div>
        <div class="footer">
            <i class="fas fa-paperclip icon-btn" onclick="openAttach()"></i>
            <input type="text" id="msgInput" placeholder="Ketik pesan...">
            <i class="fas fa-microphone icon-btn" onclick="voiceSystem()"></i>
            <button class="btn-send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let MY_NAME = localStorage.getItem("zchat_zero_usn") || "";
        let CURRENT_CHAT = "";
        let CURRENT_ROOM = "";

        if(MY_NAME) launchApp();

        function login() {
            const u = document.getElementById('myUser').value.trim().toLowerCase();
            if(!u) return;
            MY_NAME = u;
            localStorage.setItem("zchat_zero_usn", u);
            db.ref('users/' + u).set({ username: u, online: true });
            launchApp();
        }

        function launchApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('display-name').innerText = "@" + MY_NAME;
            syncRequests();
            syncContacts();
        }

        function addContact() {
            Swal.fire({
                title: 'Connect New User',
                input: 'text',
                inputPlaceholder: 'Username target...',
                showCancelButton: true,
                confirmButtonColor: '#25d366'
            }).then(res => {
                if(res.value) {
                    const t = res.value.trim().toLowerCase();
                    db.ref('users/' + t).once('value', s => {
                        if(s.exists()){
                            db.ref(`requests/${t}/${MY_NAME}`).set({ from: MY_NAME, time: Date.now() });
                            Swal.fire("Sent!", "Menunggu dikonfirmasi.", "success");
                        } else {
                            Swal.fire("Gagal", "Username tidak ditemukan!", "error");
                        }
                    });
                }
            });
        }

        function syncRequests() {
            db.ref(`requests/${MY_NAME}`).on('value', snap => {
                const box = document.getElementById('req-box');
                const list = document.getElementById('req-list');
                list.innerHTML = "";
                if(snap.exists()) {
                    box.style.display = 'block';
                    snap.forEach(c => {
                        list.innerHTML += `<div class="req-item">
                            <span><b>${c.key}</b></span>
                            <div>
                                <button onclick="confirmChat('${c.key}', true)" style="background:#25d366; color:white; border:none; padding:5px 12px; border-radius:8px; cursor:pointer;">ACC</button>
                                <button onclick="confirmChat('${c.key}', false)" style="background:red; color:white; border:none; padding:5px 12px; border-radius:8px; cursor:pointer;">TOLAK</button>
                            </div>
                        </div>`;
                    });
                } else box.style.display = 'none';
            });
        }

        function confirmChat(user, accept) {
            if(accept) {
                db.ref(`contacts/${MY_NAME}/${user}`).set(true);
                db.ref(`contacts/${user}/${MY_NAME}`).set(true);
            }
            db.ref(`requests/${MY_NAME}/${user}`).remove();
        }

        function syncContacts() {
            db.ref(`contacts/${MY_NAME}`).on('value', snap => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const name = c.key;
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${name}')">
                        <div class="avatar">${name[0].toUpperCase()}</div>
                        <div><b>${name}</b><br><small style="color:gray">Tap to chat</small></div>
                    </div>`;
                });
            });
        }

        function openChat(target) {
            CURRENT_CHAT = target;
            CURRENT_ROOM = [MY_NAME, target].sort().join("_");
            document.getElementById('chat-room').style.display = 'flex';
            document.getElementById('chatting-with').innerText = target;
            
            db.ref(`chats/${CURRENT_ROOM}`).on('value', snap => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                snap.forEach(mSnap => {
                    const m = mSnap.val();
                    const isMe = m.sender === MY_NAME;
                    const msgKey = mSnap.key;
                    
                    const div = document.createElement('div');
                    div.className = `bubble ${isMe ? 'msg-out' : 'msg-in'}`;
                    
                    // Render Image if any
                    let content = m.text;
                    if(m.type === 'image') content = `<img src="${m.url}" class="msg-img" onclick="window.open('${m.url}')"><br>${m.text}`;
                    
                    div.innerHTML = `${content}<br><span style="font-size:9px; opacity:0.5; float:right; margin-top:5px;">${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
                    
                    // FITUR SALIN & HAPUS
                    div.oncontextmenu = (e) => {
                        e.preventDefault();
                        Swal.fire({
                            title: 'Opsi Pesan',
                            showDenyButton: true,
                            showCancelButton: true,
                            confirmButtonText: 'Salin',
                            denyButtonText: 'Hapus',
                        }).then((res) => {
                            if (res.isConfirmed) {
                                navigator.clipboard.writeText(m.text);
                                Swal.fire("Copied!", "", "success");
                            } else if (res.isDenied) {
                                if(isMe) db.ref(`chats/${CURRENT_ROOM}/${msgKey}`).remove();
                                else Swal.fire("Gak bisa hapus chat orang!");
                            }
                        });
                    };
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function send(type = 'text', val = null) {
            const inp = document.getElementById('msgInput');
            const text = val || inp.value;
            if(!text && type === 'text') return;

            const msgData = {
                sender: MY_NAME,
                text: text,
                time: firebase.database.ServerValue.TIMESTAMP,
                type: type
            };
            if(type === 'image') msgData.url = val;

            db.ref(`chats/${CURRENT_ROOM}`).push(msgData);
            inp.value = "";
        }

        function openAttach() {
            Swal.fire({
                title: 'Kirim Media',
                input: 'file',
                inputAttributes: { 'accept': 'image/*', 'aria-label': 'Pilih Foto' }
            }).then(res => {
                if(res.value) {
                    const reader = new FileReader();
                    reader.onload = (e) => { send('image', e.target.result); };
                    reader.readAsDataURL(res.value);
                }
            });
        }

        function voiceSystem() { Swal.fire("Voice Note", "Fitur Record VN akan aktif di versi APK. (Simulasi: Mic ON)", "info"); }
        function callSystem(t) { Swal.fire(t + " Call", "Menghubungkan ke " + CURRENT_CHAT + "...", "success"); }
        function closeChat() { document.getElementById('chat-room').style.display = 'none'; db.ref(`chats/${CURRENT_ROOM}`).off(); }
        function showGlobalSettings() { Swal.fire({ title: 'Menu', html: `<button onclick="localStorage.clear();location.reload();" style="padding:10px; background:red; color:white; border:none; border-radius:5px; width:100%;">LOGOUT</button>`, showConfirmButton: false }); }
        
        // Anti Bug Input
        document.getElementById('msgInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
