<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat Ultimate Edition - zZerr44</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* --- ROOT VARIABLES --- */
        :root {
            --biru-utama: #007bff;
            --biru-gelap: #004085;
            --hitam-total: #000000;
            --hitam-cerah: #121212;
            --abu-input: #1e1e1e;
            --abu-border: #2c2c2c;
            --putih-teks: #ffffff;
            --abu-teks: #a0a0a0;
            --merah-z: #ff3b3b;
        }

        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--hitam-total);
            color: var(--putih-teks);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* --- ANIMASI LOADING --- */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 5px solid var(--abu-border);
            border-top: 5px solid var(--biru-utama);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- TOAST SYSTEM --- */
        #toast-notif {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--biru-utama);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            z-index: 9000;
            font-weight: bold;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- MODAL SYSTEM --- */
        .z-modal-wrapper {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 8000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .z-modal-content {
            background: var(--hitam-cerah);
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--abu-border);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* --- AUTHENTICATION --- */
        #auth-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-box {
            background: var(--hitam-cerah);
            width: 100%;
            max-width: 400px;
            padding: 45px 35px;
            border-radius: 30px;
            border: 1px solid var(--abu-border);
            text-align: center;
        }

        .z-brand {
            width: 85px;
            height: 85px;
            background: var(--biru-utama);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            font-weight: 900;
            border-radius: 15px;
            box-shadow: 10px 10px 0 var(--biru-gelap);
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: var(--abu-input);
            border: 1px solid var(--abu-border);
            border-radius: 14px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--biru-utama);
            background: #252525;
        }

        .btn-z {
            width: 100%;
            padding: 16px;
            background: var(--biru-utama);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-z:active { transform: scale(0.97); }

        .btn-link {
            background: none;
            border: 1px solid var(--abu-border);
            color: var(--abu-teks);
            margin-top: 15px;
        }

        /* --- MAIN INTERFACE --- */
        header {
            background: var(--hitam-cerah);
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--biru-utama);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .avatar-small {
            width: 42px;
            height: 42px;
            background: var(--biru-utama);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-bottom: 3px solid var(--biru-gelap);
        }

        .nav-icon {
            cursor: pointer;
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-icon span {
            width: 28px;
            height: 3px;
            background: var(--biru-utama);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* --- SIDEBAR --- */
        #sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: none;
        }

        #sidebar-content {
            position: fixed;
            top: 0;
            right: -300px;
            width: 290px;
            height: 100%;
            background: var(--hitam-cerah);
            z-index: 2001;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 25px;
            border-left: 2px solid var(--biru-utama);
        }

        #sidebar-content.open { right: 0; }

        .sidebar-title {
            color: var(--biru-utama);
            font-weight: 900;
            font-size: 24px;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .side-btn {
            padding: 18px 15px;
            color: var(--abu-teks);
            border-bottom: 1px solid var(--abu-border);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .side-btn:hover {
            color: var(--biru-utama);
            background: rgba(0,123,255,0.05);
        }

        /* --- FRIEND LIST --- */
        #friend-section {
            padding: 25px;
            height: calc(100vh - 85px);
            overflow-y: auto;
        }

        .friend-item {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border: 1px solid var(--abu-border);
            transition: all 0.2s;
        }

        .friend-item:hover {
            border-color: var(--biru-utama);
            transform: translateY(-2px);
        }

        .friend-item:active { transform: scale(0.98); }

        /* --- CHAT VIEW --- */
        #chat-view {
            position: fixed;
            inset: 0;
            background: var(--hitam-total);
            z-index: 3000;
            display: flex;
            flex-direction: column;
        }

        .chat-top {
            padding: 15px 20px;
            background: var(--hitam-cerah);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--biru-utama);
        }

        .back-arrow {
            font-size: 30px;
            color: var(--biru-utama);
            cursor: pointer;
        }

        #chat-logs {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: linear-gradient(rgba(18, 18, 18, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(18, 18, 18, 0.5) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
        }

        .b-me {
            align-self: flex-end;
            background: var(--biru-utama);
            color: white;
            border-radius: 20px 20px 2px 20px;
            box-shadow: 0 5px 15px rgba(0,123,255,0.2);
        }

        .b-them {
            align-self: flex-start;
            background: var(--abu-input);
            color: white;
            border-radius: 20px 20px 20px 2px;
            border: 1px solid var(--abu-border);
        }

        .chat-footer {
            padding: 20px;
            background: var(--hitam-cerah);
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--abu-border);
        }

        .typing-indicator {
            font-size: 11px;
            color: var(--biru-utama);
            margin-left: 20px;
            margin-bottom: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="loading-overlay" class="hidden">
        <div class="loader-ring"></div>
        <p style="margin-top: 25px; letter-spacing: 3px; font-weight: bold; color: var(--biru-utama);">Z-SYSTEM BUSY</p>
    </div>

    <div id="toast-notif">Notifikasi</div>

    <div id="modal-container" class="z-modal-wrapper hidden">
        <div class="z-modal-content">
            <h3 id="modal-title" style="color: var(--biru-utama); margin-bottom: 20px;">Judul</h3>
            <div id="modal-body"></div>
            <div style="display: flex; gap: 12px; margin-top: 30px;">
                <button class="btn-z" id="modal-confirm" style="flex: 1; margin: 0;">OKE</button>
                <button class="btn-z" onclick="closeZModal()" style="flex: 1; margin: 0; background: #333;">BATAL</button>
            </div>
        </div>
    </div>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="z-brand">Z</div>
            <h1 style="margin-bottom: 35px; font-weight: 900; letter-spacing: 2px;">ZCHAT v2.0</h1>
            
            <div id="auth-entry">
                <button class="btn-z" onclick="toggleAuth('login')">SIGN IN</button>
                <button class="btn-z btn-link" onclick="toggleAuth('reg')">REGISTER</button>
            </div>

            <div id="login-form" class="hidden">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-z" onclick="doLogin()">MASUK KE AKUN</button>
                <button class="btn-z btn-link" onclick="toggleAuth('entry')" style="border:none">KEMBALI</button>
            </div>

            <div id="register-form" class="hidden">
                <input type="text" id="r-user" placeholder="Buat Username">
                <input type="password" id="r-pass" placeholder="Buat Password">
                <input type="password" id="r-confirm" placeholder="Ulangi Password">
                <button class="btn-z" onclick="doRegister()">DAFTAR SEKARANG</button>
                <button class="btn-z btn-link" onclick="toggleAuth('entry')" style="border:none">KEMBALI</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <header>
            <div class="user-pill" onclick="toggleSidebar()">
                <div id="my-avatar" class="avatar-small">?</div>
                <div style="font-weight: bold; font-size: 14px;">PROFIL</div>
            </div>
            <div style="font-weight: 900; letter-spacing: 4px; color: var(--biru-utama);">ZCHAT</div>
            <div class="nav-icon" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </div>
        </header>

        <nav id="sidebar-content">
            <div class="sidebar-title">SETTINGS</div>
            <div class="side-btn" onclick="openProfile()">⭐ Detail Profil</div>
            <div class="side-btn" onclick="openSecurity()">🔒 Ganti Password</div>
            <div class="side-btn" onclick="showToast('ZChat v2.0 by zZerr44')">ℹ️ Tentang Kami</div>
            <div class="side-btn" style="color: var(--merah-z); margin-top: 50px;" onclick="openLogout()">🚪 LOGOUT</div>
        </nav>

        <div id="friend-section">
            <button class="btn-z" onclick="openAddFriend()" style="margin-bottom: 25px;">+ TEMUKAN TEMAN</button>
            <div id="friend-list-container">
                </div>
        </div>
    </div>

    <div id="chat-view" class="hidden">
        <div class="chat-top">
            <div class="back-arrow" onclick="exitChat()">←</div>
            <div>
                <div id="chat-target-name" style="font-weight: 900; font-size: 18px;">USERNAME</div>
                <div id="status-typing" class="typing-indicator hidden">sedang mengetik...</div>
            </div>
        </div>
        <div id="chat-logs"></div>
        <div class="chat-footer">
            <input type="text" id="msg-input" placeholder="Tulis pesan..." style="margin: 0; flex: 1;">
            <button class="btn-z" style="width: 90px; margin: 0;" onclick="sendMessage()">Kirim</button>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- STATE MANAGEMENT ---
        let me = null;
        let activeFriend = null;

        // --- UI UTILS ---
        function showToast(msg) {
            const t = document.getElementById('toast-notif');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        function setSpinner(show) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        function openZModal(title, body, onOk) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById('modal-confirm').onclick = () => { onOk(); closeZModal(); };
        }

        function closeZModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        function toggleAuth(view) {
            document.getElementById('auth-entry').classList.add('hidden');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');

            if(view === 'login') document.getElementById('login-form').classList.remove('hidden');
            else if(view === 'reg') document.getElementById('register-form').classList.remove('hidden');
            else document.getElementById('auth-entry').classList.remove('hidden');
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar-content');
            const o = document.getElementById('sidebar-overlay');
            const open = s.classList.toggle('open');
            o.style.display = open ? 'block' : 'none';
        }

        // --- AUTH LOGIC ---
        async function doRegister() {
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            const p = document.getElementById('r-pass').value;
            const c = document.getElementById('r-confirm').value;

            if(!u || !p) return showToast("Data tidak lengkap!");
            if(p !== c) return showToast("Password tidak cocok!");

            setSpinner(true);
            try {
                const snap = await db.ref('users/' + u).once('value');
                if(snap.exists()) {
                    setSpinner(false);
                    return showToast("Username sudah ada!");
                }
                await db.ref('users/' + u).set({ username: u, password: p });
                setSpinner(false);
                showToast("Daftar berhasil! Silakan Login.");
                toggleAuth('login');
            } catch (e) { setSpinner(false); showToast("Koneksi Error!"); }
        }

        async function doLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;

            if(!u || !p) return showToast("Isi data!");

            setSpinner(true);
            const snap = await db.ref('users/' + u).once('value');
            setSpinner(false);

            if(snap.exists() && snap.val().password === p) {
                runApp(snap.val());
            } else {
                showToast("Username/Password salah!");
            }
        }

        function runApp(userData) {
            me = userData;
            localStorage.setItem('z_sess_v2', JSON.stringify(userData));
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-avatar').innerText = me.username[0].toUpperCase();
            loadFriends();
        }

        // AUTO-LOGIN
        const saved = localStorage.getItem('z_sess_v2');
        if(saved) runApp(JSON.parse(saved));

        // --- SOCIAL ---
        function openAddFriend() {
            const html = `<input type="text" id="target-search" placeholder="Cari Username...">`;
            openZModal("CARI TEMAN", html, async () => {
                const target = document.getElementById('target-search').value.toLowerCase();
                if(!target || target === me.username) return;

                setSpinner(true);
                const check = await db.ref('users/' + target).once('value');
                if(check.exists()) {
                    await db.ref(`friends/${me.username}/${target}`).set(true);
                    await db.ref(`friends/${target}/${me.username}`).set(true);
                    showToast("Teman baru ditambahkan!");
                } else {
                    showToast("User tidak ditemukan!");
                }
                setSpinner(false);
            });
        }

        function loadFriends() {
            db.ref(`friends/${me.username}`).on('value', snap => {
                const list = document.getElementById('friend-list-container');
                list.innerHTML = "";
                if(!snap.exists()) {
                    list.innerHTML = `<p style="text-align:center; color:#444; margin-top:40px;">Belum ada teman.</p>`;
                }
                snap.forEach(f => {
                    const name = f.key;
                    const item = document.createElement('div');
                    item.className = "friend-item";
                    item.innerHTML = `
                        <div class="avatar-small" style="margin-right:20px; background:#222; border:1px solid var(--biru-utama);">${name[0].toUpperCase()}</div>
                        <div style="flex:1;">
                            <div style="font-weight:900; letter-spacing:1px;">${name.toUpperCase()}</div>
                            <div style="font-size:12px; color:#555;">Sentuh untuk memulai pesan</div>
                        </div>
                    `;
                    item.onclick = () => enterChat(name);
                    list.appendChild(item);
                });
            });
        }

        // --- CHAT LOGIC ---
        function enterChat(name) {
            activeFriend = name;
            document.getElementById('chat-target-name').innerText = name.toUpperCase();
            document.getElementById('chat-view').classList.remove('hidden');
            listenChat();
        }

        function exitChat() {
            document.getElementById('chat-view').classList.add('hidden');
            const chatID = [me.username, activeFriend].sort().join('_');
            db.ref(`chats/${chatID}`).off();
        }

        function sendMessage() {
            const text = document.getElementById('msg-input').value;
            if(!text) return;

            const chatID = [me.username, activeFriend].sort().join('_');
            db.ref(`chats/${chatID}`).push({
                s: me.username,
                t: text,
                time: Date.now()
            });
            document.getElementById('msg-input').value = "";
        }

        function listenChat() {
            const chatID = [me.username, activeFriend].sort().join('_');
            const box = document.getElementById('chat-logs');
            
            db.ref(`chats/${chatID}`).on('value', snap => {
                box.innerHTML = "";
                snap.forEach(msg => {
                    const data = msg.val();
                    const isMe = data.s === me.username;
                    const b = document.createElement('div');
                    b.className = `bubble ${isMe ? 'bubble-me b-me' : 'bubble-them b-them'}`;
                    b.innerText = data.t;
                    box.appendChild(b);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- SIDEBAR ACTIONS ---
        function openLogout() {
            const h = `<p>Yakin ingin keluar dari akun <b>${me.username}</b>?</p><p style="font-size:11px; margin-top:10px; color:#666;">Ketik 'OUT' untuk konfirmasi:</p><input id="confirm-out">`;
            openZModal("LOGOUT", h, () => {
                if(document.getElementById('confirm-out').value === 'OUT') {
                    localStorage.removeItem('z_sess_v2');
                    location.reload();
                } else { showToast("Gagal!"); }
            });
        }

        function openSecurity() {
            const h = `<input type="password" id="p-old" placeholder="Sandi Lama"><input type="password" id="p-new" placeholder="Sandi Baru">`;
            openZModal("KEAMANAN", h, async () => {
                if(document.getElementById('p-old').value === me.password) {
                    const newP = document.getElementById('p-new').value;
                    await db.ref(`users/${me.username}/password`).set(newP);
                    me.password = newP;
                    showToast("Sandi Diperbarui!");
                } else { showToast("Sandi Lama Salah!"); }
            });
        }

        function openProfile() {
            const h = `<div style="text-align:left; background:#1a1a1a; padding:20px; border-radius:15px; border:1px solid #333;">
                <p><b>Username:</b> ${me.username}</p>
                <p><b>Status:</b> Premium User</p>
                <p><b>Member Sejak:</b> 2024</p>
            </div>`;
            openZModal("PROFIL SAYA", h, () => {});
        }

        // Enter key handling
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && document.activeElement.id === 'msg-input') sendMessage();
        });
    </script>
</body>
</html>
