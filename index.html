<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat by zZerr44</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --biru-z: #007bff;
            --biru-gelap: #0056b3;
            --hitam-bg: #0a0a0a;
            --abu-card: #161616;
            --abu-input: #222;
            --teks: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--hitam-bg); color: var(--teks); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- ANIMASI LOADING --- */
        .loader {
            border: 4px solid #333;
            border-top: 4px solid var(--biru-z);
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #overlay-loading {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }

        /* --- CUSTOM MODAL (ANTI GOOGLE) --- */
        .z-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center; z-index: 5000;
        }
        .z-modal-content {
            background: var(--abu-card); padding: 25px; border-radius: 15px;
            width: 85%; max-width: 350px; border: 1px solid #333; text-align: center;
        }

        /* --- TOAST NOTIF --- */
        #z-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--biru-z); color: white; padding: 12px 20px;
            border-radius: 8px; z-index: 6000; font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none;
        }

        /* --- AUTH PAGE --- */
        #auth-page { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { background: var(--abu-card); padding: 40px 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        
        .logo-z {
            width: 70px; height: 70px; background: var(--biru-z); color: white;
            font-size: 45px; font-weight: bold; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 6px 6px 0px var(--biru-gelap); border-radius: 4px;
        }

        input {
            width: 100%; padding: 14px; margin: 10px 0; background: var(--abu-input);
            border: 1px solid #333; border-radius: 10px; color: white; outline: none;
        }

        .btn-z {
            width: 100%; padding: 14px; background: var(--biru-z); color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* --- MAIN APP --- */
        header {
            background: var(--abu-card); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--biru-z);
        }

        /* Profile Atas Kiri */
        .my-profile-top { display: flex; flex-direction: column; align-items: flex-start; }
        .pp-z {
            width: 40px; height: 40px; background: var(--biru-z); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border-radius: 4px;
        }
        .pp-line { width: 40px; height: 3px; background: var(--biru-z); margin-top: 4px; }

        /* Menu Atas Kanan */
        .menu-toggle { cursor: pointer; padding: 5px; }
        .menu-toggle div { width: 25px; height: 3px; background: var(--biru-z); margin: 5px 0; border-radius: 2px; }

        /* Sidebar Slide Kanan */
        #sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: var(--abu-card); z-index: 4000; transition: 0.4s;
            padding: 25px; border-left: 1px solid var(--biru-z);
        }
        #sidebar.open { right: 0; }
        .side-item { padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer; color: #bbb; }
        .side-item:hover { color: var(--biru-z); }

        /* Chat Bubbles */
        #chat-window { position: fixed; inset: 0; background: var(--hitam-bg); z-index: 2500; display: flex; flex-direction: column; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        .bubble { 
            max-width: 75%; padding: 12px; margin-bottom: 10px; font-size: 15px; line-height: 1.4;
        }
        .me { 
            align-self: flex-end; background: var(--biru-z); color: white;
            border-radius: 15px 15px 2px 15px;
        }
        .them { 
            align-self: flex-start; background: #222; color: white;
            border-radius: 15px 15px 15px 2px;
        }
    </style>
</head>
<body>

    <div id="overlay-loading" class="hidden">
        <div class="loader"></div>
        <p style="margin-top: 15px; font-size: 14px; letter-spacing: 1px;">MEMPROSES...</p>
    </div>

    <div id="z-toast"></div>

    <div id="z-modal" class="z-modal hidden">
        <div class="z-modal-content">
            <h3 id="modal-title" style="margin-bottom: 15px; color: var(--biru-z);">Title</h3>
            <div id="modal-body"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn-z" id="modal-ok" style="flex:1">OKE</button>
                <button class="btn-z" onclick="closeModal()" style="flex:1; background:#333;">BATAL</button>
            </div>
        </div>
    </div>

    <div id="auth-page">
        <div class="auth-card">
            <div class="logo-z">Z</div>
            <h2 style="margin-bottom: 20px;">ZChat by zZerr44</h2>
            <div id="auth-choice">
                <button class="btn-z" onclick="showForm('login')">SIGN IN</button>
                <button class="btn-z" onclick="showForm('register')" style="margin-top: 10px; background: transparent; border: 1px solid var(--biru-z);">REGISTER</button>
            </div>

            <div id="login-form" class="hidden">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-z" onclick="doLogin()">Masuk</button>
            </div>

            <div id="register-form" class="hidden">
                <input type="text" id="r-user" placeholder="Username Baru">
                <input type="password" id="r-pass" placeholder="Password">
                <input type="password" id="r-confirm" placeholder="Konfirmasi Password">
                <button class="btn-z" onclick="doRegister()">Daftar Sekarang</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <div class="my-profile-top">
                <div id="my-initial" class="pp-z">?</div>
                <div class="pp-line"></div>
            </div>
            <div style="font-weight: bold; color: var(--biru-z);">ZCHAT</div>
            <div class="menu-toggle" onclick="toggleSidebar()">
                <div></div><div></div><div></div>
            </div>
        </header>

        <div id="friend-list" style="padding: 20px;">
            <button class="btn-z" onclick="openAddFriend()">+ TAMBAH TEMAN</button>
            <div id="list-container" style="margin-top: 20px;"></div>
        </div>

        <div id="sidebar">
            <h3 style="color: var(--biru-z); border-bottom: 1px solid #333; padding-bottom: 10px;">PENGATURAN</h3>
            <div class="side-item" onclick="showNotif('User: ' + currentUser.username)">Profil</div>
            <div class="side-item" onclick="openChangePass()">Keamanan</div>
            <div class="side-item" onclick="showNotif('© 2024 ZChat by zZerr44')">Hak Cipta</div>
            <div class="side-item" style="color: #ff4444;" onclick="openLogout()">Log Out</div>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div style="background: var(--abu-card); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--biru-z);">
            <span onclick="closeChat()" style="margin-right: 15px; font-size: 24px; cursor: pointer; color: var(--biru-z);">←</span>
            <span id="target-name">Username</span>
        </div>
        <div id="chat-msgs"></div>
        <div style="padding: 15px; background: var(--abu-card); display: flex;">
            <input type="text" id="chat-input" placeholder="Ketik pesan..." style="margin: 0; flex: 1; margin-right: 10px;">
            <button class="btn-z" style="width: 80px;" onclick="sendMsg()">Kirim</button>
        </div>
    </div>

    <script>
        // --- FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let activeFriend = null;

        // --- UTILS (NO GOOGLE) ---
        function showNotif(msg) {
            const t = document.getElementById('z-toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function toggleLoading(show) {
            document.getElementById('overlay-loading').classList.toggle('hidden', !show);
        }

        function showModal(title, bodyHTML, okCallback) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = bodyHTML;
            document.getElementById('z-modal').classList.remove('hidden');
            document.getElementById('modal-ok').onclick = () => {
                okCallback();
                closeModal();
            };
        }
        function closeModal() { document.getElementById('z-modal').classList.add('hidden'); }

        // --- AUTH ---
        function showForm(f) {
            document.getElementById('auth-choice').classList.add('hidden');
            document.getElementById('login-form').classList.toggle('hidden', f !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', f !== 'register');
        }

        async function doRegister() {
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            const p = document.getElementById('r-pass').value;
            if(!u || !p) return showNotif("Data tidak boleh kosong!");
            
            toggleLoading(true);
            const check = await db.ref('users/' + u).once('value');
            if(check.exists()) {
                toggleLoading(false);
                return showNotif("Username sudah ada!");
            }
            await db.ref('users/' + u).set({ username: u, password: p });
            toggleLoading(false);
            showNotif("Berhasil! Silakan Sign In.");
            showForm('login');
        }

        async function doLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            toggleLoading(true);
            const snap = await db.ref('users/' + u).once('value');
            toggleLoading(false);
            if(snap.exists() && snap.val().password === p) {
                launch(snap.val());
            } else {
                showNotif("Salah User/Password!");
            }
        }

        function launch(data) {
            currentUser = data;
            localStorage.setItem('z_sess', JSON.stringify(data));
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-initial').innerText = data.username[0].toUpperCase();
            loadFriends();
        }

        if(localStorage.getItem('z_sess')) launch(JSON.parse(localStorage.getItem('z_sess')));

        // --- FEATURES ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function openLogout() {
            showModal("LOG OUT", `<p>Ketik 'out' untuk keluar:</p><input type="text" id="out-confirm">`, () => {
                if(document.getElementById('out-confirm').value === 'out') {
                    localStorage.removeItem('z_sess');
                    location.reload();
                } else { showNotif("Gagal Keluar!"); }
            });
        }

        function openAddFriend() {
            showModal("CARI TEMAN", `<input type="text" id="f-target" placeholder="Username Teman">`, async () => {
                const t = document.getElementById('f-target').value.toLowerCase();
                if(!t || t === currentUser.username) return;
                toggleLoading(true);
                const snap = await db.ref('users/' + t).once('value');
                if(snap.exists()) {
                    await db.ref(`friends/${currentUser.username}/${t}`).set(true);
                    await db.ref(`friends/${t}/${currentUser.username}`).set(true);
                    showNotif("Teman ditambahkan!");
                } else {
                    showNotif("User tidak ada!");
                }
                toggleLoading(false);
            });
        }

        function loadFriends() {
            db.ref(`friends/${currentUser.username}`).on('value', snap => {
                const cont = document.getElementById('list-container');
                cont.innerHTML = "";
                snap.forEach(c => {
                    const name = c.key;
                    const div = document.createElement('div');
                    div.style = "padding:15px; background:#1a1a1a; margin-bottom:10px; border-radius:10px; display:flex; align-items:center; cursor:pointer; border: 1px solid #222;";
                    div.innerHTML = `<div class="pp-z" style="margin-right:15px;">${name[0].toUpperCase()}</div><b>${name}</b>`;
                    div.onclick = () => openChat(name);
                    cont.appendChild(div);
                });
            });
        }

        function openChat(name) {
            activeFriend = name;
            document.getElementById('target-name').innerText = name;
            document.getElementById('chat-window').classList.remove('hidden');
            loadMsgs();
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        function sendMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt) return;
            const id = [currentUser.username, activeFriend].sort().join('_');
            db.ref(`chats/${id}`).push({ sender: currentUser.username, text: txt });
            document.getElementById('chat-input').value = "";
        }

        function loadMsgs() {
            const id = [currentUser.username, activeFriend].sort().join('_');
            db.ref(`chats/${id}`).on('value', snap => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const d = document.createElement('div');
                    d.className = `bubble ${m.sender === currentUser.username ? 'me' : 'them'}`;
                    d.innerText = m.text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function openChangePass() {
            showModal("GANTI SANDI", `
                <input type="password" id="old-p" placeholder="Sandi Lama">
                <input type="password" id="new-p" placeholder="Sandi Baru">
            `, () => {
                const o = document.getElementById('old-p').value;
                const n = document.getElementById('new-p').value;
                if(o === currentUser.password) {
                    db.ref(`users/${currentUser.username}/password`).set(n);
                    currentUser.password = n;
                    showNotif("Berhasil!");
                } else { showNotif("Sandi Lama Salah!"); }
            });
        }
    </script>
</body>
</html>
