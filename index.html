<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat - Original Real-time Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00a884;
            --bg-dark: #111b21;
            --bg-lighter: #202c33;
            --text-main: #e9edef;
            --text-dim: #8696a0;
            --bubble-out: #005c4b;
            --bubble-in: #202c33;
            --accent: #53bdeb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; height: 100vh; }

        /* SPLASH SCREEN */
        #splash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .logo-box { font-size: 3rem; color: var(--primary); margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .loader { width: 40px; height: 40px; border: 4px solid var(--bg-lighter); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* AUTH PAGES */
        .auth-container {
            display: none; width: 100%; height: 100vh; padding: 20px;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .auth-card {
            background: var(--bg-lighter); padding: 30px; border-radius: 15px;
            width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: none; background: #2a3942; color: white; outline: none;
        }
        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:active { transform: scale(0.98); }

        /* MAIN APP LAYOUT */
        #main-app { display: none; height: 100vh; grid-template-columns: 350px 1fr; }
        
        /* SIDEBAR */
        .sidebar { background: var(--bg-dark); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .side-header { 
            padding: 15px; background: var(--bg-lighter); display: flex; 
            justify-content: space-between; align-items: center;
        }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .chat-list { overflow-y: auto; flex: 1; }
        .chat-item { 
            display: flex; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; transition: 0.2s;
        }
        .chat-item:hover { background: #2a3942; }

        /* CHAT AREA */
        .chat-window { display: flex; flex-direction: column; background: #0b141a; position: relative; }
        .chat-header { 
            padding: 10px 20px; background: var(--bg-lighter); display: flex; 
            align-items: center; justify-content: space-between;
        }
        .messages-container { 
            flex: 1; overflow-y: auto; padding: 20px; 
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }
        .msg { margin-bottom: 10px; max-width: 70%; padding: 8px 12px; border-radius: 8px; position: relative; font-size: 0.95rem; }
        .msg.sent { background: var(--bubble-out); align-self: flex-end; margin-left: auto; border-top-right-radius: 0; }
        .msg.received { background: var(--bubble-in); align-self: flex-start; border-top-left-radius: 0; }
        .msg-time { font-size: 0.7rem; color: var(--text-dim); text-align: right; margin-top: 4px; }

        /* INPUT AREA */
        .input-area { padding: 10px 20px; background: var(--bg-lighter); display: flex; align-items: center; gap: 15px; }
        .input-area input { margin: 0; }
        
        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            #main-app { grid-template-columns: 1fr; }
            .chat-window { position: fixed; top:0; left:0; width:100%; height:100%; display: none; z-index: 10; }
            .chat-window.active { display: flex; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-box"><i class="fab fa-whatsapp"></i></div>
        <h2 style="color: white; margin-bottom: 20px;">ZChat</h2>
        <div class="loader"></div>
    </div>

    <div id="login-page" class="auth-container">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 20px;">Login ZChat</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
            <p style="margin-top: 15px; font-size: 0.8rem; text-align: center; color: var(--text-dim);">
                Belum punya akun? <a href="#" onclick="showRegister()" style="color: var(--primary);">Daftar</a>
            </p>
        </div>
    </div>

    <div id="register-page" class="auth-container">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 20px;">Buat Akun</h2>
            <div style="text-align: center;">
                <img id="reg-preview" src="https://via.placeholder.com/80" class="user-avatar" style="width: 80px; height: 80px; margin-bottom: 10px;">
                <input type="file" id="reg-photo" accept="image/*" style="display: none;">
                <button onclick="document.getElementById('reg-photo').click()" style="background: transparent; border: 1px solid var(--primary); font-size: 0.7rem; width: auto; padding: 5px 10px;">Pilih Foto</button>
            </div>
            <input type="text" id="reg-user" placeholder="Username Unik">
            <input type="password" id="reg-pass" placeholder="Password">
            <input type="text" id="reg-bio" placeholder="Bio (Opsional)">
            <button onclick="handleRegister()">Daftar Sekarang</button>
            <button onclick="showLogin()" style="background: transparent; margin-top: 5px;">Batal</button>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div class="side-header">
                <img id="my-avatar" src="" class="user-avatar" onclick="toggleProfile()">
                <div class="icons" style="display: flex; gap: 15px; color: var(--text-dim);">
                    <i class="fas fa-circle-notch" title="Status" onclick="alert('Fitur Story segera hadir!')"></i>
                    <i class="fas fa-comment-alt" onclick="openSearch()"></i>
                    <i class="fas fa-ellipsis-v" onclick="toggleMenu()"></i>
                </div>
            </div>
            <div style="padding: 10px;">
                <input type="text" id="search-input" placeholder="Cari atau mulai chat baru" onkeyup="searchUsers()">
            </div>
            <div id="chat-list" class="chat-list">
                </div>
        </div>

        <div id="chat-window" class="chat-window">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="fas fa-arrow-left" id="back-btn" style="display: none;" onclick="closeChatMobile()"></i>
                    <img id="chat-avatar" src="https://via.placeholder.com/40" class="user-avatar">
                    <div>
                        <div id="chat-name" style="font-weight: 600;">Pilih Teman</div>
                        <div id="chat-status" style="font-size: 0.75rem; color: var(--text-dim);">online</div>
                    </div>
                </div>
                <div style="display: flex; gap: 20px; color: var(--text-dim);">
                    <i class="fas fa-video"></i>
                    <i class="fas fa-phone"></i>
                    <i class="fas fa-search"></i>
                </div>
            </div>

            <div id="messages" class="messages-container" style="display: flex; flex-direction: column;">
                </div>

            <div class="input-area">
                <i class="far fa-smile" style="font-size: 1.5rem; color: var(--text-dim);"></i>
                <i class="fas fa-paperclip" style="font-size: 1.2rem; color: var(--text-dim);"></i>
                <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeypress="checkEnter(event)">
                <button id="send-btn" onclick="sendMessage()" style="width: auto; background: transparent;"><i class="fas fa-paper-plane" style="color: var(--primary); font-size: 1.5rem;"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-storage.js";

        // Konfigurasi dari Anda
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // State Global
        let currentUser = JSON.parse(localStorage.getItem('zchat_user')) || null;
        let activeChatId = null;
        let activeRecipientId = null;

        // --- AUTH LOGIC ---
        window.handleRegister = async () => {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;
            const bio = document.getElementById('reg-bio').value || "Hey there! I am using ZChat.";
            const file = document.getElementById('reg-photo').files[0];

            if(!user || !pass) return alert("Username & Password wajib!");

            // Cek Username Unik
            const userRef = ref(db, 'users/' + user);
            const snapshot = await get(userRef);
            if(snapshot.exists()) return alert("Username sudah digunakan!");

            let photoUrl = "https://via.placeholder.com/150";
            if(file) {
                const storageRef = sRef(storage, 'profiles/' + user);
                await uploadBytes(storageRef, file);
                photoUrl = await getDownloadURL(storageRef);
            }

            const userData = { username: user, password: pass, photo: photoUrl, bio: bio, lastSeen: Date.now(), status: "online" };
            await set(userRef, userData);
            alert("Berhasil Daftar! Silakan Login.");
            showLogin();
        };

        window.handleLogin = async () => {
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value;

            const userRef = ref(db, 'users/' + user);
            const snapshot = await get(userRef);
            
            if(snapshot.exists() && snapshot.val().password === pass) {
                currentUser = snapshot.val();
                localStorage.setItem('zchat_user', JSON.stringify(currentUser));
                startApp();
            } else {
                alert("Username atau Password salah!");
            }
        };

        // --- CORE APP LOGIC ---
        function startApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            document.getElementById('my-avatar').src = currentUser.photo;
            loadChatList();
            updateStatus("online");
        }

        function loadChatList() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const user = child.val();
                    if(user.username !== currentUser.username) {
                        const item = document.createElement('div');
                        item.className = 'chat-item';
                        item.innerHTML = `
                            <img src="${user.photo}" class="user-avatar" style="margin-right:15px">
                            <div>
                                <div style="font-weight:600">${user.username}</div>
                                <div style="font-size:0.8rem; color:var(--text-dim)">${user.bio}</div>
                            </div>
                        `;
                        item.onclick = () => openChat(user);
                        list.appendChild(item);
                    }
                });
            });
        }

        window.openChat = (recipient) => {
            activeRecipientId = recipient.username;
            activeChatId = [currentUser.username, recipient.username].sort().join("_");
            
            document.getElementById('chat-name').innerText = recipient.username;
            document.getElementById('chat-avatar').src = recipient.photo;
            
            if(window.innerWidth <= 768) {
                document.getElementById('chat-window').classList.add('active');
                document.getElementById('back-btn').style.display = 'block';
            }

            listenMessages();
        };

        function listenMessages() {
            const msgRef = ref(db, 'messages/' + activeChatId);
            onValue(msgRef, (snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    const m = child.val();
                    const div = document.createElement('div');
                    div.className = `msg ${m.sender === currentUser.username ? 'sent' : 'received'}`;
                    div.innerHTML = `
                        ${m.text}
                        <div class="msg-time">${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ${m.sender === currentUser.username ? '✓✓' : ''}</div>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !activeChatId) return;

            const msgData = {
                sender: currentUser.username,
                text: text,
                time: Date.now(),
                seen: false
            };

            await push(ref(db, 'messages/' + activeChatId), msgData);
            input.value = "";
            
            // Update last message in chats
            update(ref(db, 'chats/' + activeChatId), {
                lastMessage: text,
                time: Date.now(),
                members: [currentUser.username, activeRecipientId]
            });
        };

        // --- UTILS & UI ---
        window.showRegister = () => {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('register-page').style.display = 'flex';
        };
        window.showLogin = () => {
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'flex';
        };
        window.closeChatMobile = () => {
            document.getElementById('chat-window').classList.remove('active');
        };
        window.checkEnter = (e) => { if(e.key === 'Enter') sendMessage(); };

        function updateStatus(status) {
            if(currentUser) {
                update(ref(db, 'users/' + currentUser.username), { 
                    status: status, 
                    lastSeen: Date.now() 
                });
            }
        }

        // Init Splash Screen Delay
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                if(currentUser) startApp();
                else showLogin();
            }, 500);
        }, 2000);

        // Handle Online/Offline
        window.addEventListener('beforeunload', () => updateStatus("offline"));
    </script>
</body>
                        </html>
