<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZChat Professional</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- CORE DISCORD THEME --- */
        :root {
            --bg-darker: #0e0e10;
            --bg-side: #1e1f22;
            --bg-chat: #313338;
            --bg-input: #383a40;
            --accent: #5865f2;
            --cyan-btn: #00b2ff;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --white: #ffffff;
            --danger: #ed4245;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed; /* Kunci biar gak mental pas ngetik */
        }

        /* --- NAVIGATION (Sesuai Screenshot) --- */
        header {
            height: 60px;
            background: var(--bg-darker);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #222;
            position: relative;
            z-index: 1000;
        }

        .btn-top {
            background: #2b2d31;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-menu {
            background: var(--cyan-btn);
            color: black;
        }

        .chat-title {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
            color: var(--white);
        }

        /* --- LAYOUT SYSTEM --- */
        .app-body {
            display: flex;
            height: calc(100vh - 60px);
            width: 100%;
            position: relative;
        }

        /* SIDEBAR TEMAN */
        aside {
            position: absolute;
            left: -100%;
            top: 0;
            width: 280px;
            height: 100%;
            background: var(--bg-side);
            z-index: 999;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }

        aside.active { left: 0; }

        .side-head {
            padding: 20px;
            font-weight: 700;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid #2b2d31;
        }

        .friend-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 2px;
        }

        .friend-item:hover { background: #35373c; }
        .friend-item.active { background: #3f4147; color: white; }

        .avatar-box {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            position: relative;
            background: #444;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
            bottom: -2px;
            right: -2px;
            border: 2px solid var(--bg-side);
            background: #555;
        }

        .online-dot.on { background: #23a55a; }

        /* --- CHAT AREA --- */
        main {
            flex: 1;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* Jarak bawah biar input gak nutup pesan terakhir */
            padding-bottom: 100px; 
        }

        .msg-row {
            display: flex;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .msg-pfp {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .msg-content { flex: 1; }
        .msg-user { 
            font-weight: 700; 
            font-size: 14px; 
            color: white; 
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .msg-time { font-size: 10px; color: var(--text-muted); font-weight: 400; }
        .msg-text { font-size: 15px; line-height: 1.5; color: #dcddde; word-break: break-word; }

        /* --- INPUT BAR (ANTI-KEPOTONG) --- */
        .input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 15px 25px; /* Tambah padding bawah buat HP */
            background: linear-gradient(transparent, var(--bg-chat) 20%);
        }

        .input-wrapper {
            background: var(--bg-input);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 12px 15px;
            gap: 15px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }

        /* --- MENU OVERLAY (RIGHT) --- */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            justify-content: flex-end;
        }

        .menu-panel {
            width: 300px;
            height: 100%;
            background: var(--bg-side);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: slideLeft 0.3s ease;
        }

        @keyframes slideLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .menu-btn {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: none;
            background: #2b2d31;
            color: white;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn:hover { background: var(--accent); }
        .menu-btn.logout { color: var(--danger); }

        /* --- AUTH SCREEN --- */
        .auth-wrap {
            position: fixed;
            inset: 0;
            background: var(--bg-darker);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h1 { font-size: 28px; margin-bottom: 10px; color: white; }
        .auth-card p { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }

        .field {
            text-align: left;
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #222;
            color: white;
            border-radius: 5px;
            outline: none;
        }

        .primary-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- TOAST --- */
        #z-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 12px;
            z-index: 100000;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="z-toast">Notification</div>

    <div class="auth-wrap" id="auth-layer">
        <div class="auth-card">
            <h1>ZChat</h1>
            <p id="auth-sub">Masukkan kredensial Anda</p>
            <div class="field">
                <label>USERNAME</label>
                <input type="text" id="auth-u" autocomplete="off">
            </div>
            <div class="field">
                <label>PASSWORD</label>
                <input type="password" id="auth-p">
            </div>
            <button class="primary-btn" onclick="processAuth('LOGIN')" id="btn-login-txt">MASUK</button>
            <button class="menu-btn" style="background:none; justify-content:center; font-size:12px; color:var(--cyan-btn)" onclick="processAuth('REG')" id="btn-reg-txt">Daftar Akun Baru</button>
        </div>
    </div>

    <header>
        <button class="btn-top" onclick="toggleSide()" id="nav-teman">TEMAN</button>
        <div class="chat-title" id="active-name">ZCHAT</div>
        <button class="btn-top btn-menu" onclick="toggleMenu()" id="nav-menu">MENU</button>
    </header>

    <div class="app-body">
        <aside id="sidebar-ui">
            <div class="side-head" id="txt-friend-list">PESAN LANGSUNG</div>
            <div class="friend-list" id="dom-friends"></div>
            <div style="padding:15px; background:#111214; display:flex; align-items:center; gap:12px">
                <img id="my-pfp" src="" style="width:35px; height:35px; border-radius:50%">
                <div>
                    <div id="my-user-display" style="font-weight:700; font-size:13px">User</div>
                    <div style="font-size:10px; color:var(--text-muted)">Online</div>
                </div>
            </div>
        </aside>

        <main onclick="closePanels()">
            <div id="chat-scroller">
                <div style="margin: auto; text-align:center; opacity:0.2">
                    <h2 id="txt-welcome-head">Selamat Datang</h2>
                    <p id="txt-welcome-sub">Pilih teman untuk memulai</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="msg-input" placeholder="Tulis pesan..." onkeypress="if(event.key=='Enter') sendMessage()">
                    <button onclick="sendMessage()" style="background:none; border:none; color:var(--cyan-btn); font-weight:800; cursor:pointer" id="btn-send-txt">KIRIM</button>
                </div>
            </div>
        </main>
    </div>

    <div class="menu-overlay" id="menu-ui" onclick="toggleMenu()">
        <div class="menu-panel" onclick="event.stopPropagation()">
            <h2 style="color:white; margin-bottom:10px" id="txt-sett">Pengaturan</h2>
            
            <div style="margin-bottom:20px">
                <label style="font-size:11px; font-weight:800; color:var(--text-muted)" id="txt-lang-label">BAHASA / LANGUAGE</label>
                <select id="lang-select" onchange="updateLang(this.value)" style="width:100%; margin-top:8px; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:5px">
                    <option value="id">Bahasa Indonesia</option>
                    <option value="en">English (US)</option>
                </select>
            </div>

            <button class="menu-btn" onclick="uiAddFriend()">
                <span>➕</span> <span id="txt-add-f">Tambah Teman</span>
            </button>
            <button class="menu-btn" onclick="uiRequests()">
                <span>📩</span> <span id="txt-req-f">Permintaan</span>
            </button>
            <div style="flex:1"></div>
            <button class="menu-btn logout" onclick="doLogout()">
                <span>🚪</span> <span id="txt-logout">Keluar Akun</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);

        let myID = localStorage.getItem('z_uid');
        let targetID = null;
        let currentLang = localStorage.getItem('z_lang') || 'id';

        const dictionary = {
            id: {
                teman: "TEMAN", menu: "MENU", direct: "PESAN LANGSUNG", 
                welcomeH: "Selamat Datang", welcomeS: "Pilih teman untuk memulai",
                place: "Tulis pesan...", send: "KIRIM", login: "MASUK", 
                reg: "Daftar Akun Baru", sett: "Pengaturan", lang: "BAHASA",
                add: "Tambah Teman", req: "Permintaan", out: "Keluar Akun", sub: "Masukkan kredensial Anda"
            },
            en: {
                teman: "FRIENDS", menu: "MENU", direct: "DIRECT MESSAGES", 
                welcomeH: "Welcome Back", welcomeS: "Select a friend to start",
                place: "Type a message...", send: "SEND", login: "LOGIN", 
                reg: "Register New Account", sett: "Settings", lang: "LANGUAGE",
                add: "Add Friend", req: "Requests", out: "Sign Out", sub: "Enter your credentials"
            }
        };

        // --- UI HELPERS ---
        window.showToast = (m) => {
            const t = document.getElementById('z-toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        };

        window.toggleSide = () => document.getElementById('sidebar-ui').classList.toggle('active');
        window.toggleMenu = () => {
            const m = document.getElementById('menu-ui');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        };
        window.closePanels = () => {
            document.getElementById('sidebar-ui').classList.remove('active');
            document.getElementById('menu-ui').style.display = 'none';
        };

        window.updateLang = (l) => {
            currentLang = l; localStorage.setItem('z_lang', l);
            const d = dictionary[l];
            document.getElementById('nav-teman').innerText = d.teman;
            document.getElementById('nav-menu').innerText = d.menu;
            document.getElementById('txt-friend-list').innerText = d.direct;
            document.getElementById('txt-welcome-head').innerText = d.welcomeH;
            document.getElementById('txt-welcome-sub').innerText = d.welcomeS;
            document.getElementById('msg-input').placeholder = d.place;
            document.getElementById('btn-send-txt').innerText = d.send;
            document.getElementById('btn-login-txt').innerText = d.login;
            document.getElementById('btn-reg-txt').innerText = d.reg;
            document.getElementById('txt-sett').innerText = d.sett;
            document.getElementById('txt-lang-label').innerText = d.lang;
            document.getElementById('txt-add-f').innerText = d.add;
            document.getElementById('txt-req-f').innerText = d.req;
            document.getElementById('txt-logout').innerText = d.out;
            document.getElementById('auth-sub').innerText = d.sub;
        };

        // --- AUTH LOGIC ---
        window.processAuth = async (type) => {
            const u = document.getElementById('auth-u').value.trim().toUpperCase();
            const p = document.getElementById('auth-p').value.trim();
            if(u.length < 3) return showToast("Min 3 characters!");

            if(type === 'REG') {
                const s = await get(ref(db, `users/${u}`));
                if(s.exists()) return showToast("User exists!");
                await set(ref(db, `users/${u}`), { p, pfp: `https://api.dicebear.com/7.x/pixel-art/svg?seed=${u}_${Date.now()}` });
                initApp(u);
            } else {
                const s = await get(ref(db, `users/${u}`));
                if(s.exists() && s.val().p === p) initApp(u); else showToast("Wrong Login!");
            }
        };

        async function initApp(id) {
            myID = id; localStorage.setItem('z_uid', id);
            document.getElementById('auth-layer').style.display = 'none';
            document.getElementById('my-user-display').innerText = id;
            
            const s = await get(ref(db, `users/${id}`));
            document.getElementById('my-pfp').src = s.val().pfp;
            
            update(ref(db, `status/${id}`), { online: true, pfp: s.val().pfp });
            onDisconnect(ref(db, `status/${id}`)).update({ online: false });
            
            syncFriends();
            updateLang(currentLang);
            document.getElementById('lang-select').value = currentLang;
        }

        // --- CORE CHAT & FRIENDS ---
        function syncFriends() {
            onValue(ref(db, `users/${myID}/friends`), (snap) => {
                const dom = document.getElementById('dom-friends'); dom.innerHTML = '';
                snap.forEach(f => {
                    onValue(ref(db, `status/${f.key}`), (st) => {
                        const d = st.val();
                        let old = document.getElementById(`f-card-${f.key}`); if(old) old.remove();
                        const card = document.createElement('div');
                        card.id = `f-card-${f.key}`; card.className = `friend-item ${targetID===f.key?'active':''}`;
                        card.innerHTML = `<div class="avatar-box"><img src="${d.pfp}" style="width:100%; border-radius:50%"><div class="online-dot ${d.online?'on':''}"></div></div>
                                         <div style="font-weight:600; font-size:14px">${f.key}</div>`;
                        card.onclick = () => loadConversation(f.key);
                        dom.appendChild(card);
                    });
                });
            });
        }

        window.loadConversation = (id) => {
            targetID = id; document.getElementById('active-name').innerText = id;
            closePanels();
            const room = [myID, id].sort().join('_');
            onValue(ref(db, `chats/${room}`), (snap) => {
                const box = document.getElementById('chat-scroller'); box.innerHTML = '';
                snap.forEach(m => {
                    const d = m.val();
                    const row = document.createElement('di
