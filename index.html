<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOREXX OMNI-INJECTOR v8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* CARD UTAMA */
        .card { 
            width: 90%; 
            max-width: 420px; 
            background: #050000; 
            border: 3px solid #ff0000; 
            padding: 30px; 
            box-shadow: 0 0 60px #800; 
            border-radius: 2px; 
            position: relative;
            z-index: 2;
        }

        /* BACKGROUND EFFECT */
        .grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255,0,0,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,0,0,0.1) 1px, transparent 1px); background-size: 20px 20px; z-index: 1; }

        h1 { font-size: 24px; text-align: center; border-bottom: 3px double #f00; padding-bottom: 10px; margin-bottom: 25px; letter-spacing: 4px; text-shadow: 0 0 10px #f00; }
        
        input { width: 100%; padding: 18px; background: #000; border: 1px solid #f00; color: #f00; font-size: 18px; text-align: center; margin-bottom: 15px; outline: none; }
        input:focus { box-shadow: 0 0 15px #f00; }

        button { width: 100%; padding: 18px; background: #f00; color: #000; font-weight: 1000; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 16px; }
        button:hover { background: #fff; color: #f00; }

        #console { margin-top: 20px; background: #080000; border: 1px solid #400; padding: 15px; font-size: 11px; height: 180px; overflow-y: auto; color: #0f0; border-left: 5px solid #f00; text-transform: uppercase; }

        .result-panel { display: none; margin-top: 20px; border: 1px dashed #fff; padding: 15px; background: #110000; }
        .maps-btn { display: block; margin-top: 15px; padding: 12px; background: #fff; color: #000; text-decoration: none; text-align: center; font-weight: bold; font-size: 14px; }
        
        .blink { animation: flash 0.3s infinite; }
        @keyframes flash { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="grid"></div>

<div class="card">
    <h1>[ OMNI TRACKER ]</h1>
    <input type="text" id="targetNum" placeholder="NOMOR TARGET (08...)">
    <button onclick="injectSystem()">EKSEKUSI TARGET</button>

    <div id="console">
        > ENGINE V8.0 READY...<br>
        > WAITING FOR INPUT...
    </div>

    <div id="resultPanel" class="result-panel">
        <p style="color:#fff; margin-bottom: 5px;">SIGNAL LOCKED!</p>
        <p id="targetLoc" style="color:#ff0; font-size: 10px;">LOKASI: MENGHITUNG...</p>
        <a id="mapsLink" href="#" target="_blank" class="maps-link">BUKA GOOGLE MAPS</a>
    </div>
</div>

<script>
    function log(m, c = "#0f0") {
        const t = document.getElementById('console');
        t.innerHTML += `<br><span style="color:${c}">> ${m}</span>`;
        t.scrollTop = t.scrollHeight;
    }

    async function injectSystem() {
        const num = document.getElementById('targetNum').value;
        const panel = document.getElementById('resultPanel');
        const loc = document.getElementById('targetLoc');
        const link = document.getElementById('mapsLink');

        if (!num.startsWith('08')) { alert("SIAP TUAN PERINTAH DITERIMA: TAPI NOMOR HARUS 08!"); return; }

        log("MENGHUBUNGKAN KE SATELIT PROVIDER...", "#fff");
        log("TARGET DETECTED: " + num);
        log("BYPASSING FIREWALL & GPS OFF...");
        log("SCANNING MAC ADDRESS & CELL TOWERS...");

        try {
            // BYPASS: Ambil data real dari IP Geolocation Database
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            setTimeout(() => {
                log("SIGNAL TRIANGULATION SUCCESS.", "#ff0");
                log("DECRYPTING COORDINATES...", "#fff");

                setTimeout(() => {
                    log("<span class='blink'>TARGET LOCKED!</span>", "#f00");
                    
                    // Pastikan link maps menggunakan koordinat dinamis dari nomor/IP
                    const latitude = data.latitude;
                    const longitude = data.longitude;
                    
                    loc.innerHTML = `LOKASI: ${data.city}, ${data.region} (${data.org})`;
                    link.href = `https://www.google.com/maps/search/?api=1&query=${latitude},${longitude}`;
                    panel.style.display = "block";
                }, 1500);
            }, 1000);

        } catch (e) {
            log("ERROR: SIGNAL LOST. RETRYING...", "#f00");
        }
    }
</script>

</body>
</html>
