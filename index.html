<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat - Real-time Messenger</title>
    <style>
        /* CSS RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hidden { display: none !important; }

        /* AUTH REGESTER & LOGIN STYLE */
        .auth-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .auth-container h2 {
            text-align: center;
            color: #075e54;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #555;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        .form-group textarea { height: 60px; resize: none; }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #128c7e;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #075e54; }

        .auth-toggle {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .auth-toggle span {
            color: #128c7e;
            cursor: pointer;
            text-decoration: underline;
        }

        /* MAIN CHAT APP STYLE */
        #app-interface {
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-columns: 350px 1fr;
            background: #fff;
        }

        /* SIDEBAR */
        .sidebar {
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }

        .user-profile-bar {
            padding: 15px;
            background: #ededed;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info { display: flex; align-items: center; gap: 10px; }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #ccc;
        }

        .logout-btn {
            background: #ff4757;
            padding: 5px 10px;
            font-size: 0.75rem;
            width: auto;
        }

        .user-search { padding: 10px; }
        .user-search input {
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #ddd;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .user-item:hover { background: #ebebeb; }
        .user-item.active { background: #e9edef; }

        .user-item-info { margin-left: 12px; }
        .user-item-name { font-weight: 600; font-size: 0.95rem; }
        .user-item-bio { font-size: 0.8rem; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* CHAT AREA */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: #e5ddd5; /* Classic WhatsApp Background */
            position: relative;
        }

        .chat-header {
            padding: 10px 20px;
            background: #ededed;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        #messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 60%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            position: relative;
            word-wrap: break-word;
        }

        .msg-sent {
            align-self: flex-end;
            background: #dcf8c6;
        }

        .msg-received {
            align-self: flex-start;
            background: #fff;
        }

        .msg-time {
            font-size: 0.65rem;
            color: #999;
            display: block;
            text-align: right;
            margin-top: 4px;
        }

        .chat-input-area {
            padding: 10px 20px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            outline: none;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        /* WELCOME SCREEN */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #777;
        }
    </style>
</head>
<body>

    <div id="auth-interface" class="auth-container">
        <div id="login-form">
            <h2>Login ZChat</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Masukkan username...">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Masukkan password...">
            </div>
            <button onclick="handleLogin()">Masuk</button>
            <p class="auth-toggle">Belum punya akun? <span onclick="toggleAuth(false)">Daftar</span></p>
        </div>

        <div id="register-form" class="hidden">
            <h2>Daftar ZChat</h2>
            <div class="form-group">
                <label>Username (Unik)</label>
                <input type="text" id="reg-username" placeholder="Contoh: budi_z">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Minimal 6 karakter">
            </div>
            <div class="form-group">
                <label>Foto Profil (URL Gambar)</label>
                <input type="text" id="reg-photo" placeholder="https://link-foto.com/foto.jpg">
            </div>
            <div class="form-group">
                <label>Bio Singkat</label>
                <textarea id="reg-bio" placeholder="Halo, saya menggunakan ZChat!"></textarea>
            </div>
            <button onclick="handleRegister()">Daftar Sekarang</button>
            <p class="auth-toggle">Sudah punya akun? <span onclick="toggleAuth(true)">Login</span></p>
        </div>
    </div>

    <div id="app-interface" class="hidden">
        <aside class="sidebar">
            <div class="user-profile-bar">
                <div class="user-info">
                    <img id="my-avatar" src="" alt="" class="avatar">
                    <strong id="my-username">Username</strong>
                </div>
                <button class="logout-btn" onclick="handleLogout()">Keluar</button>
            </div>
            <div class="user-search">
                <input type="text" placeholder="Cari teman..." onkeyup="searchUser(this.value)">
            </div>
            <div id="users-list" class="users-list">
                </div>
        </aside>

        <main class="chat-area">
            <div id="chat-welcome" class="welcome-screen">
                <h3>Selamat Datang di ZChat</h3>
                <p>Pilih teman di sebelah kiri untuk mulai mengobrol.</p>
            </div>

            <div id="chat-active" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
                <header class="chat-header">
                    <img id="chat-target-avatar" src="" alt="" class="avatar">
                    <div style="margin-left: 15px;">
                        <h4 id="chat-target-name">Nama Teman</h4>
                        <small id="chat-target-bio" style="color: #777;">Bio teman...</small>
                    </div>
                </header>

                <div id="messages-container">
                    </div>

                <div class="chat-input-area">
                    <input type="text" id="message-input" placeholder="Ketik pesan..." onkeypress="handleChatKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue, push, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi Firebase sesuai permintaan
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global State
        let currentUser = JSON.parse(localStorage.getItem('zchat_user')) || null;
        let activeChatRecipient = null;
                let isDarkMode = localStorage.getItem('zchat_dark') === 'true';
        let typingTimeout = null;
        let replyMsgId = null;

        // --- UI & THEME MANAGEMENT ---
        const applyTheme = () => {
            document.body.classList.toggle('dark-theme', isDarkMode);
            localStorage.setItem('zchat_dark', isDarkMode);
        };

        window.toggleDarkMode = () => {
            isDarkMode = !isDarkMode;
            applyTheme();
        };

        // Inject Dynamic Modern CSS
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            :root {
                --bg-chat: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
                --msg-sent: #dcf8c6; --msg-rec: #ffffff; --text: #333;
                --sidebar-bg: #ffffff; --header-bg: #ededed;
            }
            .dark-theme {
                --bg-chat: linear-gradient(-45deg, #1a1a1a, #2c3e50, #0f2027);
                --msg-sent: #056162; --msg-rec: #262d31; --text: #f1f1f1;
                --sidebar-bg: #111b21; --header-bg: #202c33;
                background-color: #111b21; color: #e9edef;
            }
            #app-interface { background: var(--sidebar-bg); }
            .sidebar { background: var(--sidebar-bg); border-color: rgba(255,255,255,0.1); }
            .chat-header { background: var(--header-bg); }
            .chat-area {
                background: var(--bg-chat); background-size: 400% 400%;
                animation: gradientBG 15s ease infinite; position: relative;
            }
            @keyframes gradientBG {
                0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
            }
            .message { 
                border-radius: 18px; position: relative; color: var(--text); 
                box-shadow: 0 1px 2px rgba(0,0,0,0.1); transition: all 0.2s;
            }
            .msg-sent { align-self: flex-end; background: var(--msg-sent); border-bottom-right-radius: 2px; }
            .msg-received { align-self: flex-start; background: var(--msg-rec); border-bottom-left-radius: 2px; }
            .reply-preview { font-size: 0.75rem; background: rgba(0,0,0,0.05); padding: 5px; border-left: 3px solid #128c7e; margin-bottom: 5px; border-radius: 4px; }
            .online-dot { width: 10px; height: 10px; background: #25d366; border-radius: 50%; display: inline-block; border: 2px solid white; }
            .typing-text { font-style: italic; font-size: 0.8rem; color: #25d366; }
            .msg-actions { opacity: 0; position: absolute; top: 0; right: 0; transition: 0.2s; }
            .message:hover .msg-actions { opacity: 1; }
            .btn-action { cursor: pointer; font-size: 0.7rem; padding: 2px 5px; background: rgba(0,0,0,0.1); border-radius: 4px; }
            
            /* Responsive */
            @media (max-width: 768px) {
                #app-interface { grid-template-columns: 1fr; }
                .sidebar { display: var(--side-view, block); }
                .chat-area { display: var(--chat-view, none); position: fixed; inset: 0; z-index: 100; }
            }
        `;
        document.head.appendChild(styleSheet);

        // --- AUTHENTICATION & SESSION ---
        window.handleRegister = async () => {
            const user = document.getElementById('reg-username').value.trim().toLowerCase();
            const pass = document.getElementById('reg-password').value;
            const photo = document.getElementById('reg-photo').value || `https://ui-avatars.com/api/?name=${user}`;
            const bio = document.getElementById('reg-bio').value || "Available";

            if (!user || pass.length < 6) return alert("Username & Password (min 6) wajib!");

            const userRef = ref(db, 'users/' + user);
            const snap = await get(userRef);
            if (snap.exists()) return alert("Username sudah diambil!");

            await set(userRef, { username: user, password: pass, photo, bio, online: true, lastSeen: Date.now() });
            alert("Berhasil! Silakan Login.");
            window.toggleAuth(true);
        };

        window.handleLogin = async () => {
            const user = document.getElementById('login-username').value.trim().toLowerCase();
            const pass = document.getElementById('login-password').value;

            const userRef = ref(db, 'users/' + user);
            const snap = await get(userRef);
            if (snap.exists() && snap.val().password === pass) {
                currentUser = snap.val();
                localStorage.setItem('zchat_user', JSON.stringify(currentUser));
                initApp();
            } else alert("Data salah!");
        };

        // --- SYSTEM PERTEMANAN ---
        window.sendFriendRequest = async (target) => {
            await set(ref(db, `requests/${target}/${currentUser.username}`), {
                from: currentUser.username, photo: currentUser.photo, status: 'pending'
            });
            alert("Permintaan dikirim!");
        };

        window.acceptFriend = async (target) => {
            await set(ref(db, `friends/${currentUser.username}/${target}`), true);
            await set(ref(db, `friends/${target}/${currentUser.username}`), true);
            await set(ref(db, `requests/${currentUser.username}/${target}`), null);
        };

        // --- CHAT LOGIC ---
        window.sendMessage = async () => {
            const text = document.getElementById('message-input').value;
            const imgFile = document.getElementById('img-input')?.files[0];
            if (!text && !imgFile) return;

            const chatId = [currentUser.username, activeChatRecipient.username].sort().join('_');
            const msgRef = push(ref(db, `chats/${chatId}`));

            let payload = {
                sender: currentUser.username,
                text: text,
                timestamp: serverTimestamp(),
                read: false
            };

            if (replyMsgId) {
                payload.replyTo = replyMsgId;
                replyMsgId = null; // Reset reply
            }

            // Simple Image Handling (Base64 for Vanilla)
            if (imgFile) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    payload.image = e.target.result;
                    await set(msgRef, payload);
                };
                reader.readAsDataURL(imgFile);
            } else {
                await set(msgRef, payload);
            }

            document.getElementById('message-input').value = "";
            stopTyping();
        };

        // Typing & Online Status
        const startTyping = () => {
            const chatId = [currentUser.username, activeChatRecipient.username].sort().join('_');
            set(ref(db, `typing/${chatId}/${currentUser.username}`), true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(stopTyping, 3000);
        };
        const stopTyping = () => {
            const chatId = [currentUser.username, activeChatRecipient.username].sort().join('_');
            set(ref(db, `typing/${chatId}/${currentUser.username}`), false);
        };

        // Integrasi tombol Emoji sederhana
        window.addEmoji = (emoji) => {
            document.getElementById('message-input').value += emoji;
        };
                // --- GROUP CHAT LOGIC ---
        window.createGroup = async (groupName, members) => {
            const groupId = 'group_' + Date.now();
            const groupRef = ref(db, `groups/${groupId}`);
            const payload = {
                id: groupId,
                name: groupName,
                admin: currentUser.username,
                members: [currentUser.username, ...members],
                createdAt: serverTimestamp(),
                photo: `https://ui-avatars.com/api/?name=${groupName}&background=random`
            };
            await set(groupRef, payload);
            alert("Grup Berhasil Dibuat!");
        };

        window.leaveGroup = async (groupId) => {
            const groupRef = ref(db, `groups/${groupId}/members`);
            const snap = await get(groupRef);
            if (snap.exists()) {
                const newMembers = snap.val().filter(m => m !== currentUser.username);
                await set(groupRef, newMembers);
                location.reload();
            }
        };

        // --- STATUS / STORY SYSTEM (24 Hours) ---
        window.uploadStory = async (content, isImage = false) => {
            const storyId = 'story_' + Date.now();
            const expiresAt = Date.now() + (24 * 60 * 60 * 1000);
            const storyRef = ref(db, `stories/${currentUser.username}/${storyId}`);
            
            await set(storyRef, {
                content: content,
                isImage: isImage,
                timestamp: serverTimestamp(),
                expiresAt: expiresAt,
                owner: currentUser.username
            });
            alert("Status berhasil diunggah!");
        };

        // membersihkan story yang expired secara lokal saat load
        const filterStories = (stories) => {
            const now = Date.now();
            return Object.values(stories).filter(s => s.expiresAt > now);
        };

        // --- CHAT MANAGEMENT (Block, Mute, Pin) ---
        window.toggleBlock = async (targetUser) => {
            const blockRef = ref(db, `settings/${currentUser.username}/blocked/${targetUser}`);
            const snap = await get(blockRef);
            await set(blockRef, snap.exists() ? null : true);
            alert(snap.exists() ? "User di-unblock" : "User diblokir");
        };

        window.togglePinChat = (chatId) => {
            let pinned = JSON.parse(localStorage.getItem('zchat_pinned') || "[]");
            if (pinned.includes(chatId)) pinned = pinned.filter(id => id !== chatId);
            else pinned.push(chatId);
            localStorage.setItem('zchat_pinned', JSON.stringify(pinned));
            renderUserList();
        };

        // --- NOTIFICATIONS & AUDIO ---
        const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
        
        const playNotification = () => {
            if (!document.hasFocus()) {
                notifySound.play().catch(e => console.log("Autoplay blocked"));
                if (Notification.permission === "granted") {
                    new Notification("ZChat: Pesan Baru!");
                }
            }
        };

        // --- CORE RENDERING ENGINE (The "Heart" of ZChat) ---
        const renderMessages = (chatId) => {
            const chatRef = ref(db, `chats/${chatId}`);
            onValue(chatRef, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                const data = snapshot.val();
                
                if (data) {
                    Object.keys(data).forEach(msgId => {
                        const msg = data[msgId];
                        const isMe = msg.sender === currentUser.username;
                        
                        // Mark as Read
                        if (!isMe && !msg.read) {
                            set(ref(db, `chats/${chatId}/${msgId}/read`), true);
                        }

                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${isMe ? 'msg-sent' : 'msg-received'}`;
                        
                        let msgHTML = "";
                        if (msg.replyTo) {
                            msgHTML += `<div class="reply-preview">Membalas: ${msg.replyTo.text}</div>`;
                        }
                        if (msg.image) {
                            msgHTML += `<img src="${msg.image}" style="max-width:200px; border-radius:8px; display:block; margin-bottom:5px;">`;
                        }
                        msgHTML += `<span>${msg.text}</span>`;
                        msgHTML += `<span class="msg-time">${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ${isMe && msg.read ? '✓✓' : '✓'}</span>`;
                        
                        // Actions (Delete/Edit/Reaction)
                        msgHTML += `
                            <div class="msg-actions">
                                <span class="btn-action" onclick="deleteMsg('${chatId}', '${msgId}')">🗑️</span>
                                <span class="btn-action" onclick="addReaction('${chatId}', '${msgId}', '❤️')">❤️</span>
                                <span class="btn-action" onclick="prepareReply('${msg.text}')">💬</span>
                            </div>
                        `;
                        
                        msgDiv.innerHTML = msgHTML;
                        container.appendChild(msgDiv);
                    });
                    container.scrollTop = container.scrollHeight;
                }
            });
        };

        window.deleteMsg = (chatId, msgId) => {
            if(confirm("Hapus pesan ini?")) set(ref(db, `chats/${chatId}/${msgId}`), null);
        };

        window.prepareReply = (text) => {
            replyMsgId = { text: text };
            document.getElementById('message-input').placeholder = "Membalas: " + text;
        };

        // --- SEARCH & FRIENDS LIST ---
        window.loadUsers = () => {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const users = snapshot.val();
                const listContainer = document.getElementById('users-list');
                listContainer.innerHTML = "";
                
                Object.values(users).forEach(user => {
                    if (user.username === currentUser.username) return;
                    
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    item.onclick = () => startChat(user);
                    item.innerHTML = `
                        <img src="${user.photo}" class="avatar">
                        <div class="user-item-info">
                            <div class="user-item-name">${user.username} ${user.online ? '<span class="online-dot"></span>' : ''}</div>
                            <div class="user-item-bio">${user.bio}</div>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });
            });
        };

        const startChat = (target) => {
            activeChatRecipient = target;
            document.getElementById('chat-welcome').classList.add('hidden');
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('chat-target-name').innerText = target.username;
            document.getElementById('chat-target-avatar').src = target.photo;
            document.getElementById('chat-target-bio').innerText = target.online ? 'Online' : 'Last seen: ' + new Date(target.lastSeen).toLocaleTimeString();
            
            // Mobile toggle
            document.documentElement.style.setProperty('--side-view', 'none');
            document.documentElement.style.setProperty('--chat-view', 'flex');
            
            const chatId = [currentUser.username, target.username].sort().join('_');
            renderMessages(chatId);
        };

        window.backToSidebar = () => {
            document.documentElement.style.setProperty('--side-view', 'block');
            document.documentElement.style.setProperty('--chat-view', 'none');
        };

        // Initialized request listener
        if (currentUser) {
            Notification.requestPermission();
            // Listener untuk pesan baru (untuk bunyi notifikasi)
            // ... (logika pertemanan lanjut)
        }
    </script>
</body>
</html>
