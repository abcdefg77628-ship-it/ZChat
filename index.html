<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat | Zero-Auth Grid v16</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000; --surf: #0a0a0a; --item: #111; --accent: #0070f3;
            --border: rgba(255,255,255,0.06); --text: #fff; --dim: #555;
            --danger: #ff3b30; --gold: #ffcf40; --success: #34c759;
        }

        /* Skala Slim - Biar gak kegedean */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .hidden { display: none !important; }

        /* Loader Ring */
        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .spin { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: s 0.6s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        /* UI Components */
        header { height: 55px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .brand { font-weight: 900; font-size: 18px; letter-spacing: -1px; color: var(--accent); }

        .os-in { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; outline: none; margin-bottom: 10px; font-family: 'JetBrains Mono'; font-size: 12px; }
        .btn { width: 100%; padding: 12px; background: var(--item); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 11px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-blue { background: var(--accent); border: none; }
        .btn:active { transform: scale(0.97); }

        /* Cards & List */
        .card { background: var(--item); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .card:hover { border-color: var(--accent); }
        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        /* Chat System */
        #scr-chat { position: fixed; inset: 0; background: var(--bg); z-index: 8000; display: flex; flex-direction: column; animation: slide 0.3s ease; }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
        #chat-flow { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: radial-gradient(#111 0.5px, transparent 0.5px); background-size: 15px 15px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 13px; line-height: 1.4; }
        .m-me { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 2px; }
        .m-them { align-self: flex-start; background: var(--item); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* Admin Module */
        #scr-adm { position: fixed; inset: 0; background: #000; z-index: 9000; padding: 25px; overflow-y: auto; display: none; }
        .adm-card { background: #080808; padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 12px; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        .b-ban { background: var(--danger); color: #fff; }
        .b-ok { background: var(--success); color: #000; }

        /* Broadcast Overlay */
        #bc-box { position: fixed; top: -100px; left: 15px; right: 15px; background: var(--gold); color: #000; padding: 15px; border-radius: 10px; z-index: 11000; font-weight: 900; font-size: 11px; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        #bc-box.show { top: 15px; }

        /* Terminal Footer */
        #term { height: 80px; background: #030303; border-top: 1px solid var(--border); padding: 10px 15px; font-family: 'JetBrains Mono'; font-size: 9px; color: #444; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spin"></div>
        <p style="font-size:9px; color:var(--dim); margin-top:15px; letter-spacing:3px;">GRID_AUTO_LINK...</p>
    </div>

    <div id="bc-box" onclick="this.classList.remove('show')">
        <small style="opacity:0.6; font-size:8px;">PRIORITY_SIGNAL</small><br>
        <span id="bc-text">...</span>
    </div>

    <div id="scr-start" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:30px;">
        <div style="width:100%; max-width:250px;">
            <h1 class="brand" style="font-size:50px; text-align:center; margin-bottom:30px;">Z.</h1>
            <input id="nick-in" class="os-in" placeholder="Set_Identity_Name" spellcheck="false">
            <button class="btn btn-blue" onclick="joinGrid()">ENTER_GRID</button>
            <p style="text-align:center; font-size:9px; color:var(--dim); margin-top:20px; letter-spacing:1px;">NO_AUTH_REQUIRED / SECURE_LINK</p>
        </div>
    </div>

    <div id="scr-app" class="hidden" style="height:100vh; display:flex; flex-direction:column;">
        <header>
            <div class="brand">ZChat.net</div>
            <div id="adm-trigger" class="hidden" onclick="openAdm()" style="cursor:pointer; color:var(--gold); font-size:9px; font-weight:900; border:1px solid var(--gold); padding:4px 8px; border-radius:6px;">ADMIN</div>
        </header>
        
        <main style="flex:1; padding:20px; overflow-y:auto;">
            <p style="font-size:9px; color:var(--dim); letter-spacing:2px; margin-bottom:15px;">NODES_IN_GRID</p>
            <div id="node-list"></div>
        </main>

        <div id="term">
            [SYS] Quantum Grid Active...<br>
            [SYS] Waiting for identity handshake...
        </div>
        <button class="btn" onclick="exitGrid()" style="border-radius:0; border:none; border-top:1px solid var(--border); height:45px; color:var(--danger);">DISCONNECT</button>
    </div>

    <div id="scr-chat" class="hidden">
        <header>
            <span onclick="back()" style="cursor:pointer; font-size:11px; font-weight:900; color:var(--accent);">← BACK</span>
            <b id="peer-id" style="font-size:12px; letter-spacing:1px;">ID</b>
            <div style="width:40px;"></div>
        </header>
        <div id="chat-flow"></div>
        <div style="padding:10px 15px 30px; background:var(--surf); display:flex; gap:8px;">
            <input id="msg-in" class="os-in" style="margin:0; border-radius:20px;" placeholder="Message packet...">
            <button class="btn btn-blue" style="width:70px; margin:0; border-radius:20px;" onclick="send()">SEND</button>
        </div>
    </div>

    <div id="scr-adm">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <b style="color:var(--gold); font-size:13px; letter-spacing:2px;">MASTER_CONSOLE</b>
            <div style="display:flex; gap:8px;">
                <button class="btn" style="width:auto; padding:5px 12px;" onclick="bc()">BC</button>
                <button class="btn" style="width:auto; padding:5px 12px; background:var(--danger); border:none;" onclick="closeAdm()">X</button>
            </div>
        </div>
        <div id="adm-list"></div>
    </div>

    <script>
        const config = { databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const ROOT = "zZerr44";

        let me = null, target = null;

        function log(m) { const t = document.getElementById('term'); t.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${m}`; t.scrollTop = t.scrollHeight; }

        // ZERO AUTH JOIN
        async function joinGrid() {
            const nick = document.getElementById('nick-in').value.trim().toLowerCase();
            if(!nick) return;
            
            toggleL(true);
            const snap = await db.ref('u/'+nick).once('value');

            // Cek kalau di-ban
            if(snap.exists() && snap.val().status === 'banned') {
                alert("IDENTITY_BANNED_BY_ADMIN");
                toggleL(false); return;
            }

            // Kalau belum ada, buat baru (Auto-Register)
            if(!snap.exists()) {
                await db.ref('u/'+nick).set({ u: nick, status: 'active', uid: Date.now() });
            }

            me = { u: nick };
            localStorage.setItem('z_user', nick);
            boot();
        }

        window.onload = () => {
            const saved = localStorage.getItem('z_user');
            if(saved) { me = { u: saved }; boot(); } else toggleL(false);
        };

        async function boot() {
            // Cek ulang status BAN tiap boot
            const check = await db.ref('u/'+me.u+'/status').once('value');
            if(check.val() === 'banned') { exitGrid(); return; }

            document.getElementById('scr-start').classList.add('hidden');
            document.getElementById('scr-app').classList.remove('hidden');
            if(me.u === ROOT.toLowerCase()) document.getElementById('adm-trigger').classList.remove('hidden');
            
            toggleL(false);
            log("Identity confirmed: " + me.u);

            // Node List
            db.ref('u').on('value', s => {
                const l = document.getElementById('node-list'); l.innerHTML = "";
                s.forEach(c => {
                    if(c.key !== me.u) {
                        l.innerHTML += `<div class="card" onclick="chat('${c.key}')"><b>${c.key.toUpperCase()}</b><div class="status-dot"></div></div>`;
                    }
                });
            });

            // Broadcast
            db.ref('broadcast').on('value', s => {
                if(s.exists()) {
                    document.getElementById('bc-text').innerText = s.val().m;
                    document.getElementById('bc-box').classList.add('show');
                    setTimeout(() => document.getElementById('bc-box').classList.remove('show'), 5000);
                }
            });
        }

        // CHAT
        function chat(id) {
            target = id; document.getElementById('peer-id').innerText = id;
            document.getElementById('scr-chat').classList.remove('hidden');
            const rid = [me.u, id].sort().join('_');
            db.ref('m/'+rid).on('value', s => {
                const f = document.getElementById('chat-flow'); f.innerHTML = "";
                s.forEach(m => { const d = m.val(); f.innerHTML += `<div class="msg ${d.s===me.u?'m-me':'m-them'}">${d.t}</div>`; });
                f.scrollTop = f.scrollHeight;
            });
        }
        function send() {
            const i = document.getElementById('msg-in'); if(!i.value.trim()) return;
            const rid = [me.u, target].sort().join('_');
            db.ref('m/'+rid).push({ s: me.u, t: i.value.trim() });
            i.value = "";
        }
        function back() { document.getElementById('scr-chat').classList.add('hidden'); db.ref('m').off(); }

        // ADMIN
        function openAdm() {
            document.getElementById('scr-adm').style.display = 'block';
            db.ref('u').on('value', s => {
                const l = document.getElementById('adm-list'); l.innerHTML = "";
                s.forEach(uSnap => {
                    const u = uSnap.val(); const isB = u.status === 'banned';
                    l.innerHTML += `
                        <div class="adm-card">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                <b>${u.u.toUpperCase()}</b>
                                <span class="badge ${isB?'b-ban':'b-ok'}">${u.status}</span>
                            </div>
                            <div style="font-size:10px; color:var(--dim); margin-bottom:10px;">UID: ${u.uid || 'N/A'}</div>
                            <div style="display:flex; gap:8px;">
                                <button class="btn" style="height:30px;" onclick="tglB('${u.u}','${isB?'active':'banned'}')">${isB?'UNBAN':'BAN'}</button>
                                <button class="btn" style="height:30px; color:var(--danger);" onclick="purge('${u.u}')">PURGE</button>
                            </div>
                        </div>`;
                });
            });
        }
        async function bc() { const m = prompt("Broadcast:"); if(m) await db.ref('broadcast').set({ m, t: Date.now() }); }
        async function tglB(u, st) { if(u === ROOT) return; await db.ref('u/'+u+'/status').set(st); }
        async function purge(u) { if(u === ROOT) return; if(confirm("DELETE NODE?")) await db.ref('u/'+u).remove(); }
        function closeAdm() { document.getElementById('scr-adm').style.display = 'none'; db.ref('u').off(); }

        // UTILS
        function toggleL(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function exitGrid() { localStorage.clear(); location.reload(); }
    </script>
</body>
                </html>
