<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat Elite - Ultimate High Performance v4.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* =============================================================
           CSS VARIABLES & ROOT CONFIGURATION
           ============================================================= */
        :root {
            --primary-color: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary-color: #ef4444;
            --bg-dark-obsidian: #0b0f1a;
            --bg-sidebar-navy: #0f172a;
            --glass-effect: rgba(255, 255, 255, 0.05);
            --text-ultra-white: #f8fafc;
            --text-muted-gray: #94a3b8;
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* =============================================================
           BASE RESET & SCROLLBAR STYLING
           ============================================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark-obsidian);
            color: var(--text-ultra-white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            user-select: none;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-effect);
            border-radius: 10px;
        }

        .hidden { display: none !important; }

        /* =============================================================
           ANIMATIONS ENGINE
           ============================================================= */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px var(--primary-glow); }
            50% { box-shadow: 0 0 20px var(--primary-glow); }
            100% { box-shadow: 0 0 5px var(--primary-glow); }
        }

        /* =============================================================
           AUTHENTICATION INTERFACE (LOGIN / REGISTER)
           ============================================================= */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1e1e2e 0%, #000000 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        .auth-logo-icon {
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .auth-card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .auth-card p {
            color: var(--text-muted-gray);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: #0b0f1a;
            border: 1px solid #1e293b;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            transition: var(--transition-smooth);
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .btn-auth-action {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 10px;
        }

        .btn-auth-action:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
        }

        .auth-toggle-link {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted-gray);
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-toggle-link b {
            color: var(--primary-color);
            text-decoration: underline;
        }

        /* =============================================================
           MAIN APPLICATION LAYOUT
           ============================================================= */
        #app-wrapper {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 380px 1fr;
            animation: fadeIn 0.5s ease;
        }

        /* SIDEBAR STYLING */
        #sidebar-container {
            background: var(--bg-sidebar-navy);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .sidebar-header {
            padding: 30px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .user-meta img {
            width: 50px;
            height: 50px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .user-meta b {
            font-size: 1rem;
            display: block;
        }

        .user-meta span {
            font-size: 0.75rem;
            color: #10b981;
        }

        .navigation-tabs {
            display: flex;
            padding: 0 20px 20px;
            justify-content: space-around;
        }

        .nav-tab-icon {
            font-size: 1.3rem;
            color: var(--text-muted-gray);
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .nav-tab-icon.active {
            color: var(--primary-color);
            background: rgba(99, 102, 241, 0.1);
        }

        /* LIST ITEMS */
        .list-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .chat-list-item {
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }

        .chat-list-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .chat-list-item.active {
            background: rgba(99, 102, 241, 0.05);
            border-left-color: var(--primary-color);
        }

        .chat-list-item img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
        }

        /* =============================================================
           CHAT CONTENT AREA (WALLPAPER LOGIC)
           ============================================================= */
        #chat-main-interface {
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        .wallpaper-pro {
            background: radial-gradient(circle at center, rgba(160, 0, 0, 0.4) 0%, rgba(0, 0, 0, 1) 100%);
        }

        .wallpaper-default {
            background-color: #0b0f1a;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
        }

        .chat-toolbar {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .messages-display {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble-msg {
            max-width: 60%;
            padding: 15px 20px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .bubble-sent {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bubble-received {
            align-self: flex-start;
            background: rgba(30, 41, 59, 0.9);
            border-bottom-left-radius: 4px;
        }

        /* INPUT AREA */
        .chat-input-dock {
            padding: 25px 35px;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .chat-input-dock input {
            flex: 1;
            padding: 16px 25px;
            background: #1e293b;
            border: none;
            border-radius: 30px;
            color: white;
            outline: none;
        }

        /* =============================================================
           MODAL SYSTEM (SETTINGS & SEARCH)
           ============================================================= */
        .modal-blur-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content-card {
            width: 90%;
            max-width: 450px;
            background: #111827;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--primary-color);
        }

        /* MOBILE RESPONSIVE LOGIC */
        @media (max-width: 850px) {
            #app-wrapper { grid-template-columns: 1fr; }
            #chat-main-interface {
                position: fixed;
                inset: 0;
                transform: translateX(100%);
                z-index: 1000;
                transition: transform 0.4s ease;
            }
            #chat-main-interface.is-visible { transform: translateX(0); }
        }
    </style>
</head>
<body class="wallpaper-pro">

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo-icon"><i class="fas fa-shield-alt"></i></div>
            <h1 id="auth-title">ZCHAT ELITE</h1>
            <p id="auth-subtitle">Sistem Komunikasi Terenkripsi Militer</p>
            
            <div class="input-group">
                <label>Identifier Username</label>
                <input type="text" id="auth-username-field" placeholder="Masukkan username...">
            </div>

            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="auth-password-field" placeholder="********">
            </div>

            <button class="btn-auth-action" onclick="executeAuthentication()">INITIALIZE ACCESS</button>
            
            <div class="auth-toggle-link" onclick="toggleAuthMode()">
                <span id="auth-toggle-msg">Belum memiliki akses?</span> <b id="auth-toggle-btn">Request Akun</b>
            </div>
        </div>
    </div>

    <div id="app-wrapper" class="hidden">
        
        <aside id="sidebar-container">
            <div class="sidebar-header">
                <div class="user-meta" onclick="openProfileSettings()">
                    <img id="my-profile-img" src="" alt="Avatar">
                    <div>
                        <b id="my-display-name">Loading...</b>
                        <span id="my-current-bio">Available</span>
                    </div>
                </div>
                <i class="fas fa-power-off" style="color:var(--secondary-color); cursor:pointer" onclick="openProfileSettings()"></i>
            </div>

            <div class="navigation-tabs">
                <i class="fas fa-comments nav-tab-icon active" onclick="switchSection('chats', this)"></i>
                <i class="fas fa-user-friends nav-tab-icon" onclick="switchSection('friends', this)"></i>
                <i class="fas fa-user-plus nav-tab-icon" onclick="openSearchModal()"></i>
            </div>

            <div id="view-chats" class="list-viewport"></div>
            <div id="view-friends" class="list-viewport hidden"></div>
        </aside>

        <main id="chat-main-interface">
            <div id="no-chat-selected" style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0.3">
                <i class="fas fa-fingerprint" style="font-size:6rem"></i>
                <p style="margin-top:20px; font-weight:700">WAITING FOR CONNECTION...</p>
            </div>

            <div id="chat-active-box" class="hidden" style="height:100%; display:flex; flex-direction:column">
                <header class="chat-toolbar">
                    <div style="display:flex; align-items:center; gap:15px">
                        <i class="fas fa-arrow-left" onclick="backToSidebar()" style="cursor:pointer"></i>
                        <img id="active-target-img" src="" style="width:45px; height:45px; border-radius:50%">
                        <b id="active-target-name">Target</b>
                    </div>
                    <i class="fas fa-ellipsis-v" style="cursor:pointer" onclick="alert('Menu Fitur Segera Hadir')"></i>
                </header>

                <div class="messages-display" id="chat-messages-scroll"></div>

                <div class="chat-input-dock">
                    <input type="text" id="chat-input-field" placeholder="Ketik pesan rahasia..." onkeydown="if(event.key==='Enter') sendNewMessage()">
                    <button onclick="sendNewMessage()" style="background:var(--primary-color); border:none; width:50px; height:50px; border-radius:50%; color:white; cursor:pointer">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-settings" class="modal-blur-overlay hidden">
        <div class="modal-content-card">
            <h2 style="margin-bottom:25px; color:var(--primary-color)">PENGATURAN ELITE</h2>
            
            <div class="input-group">
                <label>Ubah Nama Tampilan</label>
                <input type="text" id="set-new-username">
            </div>

            <div class="input-group">
                <label>Update Password</label>
                <input type="password" id="set-new-password" placeholder="Kosongkan jika tidak diubah">
            </div>

            <div class="input-group">
                <label>Update Bio</label>
                <input type="text" id="set-new-bio">
            </div>

            <div class="input-group">
                <label>Variasi Wallpaper</label>
                <select id="set-new-wallpaper" style="width:100%; padding:15px; background:#0b0f1a; border:none; color:white; border-radius:15px">
                    <option value="wallpaper-pro">Pro: Merah Hitam (Radial)</option>
                    <option value="wallpaper-default">Classic: Dark Pattern</option>
                </select>
            </div>

            <button class="btn-auth-action" onclick="saveEliteSettings()">SAVE CHANGES</button>
            <button class="btn-auth-action" id="logout-btn-trigger" style="background:var(--secondary-color); margin-top:15px" onclick="executeLogoutSequence()">LOG OUT</button>
            <button class="btn-auth-action" style="background:#334155; margin-top:15px" onclick="closeSettings()">CLOSE</button>
        </div>
    </div>

    <div id="modal-search" class="modal-blur-overlay hidden">
        <div class="modal-content-card">
            <h2 style="margin-bottom:25px">CARI TARGET</h2>
            <div class="input-group">
                <label>Masukkan Username</label>
                <input type="text" id="search-username-input" placeholder="Ketik username tepat...">
            </div>
            <button class="btn-auth-action" onclick="performUserSearch()">KIRIM REQUEST PERTEMANAN</button>
            <button class="btn-auth-action" style="background:#334155; margin-top:15px" onclick="closeSearch()">BATAL</button>
        </div>
    </div>

    <script>
        // 1. FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 2. GLOBAL APPLICATION STATE
        let currentUser = null;
        let authMode = 'login';
        let activeChatId = null;
        let logoutCount = 0;

        // 3. AUTHENTICATION ENGINE
        function toggleAuthMode() {
            const title = document.getElementById('auth-title');
            const sub = document.getElementById('auth-subtitle');
            const btn = document.querySelector('.btn-auth-action');
            const toggleMsg = document.getElementById('auth-toggle-msg');
            const toggleBtn = document.getElementById('auth-toggle-btn');

            if (authMode === 'login') {
                authMode = 'register';
                title.innerText = "ELITE REGISTRATION";
                sub.innerText = "Buat identitas baru di jaringan terenkripsi";
                btn.innerText = "CREATE IDENTITY";
                toggleMsg.innerText = "Sudah memiliki akses?";
                toggleBtn.innerText = "Login Sekarang";
            } else {
                authMode = 'login';
                title.innerText = "ZCHAT ELITE";
                sub.innerText = "Sistem Komunikasi Terenkripsi Militer";
                btn.innerText = "INITIALIZE ACCESS";
                toggleMsg.innerText = "Belum memiliki akses?";
                toggleBtn.innerText = "Request Akun";
            }
        }

        async function executeAuthentication() {
            const u = document.getElementById('auth-username-field').value.trim().toLowerCase();
            const p = document.getElementById('auth-password-field').value;

            if (!u || !p) return alert("Identitas tidak lengkap!");

            try {
                const userRef = db.ref('users');
                const snap = await userRef.orderByChild('username').equalTo(u).once('value');

                if (authMode === 'register') {
                    if (snap.exists()) return alert("Username sudah terdaftar di database!");
                    
                    const newUid = "u" + Date.now();
                    const userData = {
                        uid: newUid,
                        username: u,
                        password: p,
                        bio: "User Elite ZChat",
                        photo: `https://ui-avatars.com/api/?name=${u}&background=random&color=fff`,
                        status: 'online',
                        created: Date.now()
                    };

                    await userRef.child(newUid).set(userData);
                    alert("Identitas Terdaftar! Silakan Login.");
                    toggleAuthMode();
                } else {
                    if (!snap.exists()) return alert("Identitas tidak ditemukan!");
                    
                    const data = Object.values(snap.val())[0];
                    if (data.password !== p) return alert("Otorisasi Gagal! Password salah.");

                    handleLoginSuccess(data);
                }
            } catch (err) {
                console.error(err);
                alert("Gagal terhubung ke server!");
            }
        }

        function handleLoginSuccess(userData) {
            currentUser = userData;
            localStorage.setItem('zchat_elite_session', JSON.stringify(userData));
            
            // UI Transitions
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-wrapper').classList.remove('hidden');
            
            // Profile Sync
            document.getElementById('my-profile-img').src = userData.photo;
            document.getElementById('my-display-name').innerText = userData.username;
            document.getElementById('my-current-bio').innerText = userData.bio;
            
            // DB Status Sync
            db.ref('users/' + userData.uid).update({ status: 'online' });
            
            startCoreListeners();
        }

        // 4. CORE DATA LISTENERS
        function startCoreListeners() {
            // Listen for Friend List
            db.ref(`friends/${currentUser.uid}`).on('value', snap => {
                const box = document.getElementById('view-friends');
                box.innerHTML = "";
                snap.forEach(child => {
                    db.ref('users/' + child.key).on('value', uSnap => {
                        const u = uSnap.val();
                        if (!u) return;
                        box.innerHTML += `
                            <div class="chat-list-item" onclick="initiateChat('${u.uid}', '${u.username}', '${u.photo}')">
                                <img src="${u.photo}">
                                <div>
                                    <b>${u.username}</b><br>
                                    <small style="color:#10b981">${u.status}</small>
                                </div>
                            </div>
                        `;
                    });
                });
            });

            // Listen for Conversations
            db.ref('chats').on('value', snap => {
                const box = document.getElementById('view-chats');
                box.innerHTML = "";
                snap.forEach(child => {
                    const c = child.val();
                    if (c.members && c.members.includes(currentUser.uid)) {
                        const otherId = c.members.find(m => m !== currentUser.uid);
                        db.ref('users/' + otherId).once('value', uSnap => {
                            const u = uSnap.val();
                            box.innerHTML += `
                                <div class="chat-list-item" onclick="initiateChat('${u.uid}', '${u.username}', '${u.photo}')">
                                    <img src="${u.photo}">
                                    <div>
                                        <b>${u.username}</b><br>
                                        <small style="opacity:0.6">${c.lastMsg || 'Sent an encrypted message'}</small>
                                    </div>
                                </div>
                            `;
                        });
                    }
                });
            });
        }

        // 5. CHAT ENGINE
        function initiateChat(uid, name, img) {
            activeChatId = [currentUser.uid, uid].sort().join("_");
            
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('chat-active-box').classList.remove('hidden');
            document.getElementById('active-target-name').innerText = name;
            document.getElementById('active-target-img').src = img;

            if (window.innerWidth <= 850) {
                document.getElementById('chat-main-interface').classList.add('is-visible');
            }

            // Realtime Message Stream
            db.ref('messages/' + activeChatId).on('value', snap => {
                const scroll = document.getElementById('chat-messages-scroll');
                scroll.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    const cls = m.sender === currentUser.uid ? 'bubble-sent' : 'bubble-received';
                    scroll.innerHTML += `<div class="bubble-msg ${cls}">${m.text}</div>`;
                });
                scroll.scrollTop = scroll.scrollHeight;
            });
        }

        function sendNewMessage() {
            const input = document.getElementById('chat-input-field');
            const txt = input.value.trim();
            if (!txt) return;

            const msgData = {
                sender: currentUser.uid,
                text: txt,
                time: Date.now()
            };

            db.ref('messages/' + activeChatId).push(msgData);
            db.ref('chats/' + activeChatId).update({
                lastMsg: txt,
                members: activeChatId.split('_')
            });

            input.value = "";
        }

        // 6. SETTINGS & LOGOUT LOGIC (2 TAHAP)
        function openProfileSettings() {
            document.getElementById('modal-settings').classList.remove('hidden');
            document.getElementById('set-new-username').value = currentUser.username;
            document.getElementById('set-new-bio').value = currentUser.bio || '';
            logoutCount = 0;
            document.getElementById('logout-btn-trigger').innerText = "LOG OUT";
        }

        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }

        async function saveEliteSettings() {
            const newU = document.getElementById('set-new-username').value.trim().toLowerCase();
            const newP = document.getElementById('set-new-password').value;
            const newB = document.getElementById('set-new-bio').value;
            const newW = document.getElementById('set-new-wallpaper').value;

            let updates = { username: newU, bio: newB };
            if (newP) updates.password = newP;

            await db.ref('users/' + currentUser.uid).update(updates);
            
            // Update UI & Storage
            currentUser = { ...currentUser, ...updates };
            localStorage.setItem('zchat_elite_session', JSON.stringify(currentUser));
            document.body.className = newW;
            
            document.getElementById('my-display-name').innerText = newU;
            document.getElementById('my-current-bio').innerText = newB;

            alert("Data Berhasil Diperbarui!");
            closeSettings();
        }

        function executeLogoutSequence() {
            logoutCount++;
            if (logoutCount === 1) {
                document.getElementById('logout-btn-trigger').innerText = "YAKIN UNTUK LOG OUT?";
            } else {
                db.ref('users/' + currentUser.uid).update({ status: 'offline' });
                localStorage.removeItem('zchat_elite_session');
                location.reload();
            }
        }

        // 7. UTILS
        function switchSection(sec, el) {
            document.querySelectorAll('.nav-tab-icon').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.list-viewport').forEach(v => v.classList.add('hidden'));
            el.classList.add('active');
            document.getElementById('view-' + sec).classList.remove('hidden');
        }

        function backToSidebar() { document.getElementById('chat-main-interface').classList.remove('is-visible'); }
        function openSearchModal() { document.getElementById('modal-search').classList.remove('hidden'); }
        function closeSearch() { document.getElementById('modal-search').classList.add('hidden'); }

        async function performUserSearch() {
            const target = document.getElementById('search-username-input').value.trim().toLowerCase();
            if (!target) return;

            const snap = await db.ref('users').orderByChild('username').equalTo(target).once('value');
            if (!snap.exists()) return alert("Target tidak ditemukan!");

            const tUser = Object.values(snap.val())[0];
            await db.ref(`friends/${currentUser.uid}/${tUser.uid}`).set(true);
            await db.ref(`friends/${tUser.uid}/${currentUser.uid}`).set(true);
            
            alert("Koneksi Berhasil! Silakan cek daftar teman.");
            closeSearch();
        }

        // 8. AUTO-LOGIN ON LOAD
        window.onload = () => {
            const saved = localStorage.getItem('zchat_elite_session');
            if (saved) handleLoginSuccess(JSON.parse(saved));
        };
    </script>
</body>
</html>
