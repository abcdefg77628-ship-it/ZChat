<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat - Original Messaging by zZerr44</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- ZCHAT EXCLUSIVE THEME --- */
        :root {
            --z-bg: #0d0f14;
            --z-panel: #161920;
            --z-accent: #00ff88;
            --z-accent-dim: #008f4c;
            --z-text: #ffffff;
            --z-text-muted: #8b9bb0;
            --z-border: #2a2f3d;
            --z-my-bubble: #00ff88;
            --z-other-bubble: #232834;
            --z-glass: rgba(22, 25, 32, 0.8);
            --z-font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body.light-mode {
            --z-bg: #f4f7f6;
            --z-panel: #ffffff;
            --z-text: #1a1d23;
            --z-text-muted: #6a7685;
            --z-border: #e1e8ed;
            --z-my-bubble: #00cc6a;
            --z-other-bubble: #f0f2f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--z-font); -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--z-bg);
            color: var(--z-text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- 1. INTRO: ZCHAT ORIGINAL --- */
        #z-intro {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1a1d23 0%, #0d0f14 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }
        .z-logo-anim {
            width: 100px; height: 100px;
            background: var(--z-accent);
            border-radius: 20px;
            display: grid; place-items: center;
            font-size: 50px; color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            animation: z-spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        @keyframes z-spin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        .z-tagline { margin-top: 25px; font-weight: 800; letter-spacing: 5px; font-size: 1.5rem; text-transform: uppercase; }
        .z-by { margin-top: 10px; color: var(--z-accent); font-size: 0.8rem; font-weight: 600; opacity: 0.8; }

        /* --- 2. AUTH: CYBER STYLE --- */
        #z-auth {
            display: none; width: 90%; max-width: 400px;
            background: var(--z-panel); padding: 40px;
            border-radius: 30px; border: 1px solid var(--z-border);
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .z-field { margin-bottom: 20px; text-align: left; }
        .z-field label { display: block; font-size: 12px; color: var(--z-text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        .z-field input {
            width: 100%; background: #0d0f14; border: 1px solid var(--z-border);
            padding: 15px; border-radius: 12px; color: white; outline: none;
            transition: 0.3s;
        }
        .z-field input:focus { border-color: var(--z-accent); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        
        /* Toggle Switch Custom */
        .z-toggle-row { display: flex; justify-content: space-between; align-items: center; margin: 25px 0; }
        .z-switch { position: relative; width: 50px; height: 26px; }
        .z-switch input { opacity: 0; width: 0; height: 0; }
        .z-slider { position: absolute; cursor: pointer; inset: 0; background: #2a2f3d; border-radius: 30px; transition: .4s; }
        .z-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: #fff; border-radius: 50%; transition: .4s; }
        input:checked + .z-slider { background: var(--z-accent); }
        input:checked + .z-slider:before { transform: translateX(24px); background: #000; }

        .z-btn {
            width: 100%; padding: 16px; background: var(--z-accent); color: #000;
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .z-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* --- 3. MAIN APP: MINIMALIST GLASS --- */
        #z-app {
            display: none; width: 100vw; height: 100vh;
            grid-template-columns: 350px 1fr; background: var(--z-bg);
        }

        #z-sidebar {
            background: var(--z-panel); border-right: 1px solid var(--z-border);
            display: flex; flex-direction: column;
        }
        .z-side-head { padding: 25px; border-bottom: 1px solid var(--z-border); display: flex; justify-content: space-between; align-items: center; }
        .z-user-info { display: flex; align-items: center; gap: 12px; }
        .z-user-info strong { font-size: 1.1rem; }
        .z-avatar { width: 45px; height: 45px; border-radius: 15px; background: var(--z-border); display: grid; place-items: center; font-size: 20px; }

        .z-search-box { padding: 20px; }
        .z-search-inner { background: #0d0f14; border-radius: 12px; display: flex; align-items: center; padding: 0 15px; border: 1px solid var(--z-border); }
        .z-search-inner input { background: transparent; border: none; padding: 12px; color: white; width: 100%; outline: none; font-size: 14px; }

        .z-list { flex: 1; overflow-y: auto; padding: 10px; }
        .z-item {
            padding: 15px; border-radius: 15px; display: flex; align-items: center;
            cursor: pointer; transition: 0.2s; margin-bottom: 5px;
        }
        .z-item:hover { background: rgba(255,255,255,0.03); }
        .z-item.active { background: rgba(0, 255, 136, 0.1); border-left: 4px solid var(--z-accent); }

        /* Chat Window */
        #z-chat-win { background: var(--z-bg); display: flex; flex-direction: column; position: relative; }
        .z-chat-head {
            padding: 15px 25px; background: var(--z-glass); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--z-border); display: flex; align-items: center; justify-content: space-between;
        }
        
        #z-messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .z-msg-wrap { display: flex; width: 100%; }
        .z-msg-wrap.me { justify-content: flex-end; }
        
        .z-bubble {
            max-width: 70%; padding: 12px 18px; border-radius: 18px; font-size: 14px;
            line-height: 1.5; position: relative;
        }
        .z-bubble.me { background: var(--z-my-bubble); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
        .z-bubble.you { background: var(--z-other-bubble); color: var(--z-text); border-bottom-left-radius: 4px; border: 1px solid var(--z-border); }
        .z-time { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }

        .z-input-bar { padding: 20px 25px; display: flex; align-items: center; gap: 15px; }
        .z-input-wrap { flex: 1; background: var(--z-panel); border-radius: 15px; padding: 5px 20px; border: 1px solid var(--z-border); }
        .z-input-wrap input { width: 100%; background: transparent; border: none; padding: 12px 0; color: white; outline: none; font-size: 15px; }
        .z-send { width: 50px; height: 50px; background: var(--z-accent); border-radius: 15px; color: #000; display: grid; place-items: center; cursor: pointer; transition: 0.2s; }
        .z-send:hover { transform: translateY(-3px) rotate(-10deg); }

        /* --- 4. MODAL: Z-MODERN --- */
        .z-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; backdrop-filter: blur(5px); }
        .z-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--z-panel); border: 1px solid var(--z-border);
            width: 90%; max-width: 400px; border-radius: 25px; padding: 30px; z-index: 2001; display: none;
        }
        .z-modal h3 { color: var(--z-accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 768px) {
            #z-app { grid-template-columns: 1fr; }
            #z-sidebar { width: 100%; }
            #z-chat-win { position: fixed; inset: 0; display: none; z-index: 1000; }
            #z-chat-win.active { display: flex; }
        }
    </style>
</head>
<body>

    <div id="z-intro">
        <div class="z-logo-anim">Z</div>
        <div class="z-tagline">Z-CHAT</div>
        <div class="z-by">ORIGINAL BY ZZERR44</div>
    </div>

    <div id="z-auth">
        <h2 id="z-auth-title" style="margin-bottom: 30px;">AUTH ACCESS</h2>
        <div class="z-field">
            <label>Identification</label>
            <input type="text" id="z-user" placeholder="Enter username">
        </div>
        <div class="z-field">
            <label>Security Key</label>
            <input type="password" id="z-pass" placeholder="Enter password">
        </div>
        <div class="z-toggle-row" id="z-keep-row">
            <span style="font-size: 13px; font-weight: 700; color: var(--z-text-muted);">REMEMBER SESSION</span>
            <label class="z-switch">
                <input type="checkbox" id="z-keep">
                <span class="z-slider"></span>
            </label>
        </div>
        <button class="z-btn" id="z-auth-btn">Authorize</button>
        <p id="z-switch-auth" style="margin-top: 25px; font-size: 13px; color: var(--z-accent); cursor: pointer; font-weight: 700;">CREATE NEW ACCOUNT</p>
    </div>

    <div id="z-app">
        <aside id="z-sidebar">
            <div class="z-side-head">
                <div class="z-user-info">
                    <div class="z-avatar"><i class="fas fa-id-badge"></i></div>
                    <strong id="z-my-name">USER</strong>
                </div>
                <div style="display: flex; gap: 20px; font-size: 20px; color: var(--z-text-muted);">
                    <i class="fas fa-plus-square" onclick="zAdd()" style="cursor:pointer"></i>
                    <i class="fas fa-sliders-h" onclick="zOpenSets()" style="cursor:pointer"></i>
                </div>
            </div>
            <div class="z-search-box">
                <div class="z-search-inner">
                    <i class="fas fa-terminal"></i>
                    <input type="text" id="z-search" placeholder="Filter protocols..." onkeyup="zFilter()">
                </div>
            </div>
            <div class="z-list" id="z-contact-list"></div>
        </aside>

        <main id="z-chat-win">
            <div class="z-chat-head">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="fas fa-chevron-left" id="z-back" style="display:none; cursor:pointer;" onclick="zCloseChat()"></i>
                    <div class="z-avatar" style="width:40px; height:40px; background: var(--z-accent); color: #000;"><i class="fas fa-user-shield"></i></div>
                    <div>
                        <h4 id="z-target-display">NO PROTOCOL</h4>
                        <span id="z-status-display" style="font-size: 10px; color: var(--z-accent);">waiting...</span>
                    </div>
                </div>
                <div id="z-tools" style="display:none;">
                    <i class="fas fa-eye-slash" title="Mute" onclick="alert('Protocol Muted')" style="margin-right:20px; cursor:pointer"></i>
                    <i class="fas fa-shield-virus" title="Block" onclick="zBlock()" style="margin-right:20px; cursor:pointer"></i>
                    <i class="fas fa-eraser" title="Clean" onclick="zClear()" style="cursor:pointer"></i>
                </div>
            </div>

            <div id="z-messages"></div>

            <div class="z-input-bar" id="z-input-area" style="display:none;">
                <div class="z-input-wrap">
                    <input type="text" id="z-msg-input" placeholder="Encrypt message...">
                </div>
                <div class="z-send" onclick="zSend()">
                    <i class="fas fa-bolt"></i>
                </div>
            </div>
        </main>
    </div>

    <div class="z-overlay" id="z-overlay" onclick="zCloseSets()"></div>
    <div class="z-modal" id="z-modal-sets">
        <h3>System Settings</h3>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span>LIGHT MODE</span>
            <label class="z-switch">
                <input type="checkbox" onchange="document.body.classList.toggle('light-mode')">
                <span class="z-slider"></span>
            </label>
        </div>
        <div style="margin-bottom: 20px;">
            <p style="font-size: 12px; margin-bottom: 10px;">WALLPAPER COLOR</p>
            <input type="color" onchange="zWall(this.value)" style="width:100%; height:40px; border:none; border-radius:10px; cursor:pointer">
        </div>
        <div style="background: #0d0f14; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--z-border);">
            <p style="font-weight: 800; color: var(--z-accent);">ZCHAT CORE v1.0</p>
            <p style="font-size: 11px; margin-top: 5px;">AUTHOR: ZZERR44</p>
        </div>
        <button class="z-btn" style="background: #ff3e3e; margin: 20px 0 10px 0;" onclick="zLogout()">TERMINATE SESSION</button>
        <button class="z-btn" style="background: #2a2f3d; color: white;" onclick="zCloseSets()">CLOSE</button>
    </div>

    <script>
        // --- ZCHAT CORE ENGINE ---
        const config = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        firebase.initializeApp(config);
        const db = firebase.database();

        let me = localStorage.getItem('z_session_id') || null;
        let activeTarget = null;
        let authState = 'login';

        // 1. Loader
        window.onload = () => {
            setTimeout(() => {
                const intro = document.getElementById('z-intro');
                intro.style.transition = '0.8s';
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    if(me) zStart();
                    else document.getElementById('z-auth').style.display = 'block';
                }, 800);
            }, 2000);
        };

        // 2. Auth Logic
        const btnAuth = document.getElementById('z-auth-btn');
        const btnSwap = document.getElementById('z-switch-auth');

        btnSwap.onclick = () => {
            authState = (authState === 'login') ? 'register' : 'login';
            document.getElementById('z-auth-title').innerText = (authState === 'login') ? 'AUTH ACCESS' : 'CREATE PROTOCOL';
            btnAuth.innerText = (authState === 'login') ? 'Authorize' : 'Initialize';
            btnSwap.innerText = (authState === 'login') ? 'CREATE NEW ACCOUNT' : 'BACK TO LOGIN';
            document.getElementById('z-keep-row').style.display = (authState === 'login') ? 'flex' : 'none';
        };

        btnAuth.onclick = async () => {
            const u = document.getElementById('z-user').value.toLowerCase().trim();
            const p = document.getElementById('z-pass').value;

            if(!u || !p) return alert("All fields required!");
            const ref = db.ref('users/' + u);
            const snap = await ref.once('value');

            if(authState === 'register') {
                if(snap.exists()) return alert("Identity already exists!");
                await ref.set({ password: p });
                alert("Protocol Created! Please Auth.");
                btnSwap.click();
            } else {
                if(snap.exists() && snap.val().password === p) {
                    me = u;
                    if(document.getElementById('z-keep').checked) localStorage.setItem('z_session_id', u);
                    zStart();
                } else alert("Invalid Credentials!");
            }
        };

        function zStart() {
            document.getElementById('z-auth').style.display = 'none';
            document.getElementById('z-app').style.display = 'grid';
            document.getElementById('z-my-name').innerText = me.toUpperCase();
            zLoad();
        }

        // 3. App Core
        async function zAdd() {
            const t = prompt("Target Username:").toLowerCase().trim();
            if(!t || t === me) return;
            const check = await db.ref('users/' + t).once('value');
            if(!check.exists()) return alert("Target not found!");
            await db.ref(`contacts/${me}/${t}`).set(true);
        }

        function zLoad() {
            db.ref(`contacts/${me}`).on('value', (snap) => {
                const list = document.getElementById('z-contact-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const name = c.key;
                    const item = document.createElement('div');
                    item.className = 'z-item';
                    item.innerHTML = `
                        <div class="z-avatar" style="background:var(--z-border)"><i class="fas fa-user-tag"></i></div>
                        <div style="margin-left: 15px;">
                            <div style="font-weight:700; font-size:14px;">${name.toUpperCase()}</div>
                            <div style="font-size:11px; color:var(--z-text-muted)">ENCRYPTED CHANNEL</div>
                        </div>
                    `;
                    item.onclick = () => zOpenChat(name);
                    list.appendChild(item);
                });
            });
        }

        function zOpenChat(target) {
            activeTarget = target;
            document.getElementById('z-target-display').innerText = target.toUpperCase();
            document.getElementById('z-status-display').innerText = 'SECURE CONNECTION';
            document.getElementById('z-tools').style.display = 'block';
            document.getElementById('z-input-area').style.display = 'flex';
            
            if(window.innerWidth <= 768) {
                document.getElementById('z-chat-win').classList.add('active');
                document.getElementById('z-back').style.display = 'block';
            }

            const room = [me, target].sort().join("_x_");
            db.ref('messages/' + room).on('value', (snap) => {
                const box = document.getElementById('z-messages');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const wrap = document.createElement('div');
                    wrap.className = `z-msg-wrap ${d.sender === me ? 'me' : ''}`;
                    wrap.innerHTML = `
                        <div class="z-bubble ${d.sender === me ? 'me' : 'you'}">
                            ${d.text}
                            <div class="z-time">${new Date(d.time).toLocaleTimeString([], {hour:'2-digit', minute:'
