<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZChat | zZerr44</title>
<script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-database.js"></script>
<style>
  :root{--a:#00ff88;--b:#050608;--p:#0d1117;--t:#e5e7eb}
  *{margin:0;padding:0;box-sizing:border-box;font-family:monospace}
  body{background:var(--b);color:var(--t);height:100vh;display:flex;overflow:hidden}
  #auth{position:fixed;inset:0;background:var(--b);z-index:9;display:flex;justify-content:center;align-items:center}
  .box{background:var(--p);padding:30px;border:1px solid #1f2937;width:320px;text-align:center}
  input{width:100%;background:#000;border:1px solid #1f2937;padding:12px;color:var(--a);margin:10px 0;outline:none}
  button{width:100%;padding:12px;background:var(--a);color:#000;font-weight:900;border:none;cursor:pointer}
  #app{display:none;width:100%;grid-template-columns:250px 1fr}
  #side{background:var(--p);border-right:1px solid #1f2937;display:flex;flex-direction:column}
  .h{padding:15px;border-bottom:1px solid #1f2937;display:flex;justify-content:space-between;align-items:center;background:#090c10}
  #msg{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  .b{max-width:80%;padding:10px;border-radius:2px;font-size:14px}
  .me{align-self:flex-end;background:var(--a);color:#000;font-weight:bold}
  .ot{align-self:flex-start;background:#161b22;border:1px solid #1f2937}
  .f{padding:15px;background:var(--p);display:flex;gap:10px}
  @media(max-width:700px){#app{grid-template-columns:1fr}#chat{position:fixed;inset:0;display:none}#chat.a{display:flex}}
</style></head><body>
<div id="auth"><div class="box"><h2 id="at" style="color:var(--a);letter-spacing:2px">Z-LOGIN</h2>
<input id="iu" placeholder="ID"><input type="password" id="ip" placeholder="KEY">
<button onclick="hA()">EXECUTE</button><p onclick="tA()" style="font-size:10px;color:var(--a);cursor:pointer;margin-top:15px">[ SWITCH MODE ]</p></div></div>
<div id="app"><aside id="side"><div class="h"><b id="mi" style="color:var(--a)">ID</b><button onclick="aF()" style="width:30px">+</button></div><div id="lc" style="flex:1;overflow-y:auto"></div></aside>
<main id="chat" style="display:flex;flex-direction:column;width:100%"><div class="h"><div><button id="bk" style="display:none;margin-right:10px" onclick="cC()"><</button><span id="ti">SELECT_ID</span></div><button onclick="lO()" style="background:red;color:#fff;width:30px">X</button></div>
<div id="msg"></div><div class="f" id="ia" style="display:none"><input id="im" placeholder="MESSAGE..."><button onclick="sM()" style="width:60px;background:var(--a)">></button></div></main></div>
<script>
const c={apiKey:"AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",databaseURL:"https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"zchat-56639"};
firebase.initializeApp(c);const d=firebase.database();let me=localStorage.getItem('zs'),ac=null,mo='l';
function tA(){mo=(mo==='l')?'r':'l';document.getElementById('at').innerText=mo==='l'?'Z-LOGIN':'Z-REG';}
async function hA(){const u=document.getElementById('iu').value.toLowerCase().trim(),p=document.getElementById('ip').value;if(!u||!p)return;const s=await d.ref('users/'+u).once('value');
if(mo==='r'){if(s.exists())return alert('ID TAKEN');await d.ref('users/'+u).set({pass:p});alert('CREATED');tA();}
else{if(s.exists()&&s.val().pass===p){me=u;localStorage.setItem('zs',u);st();}else alert('DENIED');}}
function st(){document.getElementById('auth').style.display='none';document.getElementById('app').style.display='grid';document.getElementById('mi').innerText=me.toUpperCase();
d.ref('contacts/'+me).on('value',s=>{const l=document.getElementById('lc');l.innerHTML="";s.forEach(c=>{const x=document.createElement('div');x.style.padding="15px";x.style.borderBottom="1px solid #161b22";x.innerText="> "+c.key.toUpperCase();x.onclick=()=>oC(c.key);l.appendChild(x);});});}
function oC(t){ac=t;document.getElementById('ti').innerText=t.toUpperCase();document.getElementById('ia').style.display='flex';if(window.innerWidth<700){document.getElementById('chat').classList.add('a');document.getElementById('bk').style.display='inline';}
d.ref('msgs/'+[me,t].sort().join('_')).on('value',s=>{const b=document.getElementById('msg');b.innerHTML="";s.forEach(k=>{const v=k.val(),e=document.createElement('div');e.className=`b ${v.s===me?'me':'ot'}`;e.innerText=v.t;b.appendChild(e);});b.scrollTop=b.scrollHeight;});}
function sM(){const t=document.getElementById('im').value;if(!t||!ac)return;d.ref('msgs/'+[me,ac].sort().join('_')).push({s:me,t:t});document.getElementById('im').value="";}
function aF(){const f=prompt("TARGET ID:");if(f&&f.toLowerCase()!==me)d.ref('contacts/'+me+'/'+f.toLowerCase()).set(true);}
function cC(){document.getElementById('chat').classList.remove('a');}
function lO(){localStorage.clear();location.reload();}
window.onload=()=>{if(me)st();};document.getElementById('im').onkeydown=(e)=>{if(e.key==='Enter')sM();};
</script></body></html>
