<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-CHAT PRO | SECURE NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0b;
            --input: #151518;
            --accent: #0084ff;
            --text: #ffffff;
            --dim: #82828a;
            --border: #1f1f22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            background: var(--bg); color: var(--text); 
            height: 100%; width: 100%; overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            position: fixed;
        }

        /* Toast Notif */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--surface); border: 1px solid var(--border);
            padding: 12px 25px; border-radius: 50px; font-size: 13px; font-weight: 800;
            z-index: 999999; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.active { top: 30px; }

        .layer {
            position: absolute; inset: 0; background: var(--bg);
            display: none; flex-direction: column; z-index: 10;
        }

        /* Input Styles */
        .z-input {
            width: 100%; background: var(--input); border: 2px solid var(--border);
            padding: 18px; border-radius: 15px; color: white;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        .z-input:focus { border-color: var(--accent); }

        .z-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-weight: 800; font-size: 15px; cursor: pointer;
            background: var(--accent); color: white;
        }

        /* Splash */
        #splash {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .logo { font-family: 'JetBrains Mono'; font-size: 30px; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
    </style>
</head>
<body>
    <div id="toast">SYSTEM READY</div>

    <div id="splash">
        <div class="logo">Z<span>CHAT</span></div>
        <div id="load-bar" style="width:100px; height:2px; background:var(--border); margin-top:15px; overflow:hidden;">
            <div id="progress" style="width:0%; height:100%; background:var(--accent); transition:0.3s;"></div>
        </div>
    </div>
        <div class="layer" id="auth-view" style="display: flex; padding: 30px; justify-content: center; align-items: center;">
        <div style="width: 100%; max-width: 400px;">
            <div class="logo" style="margin-bottom: 5px;">Z<span>PRO</span></div>
            <p id="auth-desc" style="color: var(--dim); font-size: 13px; margin-bottom: 35px; font-weight: 600;">Secure Node Communication</p>

            <div id="login-box">
                <div style="margin-bottom: 15px;">
                    <input type="text" id="l-user" class="z-input" placeholder="ID Node (Username)">
                </div>
                <div style="margin-bottom: 25px;">
                    <input type="password" id="l-pass" class="z-input" placeholder="Password">
                </div>
                <button onclick="doLogin()" class="z-btn">MASUK SISTEM</button>
                <p onclick="switchAuth('REG')" style="text-align: center; margin-top: 20px; color: var(--accent); font-size: 13px; font-weight: 700; cursor: pointer;">Buat Identitas Baru (Daftar)</p>
            </div>

            <div id="reg-box" style="display: none;">
                <div style="margin-bottom: 15px;">
                    <input type="text" id="r-user" class="z-input" placeholder="Pilih ID Node">
                </div>
                <div style="margin-bottom: 15px;">
                    <input type="password" id="r-pass" class="z-input" placeholder="Setel Password (Min 6 Karakter)">
                </div>
                <div style="margin-bottom: 25px;">
                    <input type="password" id="r-conf" class="z-input" placeholder="Ulangi Password">
                </div>
                <button onclick="doRegister()" class="z-btn">DAFTARKAN NODE</button>
                <p onclick="switchAuth('LOGIN')" style="text-align: center; margin-top: 20px; color: var(--accent); font-size: 13px; font-weight: 700; cursor: pointer;">Sudah Punya Akses? Masuk</p>
            </div>
        </div>
    </div>

    <div class="layer" id="main-view">
        <header style="padding: 50px 20px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div id="my-avatar" style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; border: 2px solid var(--border);">?</div>
                <div>
                    <div id="display-name" style="font-weight: 800; font-size: 14px;">USER</div>
                    <div style="font-size: 9px; color: #30d158; font-weight: 800;">• ONLINE</div>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <svg onclick="openSearch()" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <svg onclick="logout()" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff453a" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </div>
        </header>
        
        <div id="inbox-list" style="flex: 1; overflow-y: auto;">
            </div>
                        </div>
                            <div class="layer" id="chat-view" style="z-index: 100;">
        <header style="padding: 50px 20px 15px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;">
            <svg onclick="backToMain()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" style="cursor: pointer;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <div id="chat-avatar" style="width: 38px; height: 38px; border-radius: 50%; background: var(--input); display: flex; align-items: center; justify-content: center; font-weight: 800; border: 1px solid var(--border);">?</div>
            <div style="flex: 1;">
                <div id="chat-target-name" style="font-weight: 800; font-size: 15px;">TARGET</div>
                <div id="chat-target-status" style="font-size: 10px; color: var(--dim); font-weight: 700;">CONNECTING...</div>
            </div>
        </header>

        <div id="msg-box" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #000;"></div>

        <div style="padding: 12px 15px calc(15px + env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px;">
            <input type="text" id="m-input" style="flex: 1; background: var(--input); border: 1px solid var(--border); border-radius: 25px; padding: 12px 18px; color: white; outline: none; font-size: 15px;" placeholder="Ketik pesan...">
            <button onclick="send()" style="width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0, 132, 255, 0.4);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"></line><polyline points="22 2 15 22 11 13 2 9 22 2"></polyline></svg>
            </button>
        </div>
    </div>

    <div class="layer" id="search-view" style="z-index: 200;">
        <div style="padding: 50px 20px 15px; background: var(--surface); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border);">
            <svg onclick="closeSearch()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" style="cursor: pointer;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <input type="text" id="s-input" style="flex: 1; background: transparent; border: none; color: white; font-size: 17px; outline: none;" placeholder="Cari ID Node User...">
        </div>
        <div id="search-results" style="flex: 1; overflow-y: auto; padding: 10px;">
            </div>
    </div>
        <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, serverTimestamp, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // KONTROL CONFIG - Pastikan ini sesuai dengan Project Firebase Lu
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let ME = null;
        let ACTIVE_CHAT = null;

        // --- SISTEM NOTIFIKASI (TOAST) ---
        const toast = (m) => {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 3000);
        };

        // --- SISTEM NAVIGASI ---
        window.switchAuth = (m) => {
            document.getElementById('login-box').style.display = m === 'LOGIN' ? 'block' : 'none';
            document.getElementById('reg-box').style.display = m === 'REG' ? 'block' : 'none';
        };
        window.openSearch = () => document.getElementById('search-view').style.display = 'flex';
        window.closeSearch = () => document.getElementById('search-view').style.display = 'none';
        window.backToMain = () => { document.getElementById('chat-view').style.display = 'none'; ACTIVE_CHAT = null; };

        // --- LOGIKA REGISTER (ANTI-FAILED) ---
        window.doRegister = async () => {
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            const p = document.getElementById('r-pass').value;
            const c = document.getElementById('r-conf').value;

            if (u.length < 5) return toast("ID Minimal 5 Karakter!");
            if (p.length < 6) return toast("Password Minimal 6 Karakter!");
            if (p !== c) return toast("Password Tidak Cocok!");

            toast("Mendaftarkan Node...");
            try {
                // 1. Cek apakah username sudah dipakai
                const check = await get(ref(db, `usernames/${u}`));
                if (check.exists()) return toast("ID Sudah Terpakai!");

                // 2. Buat Akun Auth
                const res = await createUserWithEmailAndPassword(auth, `${u}@zpro.io`, p);
                
                // 3. Simpan Data ke Database
                await set(ref(db, `users/${res.user.uid}`), { username: u, status: 'online' });
                await set(ref(db, `usernames/${u}`), res.user.uid);
                
                toast("Berhasil! Memuat Sistem...");
            } catch (err) {
                console.error(err);
                if (err.code === 'auth/email-already-in-use') toast("ID Sudah Ada!");
                else if (err.code === 'auth/operation-not-allowed') toast("Aktifkan Email/Pass di Firebase!");
                else toast("Error: " + err.message);
            }
        };

        // --- LOGIKA LOGIN ---
        window.doLogin = async () => {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            if (!u || !p) return toast("Isi Semua Field!");

            try {
                await signInWithEmailAndPassword(auth, `${u}@zpro.io`, p);
            } catch (err) {
                toast("Akses Ditolak: Cek ID/Pass!");
            }
        };

        // --- MONITOR STATUS AUTH ---
        onAuthStateChanged(auth, async (user) => {
            const prog = document.getElementById('progress');
            if (user) {
                prog.style.width = "100%";
                const snap = await get(ref(db, `users/${user.uid}`));
                ME = { uid: user.uid, ...snap.val() };
                
                document.getElementById('display-name').innerText = ME.username.toUpperCase();
                document.getElementById('my-avatar').innerText = ME.username[0].toUpperCase();
                
                document.getElementById('splash').style.display = 'none';
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('main-view').style.display = 'flex';
                renderInbox();
            } else {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('auth-view').style.display = 'flex';
                document.getElementById('main-view').style.display = 'none';
            }
        });

        window.logout = () => { if(confirm("Keluar dari Jaringan?")) signOut(auth); };

        // --- SEARCH USER ---
        document.getElementById('s-input').oninput = async (e) => {
            const v = e.target.value.trim().toLowerCase();
            const resBox = document.getElementById('search-results');
            resBox.innerHTML = '';
            if (v.length < 3) return;

            const q = query(ref(db, 'users'), orderByChild('username'), equalTo(v));
            const snap = await get(q);
            snap.forEach(c => {
                if (c.key === ME.uid) return;
                const d = c.val();
                const div = document.createElement('div');
                div.style = "padding:15px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;";
                div.innerHTML = `<div style="width:35px; height:35px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:800;">${d.username[0].toUpperCase()}</div><b>${d.username.toUpperCase()}</b>`;
                div.onclick = () => {
                    closeSearch();
                    openChat(c.key, d.username);
                };
                resBox.appendChild(div);
            });
        };

        // --- OPEN CHAT & REALTIME MESSAGE ---
        window.openChat = (tid, name) => {
            ACTIVE_CHAT = tid;
            document.getElementById('chat-target-name').innerText = name.toUpperCase();
            document.getElementById('chat-avatar').innerText = name[0].toUpperCase();
            document.getElementById('chat-view').style.display = 'flex';

            const cid = [ME.uid, tid].sort().join('_');
            onValue(ref(db, `messages/${cid}`), (snap) => {
                const box = document.getElementById('msg-box');
                box.innerHTML = '';
                snap.forEach(m => {
                    const d = m.val();
                    const isMe = d.s === ME.uid;
                    const b = document.createElement('div');
                    b.style = `max-width:80%; padding:10px 15px; border-radius:15px; font-size:14px; ${isMe ? 'align-self:flex-end; background:var(--accent);' : 'align-self:flex-start; background:var(--input);'}`;
                    b.innerText = d.t;
                    box.appendChild(b);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.send = () => {
            const i = document.getElementById('m-input');
            if (!i.value.trim() || !ACTIVE_CHAT) return;
            const cid = [ME.uid, ACTIVE_CHAT].sort().join('_');
            const p = { s: ME.uid, t: i.value, ts: serverTimestamp() };
            push(ref(db, `messages/${cid}`), p);
            update(ref(db, `inbox/${ME.uid}/${ACTIVE_CHAT}`), { l: i.value, ts: serverTimestamp() });
            update(ref(db, `inbox/${ACTIVE_CHAT}/${ME.uid}`), { l: i.value, ts: serverTimestamp() });
            i.value = '';
        };

        function renderInbox() {
            onValue(ref(db, `inbox/${ME.uid}`), (snap) => {
                const box = document.getElementById('inbox-list');
                box.innerHTML = '';
                snap.forEach(c => {
                    get(ref(db, `users/${c.key}`)).then(u => {
                        const ud = u.val();
                        const row = document.createElement('div');
                        row.style = "padding:15px 20px; border-bottom:1px solid var(--border); display:flex; gap:15px; align-items:center;";
                        row.innerHTML = `<div style="width:45px; height:45px; border-radius:50%; background:var(--input); display:flex; align-items:center; justify-content:center; font-weight:800; border:1px solid var(--border);">${ud.username[0].toUpperCase()}</div><div style="flex:1"><b>${ud.username.toUpperCase()}</b><br><small style="color:var(--dim)">${c.val().l}</small></div>`;
                        row.onclick = () => openChat(c.key, ud.username);
                        box.prepend(row);
                    });
                });
            });
        }
    </script>
</body>
</html>
