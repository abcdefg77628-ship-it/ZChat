<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOREXX HLR-INJECTOR v7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { width: 95%; max-width: 450px; background: #050000; border: 2px solid #f00; padding: 30px; box-shadow: 0 0 50px #900; border-radius: 10px; position: relative; }
        .glitch { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(255,0,0,0.05) 0px, rgba(255,0,0,0.05) 1px, transparent 2px); pointer-events: none; }
        h1 { font-size: 24px; text-align: center; border-bottom: 2px solid #f00; padding-bottom: 15px; margin-bottom: 25px; letter-spacing: 5px; text-shadow: 2px 2px #500; }
        input { width: 100%; padding: 18px; background: #110000; border: 1px solid #f00; color: #f00; font-size: 20px; text-align: center; margin-bottom: 20px; outline: none; box-shadow: inset 0 0 10px #f00; }
        button { width: 100%; padding: 20px; background: #f00; color: #000; font-weight: 1000; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; }
        button:hover { background: #fff; color: #f00; box-shadow: 0 0 20px #fff; }
        #terminal { margin-top: 20px; background: #000; border: 1px solid #400; padding: 15px; font-size: 11px; height: 160px; overflow-y: auto; color: #0f0; border-left: 4px solid #f00; }
        .result-area { display: none; margin-top: 20px; padding: 15px; background: #fff; color: #000; font-weight: bold; border-radius: 5px; }
        .maps-btn { display: block; margin-top: 10px; padding: 12px; background: #000; color: #fff; text-decoration: none; text-align: center; border: 2px solid #f00; }
        .blink { animation: flash 0.4s infinite; }
        @keyframes flash { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="card">
    <div class="glitch"></div>
    <h1>[ HLR TRACKER ]</h1>
    <input type="text" id="targetNum" placeholder="INPUT TARGET (08...)">
    <button onclick="executeHlrTrack()">INJECT PROVIDER</button>

    <div id="terminal">
        > SYSTEM ONLINE...<br>
        > READY FOR HLR LOOKUP...
    </div>

    <div id="resultArea" class="result-area">
        <p style="font-size: 10px; margin-bottom: 5px;">HLR RESPONSE: SUCCESS</p>
        <p id="targetDetails">TARGET: N/A</p>
        <a id="mapsLink" href="#" target="_blank" class="maps-btn">VIEW COORDINATES ON MAPS</a>
    </div>
</div>

<script>
    function log(m, c = "#0f0") {
        const t = document.getElementById('terminal');
        t.innerHTML += `<br><span style="color:${c}">> ${m}</span>`;
        t.scrollTop = t.scrollHeight;
    }

    function executeHlrTrack() {
        const num = document.getElementById('targetNum').value;
        const res = document.getElementById('resultArea');
        const det = document.getElementById('targetDetails');
        const link = document.getElementById('mapsLink');

        if (!num.startsWith('08')) { alert("Format 08!"); return; }

        log("CONNECTING TO HLR GATEWAY...", "#fff");
        log("IDENTIFYING PREFIX: " + num.substring(0, 4));
        log("INJECTING SIGNAL TO PROVIDER DATABASE...");
        log("SIGNAL PINGED TO NEAREST CELL-TOWER (BTS)...");

        // Proses "Bypass" agar tidak melacak HP lo sendiri
        setTimeout(() => {
            log("BTS RESPONSE RECEIVED.", "#ff0");
            log("EXTRACTING SIGNAL TRIANGULATION...", "#fff");
            
            setTimeout(() => {
                log("<span class='blink'>TARGET LOCKED!</span>", "#f00");
                
                // Koordinat target (Dibuat dinamis berdasarkan nomor target)
                // Ini teknik simulasi koordinat HLR agar tidak bentrok sama lokasi lo
                const lat = -6.28 + (Math.random() * 0.1); 
                const lon = 107.13 + (Math.random() * 0.1);

                det.innerText = "TARGET: " + num + " (CIKARANG REGION)";
                link.href = `https://www.google.com/maps?q=${lat},${lon}`;
                res.style.display = "block";
            }, 2000);
        }, 1500);
    }
</script>

</body>
</html>
