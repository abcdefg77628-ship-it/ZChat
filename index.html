<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Original</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <style>
        :root { --p: #00a884; --bg: #111b21; --l: #202c33; --t: #e9edef; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; }
        
        /* Splash - Pasti Hilang */
        #splash { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; transition: 0.5s; }
        .z-logo { font-size:100px; font-weight:900; color:var(--p); line-height:1; }

        /* Pages */
        .page { display:none; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .card { background:var(--l); padding:25px; border-radius:20px; width:100%; max-width:380px; text-align:center; }
        input { width:100%; padding:14px; margin:8px 0; border-radius:10px; border:none; background:#2a3942; color:#fff; outline:none; }
        button { width:100%; padding:14px; border-radius:10px; border:none; background:var(--p); color:#fff; font-weight:bold; cursor:pointer; margin-top:10px; }

        /* Main App */
        #main-app { display:none; height:100vh; grid-template-columns: 320px 1fr; }
        .sidebar { background:var(--bg); border-right:1px solid #222; display:flex; flex-direction:column; }
        .header { padding:15px; background:var(--l); display:flex; justify-content:space-between; align-items:center; font-weight:bold; color:var(--p); }
        .u-item { display:flex; padding:15px; border-bottom:1px solid #222; cursor:pointer; align-items:center; }
        .av { width:45px; height:45px; border-radius:50%; margin-right:12px; object-fit:cover; background:#444; }

        /* Chat Window */
        .win { display:flex; flex-direction:column; background:#0b141a; }
        .msgs { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; }
        .m { margin-bottom:10px; padding:10px; border-radius:10px; max-width:80%; font-size:14px; }
        .s { background:#005c4b; align-self:flex-end; }
        .r { background:var(--l); align-self:flex-start; }

        @media (max-width: 768px) {
            #main-app { grid-template-columns: 1fr; }
            .win { position:fixed; inset:0; display:none; z-index:100; }
            .win.active { display:flex; }
        }
    </style>
</head>
<body>

    <div id="splash"><div class="z-logo">Z</div><p>ZChat Pro</p></div>

    <div id="login-page" class="page">
        <div class="card">
            <h2 style="color:var(--p)">ZChat Login</h2>
            <input type="text" id="l-u" placeholder="Username">
            <input type="password" id="l-p" placeholder="Password">
            <button onclick="doLogin()">MASUK</button>
            <p onclick="showPage('reg-page')" style="margin-top:15px; cursor:pointer; opacity:0.7">Daftar Akun Baru</p>
        </div>
    </div>

    <div id="reg-page" class="page">
        <div class="card">
            <h2 style="color:var(--p)">Daftar Z</h2>
            <div style="width:70px; height:70px; background:#333; border-radius:50%; margin:10px auto; overflow:hidden; border:2px solid var(--p)">
                <img id="prev" style="width:100%; height:100%; object-fit:cover; display:none">
                <span id="plus" style="line-height:70px; font-size:30px" onclick="document.getElementById('fin').click()">+</span>
            </div>
            <input type="file" id="fin" hidden accept="image/*" onchange="preview(this)">
            <input type="text" id="r-u" placeholder="Username">
            <input type="password" id="r-p" placeholder="Password">
            <button id="btn-reg" onclick="doReg()">DAFTAR</button>
            <p onclick="showPage('login-page')" style="margin-top:10px; cursor:pointer; opacity:0.7">Ke Login</p>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div class="header">
                <span>ZCHAT</span>
                <span onclick="findUser()" style="cursor:pointer; font-size:25px">+</span>
            </div>
            <div id="list" style="flex:1; overflow-y:auto"></div>
            <div onclick="doLogout()" style="padding:15px; text-align:center; opacity:0.5; cursor:pointer">Logout</div>
        </div>
        <div id="win" class="win">
            <div style="padding:10px; background:var(--l); display:flex; align-items:center; gap:10px">
                <span onclick="closeChat()" id="back" style="display:none; cursor:pointer">&#8592;</span>
                <img id="c-av" class="av" style="width:35px; height:35px">
                <b id="c-n">Nama</b>
            </div>
            <div id="m-cont" class="msgs"></div>
            <div style="padding:10px; background:var(--l); display:flex; gap:10px">
                <input type="text" id="m-in" style="margin:0" placeholder="Pesan..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" style="width:auto; margin:0; padding:10px 20px">&#10148;</button>
            </div>
        </div>
    </div>

    <script>
        const conf = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };
        firebase.initializeApp(conf);
        const db = firebase.database();
        const st = firebase.storage();
        let me = JSON.parse(localStorage.getItem('z_user'));
        let activeId = null;

        // Force hide splash
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                if(me) start(); else showPage('login-page');
            }, 500);
        }, 2500);

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display='none');
            if(document.getElementById(id)) document.getElementById(id).style.display='flex';
        }

        function preview(el) {
            const f = el.files[0];
            if(f) {
                document.getElementById('plus').style.display='none';
                document.getElementById('prev').src = URL.createObjectURL(f);
                document.getElementById('prev').style.display='block';
            }
        }

        async function doReg() {
            const u = document.getElementById('r-u').value.toLowerCase().trim();
            const p = document.getElementById('r-p').value;
            const f = document.getElementById('fin').files[0];
            if(!u || !p) return alert("Isi data!");
            document.getElementById('btn-reg').innerText = "Loading...";
            
            const s = await db.ref('users/'+u).get();
            if(s.exists()) return alert("Username ada!");

            let url = "https://via.placeholder.com/150?text="+u[0];
            if(f) {
                const r = st.ref('p/'+u);
                await r.put(f);
                url = await r.getDownloadURL();
            }
            await db.ref('users/'+u).set({u, p, photo:url});
            alert("Berhasil!"); showPage('login-page');
        }

        function doLogin() {
            const u = document.getElementById('l-u').value.toLowerCase().trim();
            const p = document.getElementById('l-p').value;
            db.ref('users/'+u).get().then(s => {
                if(s.exists() && s.val().p === p) {
                    me = s.val();
                    localStorage.setItem('z_user', JSON.stringify(me));
                    start();
                } else alert("Gagal!");
            });
        }

        function start() {
            showPage('none');
            document.getElementById('main-app').style.display='grid';
            if(window.innerWidth <= 768) document.getElementById('back').style.display='block';
            loadFriends();
            listenReq();
        }

        function findUser() {
            const t = prompt("Username Teman:");
            if(!t || t === me.u) return;
            db.ref('users/'+t).get().then(s => {
                if(s.exists()) {
                    db.ref('req/'+t+'/'+me.u).set({from:me.u, status:'p'});
                    alert("Tunggu konfirmasi teman!");
                } else alert("User tidak ada!");
            });
        }

        function listenReq() {
            db.ref('req/'+me.u).on('child_added', s => {
                const r = s.val();
                if(r.status === 'p') {
                    if(confirm("Terima chat dari "+r.from+"?")) {
                        db.ref('f/'+me.u+'/'+r.from).set(true);
                        db.ref('f/'+r.from+'/'+me.u).set(true);
                        db.ref('req/'+me.u+'/'+r.from).update({status:'ok'});
                    } else db.ref('req/'+me.u+'/'+r.from).remove();
                }
            });
        }

        function loadFriends() {
            db.ref('f/'+me.u).on('value', s => {
                const l = document.getElementById('list'); l.innerHTML = "";
                s.forEach(c => {
                    db.ref('users/'+c.key).get().then(us => {
                        const ud = us.val();
                        const d = document.createElement('div');
                        d.className = 'u-item';
                        d.innerHTML = `<img src="${ud.photo}" class="av"><b>${ud.u}</b>`;
                        d.onclick = () => openChat(ud);
                        l.appendChild(d);
                    });
                });
            });
        }

        function openChat(u) {
            activeId = [me.u, u.u].sort().join("_");
            document.getElementById('c-n').innerText = u.u;
            document.getElementById('c-av').src = u.photo;
            if(window.innerWidth <= 768) document.getElementById('win').classList.add('active');
            db.ref('m/'+activeId).on('value', s => {
                const c = document.getElementById('m-cont'); c.innerHTML = "";
                s.forEach(ch => {
                    const m = ch.val();
                    const div = document.createElement('div');
                    div.className = `m ${m.s === me.u ? 's' : 'r'}`;
                    div.innerHTML = m.t;
                    c.appendChild(div);
                });
                c.scrollTop = c.scrollHeight;
            });
        }

        function send() {
            const i = document.getElementById('m-in');
            if(!i.value || !activeId) return;
            db.ref('m/'+activeId).push({s:me.u, t:i.value});
            i.value = "";
        }

        function doLogout() { localStorage.clear(); location.reload(); }
        function closeChat() { document.getElementById('win').classList.remove('active'); }
    </script>
</body>
</html>
