<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERA - Light Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --wa-light-green: #25d366; 
            --wa-soft-green: #dcf8c6; 
            --wa-bg: #ffffff; 
            --wa-panel: #f0f2f5; 
            --wa-text: #3b4a54;
            --glow: #00ffcc; 
        }
        
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #e5ddd5; color: var(--wa-text); overflow: hidden; }

        /* INTRO */
        #intro { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .zera-logo { font-size: 4rem; font-weight: 900; color: var(--wa-light-green); animation: slideDown 1.2s forwards; text-shadow: 0 0 10px rgba(0,0,0,0.1); }
        @keyframes slideDown { 0% { transform: translateY(-300px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        /* LOGIN CENTERED */
        .page-center { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; background: #f0f2f5; padding: 20px; }
        .login-card { width: 100%; max-width: 350px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        .login-card h2 { margin-bottom: 10px; color: var(--wa-light-green); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--wa-light-green); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        /* MAIN APP */
        #main-app { display: none; height: 100vh; flex-direction: column; background: white; }
        .header { background: var(--wa-panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border-bottom: 1px solid #ddd; }
        
        .contact-item { padding: 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; cursor: pointer; background: white; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #00a884; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }

        /* CHAT ROOM */
        #chat-room { display: none; position: fixed; inset: 0; background: #e5ddd5; flex-direction: column; z-index: 100; }
        .chat-view { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; 
            background-size: cover; background-position: center;
        }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 10px; margin-bottom: 4px; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-in { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .msg-out { background: var(--wa-soft-green); align-self: flex-end; border-top-right-radius: 0; }

        .footer { background: var(--wa-panel); padding: 10px; display: flex; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--wa-light-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="intro"><div class="zera-logo">ZERA</div></div>

    <div id="login-page" class="page-center">
        <div class="login-card">
            <h2>MOHON MASUK</h2>
            <p style="font-size: 12px; color: gray;">Gunakan username lama untuk masuk kembali</p>
            <input type="text" id="myUser" placeholder="Username">
            <input type="password" id="myPass" placeholder="Password">
            <button class="btn" onclick="login()">MASUK / RECOVER</button>
        </div>
    </div>

    <div id="loading-page" class="page-center">
        <div class="login-card">
            <h3 id="load-status">Mengecek Sinyal...</h3>
            <div style="width:100%; background:#eee; height:8px; border-radius:10px; overflow:hidden;">
                <div id="bar" style="width:0%; height:100%; background:var(--wa-light-green);"></div>
            </div>
            <div id="pct" style="margin-top:10px">0%</div>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <span>ZERA MESSENGER</span>
            <div onclick="showSettings()" style="cursor:pointer">⋮</div>
        </div>
        <div id="contact-list" style="flex:1; overflow-y:auto;"></div>
        <div class="fab" onclick="addContact()">+</div>
    </div>

    <div id="chat-room">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <span onclick="closeChat()" style="margin-right:15px; cursor:pointer;">←</span>
                <span id="chatting-with">Nama</span>
            </div>
            <div id="chat-opts" onclick="showChatMenu()" style="cursor:pointer">⋮</div>
        </div>
        <div id="chatBox" class="chat-view"></div>
        <div class="footer">
            <input type="text" id="msgInput" placeholder="Ketik pesan...">
            <button class="btn" onclick="send()" style="width:50px">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let MY_NAME = localStorage.getItem("zera_user") || "";
        let CURRENT_ROOM = "";
        let CURRENT_FRIEND = "";

        // INTRO & KEEP LOGIN
        setTimeout(() => {
            document.getElementById('intro').style.display = 'none';
            if(MY_NAME) { login(true); } 
            else { document.getElementById('login-page').style.display = 'flex'; }
        }, 3000);

        window.login = async (isAuto = false) => {
            if(!isAuto) {
                const u = document.getElementById('myUser').value.trim().toLowerCase();
                const p = document.getElementById('myPass').value;
                if(!u || !p) return Swal.fire("Isi data!", "", "error");
                
                // Simpan data untuk recovery/login ulang
                const userRef = ref(db, `accounts/${u}`);
                const snap = await get(userRef);
                
                if(snap.exists() && snap.val().pass !== p) {
                    return Swal.fire("Password Salah!", "Akun ini sudah ada.", "error");
                } else if(!snap.exists()) {
                    await set(userRef, { pass: p });
                }
                
                MY_NAME = u;
                localStorage.setItem("zera_user", u);
            }

            document.getElementById('login-page').style.display = 'none';
            document.getElementById('loading-page').style.display = 'flex';
            
            let prog = 0;
            let itv = setInterval(() => {
                if(!navigator.onLine) return;
                prog += 5;
                document.getElementById('bar').style.width = prog + "%";
                document.getElementById('pct').innerText = prog + "%";
                if(prog >= 100) {
                    clearInterval(itv);
                    document.getElementById('loading-page').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    loadList();
                }
            }, 80);
        };

        window.addContact = async () => {
            const { value: friend } = await Swal.fire({ title: 'Tambah User', input: 'text', background: '#fff', color: '#000' });
            if(friend) {
                const f = friend.trim().toLowerCase();
                const room = [MY_NAME, f].sort().join("_");
                await set(ref(db, `users/${MY_NAME}/contacts/${f}`), { room: room });
                await set(ref(db, `users/${f}/contacts/${MY_NAME}`), { room: room });
            }
        };

        function loadList() {
            onValue(ref(db, `users/${MY_NAME}/contacts`), (snap) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    if(c.val().blocked) return; // Sembunyikan jika diblokir
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.innerHTML = `<div class="avatar">${c.key[0].toUpperCase()}</div><div><b>${c.key}</b><br><small>${c.val().muted ? '🔇 Muted' : 'Online'}</small></div>`;
                    div.onclick = () => openChat(c.key, c.val().room);
                    list.appendChild(div);
                });
            });
        }

        window.openChat = (name, room) => {
            CURRENT_ROOM = room; CURRENT_FRIEND = name;
            document.getElementById('chatting-with').innerText = name;
            document.getElementById('chat-room').style.display = 'flex';
            const cb = document.getElementById('chatBox');
            
            // Set wallpaper tersimpan
            cb.style.backgroundImage = `url('${localStorage.getItem("wp_"+MY_NAME) || ""}')`;

            onValue(ref(db, `messages/${room}`), (snap) => {
                cb.innerHTML = "";
                snap.forEach(m => {
                    const d = document.createElement('div');
                    d.className = `bubble ${m.val().sender === MY_NAME ? 'msg-out' : 'msg-in'}`;
                    d.innerText = m.val().text;
                    cb.appendChild(d);
                });
                cb.scrollTop = cb.scrollHeight;
            });
        };

        window.send = () => {
            const inp = document.getElementById('msgInput');
            if(!inp.value) return;
            push(ref(db, `messages/${CURRENT_ROOM}`), { sender: MY_NAME, text: inp.value });
            inp.value = "";
        };

        window.showSettings = () => {
            Swal.fire({
                title: 'Pengaturan',
                html: `
                    <button class="btn" onclick="changeWP()" style="margin-bottom:10px">Ganti Wallpaper</button>
                    <button class="btn" onclick="logout()" style="background:red">Logout</button>
                `,
                showConfirmButton: false
            });
        };

        window.changeWP = () => {
            const wps = [
                'https://i.pinimg.com/originals/79/5c/36/795c3614275030093672322580ef1488.jpg',
                'https://i.pinimg.com/736x/ec/64/00/ec64005b57f0022207b99c090623d3a0.jpg',
                'https://wallpaperaccess.com/full/1288076.jpg',
                'https://e0.pxfuel.com/wallpapers/315/593/desktop-wallpaper-green-whatsapp-whatsapp-chat.jpg',
                'https://images.rawpixel.com/image_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIyLTA1L3B4MTM2OTgxMy1pbWFnZS1rd3Z4eHA5Mi5qcGc.jpg'
            ];
            let html = wps.map((url, i) => `<img src="${url}" width="60" height="80" onclick="setWP('${url}')" style="margin:5px; cursor:pointer; border:2px solid #ddd">`).join("");
            Swal.fire({ title: 'Pilih Wallpaper', html: html });
        };

        window.setWP = (url) => {
            localStorage.setItem("wp_"+MY_NAME, url);
            document.getElementById('chatBox').style.backgroundImage = `url('${url}')`;
            Swal.fire("Berhasil!", "", "success");
        };

        window.showChatMenu = () => {
            Swal.fire({
                title: 'Opsi Chat',
                html: `
                    <button class="btn" onclick="muteUser()" style="margin-bottom:10px">Mute / Unmute</button>
                    <button class="btn" onclick="blockUser()" style="background:orange">Blokir Kontak</button>
                `,
                showConfirmButton: false
            });
        };

        window.muteUser = async () => {
            const path = `users/${MY_NAME}/contacts/${CURRENT_FRIEND}/muted`;
            const snap = await get(ref(db, path));
            await set(ref(db, path), !snap.val());
            Swal.fire("Status Mute Diubah", "", "success");
        };

        window.blockUser = async () => {
            await set(ref(db, `users/${MY_NAME}/contacts/${CURRENT_FRIEND}/blocked`), true);
            Swal.fire("Diblokir", "", "success");
            closeChat();
        };

        window.logout = () => { localStorage.clear(); location.reload(); };
        window.closeChat = () => document.getElementById('chat-room').style.display = 'none';
    </script>
</body>
    </html>
