<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-side: #161925;
            --accent: #3d5afe;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --bubble-me: #3d5afe;
            --bubble-them: #232736;
            --danger: #ff5252;
            --success: #00e676;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-dark: #f8fafc;
            --bg-side: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --bubble-me: #3d5afe;
            --bubble-them: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid var(--accent);
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Auth Layout */
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-side);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .auth-card h2 { margin-bottom: 24px; text-align: center; font-weight: 700; }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: var(--bg-dark);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            outline: none;
        }

        [data-theme="light"] input { color: #000; border: 1px solid #ddd; }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        button:active { transform: scale(0.98); }

        .auth-toggle {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: var(--text-dim);
            cursor: pointer;
        }

        /* Main App Layout */
        #app-interface {
            display: none;
            height: 100vh;
            grid-template-columns: 280px 1fr;
        }

        .sidebar {
            background: var(--bg-side);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .profile-section {
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 45px; height: 45px; 
            background: var(--accent); 
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        .online-badge { font-size: 12px; color: var(--success); }

        .menu-list { flex: 1; list-style: none; }
        .menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: 8px; cursor: pointer;
            transition: var(--transition); color: var(--text-dim);
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }

        /* Chat Area */
        .chat-main {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .chat-header {
            padding: 16px 24px;
            background: var(--bg-side);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #message-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 14px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.me {
            align-self: flex-end;
            background: var(--bubble-me);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .msg.them {
            align-self: flex-start;
            background: var(--bubble-them);
            border-bottom-left-radius: 2px;
        }

        .msg-info { font-size: 11px; margin-bottom: 4px; opacity: 0.7; }
        .msg-time { font-size: 10px; margin-top: 4px; text-align: right; opacity: 0.6; }

        .msg-actions {
            position: absolute; top: 0; right: -30px;
            display: none; cursor: pointer; color: var(--danger);
        }
        .msg.me:hover .msg-actions { display: block; }

        /* Input Area */
        .input-area {
            padding: 20px 24px;
            background: var(--bg-side);
            display: flex;
            gap: 12px;
        }

        .input-area input { margin-bottom: 0; flex: 1; }

        /* Modals */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-side);
            padding: 30px; border-radius: 16px;
            width: 90%; max-width: 400px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #app-interface { grid-template-columns: 1fr; }
            .sidebar { 
                position: fixed; left: -100%; top: 0; height: 100%; width: 80%; 
                z-index: 100; transition: 0.3s; 
            }
            .sidebar.active { left: 0; }
        }
    </style>
</head>
<body data-theme="dark">

    <div id="loading-screen"><div class="loader"></div></div>

    <div id="auth-interface" class="auth-container">
        <div class="auth-card" id="login-form">
            <h2>ZChat Pro</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
            <div class="auth-toggle" onclick="toggleAuth(true)">Don't have an account? Register</div>
        </div>

        <div class="auth-card" id="register-form" style="display: none;">
            <h2>Create Account</h2>
            <input type="text" id="reg-user" placeholder="Username">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <input type="password" id="reg-confirm" placeholder="Confirm Password">
            <button onclick="handleRegister()">Register</button>
            <div class="auth-toggle" onclick="toggleAuth(false)">Already have an account? Login</div>
        </div>
    </div>

    <div id="app-interface">
        <aside class="sidebar" id="sidebar">
            <div class="profile-section">
                <div class="user-info">
                    <div class="avatar" id="my-initial">Z</div>
                    <div>
                        <div id="my-username" style="font-weight: 600;">Username</div>
                        <div class="online-badge">Online</div>
                    </div>
                </div>
            </div>
            <ul class="menu-list">
                <li class="menu-item" onclick="openSettings()">
                    <span class="material-icons-round">settings</span> Settings
                </li>
                <li class="menu-item" onclick="toggleTheme()">
                    <span class="material-icons-round">dark_mode</span> Change Theme
                </li>
                <li class="menu-item" style="color: var(--danger)" onclick="handleLogout()">
                    <span class="material-icons-round">logout</span> Logout
                </li>
            </ul>
            <div style="font-size: 12px; color: var(--text-dim);">
                Online Members: <span id="online-count">0</span>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <span class="material-icons-round" id="menu-toggle" style="cursor: pointer;">menu</span>
                <div style="font-weight: 600;">Global Group Chat</div>
                <div id="typing-status" style="font-size: 12px; color: var(--text-dim);"></div>
            </header>

            <div id="message-container"></div>

            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="checkEnter(event)">
                <button style="width: 60px;" onclick="sendMessage()">
                    <span class="material-icons-round">send</span>
                </button>
            </div>
        </main>
    </div>

    <div class="modal" id="settings-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 20px;">Settings</h3>
            <p style="color: var(--text-dim); margin-bottom: 20px;">Manage your account and privacy.</p>
            <button onclick="closeModal(null)">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let lastMessageTime = 0;
        let blockedUsers = [];
        let mutedUsers = [];

        // Auth Logic
        auth.onAuthStateChanged(user => {
            document.getElementById('loading-screen').style.display = 'none';
            if (user) {
                currentUser = user;
                showApp();
                setupPresence();
                listenMessages();
                updateOnlineCount();
            } else {
                showAuth();
            }
        });

        function toggleAuth(isReg) {
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
            document.getElementById('register-form').style.display = isReg ? 'block' : 'none';
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!user || !email || pass.length < 6) return alert("Valid data required (Pass min 6 chars)");
            if (pass !== confirm) return alert("Passwords do not match");

            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await res.user.updateProfile({ displayName: user });
                await db.ref('users/' + res.user.uid).set({ username: user, status: 'online' });
                location.reload();
            } catch (e) { alert(e.message); }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } catch (e) { alert(e.message); }
        }

        function handleLogout() { auth.signOut().then(() => location.reload()); }

        // Core App Logic
        function showApp() {
            document.getElementById('auth-interface').style.display = 'none';
            document.getElementById('app-interface').style.display = 'grid';
            document.getElementById('my-username').innerText = currentUser.displayName;
            document.getElementById('my-initial').innerText = currentUser.displayName.charAt(0).toUpperCase();
        }

        function showAuth() {
            document.getElementById('auth-interface').style.display = 'flex';
            document.getElementById('app-interface').style.display = 'none';
        }

        // Messaging Logic
        function sendMessage() {
            const now = Date.now();
            if (now - lastMessageTime < 1500) return alert("Anti-spam: Wait a moment");
            
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val) return;

            db.ref('messages').push({
                uid: currentUser.uid,
                username: currentUser.displayName,
                text: val,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            input.value = '';
            lastMessageTime = now;
        }

        function listenMessages() {
            db.ref('messages').limitToLast(50).on('value', snapshot => {
                const container = document.getElementById('message-container');
                container.innerHTML = '';
                snapshot.forEach(child => {
                    const data = child.val();
                    if (blockedUsers.includes(data.uid)) return;
                    
                    const isMe = data.uid === currentUser.uid;
                    const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'me' : 'them'}`;
                    div.innerHTML = `
                        <div class="msg-info">${isMe ? 'You' : data.username}</div>
                        <div class="msg-text">${data.text}</div>
                        <div class="msg-time">${time}</div>
                        ${isMe ? `<span class="material-icons-round msg-actions" onclick="deleteMsg('${child.key}')">delete</span>` : ''}
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
                if (!document.hasFocus() && snapshot.numChildren() > 0) {
                    new Notification("ZChat Pro: New Message");
                }
            });
        }

        function deleteMsg(id) {
            if (confirm("Delete this message?")) db.ref('messages/' + id).remove();
        }

        // Presence & Theme
        function setupPresence() {
            const statusRef = db.ref('users/' + currentUser.uid + '/status');
            db.ref('.info/connected').on('value', snap => {
                if (snap.val() === false) return;
                statusRef.onDisconnect().set('offline');
                statusRef.set('online');
            });
        }

        function updateOnlineCount() {
            db.ref('users').on('value', snap => {
                let count = 0;
                snap.forEach(u => { if (u.val().status === 'online') count++; });
                document.getElementById('online-count').innerText = count;
            });
        }

        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
        }

        // UI Helpers
        function checkEnter(e) { if (e.key === 'Enter') sendMessage(); }
        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeModal(e) { document.getElementById('settings-modal').style.display = 'none'; }

        // Sidebar Toggle Mobile
        document.getElementById('menu-toggle').onclick = () => {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Request Notification
        if (Notification.permission !== "granted") Notification.requestPermission();

    </script>
</body>
</html>
