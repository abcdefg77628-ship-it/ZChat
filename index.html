<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat - zZerr44</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --sidebar-color: #1e1f22;
            --chat-bg: radial-gradient(circle, #0044ff 0%, #000000 100%);
            --accent-z: #00d4ff;
            --text-main: #ffffff;
            --msg-sent: #005c4b;
            --msg-rec: #202329;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* Custom Notification */
        #custom-notification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #2b2d31; border-bottom: 3px solid var(--accent-z);
            padding: 15px 25px; z-index: 10000; transition: 0.5s; border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { background: #18191c; padding: 40px; border-radius: 12px; width: 350px; text-align: center; }
        
        .logo-z {
            width: 70px; height: 70px; border: 4px solid var(--accent-z); margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; color: var(--accent-z); position: relative;
        }
        .logo-z::after { content: ''; position: absolute; width: 110%; height: 4px; background: var(--accent-z); transform: rotate(-45deg); }

        input { width: 100%; padding: 12px; margin: 8px 0; background: #1e1f22; border: 1px solid #333; color: white; border-radius: 5px; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: var(--accent-z); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:active { transform: scale(0.95); transition: 0.1s; }

        /* Main App */
        .app-container { display: none; height: 100vh; grid-template-columns: 70px 260px 1fr; }
        .creator-tag { position: absolute; top: 10px; right: 15px; font-size: 11px; color: #555; z-index: 100; }

        .sidebar-left { background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 20px; }
        .sidebar-friends { background: #2b2d31; border-right: 1px solid #1e1f22; display: flex; flex-direction: column; }
        
        .chat-area { display: flex; flex-direction: column; background: var(--chat-bg); position: relative; }
        .chat-header { height: 60px; background: rgba(30, 31, 34, 0.95); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #111; }
        
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--msg-sent); border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--msg-rec); border-bottom-left-radius: 2px; }

        .typing-info { font-size: 11px; color: #00d4ff; padding: 5px 20px; height: 20px; font-style: italic; }

        .input-box { padding: 20px; background: #1e1f22; display: flex; gap: 10px; align-items: center; }
        .input-box input { flex: 1; margin: 0; }
        .btn-icon { width: 45px; background: #333; color: white; padding: 10px; }

        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #444; object-fit: cover; border: 2px solid transparent; }
        .avatar.active { border-color: var(--accent-z); }

        .friend-item { padding: 12px; margin: 5px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .friend-item:hover { background: #35373c; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #888; }
        .status-dot.online { background: #23a55a; box-shadow: 0 0 5px #23a55a; }

        .dropdown-menu { position: absolute; top: 55px; right: 10px; background: #18191c; border: 1px solid #333; border-radius: 5px; display: none; z-index: 500; min-width: 150px; }
        .dropdown-menu div { padding: 12px; cursor: pointer; font-size: 13px; }
        .dropdown-menu div:hover { background: #2b2d31; }

        /* Hidden Scrollbar */
        .messages-container::-webkit-scrollbar { width: 5px; }
        .messages-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="custom-notification">Pesan</div>
    <div class="creator-tag">zZerr44</div>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="logo-z">Z</div>
            <h2 style="margin-bottom: 5px;">ZChat</h2>
            <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Private Real-time Connection</p>
            <input type="text" id="user-input" placeholder="Username (Min 8 Karakter)">
            <input type="password" id="pass-input" placeholder="Password (Min 8 Angka)">
            <button onclick="handleAuth()">MASUK / DAFTAR</button>
        </div>
    </div>

    <div class="app-container" id="main-app">
        <div class="sidebar-left">
            <img id="my-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Z1" class="avatar" onclick="openSettings()" title="Pengaturan Profil">
            <div style="flex: 1;"></div>
            <button class="btn-icon" style="border-radius: 50%;" onclick="addFriend()">+</button>
        </div>

        <div class="sidebar-friends">
            <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid #1e1f22;">Teman</div>
            <div id="friend-list" style="overflow-y: auto; flex: 1;"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div id="active-chat-user">Pilih teman untuk memulai</div>
                <div style="cursor: pointer; font-size: 20px;" onclick="toggleMenu()">⋮</div>
                <div class="dropdown-menu" id="menu-box">
                    <div onclick="showCopyright()">Hak Cipta</div>
                    <div onclick="logout()" style="color: #ff4747;">Logout</div>
                </div>
            </div>

            <div class="messages-container" id="chat-box"></div>
            <div class="typing-info" id="typing-status"></div>

            <div class="input-box">
                <button class="btn-icon" onclick="document.getElementById('file-input').click()">📷</button>
                <input type="file" id="file-input" hidden accept="image/*" onchange="uploadImage(this)">
                <input type="text" id="msg-input" placeholder="Tulis pesan..." oninput="sendTypingStatus()">
                <button class="btn-icon" style="background: var(--accent-z); color: black;" onclick="sendChat()">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = localStorage.getItem('zchat_user') || null;
        let activeFriend = null;

        window.showNotif = (txt) => {
            const n = document.getElementById('custom-notification');
            n.innerText = txt; n.style.top = '20px';
            setTimeout(() => n.style.top = '-100px', 3000);
        };

        window.handleAuth = () => {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if(u.length < 8 || p.length < 8) return showNotif("User & Pass minimal 8 karakter!");
            
            currentUser = u;
            localStorage.setItem('zchat_user', u);
            initApp();
        };

        function initApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            
            // Set Online Status
            const statusRef = ref(db, 'status/' + currentUser);
            set(statusRef, { online: true, typing: false });
            onDisconnect(statusRef).remove();

            loadFriends();
        }

        function loadFriends() {
            onValue(ref(db, 'status'), (snapshot) => {
                const list = document.getElementById('friend-list');
                list.innerHTML = '';
                snapshot.forEach((child) => {
                    if(child.key !== currentUser) {
                        const div = document.createElement('div');
                        div.className = 'friend-item';
                        div.innerHTML = `<div class="status-dot ${child.val().online ? 'online' : ''}"></div> ${child.key}`;
                        div.onclick = () => startChat(child.key);
                        list.appendChild(div);
                    }
                });
            });
        }

        window.startChat = (name) => {
            activeFriend = name;
            document.getElementById('active-chat-user').innerText = `Chat dengan ${name}`;
            const chatID = [currentUser, activeFriend].sort().join('_');
            
            onValue(ref(db, 'chats/' + chatID), (snapshot) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snapshot.forEach((msg) => {
                    const data = msg.val();
                    const mDiv = document.createElement('div');
                    mDiv.className = `msg ${data.sender === currentUser ? 'sent' : 'received'}`;
                    
                    if(data.type === 'img') {
                        mDiv.innerHTML = `<img src="${data.content}" style="max-width:100%; border-radius:10px;">`;
                    } else {
                        mDiv.innerText = data.content;
                    }

                    // Delete & Copy feature
                    mDiv.oncontextmenu = (e) => {
                        e.preventDefault();
                        if(confirm("Salin pesan?")) navigator.clipboard.writeText(data.content);
                        if(data.sender === currentUser && confirm("Hapus pesan ini?")) remove(ref(db, `chats/${chatID}/${msg.key}`));
                    };

                    box.appendChild(mDiv);
                });
                box.scrollTop = box.scrollHeight;
            });

            // Listen Typing Status
            onValue(ref(db, `status/${activeFriend}/typing`), (snap) => {
                document.getElementById('typing-status').innerText = snap.val() ? `${activeFriend} sedang mengetik...` : '';
            });
        };

        window.sendChat = () => {
            const inp = document.getElementById('msg-input');
            if(!inp.value || !activeFriend) return;
            const chatID = [currentUser, activeFriend].sort().join('_');
            push(ref(db, 'chats/' + chatID), {
                sender: currentUser,
                content: inp.value,
                type: 'text',
                time: Date.now()
            });
            inp.value = '';
            update(ref(db, `status/${currentUser}`), { typing: false });
        };

        window.sendTypingStatus = () => {
            update(ref(db, `status/${currentUser}`), { typing: true });
            clearTimeout(window.typeTimer);
            window.typeTimer = setTimeout(() => {
                update(ref(db, `status/${currentUser}`), { typing: false });
            }, 2000);
        };

        window.uploadImage = (input) => {
            if(input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const chatID = [currentUser, activeFriend].sort().join('_');
                    push(ref(db, 'chats/' + chatID), {
                        sender: currentUser,
                        content: e.target.result,
                        type: 'img',
                        time: Date.now()
                    });
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.addFriend = () => {
            const f = prompt("Masukkan username teman (Minimal 8 karakter):");
            if(f && f.length >= 8) showNotif("Permintaan terkirim ke " + f);
            else showNotif("User tidak valid!");
        };

        window.toggleMenu = () => {
            const m = document.getElementById('menu-box');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        window.showCopyright = () => alert("ZChat Hak Cipta © 2026 oleh zZerr44.\nSemua sistem berjalan di Firebase Realtime.");

        window.logout = () => { localStorage.clear(); location.reload(); };

        window.openSettings = () => {
            const b = prompt("Ubah Bio kamu:");
            if(b) showNotif("Bio diperbarui!");
        };

        if(currentUser) initApp();
    </script>
</body>
</html>
