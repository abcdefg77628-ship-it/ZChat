<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zchat · real‑time messenger</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, push, onValue, update, remove, get, child, query, orderByChild, equalTo, onDisconnect, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        window.firebaseModules = { getDatabase, ref, set, push, onValue, update, remove, get, child, query, orderByChild, equalTo, onDisconnect, serverTimestamp };
        window.firebaseApp = null;
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: #0b0f17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef2fb;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        #app {
            width: 100%;
            max-width: 460px;
            height: 100vh;
            background: #10141e;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border-radius: 32px 32px 0 0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }
        
        /* Screen container */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #10141e;
            animation: fadeSlide 0.25s ease;
            overflow: hidden;
        }
        
        .screen.active {
            display: flex;
        }
        
        @keyframes fadeSlide {
            0% { opacity: 0.4; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* Header dengan back button */
        .header {
            padding: 16px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0e121b;
            border-bottom: 1px solid #262d3b;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 70px;
        }
        
        .header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            flex: 1;
        }
        
        .back-btn, .hamburger, .close-btn {
            background: transparent;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #b9c8e7;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        
        .back-btn:hover, .hamburger:hover, .close-btn:hover {
            background: #262f40;
        }
        
        .back-btn svg, .hamburger svg, .close-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
        
        /* Content area dengan scroll yang benar */
        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            height: calc(100% - 70px - 60px); /* Header height + bottom nav */
        }
        
        .content.full {
            height: calc(100% - 70px); /* Tanpa bottom nav */
        }
        
        /* Bottom navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            background: #0c101a;
            border-top: 1px solid #262d3b;
            flex-shrink: 0;
            height: 60px;
            z-index: 10;
        }
        
        .nav-item {
            background: transparent;
            border: none;
            color: #7b8aa5;
            font-size: 0.75rem;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
            border-radius: 20px;
            transition: all 0.1s;
            cursor: pointer;
            flex: 1;
            display: flex;
            -webkit-tap-highlight-color: transparent;
        }
        
        .nav-item.active {
            color: #3b82f6;
            background: #1e2638;
        }
        
        .nav-item svg { 
            width: 22px; 
            height: 22px; 
            stroke: currentColor; 
            fill: none; 
            stroke-width: 1.8; 
        }
        
        /* Toast notifications */
        .toast-container {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        
        .toast {
            background: #1f2a3f;
            backdrop-filter: blur(8px);
            color: #f0f4ff;
            padding: 14px 20px;
            border-radius: 60px;
            box-shadow: 0 10px 25px -5px #00000060;
            font-size: 0.95rem;
            font-weight: 500;
            border-left: 4px solid #3b82f6;
            transform: translateX(0);
            animation: slideIn 0.2s ease;
            pointer-events: auto;
            max-width: 100%;
            word-break: break-word;
        }
        
        @keyframes slideIn { 
            from { opacity:0; transform:translateX(30px); } 
            to { opacity:1; transform:translateX(0); } 
        }
        
        /* Auth card */
        .auth-card {
            background: #1b2332;
            border-radius: 36px;
            padding: 32px 24px;
            margin: 20px 0;
            box-shadow: 0 20px 40px -10px black;
            border: 1px solid #2c3547;
            animation: fadeIn 0.3s;
        }
        
        .auth-tabs {
            display: flex;
            gap: 8px;
            background: #0f1622;
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 28px;
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            background: transparent;
            color: #9aa9c1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .auth-tab.active {
            background: #2a344a;
            color: white;
            box-shadow: 0 2px 6px #0a0e16;
        }
        
        /* Input group */
        .input-group {
            margin-bottom: 24px;
            position: relative;
        }
        
        .input-group input {
            width: 100%;
            background: #0f1623;
            border: 1.5px solid #2b3449;
            border-radius: 40px;
            padding: 16px 22px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: border 0.15s;
        }
        
        .input-group input:focus { border-color: #3b82f6; }
        
        .input-group label {
            position: absolute;
            left: 22px;
            top: -10px;
            background: #1b2332;
            padding: 0 6px;
            font-size: 0.8rem;
            color: #a2b4da;
        }
        
        .btn-primary {
            background: #2563eb;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 16px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s;
            box-shadow: 0 10px 20px -8px #1e3a8a80;
            margin-top: 12px;
            -webkit-tap-highlight-color: transparent;
                    }
        
        .btn-primary:active { background: #1d4ed8; }
        .btn-secondary {
            background: #2d374b;
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Friend item */
        .friend-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            background: #1a2332;
            margin: 8px 0;
            border-radius: 50px;
            border: 1px solid #2c364b;
        }
        
        .avatar {
            width: 48px; 
            height: 48px; 
            border-radius: 50%;
            background: #2d3b52;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold; 
            font-size: 1.3rem; 
            color: white;
            flex-shrink: 0;
        }
        
        .online-dot { 
            width: 12px; 
            height: 12px; 
            background: #22c55e; 
            border-radius: 50%; 
            margin-left: 6px; 
            display: inline-block; 
        }
        
        .badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 40px;
            margin-left: auto;
        }
        
        /* Hamburger menu */
        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
        }
        
        .menu-overlay.show {
            display: block;
        }
        
        .menu-panel {
            width: 280px;
            height: 100%;
            background: #141c2b;
            padding: 30px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-right: 1px solid #2b3449;
            transform: translateX(-100%);
            transition: transform 0.25s ease-out;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .menu-overlay.show .menu-panel {
            transform: translateX(0);
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            border-radius: 40px;
            color: #ccd9f0;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .menu-item svg { 
            width: 24px; 
            height: 24px; 
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            flex-shrink: 0;
        }
        
        .menu-item:hover { background: #1e2b40; }
        
        /* Search component */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: #0e121b;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #262d3b;
            align-items: center;
        }
        
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            padding: 12px 0;
            font-size: 1rem;
        }
        
        .search-box input::placeholder { color: #5a6a82; }
        
        /* Chat */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0e121c;
            -webkit-overflow-scrolling: touch;
            height: calc(100% - 70px - 80px);
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 24px;
            word-wrap: break-word;
            animation: pop 0.2s;
        }
        
        .message.own {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 6px;
        }
        
        .message.other {
            align-self: flex-start;
            background: #262f41;
            color: #e5eefb;
            border-bottom-left-radius: 6px;
        }
        
        .timestamp {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        
        .chat-footer {
            display: flex;
            padding: 12px 16px;
            background: #151e2d;
            gap: 8px;
            border-top: 1px solid #2e3a4e;
            align-items: center;
            flex-shrink: 0;
            height: 80px;
        }
        
        .chat-footer input {
            flex: 1;
            background: #0d1421;
            border: none;
            border-radius: 40px;
            padding: 14px 18px;
            color: white;
            outline: 1px solid #314155;
        }
        
        .chat-footer button {
            background: #2563eb;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        /* Admin panel */
        .admin-stat {
            background: #1c2538;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .admin-user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #1a2332;
            margin: 8px 0;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        
        .admin-user-item button {
            background: #3b4257;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .admin-user-item button.danger { background: #b91c1c; }
        
        /* Loading screen */
        .loading-screen {
            position: absolute; 
            inset:0; 
            background: #0b0f17; 
            z-index:9999;
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: opacity 0.3s;
        }
        
        .spinner { 
            border:4px solid #2d374b; 
            border-top-color:#3b82f6; 
            width:50px; 
            height:50px; 
            border-radius:50%; 
            animation:spin 1s infinite; 
        }
        
        @keyframes spin { 
            to { transform:rotate(360deg); } 
        }
        
        .hidden { display: none !important; }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            color: #7b8aa5;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="toast-container" id="toastContainer"></div>
    <div id="loadingScreen" class="loading-screen"><div class="spinner"></div></div>

    <!-- HAMBURGER MENU OVERLAY -->
    <div id="menuOverlay" class="menu-overlay" onclick="if(event.target===this) toggleMenu()">
        <div class="menu-panel" onclick="event.stopPropagation()">
            <div style="font-size:1.8rem; font-weight:700; padding:16px 16px 24px; color:white;">☰ Zchat</div>
            
            <button class="menu-item" data-page="profile">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg> Profile
            </button>
            
            <button class="menu-item" data-page="friends">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="16" cy="7" r="4"/></svg> Friends
            </button>
            
            <button class="menu-item" data-page="friendRequests">
                <svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg> Requests 
                <span id="requestBadgeMenu" class="badge" style="margin-left:auto; display:none;">0</span>
            </button>
            
            <button class="menu-item" data-page="settings">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 18a10 10 0 0 0 6.36-2.22z"/><path d="M16.5 7.5 19 5"/><path d="M5 5l2.5 2.5"/></svg> Settings
            </button>
            
            <button class="menu-item" id="adminMenuItem" style="display:none;" data-page="adminPanel">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7v8c0 5 10 7 10 7s10-2 10-7V7l-10-5z"/><path d="M12 12v4"/><circle cx="12" cy="9" r="1"/></svg> Admin Panel
            </button>
            
            <hr>
            
            <button class="menu-item" id="darkModeToggle">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg> Dark Mode
            </button>
            
            <button class="menu-item" id="logoutBtn">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout
            </button>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div class="content full" style="display: flex; align-items: center; justify-content: center;">
            <div class="auth-card">
                <div style="text-align:center; margin-bottom:16px; font-size:2.4rem; font-weight:700; letter-spacing:-1px">Zchat</div>
                <div class="auth-tabs">
                    <button id="tabLoginBtn" class="auth-tab active">Login</button>
                    <button id="tabRegisterBtn" class="auth-tab">Register</button>
                </div>
                
                <div id="loginFields">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••">
                    </div>
                    <button class="btn-primary" id="loginBtn">Log in</button>
                </div>
                
                <div id="registerFields" style="display:none;">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" placeholder="username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="min 6 chars">
                    </div>
                    <div class="input-group">
                        <label>Confirm</label>
                        <input type="password" id="regConfirm" placeholder="confirm">
                    </div>
                    <button class="btn-primary" id="registerBtn">Register</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CHAT SCREEN -->
    <div id="chatScreen" class="screen">
        <div class="header">
            <button class="hamburger" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h2>Chats</h2>
            <div style="width:44px"></div>
        </div>
        
        <div class="content" id="chatListContainer"></div>
        
        <div class="bottom-nav">
            <button class="nav-item active" data-nav="chat">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>Chat</span>
            </button>
            <button class="nav-item" data-nav="friends">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="16" cy="7" r="4"/></svg>
                <span>Friends</span>
            </button>
            <button class="nav-item" data-nav="requests">
                <svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
                <span>Requests</span>
                <span id="requestBadgeNav" class="badge" style="display:none;">0</span>
            </button>
        </div>
    </div>

    <!-- FRIENDS PAGE (dengan back button) -->
    <div id="friendsScreen" class="screen">
        <div class="header">
            <button class="back-btn" onclick="goBackToChat()">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <h2>Friends</h2>
            <button class="hamburger" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
        
        <div class="content">
            <div class="search-box">
                <svg width="20" height="20" viewBox="0 0 24 24" stroke="#7b8aa5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="friendSearchInput" placeholder="Cari username...">
                <button id="sendRequestBtn" class="btn-secondary" style="width:auto; padding:10px 20px; margin:0;">Tambah</button>
            </div>
            <div id="friendsListContainer"></div>
        </div>
    </div>

    <!-- FRIEND REQUESTS PAGE (dengan back button) -->
    <div id="friendRequestsScreen" class="screen">
        <div class="header">
            <button class="back-btn" onclick="goBackToChat()">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <h2>Friend Requests</h2>
            <button class="hamburger" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
        
        <div class="content" id="requestsListContainer"></div>
    </div>

    <!-- PROFILE PAGE (dengan back button) -->
     <div id="profileScreen" class="screen">
        <div class="header">
            <button class="back-btn" onclick="goBackToChat()">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <h2>Profile</h2>
            <button class="hamburger" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
        
        <div class="content">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 30px;">
                <div class="avatar" style="width:100px;height:100px;font-size:3rem;" id="profileAvatar">👤</div>
                <div style="font-size:1.5rem; font-weight:600;" id="profileUsername"></div>
            </div>
            
            <div class="input-group">
                <label>Bio</label>
                <input id="profileBio" placeholder="write something">
            </div>
            
            <button class="btn-primary" id="updateProfileBtn">Update Profile</button>
        </div>
    </div>

    <!-- SETTINGS PAGE (dengan back button) -->
    <div id="settingsScreen" class="screen">
        <div class="header">
            <button class="back-btn" onclick="goBackToChat()">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <h2>Settings</h2>
            <button class="hamburger" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
        
        <div class="content">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPass" placeholder="********">
            </div>
            <button class="btn-primary" id="changePassBtn">Change password</button>
            
            <div style="margin-top: 30px;">
                <button class="btn-primary" id="darkModeToggleBtn" style="background:#2d374b;">Toggle Dark Mode</button>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL (dengan back button) -->
    <div id="adminPanelScreen" class="screen">
        <div class="header">
            <button class="back-btn" onclick="goBackToChat()">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <h2>Admin Panel</h2>
            <button class="hamburger" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
        
        <div class="content" id="adminPanelContent"></div>
    </div>

    <!-- CHAT ROOM VIEW (dengan back button) -->
    <div id="chatRoomScreen" class="screen">
        <div class="header">
            <button class="back-btn" onclick="closeChatRoom()">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <h2 id="chatFriendName">Friend</h2>
            <button class="hamburger" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
        
        <div class="chat-container" id="chatMessages"></div>
        
        <div class="chat-footer">
            <input id="messageInput" placeholder="Message...">
            <button id="sendMsgBtn">
                <svg viewBox="0 0 24 24" width="24" fill="white"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
</div>

<script type="module">
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
        authDomain: "zchat-56639.firebaseapp.com",
        databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "zchat-56639",
        storageBucket: "zchat-56639.firebasestorage.app",
        messagingSenderId: "773931983053",
        appId: "1:773931983053:web:a1c825be9a972e53dcc984",
        measurementId: "G-ZDMK1DWV6S"
    };
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, set, push, onValue, update, remove, get, child, query, orderByChild, equalTo, onDisconnect, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db;

    // Global State
    let currentUser = null;
    let currentChatFriend = null;
    let friendRequestsListener = null;
    let messagesListener = null;

    // Helper Functions
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#ef4444' : '#3b82f6';
        toast.innerText = msg;
        document.getElementById('toastContainer').appendChild(toast);
        setTimeout(() => toast.remove(), 3200);
    }

    window.toggleMenu = function() {
        const overlay = document.getElementById('menuOverlay');
        overlay.classList.toggle('show');
    };

    window.goBackToChat = function() {
        showScreen('chatScreen');
    };

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    window.closeChatRoom = function() { 
        if (currentChatFriend) {
            if (messagesListener) {
                messagesListener();
                messagesListener = null;
            }
            currentChatFriend = null;
        }
        showScreen('chatScreen'); 
    };

    // Session Management
    function setSession(user) { 
        localStorage.setItem('zchat_user', user); 
        localStorage.setItem('zchat_login', 'true'); 
    }
    
    function clearSession() { 
        localStorage.removeItem('zchat_user'); 
        localStorage.removeItem('zchat_login'); 
        currentUser = null; 
    }

    async function isBanned(username) {
        const snap = await get(child(ref(db), `users/${username}`));
        return snap.exists() && snap.val().banned === true;
    }

    // Add Friend Function
    window.addFriend = async function(searchUsername) {
        if (!searchUsername || searchUsername === currentUser) {
            showToast('Username tidak valid', true);
            return false;
        }
        
        const snap = await get(child(ref(db), `users/${searchUsername}`));
        if (!snap.exists()) {
            showToast('User tidak ditemukan', true);
            return false;
        }
        
        const friendSnap = await get(child(ref(db), `users/${currentUser}/friends/${searchUsername}`));
        if (friendSnap.exists()) {
            showToast('Sudah berteman', true);
            return false;
        }
        
        // Cek apakah sudah pernah mengirim request
        const requestsSnap = await get(child(ref(db), `friendRequests/${searchUsername}`));
        let alreadySent = false;
        if (requestsSnap.exists()) {
            Object.values(requestsSnap.val()).forEach(req => {
                if (req.from === currentUser && req.status === 'pending') alreadySent = true;
            });
        }
        
        if (alreadySent) {
            showToast('Request sudah dikirim', true);
            return false;
        }
        
        const reqRef = push(ref(db, `friendRequests/${searchUsername}`));
        await set(reqRef, { 
            from: currentUser, 
            status: 'pending', 
            timestamp: Date.now() 
        });
        
        showToast(`Request sent to ${searchUsername}`);
        document.getElementById('friendSearchInput').value = '';
        return true;
    };

    // Login/Register
    document.getElementById('tabLoginBtn').addEventListener('click', ()=>{
        document.getElementById('tabLoginBtn').classList.add('active');
        document.getElementById('tabRegisterBtn').classList.remove('active');
        document.getElementById('loginFields').style.display = 'block';
        document.getElementById('registerFields').style.display = 'none';
    });
    
    document.getElementById('tabRegisterBtn').addEventListener('click', ()=>{
        document.getElementById('tabRegisterBtn').classList.add('active');
        document.getElementById('tabLoginBtn').classList.remove('active');
        document.getElementById('loginFields').style.display = 'none';
        document.getElementById('registerFields').style.display = 'block';
    });

    document.getElementById('registerBtn').addEventListener('click', async ()=>{
        const username = document.getElementById('regUsername').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!username || !pwd || !confirm) return showToast('Isi semua field', true);
        if (pwd.length < 6) return showToast('Password minimal 6 karakter', true);
        if (pwd !== confirm) return showToast('Password tidak cocok', true);
        
        const userRef = ref(db, `users/${username}`);
        const snap = await get(userRef);
        if (snap.exists()) return showToast('Username sudah digunakan', true);
        
        await set(userRef, { 
            username, 
            password: pwd, 
            bio: 'Halo! Saya menggunakan Zchat', 
            avatar: '', 
            online: false, 
            banned: false, 
            friends: {},
            lastSeen: Date.now()
                    });
        
        showToast('Registrasi berhasil, silakan login');
        document.getElementById('tabLoginBtn').click();
        document.getElementById('regUsername').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regConfirm').value = '';
    });

    document.getElementById('loginBtn').addEventListener('click', async ()=>{
        const username = document.getElementById('loginUsername').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        
        if (!username || !pwd) return showToast('Isi username dan password', true);
        
        if (await isBanned(username)) {
            showToast('Akun Anda telah dibanned oleh admin', true);
            return;
        }
        
        const snap = await get(child(ref(db), `users/${username}`));
        if (!snap.exists() || snap.val().password !== pwd) {
            showToast('Username atau password salah', true);
            return;
        }
        
        currentUser = username;
        setSession(username);
        await update(ref(db), { [`users/${username}/online`]: true, [`users/${username}/lastSeen`]: Date.now() });
        onDisconnect(ref(db, `users/${username}`)).update({ online: false, lastSeen: Date.now() });
        
        document.getElementById('loadingScreen').style.opacity = '0';
        setTimeout(()=>document.getElementById('loadingScreen').classList.add('hidden'), 400);
        
        showScreen('chatScreen');
        setupRealTimeFeatures();
        
        if (username === 'DevzZerr44F') {
            document.getElementById('adminMenuItem').style.display = 'flex';
        } else {
            document.getElementById('adminMenuItem').style.display = 'none';
        }
        
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    });

    // Auto Login
    window.addEventListener('load', async ()=>{
        const stored = localStorage.getItem('zchat_user');
        if (stored && localStorage.getItem('zchat_login') === 'true') {
            if (await isBanned(stored)) { 
                clearSession(); 
                showScreen('loginScreen'); 
                document.getElementById('loadingScreen').classList.add('hidden'); 
                return; 
            }
            
            currentUser = stored;
            await update(ref(db), { [`users/${currentUser}/online`]: true, [`users/${currentUser}/lastSeen`]: Date.now() });
            onDisconnect(ref(db, `users/${currentUser}`)).update({ online: false, lastSeen: Date.now() });
            
            showScreen('chatScreen');
            
            if (currentUser === 'DevzZerr44F') {
                document.getElementById('adminMenuItem').style.display = 'flex';
            }
            
            setupRealTimeFeatures();
        } else { 
            clearSession(); 
            showScreen('loginScreen'); 
        }
        
        document.getElementById('loadingScreen').classList.add('hidden');
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async ()=>{
        if (currentUser) {
            await update(ref(db), { 
                [`users/${currentUser}/online`]: false, 
                [`users/${currentUser}/lastSeen`]: Date.now() 
            });
        }
        clearSession(); 
        location.reload();
    });

    // Search Friend Button
    document.getElementById('sendRequestBtn')?.addEventListener('click', ()=>{
        const username = document.getElementById('friendSearchInput').value.trim();
        if(username) window.addFriend(username);
    });

    document.getElementById('friendSearchInput')?.addEventListener('keypress', (e)=>{
        if(e.key === 'Enter') {
            const username = e.target.value.trim();
            if(username) window.addFriend(username);
        }
    });

    // Setup Real Time Features
    function setupRealTimeFeatures() {
        if (!currentUser) return;
        
        const reqRef = ref(db, `friendRequests/${currentUser}`);
        if (friendRequestsListener) friendRequestsListener();
        
        friendRequestsListener = onValue(reqRef, (snap) => {
            const reqs = snap.val() ? Object.entries(snap.val()).filter(([_,v]) => v.status === 'pending') : [];
            const badge = document.getElementById('requestBadgeNav');
            const menuBadge = document.getElementById('requestBadgeMenu');
            
            if (reqs.length) { 
                badge.style.display = 'inline-block'; 
                badge.innerText = reqs.length; 
                menuBadge.style.display = 'inline-block'; 
                menuBadge.innerText = reqs.length; 
            } else { 
                badge.style.display = 'none'; 
                menuBadge.style.display = 'none'; 
            }
            
            renderRequestsList(reqs);
        });
        
        loadFriendsList();
        document.getElementById('profileUsername').innerText = currentUser;
        loadProfile();
    }

    async function loadFriendsList() {
        const userSnap = await get(child(ref(db), `users/${currentUser}/friends`));
        const friends = userSnap.val() ? Object.keys(userSnap.val()) : [];
        const chatContainer = document.getElementById('chatListContainer');
        const friendsContainer = document.getElementById('friendsListContainer');
        
        if (chatContainer) {
            chatContainer.innerHTML = '';
            if (friends.length === 0) {
                chatContainer.innerHTML = '<div class="empty-state">Belum ada teman. Tambah teman di menu Friends</div>';
            }
        }
        
        if (friendsContainer) {
            friendsContainer.innerHTML = '';
            if (friends.length === 0) {
                friendsContainer.innerHTML = '<div class="empty-state">Belum ada teman. Cari username untuk menambah teman</div>';
            }
        }
        
        for (let f of friends) {
            const fSnap = await get(child(ref(db), `users/${f}`));
            if (!fSnap.exists()) continue;
            
            const data = fSnap.val();
            
            // Chat list
            if (chatContainer) {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `
                    <div class="avatar">${f[0].toUpperCase()}</div>
                    <div style="flex:1">
                        <div style="font-weight:600">${f}</div>
                        <small style="color:${data.online ? '#22c55e' : '#7b8aa5'}">${data.online ? '● online' : '○ offline'}</small>
                    </div>
                    <button class="btn-primary" style="width:auto; padding:8px 18px; margin:0;" data-chat="${f}">Chat</button>
                `;
                chatContainer.appendChild(div);
            }
            
            // Friends list page
            if (friendsContainer) {
                const friendDiv = document.createElement('div');
                friendDiv.className = 'friend-item';
                friendDiv.innerHTML = `
                    <div class="avatar">${f[0].toUpperCase()}</div>
                    <div style="flex:1">
                        <div style="font-weight:600">${f}</div>
                        <small>${data.bio || 'Halo!'}</small>
                    </div>
                    <span class="online-dot" style="background:${data.online ? '#22c55e' : '#6b7280'}"></span>
                `;
                friendsContainer.appendChild(friendDiv);
            }
        }
        
        document.querySelectorAll('[data-chat]').forEach(b => {
            b.addEventListener('click', (e) => openChat(e.target.dataset.chat));
        });
    }

    window.openChat = function(friend) { 
        currentChatFriend = friend; 
        document.getElementById('chatFriendName').innerText = friend; 
        showScreen('chatRoomScreen'); 
        loadMessages(friend); 
    };

    async function loadMessages(friend) {
        if (messagesListener) messagesListener();
        
        const roomId = [currentUser, friend].sort().join('_');
        const msgsRef = ref(db, `chats/${roomId}/messages`);
        
        messagesListener = onValue(msgsRef, (snap) => {
            const msgs = snap.val() ? Object.values(snap.val()).sort((a,b)=>a.timestamp - b.timestamp) : [];
            renderMessages(msgs);
        });
    }

    function renderMessages(msgs) {
        const cont = document.getElementById('chatMessages'); 
        cont.innerHTML = '';
        
        if (msgs.length === 0) {
            cont.innerHTML = '<div class="empty-state">Kirim pesan pertama</div>';
            return;
        }
        
        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = `message ${m.sender === currentUser ? 'own' : 'other'}`;
            div.innerHTML = `
                <div>${m.text}</div>
                <div class="timestamp">${new Date(m.timestamp).toLocaleTimeString()}</div>
            `;
            cont.appendChild(div);
        });
        
        cont.scrollTop = cont.scrollHeight;
    }

    document.getElementById('sendMsgBtn').addEventListener('click', async ()=>{
        const text = document.getElementById('messageInput').value.trim();
        if (!text || !currentChatFriend) return;
        
        const roomId = [currentUser, currentChatFriend].sort().join('_');
        const msgRef = push(ref(db, `chats/${roomId}/messages`));
        
        await set(msgRef, { 
            text, 
            sender: currentUser, 
            timestamp: Date.now() 
        });
        
        document.getElementById('messageInput').value = '';
    });

    document.getElementById('messageInput')?.addEventListener('keypress', (e)=>{
        if(e.key === 'Enter') {
            document.getElementById('sendMsgBtn').click();
        }
    });

    // Bottom Navigation
    document.querySelectorAll('[data-nav]').forEach(btn => {
        btn.addEventListener('click', (e)=>{
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if (btn.dataset.nav === 'chat') {
                showScreen('chatScreen');
                loadFriendsList();
            }
            else if (btn.dataset.nav === 'friends') { 
                showScreen('friendsScreen'); 
                loadFriendsList(); 
            }
            else if (btn.dataset.nav === 'requests') { 
                showScreen('friendRequestsScreen'); 
            }
        });
    });

    // Render Friend Requests
    async function renderRequestsList(reqs) {
        const container = document.getElementById('requestsListContainer');
        if (!container) return;
        
        container.innerHTML = '';
        
        if (reqs.length === 0) {
            container.innerHTML = '<div class="empty-state">Tidak ada request pending</div>';
            return;
        }
        
        for (let [key, req] of reqs) {
            const from = req.from;
            const fromSnap = await get(child(ref(db), `users/${from}`));
            const fromData = fromSnap.exists() ? fromSnap.val() : { bio: '' };
            
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `
                <div class="avatar">${from[0].toUpperCase()}</div>
                <div style="flex:1">
                    <div style="font-weight:600">${from}</div>
                    <small>${fromData.bio || 'Ingin berteman'}</small>
                </div>
                <button class="btn-primary" style="width:auto; padding:8px 16px; margin:0 4px;" data-accept="${from}" data-key="${key}">Terima</button>
                <button class="btn-secondary" style="width:auto; padding:8px 16px; margin:0; background:#4b5563;" data-reject="${from}" data-key="${key}">Tolak</button>
            `;
            container.appendChild(div);
        }
        
        document.querySelectorAll('[data-accept]').forEach(b => {
            b.addEventListener('click', async (e) => {
                const from = e.target.dataset.accept; 
                const key = e.target.dataset.key;
                
                await update(ref(db), { 
                    [`users/${currentUser}/friends/${from}`]: true, 
                    [`users/${from}/friends/${currentUser}`]: true, 
                    [`friendRequests/${currentUser}/${key}/status`]: 'accepted' 
                });
                
                showToast(`Sekarang Anda berteman dengan ${from}`);
                loadFriendsList();
            });
        });
        
        document.querySelectorAll('[data-reject]').forEach(b => {
            b.addEventListener('click', async (e) => {
                const key = e.target.dataset.key;
                await remove(ref(db, `friendRequests/${currentUser}/${key}`));
                showToast('Request ditolak');
            });
        });
    }

    // Menu Navigation
    document.querySelectorAll('.menu-item[data-page]').forEach(item => {
        item.addEventListener('click', (e) => {
            toggleMenu();
            const page = e.currentTarget.dataset.page;
            
            if (page === 'profile') { 
                showScreen('profileScreen'); 
                loadProfile(); 
            }
            else if (page === 'friends') { 
                showScreen('friendsScreen'); 
                loadFriendsList(); 
            }
            else if (page === 'friendRequests') { 
                showScreen('friendRequestsScreen'); 
            }
            else if (page === 'settings') { 
                showScreen('settingsScreen'); 
            }
            else if (page === 'adminPanel') { 
                if (currentUser === 'DevzZerr44F') {
                    showScreen('adminPanelScreen'); 
                    loadAdminPanel();
                } else {
                    showToast('Akses ditolak', true);
                }
            }
        });
    });

    // Profile
    async function loadProfile() {
        const snap = await get(child(ref(db), `users/${currentUser}`));
        if (snap.exists()) {
            document.getElementById('profileBio').value = snap.val().bio || '';
            document.getElementById('profileUsername').innerText = currentUser;
        }
    }
    
    document.getElementById('updateProfileBtn').addEventListener('click', async ()=>{
        const bio = document.getElementById('profileBio').value;
        await update(ref(db), { [`users/${currentUser}/bio`]: bio });
        showToast('Profile updated');
    });

    // Settings
    document.getElementById('changePassBtn').addEventListener('click', async ()=>{
        const newPass = document.getElementById('newPass').value;
        if (newPass.length < 6) return showToast('Minimal 6 karakter', true);
        await update(ref(db), { [`users/${currentUser}/password`]: newPass });
        showToast('Password changed');
        document.getElementById('newPass').value = '';
    });

    // Dark Mode Toggle
    document.getElementById('darkModeToggle').addEventListener('click', ()=>{
        document.body.style.background = document.body.style.background === 'black' ? '#0b0f17' : 'black';
        showToast('Dark mode toggled');
    });
    
    document.getElementById('darkModeToggleBtn')?.addEventListener('click', ()=>{
        document.body.style.background = document.body.style.background === 'black' ? '#0b0f17' : 'black';
    });

    // Admin Panel
    async function loadAdminPanel() {
        if (currentUser !== 'DevzZerr44F') {
            showScreen('chatScreen');
            return;
        }
        
        const snap = await get(child(ref(db), 'users'));
        const users = snap.val() ? Object.entries(snap.val()) : [];
        
        const content = document.getElementById('adminPanelContent');
        
        let totalMessages = 0;
        const chatsSnap = await get(child(ref(db), 'chats'));
        if (chatsSnap.exists()) {
            Object.values(chatsSnap.val()).forEach(chat => {
                if (chat.messages) totalMessages += Object.keys(chat.messages).length;
            });
        }
        
        content.innerHTML = `
            <div class="admin-stat">
                <h3 style="margin-bottom:16px;">📊 Dashboard</h3>
                <p>Total users: ${users.length}</p>
                <p>Total messages: ${totalMessages}</p>
                <p>Active users: ${users.filter(([_,u]) => u.online).length} online</p>
            </div>
            <h3 style="margin:16px 0 8px 0;">👥 User Management</h3>
        `;
        
        users.forEach(([u, data]) => {
            const div = document.createElement('div');
            div.className = 'admin-user-item';
            div.innerHTML = `
                <span style="flex:1; font-weight:600;">${u} ${data.banned ? '🔴 (BANNED)' : '🟢'}</span>
                <span style="color:#9aa9c1;">pw: ${data.password}</span>
                <button class="${data.banned ? '' : 'danger'}" data-ban="${u}">${data.banned ? 'Unban' : 'Ban'}</button>
                <button class="danger" data-del="${u}">Delete</button>
            `;
            content.appendChild(div);
        });
        
        document.querySelectorAll('[data-ban]').forEach(b => {
            b.addEventListener('click', async (e) => {
                const user = e.target.dataset.ban;
                const snap = await get(child(ref(db), `users/${user}/banned`));
                const newStatus = !snap.val();
                await update(ref(db), { [`users/${user}/banned`]: newStatus });
                showToast(`${user} ${newStatus ? 'dibanned' : 'diunban'}`);
                loadAdminPanel();
            });
        });
        
        document.querySelectorAll('[data-del]').forEach(b => {
            b.addEventListener('click', async (e) => {
                if (confirm(`Hapus user ${e.target.dataset.del}?`)) {
                    await remove(ref(db, `users/${e.target.dataset.del}`));
                    showToast('User dihapus');
                    loadAdminPanel();
                }
            });
        });
    }
</script>
</body>
</html>
