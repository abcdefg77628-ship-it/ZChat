<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat - Real-time Messenger</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00a884;
            --bg-light: #f0f2f5;
            --bg-chat: #efeae2;
            --white: #ffffff;
            --text-dark: #111b21;
            --text-gray: #667781;
            --my-bubble: #d9fdd3;
            --other-bubble: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); overflow: hidden; height: 100vh; width: 100vw; }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed; inset: 0; background: var(--white);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: var(--transition);
        }
        .logo-container { width: 80px; height: 80px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; animation: pulse 2s infinite; }
        .logo-container i { font-size: 40px; color: white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- AUTH PAGES --- */
        .auth-container { 
            display: none; height: 100vh; align-items: center; justify-content: center; padding: 20px;
            background: linear-gradient(135deg, #00a884 0%, #008069 100%);
        }
        .auth-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .auth-card h2 { margin-bottom: 20px; color: var(--text-dark); text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .file-input-label { display: block; text-align: center; padding: 10px; border: 2px dashed #ccc; margin: 10px 0; border-radius: 8px; cursor: pointer; }

        /* --- MAIN UI --- */
        #app { display: none; height: 100vh; grid-template-columns: 350px 1fr; }
        
        /* Sidebar */
        .sidebar { background: var(--white); border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #f0f2f5; display: flex; justify-content: space-between; align-items: center; }
        .user-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .search-bar { padding: 10px; }
        .search-bar input { background: #f0f2f5; border: none; border-radius: 8px; padding: 8px 15px; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f5f5f5; transition: 0.2s; }
        .chat-item:hover { background: #f5f6f6; }
        .chat-item-info { margin-left: 15px; flex: 1; }
        .chat-item-top { display: flex; justify-content: space-between; margin-bottom: 4px; }

        /* Main Chat Area */
        .main-content { display: flex; flex-direction: column; background: var(--bg-chat); position: relative; }
        .chat-header { padding: 10px 20px; background: #f0f2f5; display: flex; align-items: center; z-index: 10; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 65%; padding: 8px 12px; border-radius: 8px; position: relative; font-size: 14.5px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.me { align-self: flex-end; background: var(--my-bubble); border-top-right-radius: 0; }
        .msg.other { align-self: flex-start; background: var(--other-bubble); border-top-left-radius: 0; }
        .msg-time { font-size: 10px; color: var(--text-gray); margin-left: 8px; float: right; margin-top: 4px; }
        
        .chat-input-area { padding: 10px 20px; background: #f0f2f5; display: flex; align-items: center; gap: 15px; }
        .chat-input-area input { flex: 1; border: none; padding: 12px; border-radius: 30px; }
        .icon-btn { color: var(--text-gray); font-size: 20px; cursor: pointer; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            .sidebar { width: 100%; position: absolute; inset: 0; z-index: 20; }
            .main-content { position: absolute; inset: 0; z-index: 10; display: none; }
            .main-content.active { display: flex; z-index: 30; }
        }

        /* Glassmorphism for Popups */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-container"><i class="fab fa-whatsapp"></i></div>
        <h1 style="color: var(--primary); letter-spacing: 2px;">ZCHAT</h1>
        <p style="color: var(--text-gray); margin-top: 10px;">Secure. Fast. Original.</p>
    </div>

    <div id="login-page" class="auth-container">
        <div class="auth-card">
            <h2>Login ZChat</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">Masuk</button>
            <p style="text-align: center; margin-top: 15px; font-size: 14px;">
                Belum punya akun? <a href="#" onclick="showAuth('register')">Daftar</a>
            </p>
        </div>
    </div>

    <div id="register-page" class="auth-container">
        <div class="auth-card">
            <h2>Buat Akun</h2>
            <label class="file-input-label">
                <input type="file" id="reg-photo" hidden accept="image/*" onchange="previewImg(this)">
                <span id="file-status">Upload Foto Profil</span>
            </label>
            <input type="text" id="reg-username" placeholder="Username Unik">
            <input type="password" id="reg-password" placeholder="Password">
            <button class="btn-main" onclick="handleRegister()">Daftar Sekarang</button>
            <p style="text-align: center; margin-top: 15px; font-size: 14px;">
                Sudah ada akun? <a href="#" onclick="showAuth('login')">Login</a>
            </p>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <img id="my-avatar" src="https://via.placeholder.com/40" class="user-img" onclick="showModal('profile-modal')">
                <div class="header-icons">
                    <i class="fas fa-circle-notch icon-btn" style="margin-right: 15px;" title="Status"></i>
                    <i class="fas fa-comment-alt icon-btn" style="margin-right: 15px;" onclick="showModal('new-chat-modal')"></i>
                    <i class="fas fa-ellipsis-v icon-btn" onclick="logout()"></i>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Cari atau mulai chat baru" onkeyup="searchChat(this.value)">
            </div>
            <div class="chat-list" id="chat-list">
                </div>
        </div>

        <div class="main-content" id="chat-area">
            <div class="chat-header">
                <i class="fas fa-arrow-left icon-btn" style="margin-right: 15px; display: none;" id="back-btn" onclick="closeChat()"></i>
                <img id="target-avatar" src="https://via.placeholder.com/40" class="user-img">
                <div style="margin-left: 15px; flex: 1;">
                    <h4 id="target-name">Pilih Chat</h4>
                    <p id="target-status" style="font-size: 12px; color: var(--text-gray);">online</p>
                </div>
                <div class="header-icons">
                    <i class="fas fa-video icon-btn" style="margin-right: 20px;"></i>
                    <i class="fas fa-phone icon-btn"></i>
                </div>
            </div>

            <div class="chat-body" id="messages-container">
                </div>

            <div class="chat-input-area">
                <i class="far fa-smile icon-btn"></i>
                <i class="fas fa-paperclip icon-btn" onclick="document.getElementById('file-upload').click()"></i>
                <input type="file" id="file-upload" hidden onchange="sendFile(this)">
                <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeypress="handleEnter(event)">
                <i class="fas fa-microphone icon-btn" id="send-btn" onclick="sendMessage()"></i>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3>Profil Saya</h3>
            <hr style="margin: 15px 0;">
            <p>Bio:</p>
            <input type="text" id="user-bio" placeholder="Available">
            <button class="btn-main" onclick="updateProfile()">Simpan</button>
            <button class="btn-main" style="background: #ea4335;" onclick="deleteAccount()">Hapus Akun</button>
            <button class="btn-main" style="background: #999;" onclick="closeModal()">Tutup</button>
        </div>
    </div>

    <div id="new-chat-modal" class="modal">
        <div class="modal-content">
            <h3>Cari User</h3>
            <input type="text" id="search-user-input" placeholder="Masukkan username...">
            <button class="btn-main" onclick="startNewChat()">Cari & Chat</button>
            <button class="btn-main" style="background: #999;" onclick="closeModal()">Batal</button>
        </div>
    </div>

    <script>
        // --- CONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // --- STATE APP ---
        let currentUser = JSON.parse(localStorage.getItem('zchat_user')) || null;
        let activeChatId = null;

        // --- INIT ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    if (currentUser) {
                        showApp();
                    } else {
                        showAuth('login');
                    }
                }, 500);
            }, 2000);
        };

        // --- AUTH LOGIC ---
        function showAuth(type) {
            document.getElementById('login-page').style.display = type === 'login' ? 'flex' : 'none';
            document.getElementById('register-page').style.display = type === 'register' ? 'flex' : 'none';
        }

        async function handleRegister() {
            const user = document.getElementById('reg-username').value.trim().toLowerCase();
            const pass = document.getElementById('reg-password').value;
            const file = document.getElementById('reg-photo').files[0];

            if (!user || !pass || !file) return alert("Isi semua data!");

            const snapshot = await db.ref('users').orderByChild('username').equalTo(user).once('value');
            if (snapshot.exists()) return alert("Username sudah dipakai!");

            // Upload Foto
            const storageRef = storage.ref(`avatars/${user}`);
            await storageRef.put(file);
            const photoUrl = await storageRef.getDownloadURL();

            const newUser = {
                username: user,
                password: pass,
                photo: photoUrl,
                bio: "Using ZChat",
                lastSeen: Date.now(),
                status: "online"
            };

            const ref = db.ref('users').push();
            newUser.uid = ref.key;
            await ref.set(newUser);
            
            alert("Registrasi Berhasil!");
            showAuth('login');
        }

        async function handleLogin() {
            const user = document.getElementById('login-username').value.trim().toLowerCase();
            const pass = document.getElementById('login-password').value;

            const snapshot = await db.ref('users').orderByChild('username').equalTo(user).once('value');
            if (snapshot.exists()) {
                const userData = Object.values(snapshot.val())[0];
                if (userData.password === pass) {
                    currentUser = userData;
                    localStorage.setItem('zchat_user', JSON.stringify(userData));
                    showApp();
                } else {
                    alert("Password salah!");
                }
            } else {
                alert("User tidak ditemukan!");
            }
        }

        // --- MAIN APP LOGIC ---
        function showApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            document.getElementById('my-avatar').src = currentUser.photo;
            loadChatList();
            updateOnlineStatus();
        }

        function loadChatList() {
            db.ref('chats').on('value', snapshot => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                snapshot.forEach(child => {
                    const chat = child.val();
                    if (chat.members.includes(currentUser.username)) {
                        const otherUser = chat.members.find(m => m !== currentUser.username);
                        renderChatItem(otherUser, chat.lastMessage, child.key);
                    }
                });
            });
        }

        function renderChatItem(name, lastMsg, chatId) {
            const html = `
                <div class="chat-item" onclick="openChat('${chatId}', '${name}')">
                    <img src="https://ui-avatars.com/api/?name=${name}&background=random" class="user-img">
                    <div class="chat-item-info">
                        <div class="chat-item-top">
                            <strong>${name}</strong>
                            <span style="font-size: 10px; color: gray;">12:00</span>
                        </div>
                        <p style="font-size: 13px; color: gray; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            ${lastMsg || 'Klik untuk memulai chat'}
                        </p>
                    </div>
                </div>
            `;
            document.getElementById('chat-list').innerHTML += html;
        }

        function openChat(chatId, targetName) {
            activeChatId = chatId;
            document.getElementById('target-name').innerText = targetName;
            document.getElementById('target-avatar').src = `https://ui-avatars.com/api/?name=${targetName}&background=random`;
            
            if (window.innerWidth <= 768) {
                document.getElementById('chat-area').classList.add('active');
                document.getElementById('back-btn').style.display = 'block';
            }

            // Listen for messages
            db.ref(`messages/${chatId}`).on('value', snapshot => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snapshot.forEach(child => {
                    const msg = child.val();
                    const isMe = msg.sender === currentUser.username;
                    renderMessage(msg.text, isMe, msg.time);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        function renderMessage(text, isMe, time) {
            const date = new Date(time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const html = `
                <div class="msg ${isMe ? 'me' : 'other'}">
                    ${text}
                    <span class="msg-time">${date} ${isMe ? '<i class="fas fa-check-double" style="color:#53bdeb"></i>' : ''}</span>
                </div>
            `;
            document.getElementById('messages-container').innerHTML += html;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeChatId) return;

            const msgData = {
                sender: currentUser.username,
                text: text,
                time: Date.now(),
                seen: false
            };

            await db.ref(`messages/${activeChatId}`).push(msgData);
            await db.ref(`chats/${activeChatId}`).update({ lastMessage: text });
            
            input.value = "";
            // Play sound
            new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3').play();
        }

        // --- UTILS ---
        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }
        
        function logout() {
            localStorage.clear();
            location.reload();
        }

        async function startNewChat() {
            const target = document.getElementById('search-user-input').value.trim().toLowerCase();
            if (target === currentUser.username) return alert("Tidak bisa chat diri sendiri!");
            
            const snap = await db.ref('users').orderByChild('username').equalTo(target).once('value');
            if (!snap.exists()) return alert("User tidak ditemukan!");

            const chatId = [currentUser.username, target].sort().join("_");
            await db.ref(`chats/${chatId}`).set({
                members: [currentUser.username, target],
                lastMessage: ""
            });
            
            closeModal();
            openChat(chatId, target);
        }

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function closeChat() { document.getElementById('chat-area').classList.remove('active'); }
        
        function updateOnlineStatus() {
            const ref = db.ref(`users/${currentUser.uid}`);
            re
