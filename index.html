<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZChat Pro | Secure Communication</title>
    <style>
        /* CORE VARIABLES - PROFESIONAL DARK THEME */
        :root {
            --bg-deep: #050505;
            --bg-panel: #0f0f11;
            --bg-input: #161618;
            --accent: #00a2ff;
            --accent-glow: rgba(0, 162, 255, 0.3);
            --accent-dim: rgba(0, 162, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a5;
            --border: #202022;
            --danger: #ff3131;
            --success: #00ff66;
            --bubble-me: #00a2ff;
            --bubble-them: #1e1e21;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.8);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* GLOBAL RESET */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, sans-serif;
            scrollbar-width: none; /* Firefox */
        }
        *::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        body, html {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh; width: 100vw;
            overflow: hidden; position: fixed;
            user-select: none;
        }

        /* SPLASH SCREEN SYSTEM */
        #splash-screen {
            position: fixed; inset: 0; background: var(--bg-deep);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100000; transition: opacity 0.8s ease;
        }

        .logo-container {
            position: relative; width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-ring {
            position: absolute; inset: 0;
            border: 2px solid var(--accent-dim);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* AUTHENTICATION LAYER */
        #auth-layer {
            position: fixed; inset: 0; background: var(--bg-deep);
            z-index: 90000; display: flex; flex-direction: column;
            padding: 40px 30px; overflow-y: auto;
        }

        .auth-card {
            width: 100%; max-width: 400px; margin: auto;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .auth-brand { text-align: center; margin-bottom: 50px; }
        .auth-brand h1 { font-size: 36px; font-weight: 900; letter-spacing: 10px; color: var(--accent); }
        .auth-brand p { font-size: 11px; color: var(--text-dim); letter-spacing: 3px; margin-top: 10px; }

        .field-box { margin-bottom: 25px; position: relative; }
        .field-box label {
            display: block; font-size: 10px; font-weight: 800;
            color: var(--text-dim); text-transform: uppercase;
            margin-bottom: 10px; letter-spacing: 1.5px;
        }

        .z-input {
            width: 100%; background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 18px 20px; border-radius: 15px;
            color: #fff; font-size: 15px; font-weight: 500;
            transition: var(--transition);
        }

        .z-input:focus {
            border-color: var(--accent);
            background: var(--bg-input);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .z-btn {
            width: 100%; padding: 18px; border-radius: 15px;
            border: none; font-weight: 800; font-size: 14px;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: var(--transition);
            margin-bottom: 15px;
        }

        .btn-glow { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn-glow:active { transform: scale(0.96); }
        .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }

        /* MAIN INTERFACE */
        .app-shell {
            display: grid; grid-template-rows: auto 1fr;
            height: 100vh; width: 100vw; background: var(--bg-deep);
        }

        header.top-nav {
            padding: 50px 25px 20px; /* Safe area for mobile */
            background: var(--bg-panel); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .profile-trigger { display: flex; align-items: center; gap: 15px; }
        .avatar-wrap {
            width: 45px; height: 45px; border-radius: 16px;
            background: linear-gradient(135deg, var(--bg-input), var(--border));
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border); overflow: hidden;
            position: relative;
        }

        .status-dot {
            position: absolute; bottom: 5px; right: 5px;
            width: 10px; height: 10px; background: var(--success);
            border-radius: 50%; border: 2px solid var(--bg-panel);
        }

        /* INBOX & LISTS */
        .chat-list { overflow-y: auto; padding: 10px 0; }
        .node-item {
            display: flex; padding: 18px 25px; gap: 18px;
            transition: var(--transition); border-bottom: 1px solid rgba(255,255,255,0.02);
            cursor: pointer;
        }
        .node-item:active { background: var(--bg-panel); }

        .node-meta { flex: 1; overflow: hidden; }
        .node-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .node-name { font-weight: 700; font-size: 16px; color: var(--text-main); }
        .node-time { font-size: 11px; color: var(--text-dim); }
        .node-preview { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* TOAST SYSTEM */
        #z-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--bg-panel); border: 1px solid var(--accent);
            color: #fff; padding: 15px 30px; border-radius: 20px;
            font-size: 13px; font-weight: 700; z-index: 200000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow-lg);
        }
        #z-toast.show { top: 30px; }
    </style>
</head>
<body>
    <div id="z-toast">SISTEM TERHUBUNG</div>

    <div id="splash-screen">
        <div class="logo-container">
            <div class="logo-ring"></div>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
        </div>
        <h2 style="letter-spacing: 10px; font-weight: 900; margin-top: 30px; font-size: 18px;">ZCHAT PRO</h2>
        <p style="color: var(--text-dim); font-size: 10px; margin-top: 10px; letter-spacing: 4px; opacity: 0.6;">ENCRYPTED NODE v2.0</p>
    </div>

    <div id="auth-layer" style="display: none;">
        <div class="auth-card">
            <div class="auth-brand">
                <h1>Z</h1>
                <p>SECURE INTERFACE</p>
            </div>

            <div id="view-login">
                <div class="field-box">
                    <label>Identitas Pengguna</label>
                    <input type="text" id="log-user" class="z-input" placeholder="Username (Min. 6 Karakter)">
                </div>
                <div class="field-box">
                    <label>Kunci Akses</label>
                    <input type="password" id="log-pass" class="z-input" placeholder="Password Jaringan">
                </div>
                <button class="z-btn btn-glow" onclick="processLogin()">Buka Akses</button>
                <button class="z-btn btn-ghost" onclick="switchAuth('REG')">Registrasi Node Baru</button>
            </div>

            <div id="view-reg" style="display: none;">
                <div class="field-box">
                    <label>Username Baru</label>
                    <input type="text" id="reg-user" class="z-input" placeholder="Gunakan ID Unik">
                </div>
                <div class="field-box">
                    <label>Kunci Akses Baru</label>
                    <input type="password" id="reg-pass" class="z-input" placeholder="Minimal 8 Karakter">
                </div>
                <div class="field-box">
                    <label>Verifikasi Kunci</label>
                    <input type="password" id="reg-conf" class="z-input" placeholder="Ulangi Password">
                </div>
                <button class="z-btn btn-glow" onclick="processRegister()">Buat Identitas</button>
                <button class="z-btn btn-ghost" onclick="switchAuth('LOGIN')">Sudah Terdaftar? Masuk</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="app-shell" style="display: none;">
        <header class="top-nav">
            <div class="profile-trigger" onclick="toggleSidebar()">
                <div class="avatar-wrap" id="my-p-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <div class="status-dot"></div>
                </div>
                <div>
                    <div id="my-u-name" style="font-weight: 900; font-size: 15px;">USER</div>
                    <div style="font-size: 9px; color: var(--success); font-weight: 800; letter-spacing: 1px;">TERKONEKSI</div>
                </div>
            </div>
            <div style="display: flex; gap: 20px;">
                <svg onclick="openSearch()" style="cursor: pointer;" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <svg onclick="openMenu()" style="cursor: pointer;" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </div>
        </header>

        <div class="chat-list" id="node-inbox">
            <div id="inbox-empty" style="text-align: center; padding: 100px 40px; opacity: 0.3;">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <p style="margin-top: 15px; font-size: 13px; font-weight: 700;">TIDAK ADA SINYAL MASUK</p>
            </div>
        </div>

        <div id="search-layer" style="position: fixed; inset: 0; background: var(--bg-deep); z-index: 95000; display: none; flex-direction: column;">
            <div style="padding: 50px 20px 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;">
                <svg onclick="closeSearch()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                <input type="text" id="input-search" class="z-input" placeholder="Cari Username..." style="margin-bottom: 0; border: none; background: transparent;">
            </div>
            <div id="search-res" class="chat-list"></div>
        </div>
    </div>

    <div id="chat-viewport" style="position: fixed; inset: 0; background: var(--bg-deep); z-index: 98000; display: none; flex-direction: column;">
        <header class="top-nav">
            <div style="display: flex; align-items: center; gap: 15px;">
                <svg onclick="closeChat()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                <div class="avatar-wrap" style="width: 38px; height: 38px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div>
                    <div id="chat-target-u" style="font-weight: 900; font-size: 15px;">TARGET_ID</div>
                    <div id="chat-target-s" style="font-size: 9px; color: var(--text-dim); font-weight: 700;">MENGHUBUNGKAN...</div>
                </div>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </header>

        <div id="msg-flow" style="flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px;"></div>

        <div id="typing-box" style="padding: 5px 25px; font-size: 10px; font-weight: 900; color: var(--accent); display: none; letter-spacing: 1px;">NODE SEDANG MENULIS...</div>

        <div style="padding: 15px 20px calc(20px + env(safe-area-inset-bottom)); background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px;">
            <div style="width: 40px; height: 40px; border-radius: 12px; background: var(--bg-input); display: flex; align-items: center; justify-content: center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <input type="text" id="msg-input" class="z-input" placeholder="Ketik transmisi..." style="margin-bottom: 0; border: none; background: var(--bg-input); padding: 12px 20px; border-radius: 20px;">
            <button onclick="sendMsg()" style="width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px var(--accent-glow);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
                    </div>
                              <script type="module">
        // Import Firebase modules secara modular (Modern Way)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, serverTimestamp, get, query, orderByChild, equalTo, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ==========================================
        // CONFIGURATION & INITIALIZATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // GLOBAL STATE
        let currentUser = null;
        let activeRecipientID = null;
        let messageListener = null;

        // ==========================================
        // UI CORE HELPERS
        // ==========================================
        window.showToast = (msg, duration = 3000) => {
            const t = document.getElementById('z-toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        };

        const toggleLoading = (show) => {
            document.getElementById('splash-screen').style.opacity = show ? '1' : '0';
            document.getElementById('splash-screen').style.pointerEvents = show ? 'all' : 'none';
        };

        window.switchAuth = (mode) => {
            document.getElementById('view-login').style.display = mode === 'LOGIN' ? 'block' : 'none';
            document.getElementById('view-reg').style.display = mode === 'REG' ? 'block' : 'none';
        };

        // ==========================================
        // AUTHENTICATION ENGINE
        // ==========================================
        
        // Memastikan sesi tetap tersimpan di browser/device
        setPersistence(auth, browserLocalPersistence);

        // Listener Status Login
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await syncUserProfile(user.uid);
            } else {
                toggleLoading(false);
                document.getElementById('auth-layer').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        // Sinkronisasi data user dari Database
        async function syncUserProfile(uid) {
            try {
                const snap = await get(ref(db, `users/${uid}`));
                if (snap.exists()) {
                    currentUser = { uid, ...snap.val() };
                    document.getElementById('my-u-name').innerText = currentUser.username.toUpperCase();
                    
                    // Setup Online Status Management
                    const statusRef = ref(db, `users/${uid}`);
                    update(statusRef, { status: 'online', last_active: serverTimestamp() });
                    onDisconnect(statusRef).update({ status: 'offline', last_active: serverTimestamp() });

                    // Tampilkan UI Utama
                    document.getElementById('auth-layer').style.display = 'none';
                    document.getElementById('main-app').style.display = 'grid';
                    loadInbox();
                    setTimeout(() => toggleLoading(false), 1000);
                }
            } catch (err) {
                showToast("Sinkronisasi Gagal!");
            }
        }

        // Prosedur Registrasi
        window.processRegister = async () => {
            const u = document.getElementById('reg-user').value.trim().toLowerCase();
            const p = document.getElementById('reg-pass').value;
            const c = document.getElementById('reg-conf').value;

            if (u.length < 5) return showToast("Username minimal 5 karakter!");
            if (p.length < 8) return showToast("Password minimal 8 karakter!");
            if (p !== c) return showToast("Verifikasi password tidak sesuai!");

            toggleLoading(true);
            try {
                // Cek ketersediaan username
                const uCheck = await get(ref(db, `usernames/${u}`));
                if (uCheck.exists()) {
                    toggleLoading(false);
                    return showToast("Username sudah digunakan!");
                }

                // Buat akun Firebase Auth (Virtual Email)
                const res = await createUserWithEmailAndPassword(auth, `${u}@zchat.pro`, p);
                
                // Simpan metadata ke Database
                const userData = {
                    username: u,
                    status: 'online',
                    created_at: serverTimestamp(),
                    bio: "Using ZChat Pro Node"
                };
                await set(ref(db, `users/${res.user.uid}`), userData);
                await set(ref(db, `usernames/${u}`), res.user.uid);

                showToast("Identitas Berhasil Dibuat!", 2000);
            } catch (e) {
                toggleLoading(false);
                showToast("Registrasi Gagal!");
            }
        };

        // Prosedur Login
        window.processLogin = async () => {
            const u = document.getElementById('log-user').value.trim().toLowerCase();
            const p = document.getElementById('log-pass').value;

            if (!u || !p) return showToast("Lengkapi semua bidang!");

            toggleLoading(true);
            try {
                await signInWithEmailAndPassword(auth, `${u}@zchat.pro`, p);
            } catch (e) {
                toggleLoading(false);
                showToast("Akses Ditolak! Cek ID/Password.");
            }
        };

        // ==========================================
        // CHAT & MESSAGING ENGINE
        // ==========================================

        window.openSearch = () => {
            document.getElementById('search-layer').style.display = 'flex';
            document.getElementById('input-search').focus();
        };

        window.closeSearch = () => {
            document.getElementById('search-layer').style.display = 'none';
            document.getElementById('search-res').innerHTML = '';
            document.getElementById('input-search').value = '';
        };

        // Live Search User
        document.getElementById('input-search').addEventListener('input', async (e) => {
            const queryVal = e.target.value.trim().toLowerCase();
            const resContainer = document.getElementById('search-res');
            resContainer.innerHTML = '';

            if (queryVal.length < 3) return;

            const usersRef = query(ref(db, 'users'), orderByChild('username'), equalTo(queryVal));
            const snap = await get(usersRef);

            if (snap.exists()) {
                snap.forEach(child => {
                    if (child.key === currentUser.uid) return;
                    const data = child.val();
                    const el = document.createElement('div');
                    el.className = 'node-item';
                    el.innerHTML = `
                        <div class="avatar-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                        <div class="node-meta">
                            <div class="node-name">${data.username}</div>
                            <div class="node-preview">Ketuk untuk mulai transmisi</div>
                        </div>
                    `;
                    el.onclick = () => openChatRoom(child.key, data.username);
                    resContainer.appendChild(el);
                });
            }
        });

        window.openChatRoom = (targetID, targetName) => {
            activeRecipientID = targetID;
            document.getElementById('chat-target-u').innerText = targetName.toUpperCase();
            document.getElementById('chat-viewport').style.display = 'flex';
            
            // Tutup pencarian jika terbuka
            closeSearch();
            
            // Listen status target
            onValue(ref(db, `users/${targetID}/status`), (snap) => {
                document.getElementById('chat-target-s').innerText = snap.val() === 'online' ? 'AKTIF SEKARANG' : 'OFFLINE';
                document.getElementById('chat-target-s').style.color = snap.val() === 'online' ? 'var(--success)' : 'var(--text-dim)';
            });

            loadMessages(targetID);
        };

        window.closeChat = () => {
            if (messageListener) messageListener(); // Unsubscribe
            document.getElementById('chat-viewport').style.display = 'none';
            activeRecipientID = null;
        };

        function loadMessages(targetID) {
            const roomID = [currentUser.uid, targetID].sort().join('_');
            const msgRef = ref(db, `messages/${roomID}`);
            const flow = document.getElementById('msg-flow');

            messageListener = onValue(msgRef, (snap) => {
                flow.innerHTML = '';
                if (!snap.exists()) {
                    flow.innerHTML = `<div style="text-align:center; color:var(--text-dim); font-size:11px; margin-top:50px;">MEMULAI ENKRIPSI END-TO-END</div>`;
                    return;
                }

                snap.forEach(m => {
                    const d = m.val();
                    const isMe = d.sender === currentUser.uid;
                    const b = document.createElement('div');
                    b.className = `bubble ${isMe ? 'sent' : 'received'}`;
                    b.innerHTML = `
                        ${d.text}
                        <div style="font-size:8px; opacity:0.5; margin-top:5px; text-align:right;">
                            ${new Date(d.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                        </div>
                    `;
                    flow.appendChild(b);
                });
                flow.scrollTop = flow.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeRecipientID) return;

            const roomID = [currentUser.uid, activeRecipientID].sort().join('_');
            const msgData = {
                sender: currentUser.uid,
                text: text,
                timestamp: serverTimestamp()
            };

            push(ref(db, `messages/${roomID}`), msgData);
            
            // Update Inbox Summary
            const summary = { last_msg: text, timestamp: serverTimestamp() };
            update(ref(db, `inbox/${currentUser.uid}/${activeRecipientID}`), summary);
            update(ref(db, `inbox/${activeRecipientID}/${currentUser.uid}`), summary);

            input.value = '';
        };

        function loadInbox() {
            const inboxRef = ref(db, `inbox/${currentUser.uid}`);
            onValue(inboxRef, (snap) => {
                const container = document.getElementById('node-inbox');
                const empty = document.getElementById('inbox-empty');
                
                if (!snap.exists()) {
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';
                container.innerHTML = '';

                let items = [];
                snap.forEach(child => {
                    items.push({ id: child.key, ...child.val() });
                });

                // Urutkan berdasarkan waktu terbaru
                items.sort((a, b) => b.timestamp - a.timestamp);

                items.forEach(async (item) => {
                    const uSnap = await get(ref(db, `users/${item.id}`));
                    const uData = uSnap.val();
                    const row = document.createElement('div');
                    row.className = 'node-item';
                    row.innerHTML = `
                        <div class="avatar-wrap">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div class="node-meta">
                            <div class="node-top">
                                <span class="node-name">${uData.username}</span>
                                <span class="node-time">AKTIF</span>
                            </div>
                            <div class="node-preview">${item.last_msg}</div>
                        </div>
                    `;
                    row.onclick = () => openChatRoom(item.id, uData.username);
                    container.appendChild(row);
                });
            });
        }

        window.toggleSidebar = () => {
            if (confirm("KONFIRMASI: Putuskan koneksi (Logout)?")) {
                update(ref(db, `users/${currentUser.uid}`), { status: 'offline' });
                signOut(auth).then(() => location.reload());
            }
        };

    </script>
</body>
</html>
