<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat - Realtime Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #075e54;
            --secondary: #128c7e;
            --bg-light: #f0f2f5;
            --bg-dark: #111b21;
            --text-main: #3b4a54;
            --my-chat: #d9fdd3;
            --other-chat: #ffffff;
            --accent: #25d366;
            --transition: all 0.3s ease;
        }

        /* Dark Mode Toggle */
        body.dark-mode {
            --bg-light: #0b141a;
            --text-main: #e9edef;
            --other-chat: #202c33;
            --my-chat: #005c4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* --- 1. INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            inset: 0;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
        }

        .intro-logo { font-size: 3rem; font-weight: bold; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- 2 & 3. AUTH SCREEN --- */
        #auth-container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none;
            z-index: 100;
        }

        .auth-title { text-align: center; margin-bottom: 25px; color: var(--primary); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: var(--transition); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; }

        .switch-auth { text-align: center; margin-top: 15px; font-size: 0.85rem; cursor: pointer; color: var(--secondary); }
        
        /* Toggle Switch */
        .keep-login-wrap { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; font-size: 0.85rem; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- 4. MAIN CHAT INTERFACE --- */
        #main-app {
            display: none;
            width: 100vw;
            height: 100vh;
            grid-template-columns: 350px 1fr;
        }

        /* Sidebar */
        #sidebar {
            background: var(--other-chat);
            border-right: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            background: var(--bg-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #ccc; display: grid; place-items: center; }

        .search-box { padding: 10px; }
        .search-box input { width: 100%; padding: 8px 15px; border-radius: 20px; border: none; background: var(--bg-light); outline: none; }

        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item {
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition);
        }
        .contact-item:hover { background: var(--bg-light); }
        .contact-item.active { background: #ebebeb; }

        /* Chat Area */
        #chat-area {
            display: flex;
            flex-direction: column;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-color: #e5ddd5;
        }

        .chat-header {
            padding: 10px 20px;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .msg-sent { align-self: flex-end; background: var(--my-chat); }
        .msg-received { align-self: flex-start; background: var(--other-chat); }
        .msg-time { font-size: 0.7rem; color: #888; text-align: right; margin-top: 4px; }

        .chat-input-area {
            padding: 10px 20px;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: none;
            outline: none;
        }

        /* Settings Modal */
        #settings-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 12px;
            display: none;
            z-index: 1000;
            width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 999;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #main-app { grid-template-columns: 1fr; }
            #sidebar { display: block; }
            #chat-area { display: none; position: absolute; inset: 0; z-index: 10; }
            #chat-area.active { display: flex; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-logo"><i class="fab fa-whatsapp"></i> ZChat</div>
        <p>Realtime Messaging</p>
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.7;">Created by zZerr44</p>
    </div>

    <div id="auth-container">
        <h2 class="auth-title" id="auth-header">Login to ZChat</h2>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="auth-user" placeholder="Masukkan username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="auth-pass" placeholder="Masukkan password">
        </div>
        
        <div class="keep-login-wrap" id="keep-login-ui">
            <span>Keep Login</span>
            <label class="switch">
                <input type="checkbox" id="keep-login">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn btn-primary" id="btn-auth-action">Login</button>
        <p class="switch-auth" id="btn-switch-mode">Belum punya akun? Daftar sekarang</p>
    </div>

    <div id="main-app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="user-avatar" id="my-profile-btn" style="cursor: pointer;"><i class="fa fa-user"></i></div>
                <h4 id="display-my-user">User</h4>
                <div style="display: flex; gap: 15px;">
                    <i class="fa fa-user-plus" style="cursor: pointer;" onclick="toggleAddUser()"></i>
                    <i class="fa fa-cog" style="cursor: pointer;" onclick="toggleSettings()"></i>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="search-contact" placeholder="Cari teman..." onkeyup="searchFriend()">
            </div>

            <div class="contact-list" id="contact-list">
                </div>
        </aside>

        <main id="chat-area">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fa fa-arrow-left" id="back-btn" style="display: none; cursor: pointer;"></i>
                    <div class="user-avatar"><i class="fa fa-user"></i></div>
                    <div>
                        <strong id="target-name">Pilih teman</strong>
                        <p id="target-status" style="font-size: 0.7rem; color: #666;">Klik kontak untuk memulai chat</p>
                    </div>
                </div>
                <div id="chat-options" style="display: none;">
                    <i class="fa fa-volume-mute" title="Mute" onclick="muteUser()" style="margin-right: 15px; cursor:pointer;"></i>
                    <i class="fa fa-ban" title="Block" onclick="blockUser()" style="margin-right: 15px; cursor:pointer;"></i>
                    <i class="fa fa-trash" title="Clear Chat" onclick="deleteHistory()" style="cursor:pointer;"></i>
                </div>
            </div>

            <div id="messages-container">
                </div>

            <div class="chat-input-area" id="input-group-chat" style="display: none;">
                <i class="far fa-smile" style="font-size: 1.5rem; color: #888;"></i>
                <input type="text" id="msg-input" placeholder="Ketik pesan...">
                <button id="send-btn" style="background: none; border: none; color: var(--secondary); font-size: 1.5rem; cursor: pointer;">
                    <i class="fa fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="overlay"></div>
    <div id="settings-modal">
        <h3>Settings</h3>
        <hr style="margin: 15px 0;">
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Dark Mode</span>
                <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()">
            </div>
            <div>
                <p>Wallpaper Color</p>
                <input type="color" id="wallpaper-picker" onchange="changeWallpaper(this.value)" style="width: 100%;">
            </div>
            <button class="btn" style="background: #ff4b2b; color: white;" onclick="logout()">Logout</button>
            <div style="font-size: 0.8rem; text-align: center; color: #888; margin-top: 10px;">
                <strong>ZChat v1.0</strong><br>Created by zZerr44
            </div>
            <button class="btn btn-primary" onclick="toggleSettings()">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // Konfigurasi User
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Global
        let currentUser = localStorage.getItem('zchat_user') || null;
        let activeChat = null;
        let isRegisterMode = false;

        // Elements
        const intro = document.getElementById('intro-screen');
        const authCont = document.getElementById('auth-container');
        const mainApp = document.getElementById('main-app');
        const btnAuth = document.getElementById('btn-auth-action');
        const btnSwitch = document.getElementById('btn-switch-mode');

        // --- 1. INITIALIZATION ---
        window.onload = () => {
            setTimeout(() => {
                intro.style.display = 'none';
                if (currentUser) {
                    showMainApp();
                } else {
                    authCont.style.display = 'block';
                }
            }, 2000);
        };

        // --- 2 & 3. AUTH LOGIC ---
        btnSwitch.onclick = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-header').innerText = isRegisterMode ? 'Register ZChat' : 'Login to ZChat';
            btnAuth.innerText = isRegisterMode ? 'Daftar' : 'Login';
            btnSwitch.innerText = isRegisterMode ? 'Sudah punya akun? Login' : 'Belum punya akun? Daftar';
            document.getElementById('keep-login-ui').style.display = isRegisterMode ? 'none' : 'flex';
        };

        btnAuth.onclick = async () => {
            const user = document.getElementById('auth-user').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value.trim();

            if (!user || !pass) return alert("Isi semua field!");

            const userRef = ref(db, 'users/' + user);
            const snapshot = await get(userRef);

            if (isRegisterMode) {
                if (snapshot.exists()) return alert("Username sudah dipakai!");
                await set(userRef, { password: pass });
                alert("Registrasi Berhasil! Silakan Login.");
                btnSwitch.click();
            } else {
                if (snapshot.exists() && snapshot.val().password === pass) {
                    currentUser = user;
                    if (document.getElementById('keep-login').checked) {
                        localStorage.setItem('zchat_user', user);
                    }
                    showMainApp();
                } else {
                    alert("Username atau Password salah!");
                }
            }
        };

        function showMainApp() {
            authCont.style.display = 'none';
            mainApp.style.display = 'grid';
            document.getElementById('display-my-user').innerText = currentUser;
            loadContacts();
        }

        // --- 5. TAMBAH USER ---
        window.toggleAddUser = async () => {
            const target = prompt("Masukkan username teman:");
            if (!target) return;
            if (target.toLowerCase() === currentUser) return alert("Tidak bisa menambah diri sendiri!");

            const userSnap = await get(ref(db, 'users/' + target.toLowerCase()));
            if (!userSnap.exists()) return alert("User tidak ditemukan!");

            await set(ref(db, `contacts/${currentUser}/${target}`), true);
            alert("Teman berhasil ditambahkan!");
            loadContacts();
        };

        // --- 6. LOAD CONTACTS ---
        function loadContacts() {
            const listEl = document.getElementById('contact-list');
            onValue(ref(db, `contacts/${currentUser}`), (snapshot) => {
                listEl.innerHTML = "";
                const data = snapshot.val();
                if (!data) return;

                Object.keys(data).forEach(username => {
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.innerHTML = `
                        <div class="user-avatar" style="margin-right:15px"><i class="fa fa-user"></i></div>
                        <div><strong>${username}</strong></div>
                    `;
                    item.onclick = () => openChat(username);
                    listEl.appendChild(item);
                });
            });
        }

        // --- 7. CHAT LOGIC ---
        function openChat(target) {
            activeChat = target;
            document.getElementById('target-name').innerText = target;
            document.getElementById('target-status').innerText = 'Online';
            document.getElementById('chat-options').style.display = 'block';
            document.getElementById('input-group-chat').style.display = 'flex';
            
            if (window.innerWidth <= 768) {
                document.getElementById('chat-area').classList.add('active');
                document.getElementById('back-btn').style.display = 'block';
            }

            // Room ID logic (Alphabetical sorting to ensure same room for both users)
            const roomId = [currentUser, target].sort().join("_");
            const msgRef = ref(db, 'messages/' + roomId);

            onValue(msgRef, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                const msgs = snapshot.val();
                if (msgs) {
                    Object.values(msgs).forEach(m => {
                        const div = document.createElement('div');
                        div.className = `msg ${m.sender === currentUser ? 'msg-sent' : 'msg-received'}`;
                        div.innerHTML = `
                            <div>${m.text}</div>
                            <div class="msg-time">${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                        `;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                }
            });
        }

        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        async function sendMessage() {
            const text = document.getElementById('msg-input').value.trim();
            if (!text || !activeChat) return;

            // Check if blocked
            const blockedSnap = await get(ref(db, `blocked/${activeChat}/${currentUser}`));
            if (blockedSnap.exists()) return alert("Anda telah diblokir oleh user ini.");

            const roomId = [currentUser, activeChat].sort().join("_");
            const newMsgRef = push(ref(db, 'messages/' + roomId));
            await set(newMsgRef, {
                sender: currentUser,
                text: text,
                time: Date.now()
            });
