<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat - Realtime Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --sent-bubble: #4f46e5;
            --rcv-bubble: #334155;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow: hidden; height: 100vh; }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .logo-anim { font-size: 3rem; font-weight: 800; color: var(--primary); animation: pulse 1.5s infinite; }
        .creator-tag { margin-top: 10px; color: var(--text-dim); font-size: 0.9rem; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- AUTH SYSTEM --- */
        .auth-container {
            height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            background: var(--bg-card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155;
            background: #0f172a; color: white; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .toggle-container { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; margin: 10px 0; }

        /* --- MAIN LAYOUT --- */
        #main-app { display: grid; grid-template-columns: 350px 1fr; height: 100vh; display: none; }
        
        /* Sidebar */
        .sidebar { background: var(--bg-card); border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .sb-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { 
            padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer;
            border-bottom: 1px solid #1e293b; transition: 0.2s;
        }
        .contact-item:hover { background: #334155; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #64748b; }
        .status-online { background: var(--success); }

        /* Chat Area */
        .chat-area { display: flex; flex-direction: column; background-size: cover; background-position: center; }
        .chat-header { padding: 15px 25px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubbles */
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; position: relative; }
        .msg-sent { align-self: flex-end; background: var(--sent-bubble); border-bottom-right-radius: 2px; }
        .msg-rcv { align-self: flex-start; background: var(--rcv-bubble); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; display: block; text-align: right; }
        .read-status { font-size: 0.7rem; margin-left: 5px; }

        /* Input Area */
        .input-bar { padding: 15px 25px; background: var(--bg-card); display: flex; gap: 15px; align-items: center; }
        #msg-input { flex: 1; margin: 0; }

        /* Modal */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; 
            align-items: center; justify-content: center; z-index: 1000; 
        }
        .modal-content { background: var(--bg-card); padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }

        /* Responsive */
        @media (max-width: 768px) {
            #main-app { grid-template-columns: 1fr; }
            .sidebar { position: absolute; width: 100%; z-index: 10; transition: 0.3s; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="logo-anim">ZChat</div>
        <div style="color: var(--primary); font-weight: 600;">Realtime Messaging</div>
        <div class="creator-tag">Created by zZerr44</div>
    </div>

    <div id="auth-section" class="auth-container hidden">
        <div class="auth-card">
            <h2 id="auth-title" style="margin-bottom: 20px;">Masuk ke ZChat</h2>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <div class="toggle-container">
                <input type="checkbox" id="keep-login" style="width: auto;">
                <label for="keep-login">Keep Login (Tetap Masuk)</label>
            </div>
            <button class="btn btn-primary" onclick="handleAuth()">Lanjut</button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.9rem; cursor: pointer; color: var(--primary);" 
               onclick="toggleAuthMode()" id="auth-toggle-text">Belum punya akun? Daftar</p>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar" id="sidebar">
            <div class="sb-header">
                <h3>ZChat</h3>
                <div style="display: flex; gap: 15px;">
                    <i class="fas fa-user-plus" onclick="showModal('add-user-modal')"></i>
                    <i class="fas fa-cog" onclick="showModal('settings-modal')"></i>
                </div>
            </div>
            <div class="contact-list" id="contact-list">
                </div>
        </div>

        <div class="chat-area" id="chat-area">
            <div id="no-chat-selected" style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color: var(--text-dim);">
                <i class="fas fa-comments" style="font-size: 4rem; margin-bottom: 10px;"></i>
                <p>Pilih teman untuk mulai chat</p>
            </div>

            <div id="active-chat" class="hidden" style="display:flex; flex-direction:column; height: 100%;">
                <div class="chat-header">
                    <div style="display:flex; align-items:center; gap: 10px;">
                        <i class="fas fa-arrow-left mobile-only" onclick="closeChat()"></i>
                        <div>
                            <strong id="target-name">Username</strong>
                            <div id="target-status" style="font-size: 0.7rem; color: var(--success);">Online</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <i class="fas fa-search" onclick="searchChat()"></i>
                        <i class="fas fa-ellipsis-v" onclick="toggleChatMenu()"></i>
                    </div>
                </div>
                
                <div class="messages-container" id="messages-container">
                    </div>

                <div id="typing-indicator" style="padding: 5px 25px; font-size: 0.75rem; font-style: italic; color: var(--text-dim); display:none;">Sedang mengetik...</div>

                <div class="input-bar">
                    <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeyup="handleTyping(event)">
                    <button class="btn btn-primary" style="width: auto; margin:0;" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="add-user-modal" class="modal">
        <div class="modal-content">
            <h3>Tambah Teman</h3>
            <input type="text" id="new-friend-user" placeholder="Masukkan username">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="addFriend()">Tambah</button>
                <button class="btn" style="background:#475569" onclick="closeModals()">Batal</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Pengaturan</h3>
            <button class="btn" onclick="toggleDarkMode()">Ganti Tema (Dark/Light)</button>
            <button class="btn" onclick="changeWallpaper()">Ganti Wallpaper</button>
            <button class="btn" onclick="showAppInfo()" style="background: #6366f1;">Info Aplikasi</button>
            <button class="btn" style="background: var(--danger);" onclick="logout()">Keluar</button>
            <button class="btn" onclick="closeModals()">Tutup</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue, push, update, onDisconnect, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi Firebase sesuai permintaan
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global State
        let currentUser = null;
        let isRegisterMode = false;
        let activeChatUser = null;

        // --- AUTH LOGIC ---
        window.toggleAuthMode = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "Daftar ZChat" : "Masuk ke ZChat";
            document.getElementById('auth-toggle-text').innerText = isRegisterMode ? "Sudah punya akun? Login" : "Belum punya akun? Daftar";
        };

        window.handleAuth = async () => {
            const user = document.getElementById('auth-user').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value;
            const keepLogin = document.getElementById('keep-login').checked;

            if(!user || !pass) return alert("Isi semua bidang!");

            const userRef = ref(db, 'users/' + user);
            const snapshot = await get(userRef);

            if(isRegisterMode) {
                if(snapshot.exists()) return alert("Username sudah digunakan!");
                await set(userRef, { password: pass, username: user, status: 'offline' });
                alert("Registrasi Berhasil! Silakan Login.");
                toggleAuthMode();
            } else {
                if(!snapshot.exists() || snapshot.val().password !== pass) {
                    return alert("Username atau Password salah!");
                }
                loginSuccess(snapshot.val(), keepLogin);
            }
        };

        function loginSuccess(userData, keep) {
            currentUser = userData;
            if(keep) localStorage.setItem('zchat_session', JSON.stringify(userData));
            
            // Set Online Status
            const statusRef = ref(db, `users/${currentUser.username}/status`);
            set(statusRef, 'online');
            onDisconnect(statusRef).set('offline');

            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').style.display = 'grid';
            loadContacts();
        }

        // --- CONTACT LOGIC ---
        window.addFriend = async () => {
            const target = document.getElementById('new-friend-user').value.trim().toLowerCase();
            if(target === currentUser.username) return alert("Tidak bisa menambah diri sendiri!");
            
            const targetSnap = await get(ref(db, 'users/' + target));
            if(!targetSnap.exists()) return alert("User tidak ditemukan!");

            await set(ref(db, `contacts/${currentUser.username}/${target}`), { username: target });
            closeModals();
            alert("Kontak ditambahkan!");
        };

        function loadContacts() {
            const contactsRef = ref(db, `contacts/${currentUser.username}`);
            onValue(contactsRef, (snapshot) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const contact = child.val();
                    const item = document.createElement('div');
                    item.className = "contact-item";
                    item.innerHTML = `
                        <div class="status-dot" id="dot-${contact.username}"></div>
                        <div style="flex:1"><strong>${contact.username}</strong></div>
                    `;
                    item.onclick = () => openChat(contact.username);
                    list.appendChild(item);
                    
                    // Listen to contact status
                    onValue(ref(db, `users/${contact.username}/status`), (stat) => {
                        const dot = document.getElementById(`dot-${contact.username}`);
                        if(dot) dot.className = `status-dot ${stat.val() === 'online' ? 'status-online' : ''}`;
                    });
                });
            });
        }

        // --- CHAT LOGIC ---
        window.openChat = (target) => {
            activeChatUser = target;
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('target-name').innerText = target;
            
            if(window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }

            loadMessages();
            
            // Typing indicator listener
            onValue(ref(db, `typing/${activeChatUser}/${currentUser.username}`), (snap) => {
                document.getElementById('typing-indicator').style.display = snap.val() ? 'block' : 'none';
            });
        };

        window.sendMessage = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !activeChatUser) return;

            // Cek blokir
            const blocked = await get(ref(db, `blocked/${activeChatUser}/${currentUser.username}`));
            if(blocked.exists()) return alert("Anda diblokir oleh user ini.");

            const chatId = [currentUser.username, activeChatUser].sort().join("_");
            const msgData = {
                sender: currentUser.username,
                text: text,
                timestamp: serverTimestamp(),
                read: false
            };

            await push(ref(db, `messages/${chatId}`), msgData);
            input.value = "";
            set(ref(db, `typing/${currentUser.username}/${activeChatUser}`), false);
        };

        function loadMessages() {
            const chatId = [currentUser.username, activeChatUser].sort().join("_");
            const msgRef = ref(db, `messages/${chatId}`);
            
            onValue(msgRef, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    const m = child.val();
                    const isMe = m.sender === currentUser.username;
                    const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
                    
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'msg-sent' : 'msg-rcv'}`;
                    div.innerHTML = `
                        ${m.text}
                        <span class="msg-time">${time} ${isMe ? (m.read ? ' <i class="fas fa-check-double" style="color:#34d399"></i>' : ' <i class="fas fa-check"></i>') : ''}</span>
                    `;
                    container.appendChild(div);
                    
                    // Set Read Receipt
                    if(!isMe && !m.read) {
                        update(ref(db, `messages/${chatId}/${child.key}`), { read: true });
                    }
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.handleTyping = (e) => {
            const isTyping = e.target.value.length > 0;
            set(ref(db, `typing/${currentUser.username}/${activeChatUser}`), isTyping);
            if(e.key === 'Enter') sendMessage();
        };

        // --- UI HELPERS ---
        window.showModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModals = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        };
        window.closeChat = () => {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('active-chat').classList.add('hidden');
        };

        window.logout = () => {
            set(ref(db, `users/${currentUser.username}/status`), 'offline');
            localStorage.removeItem('zchat_session');
            location.reload();
        };

        window.showAppInfo = () => {
            alert("ZChat v1.0\nCreator: zZerr44\nModern Realtime Messaging Experience");
        };

        window.changeWallpaper = () => {
            const url = prompt("Masukkan URL Gambar Wallpaper:");
            if(url) document.getElementById('chat-area').style.backgroundImage = `url('${url}')`;
        };

        // --- INITIALIZATION ---
        setTimeout(() => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                const session = localStorage.getItem('zchat_session');
                if(session) {
                    loginSuccess(JSON.parse(session), true);
                } else {
                    document.getElementById('auth-section').classList.remove('hidden');
                }
            }, 500);
        }, 2500);

    </script>
</body>
                </html>
