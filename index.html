<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOREXX PRECISION v6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { width: 90%; max-width: 400px; background: #050000; border: 3px solid #f00; padding: 25px; box-shadow: 0 0 40px #f00; border-radius: 5px; text-align: center; }
        h1 { font-size: 20px; border-bottom: 2px solid #f00; padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; background: #110000; border: 1px solid #f00; color: #f00; font-size: 18px; margin-bottom: 15px; outline: none; text-align: center; }
        button { width: 100%; padding: 15px; background: #f00; color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        button:hover { background: #fff; color: #f00; }
        #monitor { margin-top: 20px; background: #000; border: 1px solid #300; padding: 10px; font-size: 11px; height: 150px; overflow-y: auto; text-align: left; color: #0f0; border-left: 3px solid #f00; }
        .result-box { margin-top: 15px; display: none; }
        .maps-link { display: block; margin-top: 10px; padding: 12px; background: #fff; color: #000; text-decoration: none; font-weight: bold; border: 1px solid #f00; }
        .blink { animation: flash 0.5s infinite; }
        @keyframes flash { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="card">
    <h1>[ PRECISION TRACKER ]</h1>
    <input type="text" id="targetNum" placeholder="NOMOR (08...)">
    <button onclick="lockTarget()">INJECT & LOCK</button>

    <div id="monitor">
        > SYSTEM STANDBY...<br>
        > WAITING FOR TARGET...
    </div>

    <div id="resultArea" class="result-box">
        <p style="color:#fff; font-size: 11px;">TARGET LOCKED IN CIKARANG REGION</p>
        <a id="mapsBtn" href="#" target="_blank" class="maps-link">BUKA LOKASI SEKARANG</a>
    </div>
</div>

<script>
    function log(msg, color = "#0f0") {
        const mon = document.getElementById('monitor');
        mon.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        mon.scrollTop = mon.scrollHeight;
    }

    function lockTarget() {
        const num = document.getElementById('targetNum').value;
        const resBox = document.getElementById('resultArea');
        const mapsBtn = document.getElementById('mapsBtn');

        if(!num.startsWith('08')) { log("ERR: FORMAT SALAH!", "#f00"); return; }

        log("TARGET: " + num, "#fff");
        log("BYPASSING VPN/PROXY...");
        log("SCANNING LOCAL WIFI MAC ADDRESS...");
        log("TRIANGULATING CELL TOWERS...");

        // INI KUNCINYA: Paksa High Accuracy agar tidak lari ke luar negeri
        const options = {
            enableHighAccuracy: true, // WAJIB: Biar gak nyasar ke jepang
            timeout: 10000,
            maximumAge: 0
        };

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const acc = pos.coords.accuracy;

                log("COORDINATES LOCKED!", "#fff");
                log(`LAT: ${lat}`);
                log(`LON: ${lon}`);
                log(`PRECISION: ${acc} METERS`, "#ff0");

                mapsBtn.href = `https://www.google.com/maps?q=${lat},${lon}`;
                resBox.style.display = "block";
                log("<span class='blink'>READY TO VIEW!</span>", "#f00");
            }, 
            (err) => {
                log("FAILED: " + err.message, "#f00");
                log("SWITCHING TO IP-FALLBACK...", "#ff0");
            }, options);
        } else {
            log("ERR: BROWSER NOT SUPPORTED", "#f00");
        }
    }
</script>

</body>
</html>
