<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat - Realtime Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0b4a3f;
            --secondary: #128c7e;
            --bg-light: #f0f2f5;
            --bg-dark: #111b21;
            --text-main: #3b4a54;
            --my-chat: #d9fdd3;
            --other-chat: #ffffff;
            --accent: #00a884;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg-light: #0b141a;
            --text-main: #e9edef;
            --other-chat: #202c33;
            --my-chat: #005c4b;
            --bg-dark: #0b141a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* --- 1. INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            inset: 0;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease;
        }

        .intro-logo { font-size: 3.5rem; font-weight: bold; margin-bottom: 10px; animation: scaleUp 1s infinite alternate; }
        @keyframes scaleUp { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* --- 2 & 3. AUTH SYSTEM --- */
        #auth-container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: none;
            text-align: center;
        }

        .auth-title { margin-bottom: 30px; color: var(--primary); font-size: 1.8rem; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; transition: 0.3s; outline: none; }
        .input-group input:focus { border-color: var(--accent); }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: var(--transition); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,168,132,0.4); }

        .keep-login-wrap { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; font-size: 0.9rem; }
        .switch { position: relative; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 24px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(21px); }

        /* --- 4. MAIN INTERFACE --- */
        #main-app {
            display: none;
            width: 100vw;
            height: 100vh;
            grid-template-columns: 380px 1fr;
        }

        #sidebar {
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--bg-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .search-bar { padding: 15px; }
        .search-bar input { width: 100%; padding: 10px 15px; border-radius: 10px; border: none; background: var(--bg-light); outline: none; }

        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #f5f5f5;
        }
        .contact-item:hover { background: #f9f9f9; }
        .contact-item.active { background: #eff2f5; border-left: 4px solid var(--accent); }

        /* Chat Area */
        #chat-area {
            background: #efe7dd;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 15px 25px;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }

        #messages-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
        .sent { align-self: flex-end; background: var(--my-chat); border-top-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--other-chat); border-top-left-radius: 2px; }
        .time { font-size: 0.7rem; color: #888; margin-top: 5px; text-align: right; }

        .input-box {
            padding: 15px 25px;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .input-box input { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; outline: none; font-size: 1rem; }

        /* Settings Modal */
        #modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.6); display:none; z-index: 1000; backdrop-filter: blur(4px); }
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px;
            display: none; z-index: 1001;
        }

        @media (max-width: 768px) {
            #main-app { grid-template-columns: 1fr; }
            #sidebar { width: 100%; display: flex; }
            #chat-area { display: none; position: fixed; inset: 0; z-index: 100; }
            #chat-area.active { display: flex; }
            .back-btn { display: block !important; margin-right: 15px; cursor: pointer; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-logo"><i class="fas fa-comment-alt"></i> ZChat</div>
        <p style="letter-spacing: 2px; opacity: 0.9;">REALTIME MESSAGING</p>
        <p style="margin-top: 30px; font-size: 0.8rem;">Created by zZerr44</p>
    </div>

    <div id="auth-container">
        <h2 class="auth-title" id="auth-header">Welcome to ZChat</h2>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="auth-user" placeholder="Choose a name">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="auth-pass" placeholder="••••••••">
        </div>
        <div class="keep-login-wrap" id="keep-login-box">
            <span>Keep Login</span>
            <label class="switch">
                <input type="checkbox" id="keep-login">
                <span class="slider"></span>
            </label>
        </div>
        <button class="btn btn-primary" id="btn-auth">Login</button>
        <p style="margin-top: 20px; font-size: 0.85rem; color: var(--secondary); cursor: pointer;" id="switch-auth">New here? Register</p>
    </div>

    <div id="main-app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: grid; place-items: center; color: white;">
                        <i class="fa fa-user"></i>
                    </div>
                    <strong id="my-username">User</strong>
                </div>
                <div style="display: flex; gap: 18px; font-size: 1.2rem; color: #555;">
                    <i class="fa fa-user-plus" onclick="addUser()" style="cursor:pointer"></i>
                    <i class="fa fa-ellipsis-v" onclick="openSettings()" style="cursor:pointer"></i>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search or start new chat..." id="search-input" onkeyup="filterFriends()">
            </div>
            <div class="contact-list" id="contact-list"></div>
        </aside>

        <main id="chat-area">
            <div class="chat-header">
                <div style="display: flex; align-items: center;">
                    <i class="fa fa-arrow-left back-btn" style="display:none" onclick="closeChat()"></i>
                    <div style="width: 40px; height: 40px; background: #ccc; border-radius: 50%; margin-right: 12px; display: grid; place-items: center;">
                        <i class="fa fa-user"></i>
                    </div>
                    <div>
                        <strong id="chat-target-name">Select Contact</strong>
                        <p style="font-size: 0.75rem; color: #777;" id="target-status">offline</p>
                    </div>
                </div>
                <div id="chat-tools" style="display:none; gap: 20px; color: #555;">
                    <i class="fa fa-search"></i>
                    <i class="fa fa-ban" title="Block" onclick="blockUser()"></i>
                    <i class="fa fa-trash" title="Delete History" onclick="clearChat()"></i>
                </div>
            </div>

            <div id="messages-container"></div>

            <div class="input-box" id="chat-input-row" style="display:none">
                <i class="far fa-smile" style="font-size: 1.4rem; color: #666;"></i>
                <input type="text" id="message-input" placeholder="Type a message">
                <i class="fa fa-paper-plane" id="send-btn" style="color: var(--accent); font-size: 1.4rem; cursor: pointer;"></i>
            </div>
        </main>
    </div>

    <div id="modal-overlay" onclick="closeSettings()"></div>
    <div class="modal" id="settings-modal">
        <h3 style="margin-bottom: 20px;">Settings</h3>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; justify-content: space-between;">
                <span>Dark Mode</span>
                <input type="checkbox" id="dark-mode-toggle" onchange="toggleDark()">
            </div>
            <div>
                <p style="margin-bottom: 5px;">Wallpaper Color</p>
                <input type="color" id="bg-color" onchange="changeBg(this.value)" style="width: 100%;">
            </div>
            <hr>
            <div style="text-align: center; font-size: 0.8rem; color: #999;">
                <p><strong>ZChat Version 1.0</strong></p>
                <p>Created by zZerr44</p>
            </div>
            <button class="btn btn-primary" onclick="logout()">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GLOBAL STATE ---
        let me = localStorage.getItem('zchat_logged_user') || null;
        let activeTarget = null;
        let isRegister = false;

        // --- AUTH LOGIC ---
        const authBtn = document.getElementById('btn-auth');
        const switchBtn = document.getElementById('switch-auth');

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                    if(me) startApp();
                    else document.getElementById('auth-container').style.display = 'block';
                }, 500);
            }, 2000);
        };

        switchBtn.onclick = () => {
            isRegister = !isRegister;
            document.getElementById('auth-header').innerText = isRegister ? "Create Account" : "Welcome Back";
            authBtn.innerText = isRegister ? "Register" : "Login";
            switchBtn.innerText = isRegister ? "Already have account? Login" : "New here? Register";
            document.getElementById('keep-login-box').style.display = isRegister ? 'none' : 'flex';
        };

        authBtn.onclick = async () => {
            const user = document.getElementById('auth-user').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value;

            if(!user || !pass) return alert("Fill everything!");

            const userRef = ref(db, 'users/' + user);
            const snap = await get(userRef);

            if(isRegister) {
                if(snap.exists()) return alert("Username taken!");
                await set(userRef, { password: pass });
                alert("Registered! Now login.");
                switchBtn.click();
            } else {
                if(snap.exists() && snap.val().password === pass) {
                    me = user;
                    if(document.getElementById('keep-login').checked) {
                        localStorage.setItem('zchat_logged_user', user);
                    }
                    startApp();
                } else alert("Wrong credentials!");
            }
        };

        function startApp() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            document.getElementById('my-username').innerText = me;
            loadContacts();
        }

        // --- CONTACTS ---
        window.addUser = async () => {
            const friend = prompt("Enter username:").toLowerCase();
            if(!friend || friend === me) return;
            const snap = await get(ref(db, 'users/' + friend));
            if(!snap.exists()) return alert("User not found!");
            
            await set(ref(db, `contacts/${me}/${friend}`), true);
            loadContacts();
        };

        function loadContacts() {
            onValue(ref(db, `contacts/${me}`), (snap) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                if(!snap.exists()) return;
                Object.keys(snap.val()).forEach(name => {
                    const el = document.createElement('div');
                    el.className = 'contact-item';
                    el.innerHTML = `<div style="width:40px;height:40px;background:#ddd;border-radius:50%;margin-right:12px"></div><strong>${name}</strong>`;
                    el.onclick = () => openChat(name);
                    list.appendChild(el);
                });
            });
        }

        // --- CHAT SYSTEM ---
        function openChat(name) {
            activeTarget = name;
            document.getElementById('chat-target-name').innerText = name;
            document.getElementById('chat-tools').style.display = 'flex';
            document.getElementById('chat-input-row').style.display = 'flex';
            
            if(window.innerWidth <= 768) document.getElementById('chat-area').classList.add('active');

            const roomId = [me, name].sort().join("--");
            onValue(ref(db, 'messages/' + roomId), (snap) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                if(snap.exists()) {
                    Object.values(snap.val()).forEach(m => {
                        const div = document.createElement('div');
                        div.className = `bubble ${m.sender === me ? 'sent' : 'received'}`;
                        div.innerHTML = `${m.text}<div class="time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                }
            });
        }

        const sendMsg = async () => {
            const txt = document.getElementById('message-input').value.trim();
            if(!txt || !activeTarget) return;

            // Block Check
            const blocked = await get(ref(db, `blocked/${activeTarget}/${me}`));
            if(blocked.exists()) return alert("You are blocked by this user.");

            const roomId = [me, activeTarget].sort().join("--");
            push(ref(db, 'messages/' + roomId), {
                sender: me,
                text: txt,
                time: Date.now()
            });
            document.getElementById('message-input').value = "";
        };

        document.getElementById('send-btn').onclick = sendMsg;
        document.getElementById('message-input').onkeydown = (e) => { if(e.key==='Enter') sendMsg(); };

        // --- TOOLS ---
        window.closeChat = () => document.getElementById('chat-area').classList.remove('active');
        
        window.openSettings = () => {
            document.getElementById('settings-modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        };

        window.closeSettings = () => {
            document.getElementById('settings-modal').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        };

        window.toggleDark = () => document.body.classList.toggle('dark-mode');
        
        window.changeBg = (color) => {
            document.getElementById('chat-area').style.background = color;
        };

        window.logout = () => {
            localStorage.clear();
            location.reload();
        };

        window.clearChat = () => {
            if(confirm("Hapus semua pesan?")) {
                const roomId = [me, activeTarget].sort().join("--");
                remove(ref(db, 'messages/' + roomId));
            }
        };

        window.blockUser = async () => {
            if(confirm(`Blokir ${activeTarget}?`)) {
                await set(ref(db, `blocked/${me}/${activeTarget}`), true);
                alert("User blocked.");
            }
        };
